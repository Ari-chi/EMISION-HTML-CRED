window.toggleEjecEmi = function(id){
  const div = document.getElementById(id);
  const car = document.getElementById(id+'_car');
  if(!div) return;
  if(div.style.display!=='none'){ div.style.display='none'; if(car)car.textContent='▸'; return; }
  const rec = (state._ejecEmitido||{})[id];
  if(!rec){ div.innerHTML='—'; div.style.display='block'; return; }
  const {data} = rec;
  /* useUSD = moneda del BOTÓN 3° del HTML (la vista elegida).
     Los TOTALES de la sección se muestran en la vista; los detalles por póliza
     se muestran en la moneda ORIGINAL (con equivalente en la vista en gris). */
  const useUSD = rec.useUSD;
  /* El BONO se muestra en NEGATIVO (resta de la emisión). */
  const esBono = /^ejecEmi_bono_/.test(id);
  const sgnTxt = esBono ? '−' : '';

  /* Lookup de pólizas completas por clave (para acceder a proy/tasa/sin). */
  const polByClave = new Map();
  for(const fp of state.polizas){ polByClave.set(fp.clave, fp); polByClave.set(fp.poliza, fp); }
  /* Enriquecer los registros del bucket con proy/tasa/sinies del full póliza. */
  const enriched = data.polizas.map(r=>{
    const full = polByClave.get(r.clave) || polByClave.get(r.poliza) || {};
    return {
      ...r,
      _full: full,
      proyARS25: full.proyARS2025||0, proyARS26: full.proyARS2026||0,
      proyUSD25: full.proyUSD2025||0, proyUSD26: full.proyUSD2026||0,
      tasa25: full.tasa2025, tasa26: full.tasa2026,
      sinH25: full.sinH2025, sinH26: full.sinH2026,
      sinUV25: full.sinUV2025, sinUV26: full.sinUV2026,
    };
  });

  /* Valor en la moneda del botón */
  const valBtn = (p, campo)=> useUSD ? (p['usd'+campo]||0) : (p['ars'+campo]||0);
  /* Valor en la moneda ORIGINAL */
  const valOrig = (p, campo)=> (p.moneda==='US') ? (p['usd'+campo]||0) : (p['ars'+campo]||0);
  const monStr = (m)=> m==='US'?'US':'$';

  /* Etiqueta del concepto principal según el bucket que se está desplegando.
     Para Renovaciones/Segunda/Tercera/Pólizas nuevas, el valor es Prima Mín.;
     para Ajuste/Bono/Malus, el valor es el propio concepto; para Anualidad
     Anterior se muestra qué concepto(s) son AA en cada póliza (p.concepto). */
  const bucketKey = id.replace(/^ejecEmi_/, '').replace(/_[ua]$/, '');
  const conceptoBucketLbl = ({
    ren:'Prima', seg:'Prima', ter:'Prima', nuevas:'Prima',
    ajuste:'Ajuste', bono:'Bono', malus:'Malus',
    anualant:'AA'
  })[bucketKey] || 'Prima';

  /* ===== Comparación 2025 vs 2026: MISMO conjunto que la leyenda/detalle =====
     2026 = data.polizas (idéntico al donut/leyenda/detalle), enriquecido con proy/tasa/sin
     del 2026 y el valor del concepto (ars26/usd26). 2025 = set central state._ejecCS25
     (tipo2025 / concepto / AA). Así TODO coincide. */
  const enriched26 = data.polizas.map(r=>{
    const full = polByClave.get(r.clave) || polByClave.get(r.poliza) || {};
    return {
      moneda: r.moneda, rubro: r.rubro,
      val_ars: r.ars26||0, val_usd: r.usd26||0,
      proy_ars: full.proyARS2026||0, proy_usd: full.proyUSD2026||0,
      tasa: full.tasa2026, sinUV: full.sinUV2026, sinH: full.sinH2026,
    };
  });
  const enriched25 = (state._ejecCS25 || {})[bucketKey] || [];

  /* fila de póliza: poliza/asegurado + rubro a la izquierda, cuadrito gris con
     variaciones del concepto / PV / Tasa / SinUV / SinH abajo, monto 2026 + % a
     la derecha (verde sube, rojo baja, azul tenue igual). Debajo del monto
     principal aparece el equivalente en la moneda de la vista (cuando difiere),
     sin label adicional ni prefijo duplicado (fmtCompact ya inyecta $ / US). */
  const fila = (p)=>{
    const monOrig = (p.moneda==='US')?'US':'$';
    const monBtn = useUSD?'US':'$';
    const v26orig = valOrig(p,'26'), v25orig = valOrig(p,'25');
    const dOrig = v26orig - v25orig;
    const dpct = v25orig ? dOrig/Math.abs(v25orig) : null;
    let cc;
    /* Bono: SIEMPRE es negativo. La variación define el color como cualquier otro
       concepto: si el bono se hace MÁS negativo (dOrig<0) es PEOR → rojo; si se hace
       MENOS negativo (dOrig>0) es MEJOR → verde. */
    if(dOrig>0) cc='var(--pos)';
    else if(dOrig<0) cc='var(--neg)';
    else cc='var(--accent)';
    const equivLine = (monOrig!==monBtn)
      ? `<div style="font-size:11.5px;color:var(--ink-3);font-family:var(--font-mono);text-align:right;margin-top:2px">${sgnTxt}${fmtCompact(valBtn(p,'26'), useUSD)}</div>`
      : '';
    /* Etiqueta del concepto AA — viene en p.concepto (ej. "Prima+Ajuste"). */
    const lblConcepto = bucketKey==='anualant' ? (p.concepto || 'AA') : conceptoBucketLbl;
    const concBadge = (bucketKey==='anualant' && p.concepto)
      ? `<span style="font-size:11px;color:var(--accent-3);font-weight:700;background:rgba(124,77,255,.10);padding:1px 6px;border-radius:3px;margin-left:4px">${p.concepto}</span>`
      : '';
    /* Cuadrito gris con las variaciones de la póliza */
    const varLine = (label, v25, v26, fmt, deltaFmt, neg)=>{
      if(v25==null && v26==null) return '';
      if((v25==null||v25===0) && (v26==null||v26===0)) return '';
      const d = (v26||0) - (v25||0);
      const cT = d===0?'var(--accent)':(d>0?(neg?'var(--neg)':'var(--pos)'):(neg?'var(--pos)':'var(--neg)'));
      const pct = (v25!=null && v25!==0) ? d/Math.abs(v25) : null;
      return `<div style="display:grid;grid-template-columns:62px 1fr auto;gap:6px;font-size:11.5px;line-height:1.35;padding:1px 0">
        <span style="color:var(--accent-3);font-weight:700">${label}</span>
        <span style="font-family:var(--font-mono);color:var(--ink-2)">${fmt(v25)} → <strong>${fmt(v26)}</strong></span>
        <span style="font-family:var(--font-mono);font-weight:800;color:${cT};text-align:right;min-width:60px">${d>=0?'+':''}${deltaFmt(d)}${pct!=null?' ('+(d>=0?'+':'')+FMT_PCT(pct)+')':''}</span>
      </div>`;
    };
    /* Prima/PV: moneda original; Tasa/Sin: porcentaje */
    const pmO25 = (p.moneda==='US')?p.usd25:p.ars25;
    const pmO26 = (p.moneda==='US')?p.usd26:p.ars26;
    const pvO25 = (p.moneda==='US')?p.proyUSD25:p.proyARS25;
    const pvO26 = (p.moneda==='US')?p.proyUSD26:p.proyARS26;
    const isUS = p.moneda==='US';
    const fmtMon = (v)=>v==null?'—':fmtCompact(v, isUS);
    const fmtTasa = (v)=>v==null?'—':FMT_PCT_TASA(v);
    const fmtSin = (v)=>v==null?'—':FMT_PCT_SIN(v);
    /* Para "Corresponde a la Anualidad Anterior" mostramos SOLO la línea del
       concepto AA — sin PV/Tasa/Siniestralidad, porque la AA es residuo del
       período anterior y esas variables no aplican al desvío de este período. */
    const esAAbucket = (bucketKey==='anualant');
    const varBox = `<div style="background:rgba(0,0,0,.03);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin-top:6px;max-width:520px">
      ${varLine(lblConcepto, pmO25, pmO26, fmtMon, fmtMon, false)}
      ${esAAbucket?'':varLine('PV',    pvO25, pvO26, fmtMon, fmtMon, false)}
      ${esAAbucket?'':varLine('Tasa',  p.tasa25, p.tasa26, fmtTasa, fmtTasa, false)}
      ${esAAbucket?'':varLine('Sin UV',p.sinUV25, p.sinUV26, fmtSin, fmtSin, true)}
      ${esAAbucket?'':varLine('Sin H', p.sinH25, p.sinH26, fmtSin, fmtSin, true)}
    </div>`;
    return `<div style="padding:10px 4px;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start">
        <div style="min-width:0;flex:1">
          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:800;color:var(--accent-3);background:var(--bg-2);padding:2px 9px;border-radius:5px">${fmtPoliza(p.poliza)}</span>
            <span style="color:var(--ink-1);font-size:13.5px;font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(p.asegurado||'').substring(0,32)}</span>
            <span style="font-size:11px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${p.rubro||'—'}</span>
            ${concBadge}
          </div>
          ${varBox}
        </div>
        <div style="text-align:right;font-family:var(--font-mono);white-space:nowrap;min-width:130px">
          <div style="font-size:16px;font-weight:800;color:${cc}">${sgnTxt}${fmtCompact(v26orig, isUS)}</div>
          ${equivLine}
          ${dpct!=null?`<div style="font-size:13px;font-weight:800;color:${cc};margin-top:2px">${dOrig>=0?'+':''}${FMT_PCT(dpct)}</div>`:''}
        </div>
      </div>
    </div>`;
  };

  /* Resumen del bucket en formato cuadro: variación neta de proy/tasa/sin,
     conteo de pólizas por rubro y desvío de emisión por moneda. */
  const sumByMon = (arr, picker)=>{
    let s25=0, s26=0, n=0;
    for(const r of arr){
      const v25 = picker(r,'25'), v26 = picker(r,'26');
      if(v25==null && v26==null) continue;
      s25 += v25||0; s26 += v26||0; n++;
    }
    return {s25, s26, d:s26-s25, n, pct: s25?(s26-s25)/Math.abs(s25):null};
  };
  const avgByMon = (arr, picker25, picker26)=>{
    let s25=0, s26=0, n=0;
    for(const r of arr){
      const v25 = picker25(r), v26 = picker26(r);
      if(v25==null || v26==null) continue;
      s25+=v25; s26+=v26; n++;
    }
    return n>0 ? {v25:s25/n, v26:s26/n, d:(s26-s25)/n, n} : null;
  };
  const renderResumen = ()=>{
    /* Cada año desde su PROPIO conjunto (enriched25 / enriched26), separados por moneda. */
    const a$25 = enriched25.filter(r=>r.moneda==='$'), a$26 = enriched26.filter(r=>r.moneda==='$');
    const aU25 = enriched25.filter(r=>r.moneda==='US'), aU26 = enriched26.filter(r=>r.moneda==='US');
    const sumYr = (arr25, arr26, key)=>{
      const s25 = arr25.reduce((x,r)=>x+(r[key]||0),0);
      const s26 = arr26.reduce((x,r)=>x+(r[key]||0),0);
      return {s25, s26, d:s26-s25, pct: s25?(s26-s25)/Math.abs(s25):null, n25:arr25.length, n26:arr26.length};
    };
    const avgYr = (arr25, arr26, key)=>{
      const av=(arr)=>{ let s=0,n=0; for(const r of arr){ if(r[key]!=null){ s+=r[key]; n++; } } return n?s/n:null; };
      const v25=av(arr25), v26=av(arr26);
      return {v25, v26, d:(v25!=null&&v26!=null)?(v26-v25):null, n25:arr25.length, n26:arr26.length};
    };
    const proyARS = sumYr(a$25, a$26, 'proy_ars');
    const proyUSD = sumYr(aU25, aU26, 'proy_usd');
    const tasaARS = avgYr(a$25, a$26, 'tasa');
    const tasaUSD = avgYr(aU25, aU26, 'tasa');
    const sinUVARS = avgYr(a$25, a$26, 'sinUV');
    const sinUVUSD = avgYr(aU25, aU26, 'sinUV');
    const sinHARS  = avgYr(a$25, a$26, 'sinH');
    const sinHUSD  = avgYr(aU25, aU26, 'sinH');
    /* Rubros: conteo por rubro en cada conjunto (2025 y 2026) para mostrar variación. */
    const rub25 = {}, rub26 = {};
    for(const r of enriched25){ const k=r.rubro||'(sin rubro)'; rub25[k]=(rub25[k]||0)+1; }
    for(const r of enriched26){ const k=r.rubro||'(sin rubro)'; rub26[k]=(rub26[k]||0)+1; }
    const rubArr = [...new Set([...Object.keys(rub25), ...Object.keys(rub26)])]
      .map(k=>[k, rub25[k]||0, rub26[k]||0])
      .sort((a,b)=> b[2]-a[2] || b[1]-a[1]);
    const monARS = sumYr(a$25, a$26, 'val_ars');
    const monUSD = sumYr(aU25, aU26, 'val_usd');
    /* Helpers de formato */
    const fmtTasaPct = (v)=>v==null?'—':FMT_PCT_TASA(v);
    const fmtSinPct = (v)=>v==null?'—':FMT_PCT_SIN(v);
    /* Cells sin tinte de fondo. Solo el símbolo $/US se colorea sutil para
       diferenciar la moneda; al lado, el conteo de pólizas en esa moneda. */
    const monSymHTML = (sym, n)=>{
      /* Etiqueta de moneda original: "Pólizas Moneda Orig $/US". $ ámbar, US violeta. */
      const c = sym==='US' ? '#8b5cf6' : '#e89b1e';
      return `Pólizas Moneda Orig <span style="color:${c};font-weight:900">${sym}</span> <span style="color:var(--ink-3);font-weight:600">(${n} pól.)</span>`;
    };
    /* Encabezado de categoría (recuadro de color) para agrupar las cards. */
    const catHead = (label, bg, txt, border)=>`<div style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 6px;border-radius:7px;text-align:center;background:${bg};color:${txt};border:1.5px solid ${border};white-space:nowrap">${label}</div>`;
    /* Referencia de moneda a la izquierda (en vez de repetir la etiqueta en cada card). */
    const refCell = (sym, n25, n26)=>{
      const c = sym==='US' ? '#8b5cf6' : '#e89b1e';
      return `<div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:4px 8px;text-align:right;line-height:1.15">
        <span style="font-size:10px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Pólizas<br>Moneda Orig</span>
        <span style="font-size:16px;font-weight:900;color:${c};margin-top:2px">${sym}</span>
        <span style="font-size:11px;font-weight:800;color:var(--ink-2);font-family:var(--font-mono);margin-top:3px">${n25||0} → ${n26||0} <span style="color:var(--ink-3);font-weight:600">pól.</span></span>
      </div>`;
    };
    /* El conteo de pólizas va una sola vez bajo el $/US (es el mismo en toda la fila). */
    const nLbl = (info)=>'';
    /* AA: en "Corresponde a la Anualidad Anterior" SOLO se muestran Emisión y Rubros;
       proyección/tasa/siniestralidades quedan SIEMPRE en blanco (aunque haya datos). */
    const esAAdrill = /_anualant_/.test(id);
    const blankCell = `<div style="background:#fafbfc;border:1px dashed var(--line);border-radius:6px;padding:10px 13px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:11px;font-style:italic;min-height:48px">— no aplica —</div>`;
    /* Bloque "2025 → 2026" con el año arriba de cada valor, separado de la variación. */
    const arrowYears = (v25,v26,c25,c26)=>`<div style="display:flex;align-items:baseline;justify-content:center;gap:5px;margin-top:2px;font-family:var(--font-mono);white-space:nowrap">
        <span style="font-size:8.5px;color:var(--ink-3);font-weight:800">'25</span><span style="font-size:12px;color:${c25||'var(--ink-2)'}">${v25}</span>
        <span style="color:var(--ink-3);font-size:12px">→</span>
        <span style="font-size:8.5px;color:var(--ink-3);font-weight:800">'26</span><strong style="font-size:13px;color:${c26||'var(--accent-3)'}">${v26}</strong>
      </div>`;
    const cellMonto = (titulo, sym, info, isUS)=>{
      if(!info || ((info.n25||0)===0 && (info.n26||0)===0)){
        return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06);opacity:.6">
          ${nLbl(null)}
          ${arrowYears(fmtCompact(0,isUS), fmtCompact(0,isUS), 'var(--ink-3)', 'var(--ink-2)')}
          <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--ink-3);margin-top:2px;text-align:center">0</div>
        </div>`;
      }
      const c = info.d>=0?'var(--pos)':'var(--neg)';
      return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06)">
        ${nLbl(info)}
        ${arrowYears(fmtCompact(info.s25,isUS), fmtCompact(info.s26,isUS))}
        <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${info.d>=0?'+':''}${fmtCompact(info.d,isUS)}${info.pct!=null?' ('+(info.d>=0?'+':'')+FMT_PCT(info.pct)+')':''}</div>
      </div>`;
    };
    const cellPct = (sym, info, fmt, neg)=>{
      if(!info || ((info.n25||0)===0 && (info.n26||0)===0)){
        return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06);opacity:.6">
          ${nLbl(null)}
          ${arrowYears(fmt(0), fmt(0), 'var(--ink-3)', 'var(--ink-2)')}
          <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--ink-3);margin-top:2px;text-align:center">0</div>
        </div>`;
      }
      const c = info.d===0?'var(--accent)':(info.d>0?(neg?'var(--neg)':'var(--pos)'):(neg?'var(--pos)':'var(--neg)'));
      const rel = info.v25?info.d/Math.abs(info.v25):null;
      return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06)">
        ${nLbl(info)}
        ${arrowYears(fmt(info.v25), fmt(info.v26))}
        <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${info.d>=0?'+':''}${fmt(info.d)}${rel!=null?` <span style="font-size:12px">(${info.d>=0?'+':''}${FMT_PCT(rel)})</span>`:''}</div>
      </div>`;
    };
    /* Siniestralidad UNIFICADA: una sola card con dos renglones — UV arriba, H abajo
       (cada uno: 2025 → 2026 + variación). Sube de siniestralidad = negativo (rojo). */
    const cellSinUnif = (uvInfo, hInfo, fmt)=>{
      /* Sin % de variación: solo 2025 → 2026. El 2026 se pinta según el cambio: sube → rojo,
         baja → verde, igual → neutro. */
      const linea = (lbl, info)=>{
        if(!info || ((info.n25||0)===0 && (info.n26||0)===0)) return `<div style="display:flex;align-items:baseline;gap:6px;font-size:12.5px"><strong style="color:var(--ink-2);min-width:24px">${lbl}:</strong> <span style="color:var(--ink-3);font-style:italic;font-size:11.5px">— sin datos —</span></div>`;
        const c26 = info.d>0?'var(--neg)':(info.d<0?'var(--pos)':'var(--accent-3)');
        return `<div style="display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;font-family:var(--font-mono)">
          <strong style="color:var(--accent-3);min-width:24px;font-family:Calibri">${lbl}:</strong>
          <span style="font-size:13px;color:var(--ink-2)">${fmt(info.v25)} <span style="color:var(--ink-3)">→</span> <strong style="color:${c26};font-size:14.5px">${fmt(info.v26)}</strong></span>
        </div>`;
      };
      const _ni = uvInfo || hInfo || {};
      return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06);display:flex;flex-direction:column;gap:8px;justify-content:center">
        ${linea('UV', uvInfo)}
        <div style="border-top:1px dashed var(--line)"></div>
        ${linea('H', hInfo)}
      </div>`;
    };
    const rubrosCell = (()=>{
      const half = Math.ceil(rubArr.length/2);
      const cel = (x)=> x ? `<span style="font-size:11px;color:var(--accent-3);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x[0]}</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);text-align:right">${x[1]}</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;text-align:right">${x[2]}</span>` : `<span></span><span></span><span></span>`;
      let cells='';
      for(let i=0;i<half;i++){ cells += cel(rubArr[i]) + cel(rubArr[i+half]); }
      return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;box-shadow:0 1px 4px rgba(10,31,58,.06);height:100%${rubArr.length>0?'':';opacity:.6'}">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:4px"><span>Rubros (${rubArr.length})</span><span style="font-family:var(--font-mono)">'25·'26</span></div>
        ${rubArr.length>0 ? `<div style="display:grid;grid-template-columns:1fr 20px 20px 1fr 20px 20px;gap:2px 9px;align-items:baseline">${cells}</div>` : '<span style="font-size:11px;color:var(--ink-3);font-style:italic">— sin rubros —</span>'}
      </div>`;
    })();
    const proyARSCell = esAAdrill ? blankCell : cellMonto('', '$',  proyARS, false);
    const proyUSDCell = esAAdrill ? blankCell : cellMonto('', 'US', proyUSD, true);
    const pctCell = (sym,info,fmt,neg)=> esAAdrill ? blankCell : cellPct(sym,info,fmt,neg);
    const sinCell = (uvI,hI)=> esAAdrill ? blankCell : cellSinUnif(uvI, hI, fmtSinPct);
    const monARSCell  = cellMonto('', '$',  monARS, false);
    const monUSDCell  = cellMonto('', 'US', monUSD, true);
    /* Variación total emisión 2025→2026, unificada en la moneda elegida (valBtn ya
       devuelve el equivalente en USD o ARS$ según el botón de Moneda). */
    const _t25 = enriched25.reduce((a,r)=>a+(useUSD?r.val_usd:r.val_ars),0);
    const _t26 = enriched26.reduce((a,r)=>a+(useUSD?r.val_usd:r.val_ars),0);
    const _dT = _t26 - _t25, _dTp = _t25 ? _dT/Math.abs(_t25) : null;
    /* Grilla unificada: 1ª columna = referencia de moneda ($ arriba / US abajo);
       luego Emisión · Proyección · Tasa · Sin. UV · Sin. Hist. · Rubros. */
    return `<div style="margin-bottom:14px">
      <div style="overflow-x:auto"><div style="display:grid;grid-template-columns:auto repeat(5,minmax(104px,1fr));gap:5px;align-items:stretch;min-width:560px">
        <div></div>
        ${catHead('Emisión','#2d9b6a','#fff','#2d9b6a')}
        ${catHead('Proyección','rgba(30,111,217,.10)','#1e6fd9','#1e6fd9')}
        ${catHead('Tasa promedio','rgba(139,92,246,.12)','#7c4ddb','#8b5cf6')}
        ${catHead('Siniestralidad','rgba(232,155,30,.14)','#b9760f','#e89b1e')}
        ${catHead('Rubros','rgba(94,179,232,.16)','#2a6aa0','#5eb3e8')}
        ${refCell('$', monARS.n25, monARS.n26)}
        ${monARSCell}
        ${proyARSCell}
        ${pctCell('$', tasaARS, fmtTasaPct, false)}
        ${sinCell(sinUVARS, sinHARS)}
        <div style="grid-row:span 2">${rubrosCell}</div>
        ${refCell('US', monUSD.n25, monUSD.n26)}
        ${monUSDCell}
        ${proyUSDCell}
        ${pctCell('US', tasaUSD, fmtTasaPct, false)}
        ${sinCell(sinUVUSD, sinHUSD)}
      </div></div>
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:flex-end;gap:12px;flex-wrap:wrap;padding:9px 14px;background:rgba(45,155,106,.06);border:1px solid var(--line);border-radius:8px">
        <span style="font-size:11.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:800">Variación total emisión 2025→2026 · ${useUSD?'USD':'ARS$'}</span>
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--ink-2)">${fmtCompact(_t25,useUSD)} <span style="color:var(--ink-3)">→</span> <strong style="color:var(--accent-3)">${fmtCompact(_t26,useUSD)}</strong></span>
        <span style="font-family:var(--font-mono);font-size:18px;font-weight:800;color:${_dT>=0?'var(--pos)':'var(--neg)'}">${_dT>=0?'+':''}${fmtCompact(_dT,useUSD)}${_dTp!=null?' ('+(_dT>=0?'+':'')+FMT_PCT(_dTp)+')':''}</span>
      </div>
    </div>`;
  };
  const resumenCard = renderResumen();

  /* "Pólizas nuevas" y "Anualidad Anterior" no tienen comparación con 2025 que
     tenga sentido (las nuevas no existían y las AA pertenecen al período previo),
     así que en esas tarjetas mostramos una sola lista ordenada por monto.
     El resto (Renovaciones, Segunda/Tercera anualidad, Ajuste, Malus, Bono) se
     desglosa en tres bloques: Crecieron / Mantienen / Cayeron. */
  const esSimple = /^ejecEmi_(nuevas|anualant)_/.test(id);

  /* Una columna = una moneda ORIGINAL ($ o US). monOrig: 'US' o '$' (filtra por
     moneda original de la póliza). Usa `enriched` para acceder a proy/tasa/sin. */
  const col = (monOrig)=>{
    const arr = enriched.filter(p=>p.moneda===monOrig);
    const umbralPct = (monOrig==='US')?10:30;
    const umbral = umbralPct/100;
    const esUS = (monOrig==='US');
    const headColor = esUS?'var(--pos)':'var(--accent)';
    const headBg = esUS?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    const tot = arr.reduce((a,p)=>a+valBtn(p,'26'),0);
    /* Ordenar de MAYOR a MENOR emisión dentro de cada sección. */
    const ordDesc = (a,b)=> valBtn(b,'26')-valBtn(a,'26');
    const bloque = (a2, titulo, color, bg)=>{
      if(a2.length===0) return '';
      /* Sin título → solo las pólizas (no repetimos el header que ya está arriba en la columna). */
      if(!titulo) return `<div style="margin-bottom:14px">${a2.map(p=>fila(p)).join('')}</div>`;
      const t2 = a2.reduce((s,p)=>s+valBtn(p,'26'),0);
      return `<div style="margin-bottom:14px">
        <div style="font-size:15px;font-weight:800;color:${color};margin-bottom:6px;padding:6px 10px;background:${bg};border-radius:6px;display:flex;justify-content:space-between;align-items:center">
          <span>${titulo} · ${a2.length} pól.</span>
          <span style="font-family:var(--font-mono);font-size:16px;color:${esBono?'var(--neg)':'inherit'}">${sgnTxt}${fmtCompact(t2,useUSD)}</span>
        </div>
        ${a2.map(p=>fila(p)).join('')}
      </div>`;
    };
    /* Cabecera sutil: solo el chip de moneda lleva tinte; el resto de la fila
       sigue siendo el fondo del card. Mismos colores que el resumen card
       ($ → ámbar, US → violeta) para consistencia visual. */
    const monChip = monedaChipHTML(esUS);
    const cabecera = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:11px 14px;background:${esUS?'rgba(139,92,246,.12)':'rgba(232,155,30,.14)'};border:1.5px solid ${esUS?'#8b5cf6':'#e89b1e'};border-radius:8px">
      ${monChip}
      <span style="margin-left:auto;font-family:var(--font-mono);font-size:19px;font-weight:800;color:${esBono?'var(--neg)':'var(--accent-3)'}">${arr.length} pól. · ${sgnTxt}${fmtCompact(tot,useUSD)}</span>
    </div>`;
    if(arr.length===0){
      return `<div>${cabecera}<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas en esta moneda —</div></div>`;
    }
    /* Lista única de pólizas ordenadas por emisión (se quitó el split por umbral +30/10%). */
    const sorted = [...arr].sort(ordDesc);
    return `<div>${cabecera}${bloque(sorted, '', headColor, headBg)}</div>`;
  };

  /* Layout: resumen arriba + dos columnas (moneda original $ izq, US der). */
  div.innerHTML = `${resumenCard}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${col('$')}${col('US')}</div>`;
  div.style.display='block';
  if(car)car.textContent='▾';
};

/* ============================================================
   OTROS CONCEPTOS (dentro del Desvío)
   - Suba de proyección en Renovaciones
   - Suba de proyección en Segunda anualidad
   - Variación de tasas (las que aumentaron) + conclusión general
   Mismo formato desplegable que "Lo que se emitió".
============================================================ */
function ejecOtrosConceptos(S, useUSD, dual){
  const FMTc=(v)=>fmtCompact(v,useUSD);
  const mLbl=useUSD?'USD':'ARS$';
  const sufijo = useUSD?'u':'a';
  const cats = [
    {key:'proyRen', lbl:'Suba de proyección — Renovaciones', tipo:'proy'},
    {key:'proySeg', lbl:'Suba de proyección — Segunda anualidad', tipo:'proy'},
    {key:'tasas',   lbl:'Variación de tasas (aumentaron)', tipo:'tasa'},
    {key:'noCrecieron', lbl:'Pólizas que no crecieron (mantienen o suben pero no llegan al objetivo)', tipo:'nocrece'},
  ];
  const cards = cats.map(c=>{
    const id = `ejecOtros_${c.key}_${sufijo}`;
    const data = S.otrosConceptos ? S.otrosConceptos[c.key] : null;
    const n = data ? data.polizas.length : 0;
    if(n===0) return '';
    /* Para proyección mostramos el monto sumado; para tasas y no-crecieron, la cantidad */
    const right = (c.tipo==='proy')
      ? `<span style="font-size:24px;font-weight:800;color:var(--warn);font-family:var(--font-mono)">+${FMTc(data.total)}</span>`
      : `<span style="font-size:20px;font-weight:800;color:var(--warn);font-family:var(--font-mono)">${n} pól.</span>`;
    return `<div style="background:rgba(232,155,30,.06);border-radius:8px;border-left:5px solid var(--warn);margin-bottom:8px">
      <div style="padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px" onclick="toggleEjecOtros('${id}')">
        <div>
          <span style="font-size:17px;color:var(--accent-3);font-weight:700">${c.lbl}</span>
          <span style="font-size:14px;color:var(--ink-3);margin-left:8px">${n} pól.</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${right}
          <span id="${id}_car" style="font-size:15px;color:var(--warn)">▸</span>
        </div>
      </div>
      <div id="${id}" style="display:none;padding:0 18px 14px"></div>
    </div>`;
  }).join('');

  state._ejecOtros = state._ejecOtros || {};
  cats.forEach(c=>{
    const id = `ejecOtros_${c.key}_${sufijo}`;
    state._ejecOtros[id] = (S.otrosConceptos && S.otrosConceptos[c.key])
      ? {data:S.otrosConceptos[c.key], useUSD, tipo:c.tipo}
      : {data:{total:0,polizas:[]}, useUSD, tipo:c.tipo};
  });

  return `<div style="margin-top:${dual?14:8}px">
    ${dual?`<div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:8px">${mLbl}</div>`:''}
    ${cards||'<div style="font-size:12px;color:var(--ink-3);font-style:italic">— sin movimientos en otros conceptos —</div>'}
  </div>`;
}

/* Conclusión general de tasa a partir de Categoría + Detalle//Observaciones */
/* Mini-resumen a partir de categoría + detalle//observaciones */
function miniResumen(categoria, detalle){
  const partes = [];
  if(categoria && String(categoria).trim() && !categoriaEsNoCorresponde(categoria)) partes.push(String(categoria).trim());
  if(detalle && String(detalle).trim()) partes.push(String(detalle).trim());
  if(partes.length===0) return '';
  return partes.join(' — ');
}
function conclusionTasa(r){
  const partes = [];
  if(r.categoria) partes.push(r.categoria);
  if(r.detalle) partes.push(r.detalle);
  if(r.proyCat && r.proyCat!==r.categoria) partes.push('Proy.: '+r.proyCat);
  if(partes.length===0) return 'Sin observaciones registradas para la variación.';
  return partes.join(' — ');
}

window.toggleEjecOtros = function(id){

  const rec = (state._ejecOtros||{})[id];
  if(!rec){ div.innerHTML='—'; div.style.display='block'; return; }

  const useUSD = rec.useUSD;
  const valBtn = (p, campo)=> useUSD ? (p['usd'+campo]||0) : (p['ars'+campo]||0);
  const valOrig = (p, campo)=> (p.moneda==='US') ? (p['usd'+campo]||0) : (p['ars'+campo]||0);

  if(tipo==='nocrece'){
    /* Desglose "No crecieron": por moneda original, emisión total 25→26 + cuánto creció
       vs objetivo, con justificación (categoría + detalle). */
    const filaNC = (p)=>{
      const v25 = (p.moneda==='US')?p.usd25:p.ars25;
      const v26 = (p.moneda==='US')?p.usd26:p.ars26;
      const uuO = p.moneda==='US';
      const resumen = miniResumen(p.categoria, p.detalle);
      const miniTxt = resumen ? `<div style="font-size:13px;color:var(--ink-3);margin-top:3px;font-style:italic;line-height:1.35">${resumen}</div>` : '<div style="font-size:12.5px;color:var(--warn);margin-top:3px;font-style:italic">⚠ sin categoría/observación que lo justifique</div>';
      return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline">
          <span style="font-size:14.5px"><strong>${fmtPoliza(p.poliza)}</strong> <span style="color:var(--ink-2)">${(p.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${p.rubro||'—'}</span></span>

        </div>
        ${miniTxt}
      </div>`;
    };
    const colNC = (monOrig)=>{
      const arr = data.polizas.filter(p=>p.moneda===monOrig);
      const esUS=(monOrig==='US'); const umb=esUS?10:30;
      const headColor=esUS?'var(--pos)':'var(--accent)';
      const headBg=esUS?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
      return `<div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 4px;border-bottom:1px solid var(--line)">
          ${monedaChipHTML(esUS)}
          <span style="font-size:12px;color:var(--ink-3);font-weight:700">No llega a +${umb}%</span>
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:20px;font-weight:800;color:${headColor}">${arr.length} pól.</span>
        </div>
        ${arr.sort((a,b)=>a.crec-b.crec).map(p=>filaNC(p)).join('')||'<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas en esta moneda —</div>'}
      </div>`;
    };
    div.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colNC('$')}${colNC('US')}</div>`;
    div.style.display='block';
    if(car)car.textContent='▾';
    return;
  }

  if(tipo==='tasa'){
    /* Desglose de tasas: por moneda original, fila = tasa 25→26 + conclusión */
    const filaTasa = (p)=>{
      const d = (p.tasa26-p.tasa25);
      return `<div style="padding:8px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline">

          <span style="font-family:var(--font-mono);white-space:nowrap;font-size:14px">${FMT_PCT_TASA(p.tasa25)} → <strong style="color:var(--pos);font-size:15px">${FMT_PCT_TASA(p.tasa26)}</strong> <span style="color:var(--pos);font-weight:800">(+${FMT_PCT_TASA(d)})</span></span>
        </div>
        <div style="font-size:11.5px;color:var(--ink-3);margin-top:3px;font-style:italic;line-height:1.3">${conclusionTasa(p)}</div>
      </div>`;
    };
    const colT = (monOrig)=>{
      const arr = data.polizas.filter(p=>p.moneda===monOrig);
      const esUS=(monOrig==='US');
      const headColor=esUS?'var(--pos)':'var(--accent)';
      const headBg=esUS?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
      return `<div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 4px;border-bottom:1px solid var(--line)">
          ${monedaChipHTML(esUS)}
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:18px;font-weight:800;color:var(--accent-3)">${arr.length} pól.</span>
        </div>
        ${arr.map(p=>filaTasa(p)).join('')||'<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas en esta moneda —</div>'}
      </div>`;
    };
    div.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colT('$')}${colT('US')}</div>`;
    div.style.display='block';
    if(car)car.textContent='▾';
    return;
  }

  /* Desglose de proyección: igual a "Lo que se emitió" (crecieron/resto por moneda original) */
  const fila = (p)=>{
    const v26 = valBtn(p,'26'), v25 = valBtn(p,'25');
    const dpct = v25 ? (v26-v25)/Math.abs(v25) : null;
    const cc = (v26-v25)>=0?'var(--pos)':'var(--neg)';
    const monOrig=(p.moneda==='US')?'US':'$'; const monBtn=useUSD?'US':'$';
    const equivLine = (monOrig!==monBtn)
      ? `<div style="font-size:12px;color:var(--ink-3);font-family:var(--font-mono);text-align:right;margin-top:2px">${monOrig==='US'?'US':'$'} ${fmtCompact(valOrig(p,'26'),monOrig==='US')}</div>`
      : '';
    /* mini-texto con categoría + detalle/justificación */
    const resumen = miniResumen(p.categoria, p.detalle);
    const miniTxt = resumen ? `<div style="font-size:11.5px;color:var(--ink-3);margin-top:3px;font-style:italic;line-height:1.3">${resumen}</div>` : '';
    return `<div style="padding:8px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline">
        <span style="font-size:14px"><strong>${fmtPoliza(p.poliza)}</strong> <span style="color:var(--ink-2);font-size:13px">${(p.asegurado||'').substring(0,22)}</span> <span style="font-size:11px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${p.rubro||'—'}</span></span>
        <span style="font-family:var(--font-mono);white-space:nowrap;font-size:15px;font-weight:700">${fmtCompact(v26,useUSD)} <span style="color:${cc};font-weight:800;font-size:13px">${dpct!=null?'('+((v26-v25)>=0?'+':'')+FMT_PCT(dpct)+')':''}</span></span>
      </div>
      ${equivLine}
      ${miniTxt}
    </div>`;
  };
  const col = (monOrig)=>{
    const arr = data.polizas.filter(p=>p.moneda===monOrig);
    const umbral=(monOrig==='US')?10:30; const esUS=(monOrig==='US');
    const headColor=esUS?'var(--pos)':'var(--accent)';
    const headBg=esUS?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    const tot = arr.reduce((a,p)=>a+valBtn(p,'26'),0);
    const ordDesc2 = (a,b)=> valBtn(b,'26')-valBtn(a,'26');
    const crecen=arr.filter(p=>p.creció).sort(ordDesc2), resto=arr.filter(p=>!p.creció).sort(ordDesc2);
    const bloque=(a2,titulo,color,bg)=>{

          <span>${titulo} · ${a2.length} pól.</span>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:5px 7px;background:${headBg};border-radius:8px;border:2px solid ${headColor}">

      </div>
      ${bloque(crecen, `Crecieron +${umbral}%`, 'var(--pos)', 'rgba(45,155,106,.10)')}
      ${bloque(resto, 'Resto', 'var(--accent-3)', 'rgba(30,111,217,.06)')}
      ${arr.length===0?'<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas en esta moneda —</div>':''}
    </div>`;
  };
  div.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${col('$')}${col('US')}</div>`;
  div.style.display='block';
  if(car)car.textContent='▾';
};

/* Segmento de la barra apilada del desvío */
function ejecGapSeg(val, total, color){
  if(val<=0 || total<=0) return '';
  const pct = Math.min(100, val/total*100);
  if(pct < 0.3) return '';
  /* Mostramos el % dentro de la barra cuando hay espacio (~3%+). Los segmentos más
     finos quedan sin número adentro pero SÍ aparecen en los ticks debajo y en la leyenda. */
  const showLabel = pct >= 3;
  const oneDec = pct < 10;  /* en segmentos chicos mostramos 1 decimal */
  const lbl = showLabel ? (oneDec ? pct.toFixed(1) : Math.round(pct))+'%' : '';
  return `<div title="${pct.toFixed(1)}%" style="width:${pct}%;background:${color};height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:inset -1px 0 0 rgba(255,255,255,.35);text-shadow:0 1px 2px rgba(0,0,0,.35)">${lbl}</div>`;
}

/* Item de leyenda de la barra del desvío */
function ejecLegend(color, label, val, n, useUSD){
  const FMT = useUSD?FMT_USD_FULL:FMT_ARS_FULL;
  return `<span style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-2)"><span style="width:11px;height:11px;border-radius:2px;background:${color};flex-shrink:0"></span>${label} · <strong style="color:var(--accent-3)">${FMT(val)}</strong>${n>0?` <span style="color:var(--ink-3)">(${n})</span>`:''}</span>`;
}

/* Narrativa dinámica del desvío para el directorio */
function ejecNarrativa(cPend, nPend, cPerdidas, nPerdidas, cPrimaMin, cAjuste, cBono, cMalus, cOtros, useUSD){
  const FMT = useUSD?FMT_USD_FULL:FMT_ARS_FULL;
  const partes = [];
  if(cPend>1) partes.push(`<strong style="color:var(--warn)">${FMT(cPend)}</strong> todavía están pendientes de emitir (${nPend} anualidad${nPend===1?'':'es'} vencida${nPend===1?'':'s'} sin cargar)`);
  if(cPerdidas>1) partes.push(`<strong style="color:var(--neg)">${FMT(cPerdidas)}</strong> se perdieron por ${nPerdidas} póliza${nPerdidas===1?'':'s'} que no renovaron`);
  if(cPrimaMin>1) partes.push(`<strong style="color:var(--neg)">${FMT(cPrimaMin)}</strong> por menor prima mínima en pólizas que renovaron por menos (baja de proyección de ventas y/o tasa)`);
  const abm = cAjuste+cBono+cMalus;
  if(abm>1) partes.push(`<strong style="color:var(--neg)">${FMT(abm)}</strong> por ajuste, bono y malus`);
  let txt = '';
  if(partes.length===0){
    txt = 'el desvío no se puede atribuir póliza por póliza con los datos disponibles.';
  } else {
    txt = partes.join('; ') + '.';
    if(cOtros>1) txt += ` El resto (<strong>${FMT(cOtros)}</strong>) no se puede atribuir póliza por póliza con los datos disponibles.`;
  }
  return txt;
}
