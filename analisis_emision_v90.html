/* Plugin inline: dibuja el valor compacto arriba de cada barra */
function barTopLabelPlugin(useUSD){
  return {
    id:'barTopLabel',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      ctx.save();
      ctx.font = '600 10px Calibri, sans-serif';
      ctx.fillStyle = '#3d5475';
      ctx.textAlign = 'center';
      chart.data.datasets.forEach((ds, di)=>{
        const meta = chart.getDatasetMeta(di);
        if(meta.hidden) return;
        meta.data.forEach((bar, i)=>{
          const v = ds.data[i];
          if(v==null || v===0) return;
          /* Positivos arriba de la barra; negativos DEBAJO (para que no se superpongan) */
          const y = v<0 ? bar.y + 12 : bar.y - 4;
          ctx.fillText(fmtCompact(v, useUSD), bar.x, y);
        });
      });
      ctx.restore();
    }
  };
}

/* Gráfico mensual: Emisión Real 2026 vs Presupuesto, con Proyección Actualizada (amarillo) y
   Estimación Inicial (gris). Toggle "Estimaciones anteriores" agrega el gris en los meses con
   emisión real para comparar lo estimado vs lo emitido. */
/* Agregado mensual de "Presup Arg HTML": total y confirmado (amarillo) por mes, en la moneda
   pedida ('u'=MON.ORIG / 'a'=ARS). El bono resta. */
function presupArgMensual(suf){
  const out={total:Array(12).fill(0), conf:Array(12).fill(0)};
  const pa=state._presupArg; if(!pa||!pa.ok) return out;
  /* Dedup amarillo (Confirmado) vs gris (Presupuestado): una misma (póliza, concepto) NO se
     cuenta en los dos. Predomina el amarillo: si está confirmada, su parte presupuestada (gris)
     no se suma. */
  const confKeys=new Set();
  for(const e of pa.rows){ const ck=_tipoToConcepto(e.tipo); if(!ck) continue;
    if(e.months.some(mo=>mo.yellow)) confKeys.add(_polKey(e.poliza)+'|'+ck); }
  for(const e of pa.rows){ const ck=_tipoToConcepto(e.tipo); if(!ck) continue; const sgn=(ck==='bono')?-1:1;
    const key=_polKey(e.poliza)+'|'+ck;
    for(const mo of e.months){ const v=(suf==='u')?((mo.usd!=null&&mo.usd!==0)?mo.usd:(mo.ars/(state._ejecTC||1400))):mo.ars; if(!isFinite(v)||!v) continue; const mi=mo.m-1; if(mi<0||mi>11)continue;
      if(mo.yellow){ out.conf[mi]+=sgn*v; out.total[mi]+=sgn*v; }
      else if(!confKeys.has(key)){ out.total[mi]+=sgn*v; }   /* gris solo si NO está confirmada esa póliza+concepto */
    } }
  return out;
}
/* Patrón rayado gris para la parte PRESUPUESTADA (no confirmada) de los meses proyectados. */
let _stripeGrayCache=null;
function _stripeGray(){
  if(_stripeGrayCache) return _stripeGrayCache;
  const c=document.createElement('canvas'); c.width=c.height=7; const x=c.getContext('2d');
  x.fillStyle='rgba(160,170,185,0.20)'; x.fillRect(0,0,7,7);
  x.strokeStyle='rgba(120,132,150,0.55)'; x.lineWidth=1.5;
  x.beginPath(); x.moveTo(-1,7); x.lineTo(7,-1); x.moveTo(3,9); x.lineTo(9,3); x.stroke();
  _stripeGrayCache=x.createPattern(c,'repeat'); return _stripeGrayCache;
}
function drawEjecChartMensual(canvasId, polArr, presArr, mesCorte, useUSD){
  if(!document.getElementById(canvasId)) return;
  const md = computeMensual(polArr);
  const lim = mesCorte===0 ? 12 : mesCorte;
  const corte26 = (state.globalMes2026 && state.globalMes2026>0) ? Math.min(state.globalMes2026, lim) : lim;
  const labels = MESES.slice(0, lim);
  const r26full = (useUSD? md.real26.usd : md.real26.ars).slice(0,lim);
  const r26 = r26full.map((v,i)=> (i < corte26) ? v : null);
  const presup = (presArr||Array(12).fill(0)).slice(0,lim);
  /* AMARILLO = "Proyección Actualizada" (Emisión Confirmada) en los meses SIN emisión real.
     El presupuesto va como línea punteada. */
  const paM = presupArgMensual(useUSD?'u':'a');
  const projConf=[], grayEstim=[];
  for(let i=0;i<lim;i++){
    const actual=r26full[i]||0;
    if(actual>0.5){ projConf[i]=null; }
    else { const conf=paM.conf[i]||0; projConf[i]= conf>0.5?conf:null; }
    grayEstim[i]=null;
  }
  const hayAmar = projConf.some(v=>v!=null);
  const hayGris = false;
  const hayProj = hayAmar;
  const datasets = [];
  datasets.push({label:'Presupuesto 2026', data:presup, type:'line', stack:'pl26', borderColor:'#0a3d7a', backgroundColor:'rgba(10,61,122,.08)', pointBackgroundColor:'#0a3d7a', pointBorderColor:'#fff', pointBorderWidth:1, borderWidth:1.8, borderDash:[2,3], pointRadius:2.4, pointHoverRadius:4, fill:false, tension:.25, spanGaps:true});
  /* Emisión Real 2026 + Proyección Actualizada apiladas en el mismo stack 'y26'. */
  datasets.push({label:'Emisión Real 2026', data:r26, stack:'y26', backgroundColor:'rgba(108,189,237,.88)', borderColor:'#4aa3e0', borderWidth:1.5, borderRadius:3, barPercentage:.7, categoryPercentage:.8});
  if(hayAmar){
    datasets.push({label:'Proyección Actualizada', data:projConf, stack:'y26', backgroundColor:'#ffe14d', borderColor:'#e0a800', borderWidth:1, borderRadius:3, barPercentage:.7, categoryPercentage:.8});
  }
  /* Opciones base + meses más grandes (pedido del usuario) + margen superior
     para que entren las etiquetas de valor arriba de las barras/puntos. */
  const opts = chartOpts({yMoney:useUSD?'usd':'ars',legend:true});
  /* Tooltip de "Real 2026": muestra el DESGLOSE MENSUAL por concepto del mes
     (prima mínima · ajuste · bono · malus) de lo emitido ese mes. */
  const _c26 = useUSD
    ? {pm:md.concept26.primaMin.usd, aj:md.concept26.ajuste.usd, bo:md.concept26.bono.usd, ma:md.concept26.malus.usd}
    : {pm:md.concept26.primaMin.ars, aj:md.concept26.ajuste.ars, bo:md.concept26.bono.ars, ma:md.concept26.malus.ars};
  opts.plugins = opts.plugins || {};
  opts.interaction = {mode:'index', intersect:false};
  opts.plugins.tooltip = Object.assign({}, opts.plugins.tooltip, {
    callbacks: Object.assign({}, (opts.plugins.tooltip||{}).callbacks, {
      afterBody: (its)=>{
        const it = (its||[]).find(x=>x.dataset && x.dataset.label==='Emisión Real 2026');
        if(!it) return '';
        const m = it.dataIndex;
        const out = ['', 'Emitido este mes:'];
        const add=(lbl,v)=>{ if(Math.abs(v||0)>0.5) out.push('  '+lbl+': '+(v<0?'−':'')+fmtCompact(Math.abs(v),useUSD)); };
        add('Prima mín.', _c26.pm[m]); add('Ajuste', _c26.aj[m]); add('Bono', _c26.bo[m]); add('Malus', _c26.ma[m]);
        return out.length>2 ? out : ['', '(sin desglose)'];
      }
    })
  });
  opts.scales.x.ticks.font = {family:'Calibri', size:13, weight:'700'};
  opts.scales.x.ticks.color = '#3d5475';
  /* Meses más abajo: deja un hueco entre las barras y los nombres para la fila de Emisión Real. */
  opts.scales.x.ticks.padding = 26;
  /* Apilado: la proyección (confirmado + presupuestado) se apila sobre Real 2026 en su mes.
     Las líneas de presupuesto tienen stack propio, así no se apilan con las barras. */
  opts.scales.x = opts.scales.x || {}; opts.scales.x.stacked = true;
  opts.scales.y = opts.scales.y || {}; opts.scales.y.stacked = true;
  /* Headroom arriba: el eje Y llega ~30% por encima del valor más alto (barras o puntos de
     presupuesto) para que las etiquetas de valor NO se peguen al borde ni se superpongan con
     el gráfico/leyenda. */
  const _stackTot = r26.map((v,i)=>(v||0)+(projConf[i]||0)+(grayEstim[i]||0));
  const _allVals = [...presup, ..._stackTot].filter(v=>v!=null && isFinite(v));
  const _dataMax = _allVals.length ? Math.max(..._allVals.map(Math.abs)) : 0;
  if(_dataMax>0){ opts.scales.y = opts.scales.y || {}; opts.scales.y.suggestedMax = _dataMax*1.3; }
  opts.layout = {padding:{top:30, bottom:64, left:10}};
  /* Filas de valores DEBAJO del gráfico, con título a la izquierda y bien separadas:
       · Emisión Real (celeste) — en el hueco, ARRIBA de los nombres de mes.
       · Proy. Actualizada (ámbar) y Estim. Inicial (gris) — debajo de los nombres de mes. */
  const projTotalPlugin = {
    id:'projTotals',
    afterDraw(chart){
      const xs=chart.scales.x, ctx=chart.ctx, ca=chart.chartArea, yBase=ca.bottom;
      const yEmis=yBase+12, yConf=yBase+60, yPres=yBase+88;   /* bien separadas */
      ctx.save();
      ctx.strokeStyle='rgba(120,135,160,0.22)'; ctx.lineWidth=1;
      [yBase+38, yConf+13, yPres+13].forEach(y=>{ ctx.beginPath(); ctx.moveTo(ca.left,y); ctx.lineTo(ca.right,y); ctx.stroke(); });
      /* Títulos de fila a la izquierda (alineados al borde, margen chico). */
      ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.font='700 9px Calibri';
      const lblX=2;
      ctx.fillStyle='#1565c0'; ctx.fillText('Emisión Real', lblX, yEmis);
      if(hayAmar){ ctx.fillStyle='#d39a00'; ctx.fillText('Proy. Actualizada', lblX, yConf); }
      if(hayGris){ ctx.fillStyle='#8894a6'; ctx.fillText('Estim. Inicial', lblX, yPres); }
      /* Valores por mes. */
      ctx.textAlign='center'; ctx.font='800 11px Calibri';
      for(let i=0;i<labels.length;i++){
        const x=xs.getPixelForValue(i);
        const e=r26[i];
        if(e!=null && Math.abs(e)>0.5){ ctx.fillStyle='#1565c0'; ctx.fillText(fmtCompact(e,useUSD), x, yEmis); }
        if(projConf[i]!=null && Math.abs(projConf[i])>0.5){ ctx.fillStyle='#d39a00'; ctx.fillText(fmtCompact(projConf[i],useUSD), x, yConf); }
        if(grayEstim[i]!=null && Math.abs(grayEstim[i])>0.5){ ctx.fillStyle='#8894a6'; ctx.fillText(fmtCompact(grayEstim[i],useUSD), x, yPres); }
      }
      ctx.restore();
    }
  };
  /* Plugin inline: valores en formato compacto (K/M/MM) sobre barras Real y puntos
     Presupuesto. Cuando 'Mostrar 2025' está activo también etiqueta el 2025. Resuelve
     colisiones verticales de forma dinámica (apila hacia arriba) para que los números
     no se aplasten entre sí ni sobre las barras/líneas. */
  const valueLabelPlugin = {
    id:'mensualValueLabel',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      const colTop = (chart.chartArea ? chart.chartArea.top : 0) + 7;
      /* Solo la LÍNEA de Presupuesto va arriba; la Emisión Real va en la fila inferior. */
      const wantBar  = (lbl)=> false;
      const wantLine = (lbl)=> lbl==='Presupuesto 2026';
      const colorOf = (lbl)=> lbl==='Emisión Real 2026' ? '#1565c0'
                            : lbl==='Presupuesto 2026' ? '#0a3d7a' : '#94a8c2';
      const items = [];
      chart.data.datasets.forEach((ds, di)=>{
        const meta = chart.getDatasetMeta(di);
        if(meta.hidden) return;
        const isLine = ds.type === 'line';
        if(isLine ? !wantLine(ds.label) : !wantBar(ds.label)) return;
        meta.data.forEach((el, i)=>{
          const v = ds.data[i];
          if(v==null || v===0) return;
          /* La etiqueta de la LÍNEA Presupuesto se ubica ARRIBA de la barra del mes (no adentro),
             para que no se confunda con el valor de la barra (ej. Jun: $876M presupuesto vs la
             barra amarilla de Proyección Actualizada). */
          let ly = el.y - (isLine?13:6);
          if(isLine){
            const barTopY = chart.scales.y.getPixelForValue(_stackTot[i]||0);
            ly = Math.min(el.y, barTopY) - 13;
          }
          items.push({x:el.x, ly, text:fmtCompact(v,useUSD),
                      color:colorOf(ds.label), font:'700 9.5px Calibri'});
        });
      });
      /* Anti-solape real: se calcula el medio-ancho de cada etiqueta y se considera que
         dos chocan si se superponen horizontalmente Y quedan a menos de GAP en vertical.
         Se mantiene fija la etiqueta más BAJA (pegada a su barra/punto) y se empujan las
         de arriba hacia arriba, en varias pasadas, sin estirar el gráfico. */
      const GAP = 15;
      items.forEach(it=> it.hw = it.text.length*2.9 + 4);
      for(let pass=0; pass<8; pass++){
        let moved = false;
        items.sort((a,b)=> b.ly - a.ly); /* la más baja primero */
        for(let i=0;i<items.length;i++){
          for(let j=i+1;j<items.length;j++){
            const a=items[i], b=items[j]; /* a por debajo de b */
            if(Math.abs(a.x-b.x) < (a.hw+b.hw) && (a.ly - b.ly) < GAP){
              b.ly = a.ly - GAP; moved = true;
            }
          }
        }
        items.forEach(it=>{ if(it.ly < colTop) it.ly = colTop; });
        if(!moved) break;
      }
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      /* Sin halo blanco (pedido del usuario): solo el texto. */
      items.forEach(it=>{ ctx.font=it.font; ctx.fillStyle=it.color; ctx.fillText(it.text, it.x, it.ly); });
      ctx.restore();
    }
  };
  drawChart(canvasId,{type:'bar', data:{labels,datasets}, options:opts, plugins:[valueLabelPlugin, projTotalPlugin]});
}

/* Cascada waterfall */
function drawEjecChartCascada(presup, emis, ef, useUSD){
  if(!document.getElementById('ejecChartCascada')) return;
  const FMTm = useUSD?FMT_USD_FULL:FMT_ARS_FULL;
  const steps = [
    {label:'Presupuesto', val:presup, tipo:'base'},
    {label:'Pendiente emisión', val:-ef.cPend, tipo:'pend'},
    {label:'Pólizas que se fueron', val:-ef.cPerdidas, tipo:'neg'},
    {label:'Baja prima mínima', val:-ef.cPrimaMin, tipo:'neg'},
    {label:'Ajuste', val:-ef.cAjuste, tipo:'neg'},
    {label:'Bono', val:-ef.cBono, tipo:'neg'},
    {label:'Malus', val:-ef.cMalus, tipo:'neg'},
  ];
  if(ef.cOtros>1) steps.push({label:'Otros', val:-ef.cOtros, tipo:'otros'});
  steps.push({label:'Emisión real', val:emis, tipo:'fin'});

  const labels=[], floatData=[], colors=[], borders=[];
  let running = presup;
  steps.forEach((s)=>{
    labels.push(s.label);
    if(s.tipo==='base'){ floatData.push([0, presup]); colors.push('rgba(94,179,232,.85)'); borders.push('#5eb3e8'); }
    else if(s.tipo==='fin'){ floatData.push([0, emis]); colors.push('rgba(45,155,106,.85)'); borders.push('#2d9b6a'); }
    else {
      const start = running, end = running + s.val;
      floatData.push([end, start]);
      const col = s.tipo==='pend' ? 'rgba(232,155,30,.85)' : (s.tipo==='otros'?'rgba(122,140,168,.7)':'rgba(217,71,71,.8)');
      const bd  = s.tipo==='pend' ? '#e89b1e' : (s.tipo==='otros'?'#7a8ca8':'#d94747');
      colors.push(col); borders.push(bd); running = end;
    }
  });
  drawChart('ejecChartCascada',{type:'bar',
    data:{labels,datasets:[{label:'Desvío', data:floatData, backgroundColor:colors, borderColor:borders, borderWidth:1.5, borderRadius:3, barPercentage:.8, categoryPercentage:.8}]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{backgroundColor:'#fff',titleColor:'#0a1f3a',bodyColor:'#3d5475',borderColor:'#c5d2e3',borderWidth:1,padding:10,
          callbacks:{label:(c)=>{ const v=c.raw; return FMTm(Math.abs(v[1]-v[0])); }}}},
      scales:{ x:{ticks:{color:'#7a8ca8',font:{family:"Calibri",size:10},maxRotation:40,minRotation:30},grid:{display:false},border:{color:'#dfe7f2'}},
        y:{ticks:{color:'#7a8ca8',font:{family:"Calibri",size:10.5},callback:(v)=>useUSD?FMT_USD(v):FMT_ARS(v)},grid:{color:'rgba(150,170,200,.12)'},border:{color:'#dfe7f2'},beginAtZero:true}}
    }});
}

/* Variaciones: mini-charts 2025 vs 2026 por concepto (solo lo que resta) */
function drawEjecVariaciones(polArr, f, useUSD, opts){
  const grid = document.getElementById('ejecVariacionesGrid');
  if(!grid) return;
  opts = opts || {};
  const sub = opts.sub || 'prima';  /* prima | proy | tasa */
  const mesCorte = f.mes;

  /* Botón PRIMA MÍNIMA: sin gráficos (pedido del usuario). */
  if(sub==='prima'){
    grid.innerHTML='';
    const valores = document.getElementById('ejecVariacionesValores');
    if(valores) valores.innerHTML='';
    const lbl = document.getElementById('ejecVariacionesLabel');
    if(lbl) lbl.style.display='none';
    return;
  }
  const lbl = document.getElementById('ejecVariacionesLabel');
  if(lbl) lbl.style.display='';

  /* Acumular proy/tasa sobre pólizas con prima 2026 emitida */
  let proy25=0,proy26=0, tasaS25=0,tasaS26=0,tasaN=0;
  for(const p of polArr){
    if(polizaTerminada(p)) continue;
    const rPM = p.conceptos['Prima Minima'];
    if(!conceptoEmitido26(rPM, mesCorte)) continue;
    proy25+=useUSD?(p.proyUSD2025||0):(p.proyARS2025||0);
    proy26+=useUSD?(p.proyUSD2026||0):(p.proyARS2026||0);
    if(p.tasa2025!=null&&p.tasa2026!=null){tasaS25+=p.tasa2025;tasaS26+=p.tasa2026;tasaN++;}
  }
  const it = (sub==='tasa')
    ? {id:'tasa', label:'Tasa promedio', v25:tasaN?tasaS25/tasaN:0, v26:tasaN?tasaS26/tasaN:0, pct:true}
    : {id:'proy', label:'Proyección de ventas', v25:proy25, v26:proy26, pct:false};

  const d = it.v26 - it.v25;
  const dpct = it.v25 ? d/Math.abs(it.v25) : null;
  const c = d===0?'var(--ink-3)':(d>0?'var(--pos)':'var(--neg)');
  const fmtV = it.pct ? (v=>FMT_PCT_TASA(v)) : (v=>fmtCompact(v,useUSD)); /* K/M/MM */
  grid.style.gridTemplateColumns='1fr';
  grid.innerHTML = `
    <div style="background:var(--bg-2);border-radius:8px;padding:10px 12px;max-width:640px;margin:0 auto">
      <div style="font-size:13px;font-weight:800;color:var(--accent-3);margin-bottom:6px">${it.label} · 2025 vs 2026</div>
      <div class="chart-box" style="height:90px"><canvas id="ejecVar_${it.id}"></canvas></div>
      <div style="font-family:var(--font-mono);font-size:13.5px;font-weight:800;color:${c};text-align:center;margin-top:6px">${fmtV(it.v25)} → ${fmtV(it.v26)} &nbsp; <span>${d>=0?'+':''}${fmtV(d)} ${dpct!=null?'('+(d>=0?'+':'')+FMT_PCT(dpct)+')':''}</span></div>
    </div>`;
  if(document.getElementById(`ejecVar_${it.id}`)){
    /* Barras HORIZONTALES (indexAxis:'y'), valores compactos K/M/MM */
    drawChart(`ejecVar_${it.id}`,{type:'bar',
      data:{labels:['2025','2026'],datasets:[{
        data:[it.pct?it.v25*100:it.v25, it.pct?it.v26*100:it.v26],
        backgroundColor:['rgba(94,179,232,.85)','rgba(30,111,217,.90)'],
        borderColor:['#5eb3e8','#1e6fd9'],borderWidth:1.5,borderRadius:3,barThickness:24
      }]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:(ctx)=> it.pct?(ctx.parsed.x.toFixed(3)+'%'):fmtCompact(ctx.parsed.x,useUSD)}}},
        scales:{
          x:{ticks:{callback:(v)=> it.pct?(v.toFixed(2)+'%'):fmtCompact(v,useUSD), font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},
          y:{ticks:{font:{size:11,weight:'700'}},grid:{display:false}}
        }}});
  }
  const valores = document.getElementById('ejecVariacionesValores');
  if(valores) valores.innerHTML = '';
}

/* Foco prima mínima — solo bajas, pesificado y dolarizado, con tipo de póliza */
function drawEjecPrimaMinFoco(polArr, f, useUSD){
  const wrap = document.getElementById('ejecPrimaMinFoco');
  if(!wrap) return;
  const mesCorte = f.mes;
  /* Pólizas con baja de prima mínima 2026 (según moneda de la póliza) */
  let bajas = [];
  for(const p of polArr){
    if(p.tipo2026==='Póliza terminada') continue;
    const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
    const uu = p.moneda==='US';
    const pm25 = uu?f25.breakdownUSD.primaMin:f25.breakdownARS.primaMin;
    const pm26 = uu?f26.breakdownUSD.primaMin:f26.breakdownARS.primaMin;
    const d = pm26 - pm25;
    if(d < -0.5) bajas.push({p, d, pm25, pm26, uu, tipo:p.tipo2026});
  }
  /* Totales por tipo: total de pólizas del tipo Y cuántas con baja, + proyección/tasa */
  const agrupa = (tipoMatch)=>{
    /* todas las del tipo (no solo bajas) para contar el universo */
    let total=0, conBaja=0, dU=0,dA=0, proy25=0,proy26=0, tasaS25=0,tasaS26=0,tasaN=0, conBajaTasa=0;
    for(const p of polArr){
      if(p.tipo2026!==tipoMatch) continue;
      total++;
      const uu = p.moneda==='US';
      const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
      const pm25=uu?f25.breakdownUSD.primaMin:f25.breakdownARS.primaMin;
      const pm26=uu?f26.breakdownUSD.primaMin:f26.breakdownARS.primaMin;
      const d=pm26-pm25;
      if(d<-0.5){ conBaja++; if(uu) dU+=d; else dA+=d; }
      proy25 += uu?(p.proyUSD2025||0):(p.proyARS2025||0);
      proy26 += uu?(p.proyUSD2026||0):(p.proyARS2026||0);
      if(p.tasa2025!=null&&p.tasa2026!=null){ tasaS25+=p.tasa2025; tasaS26+=p.tasa2026; tasaN++; if(p.tasa2026<p.tasa2025) conBajaTasa++; }
    }
    return {total, conBaja, conBajaTasa, dU, dA, proy25, proy26, tasa25:tasaN?tasaS25/tasaN:null, tasa26:tasaN?tasaS26/tasaN:null};
  };
  const ren = agrupa('Renovación');
  const seg = agrupa('Segunda anualidad');
  const ter = agrupa('Tercera anualidad');
  const nue = agrupa('Póliza nueva');
  let totU=0, totA=0;
  for(const b of bajas){ if(b.uu) totU+=b.d; else totA+=b.d; }

  const lineTipo = (label, g, withDetail)=>{
    if(g.total===0) return '';
    let base = `<div style="margin-bottom:6px"><strong style="color:var(--accent-3)">${label}:</strong> ${g.total} pól. en total · <strong style="color:var(--neg)">${g.conBaja}</strong> con baja de prima · <span style="color:var(--neg);font-weight:700">US ${FMT_USD_FULL(g.dU)}</span> · <span style="color:var(--neg);font-weight:700">$ ${FMT_ARS_FULL(g.dA)}</span>`;
    if(withDetail){
      const dProy = g.proy26 - g.proy25;
      const dTasa = (g.tasa25!=null&&g.tasa26!=null)?g.tasa26-g.tasa25:null;
      base += `<div style="padding-left:14px;font-size:10.5px;color:var(--ink-3);margin-top:2px">↳ Proyección ${useUSD?FMT_USD_FULL(g.proy25):FMT_ARS_FULL(g.proy25)} → ${useUSD?FMT_USD_FULL(g.proy26):FMT_ARS_FULL(g.proy26)} (<span style="color:${dProy>=0?'var(--pos)':'var(--neg)'}">${dProy>=0?'+':''}${useUSD?FMT_USD_FULL(dProy):FMT_ARS_FULL(dProy)}</span>) · Tasa prom. ${dTasa!=null?FMT_PCT_TASA(g.tasa25)+'→'+FMT_PCT_TASA(g.tasa26)+' ('+(dTasa>=0?'+':'')+FMT_PCT_TASA(dTasa)+') · '+g.conBajaTasa+' con baja de tasa':'—'}</div>`;
    }
    return base + `</div>`;
  };
  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:12px">
      <div style="background:rgba(45,155,106,.08);border-radius:6px;padding:10px">
        <div style="font-size:10px;color:var(--pos);text-transform:uppercase;letter-spacing:.04em;font-weight:700">Baja prima mínima · USD</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--neg)">${FMT_USD_FULL(totU)}</div>
      </div>
      <div style="background:rgba(30,111,217,.06);border-radius:6px;padding:10px">
        <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;font-weight:700">Baja prima mínima · ARS$</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--neg)">${FMT_ARS_FULL(totA)}</div>
      </div>
      <div style="background:var(--bg-2);border-radius:6px;padding:10px">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700">Pólizas con baja</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--accent-3)">${bajas.length}</div>
      </div>
    </div>
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--ink-2);line-height:1.8;padding:10px 12px;background:var(--bg-2);border-radius:5px;border-left:3px solid var(--accent)">
      <div style="font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">Desglose por tipo de póliza (variación 2026)</div>
      ${lineTipo('Renovación', ren, true)}
      ${lineTipo('Segunda anualidad', seg, true)}
      ${lineTipo('Tercera anualidad', ter, true)}
      ${lineTipo('Póliza nueva', nue, false)}
      ${bajas.length===0?'<span style="color:var(--ink-3);font-style:italic">— sin pólizas con baja de prima mínima —</span>':''}
    </div>`;
}

/* Detalle por rubro: emitidas 2026 vs 2025 (sin pendiente), pesos y dólares + motivos */
/* "Rubros — máximos y mínimos por concepto": muestra qué rubro tuvo la mayor y la
   menor variación 2025→2026 para Proyección de ventas, Tasa, y Siniestralidad
   (promedio entre Histórica y UV). Respeta el "Acumulado hasta" del filtro de la
   sección y la moneda de la vista. */
function drawEjecRubroExtremos(polArr, f){
  const wrap = document.getElementById('ejecRubroExtremos');
  if(!wrap) return;
  const mon = efectivoMonedas(f);
  const useUSD = mon.showUSD && !mon.showARS ? true : (mon.showARS && !mon.showUSD ? false : (f.cur==='ars'?false:true));
  const mesCorte = f.mes;
  /* MISMAS PAUTAS que el comparativo por rubro (pedido del usuario):
     - EMISIÓN: 2025 y 2026 acumulados hasta el mes de corte (suma PM+ajuste+bono+malus),
       en la moneda de la vista. El conteo por año puede diferir.
     - PROYECCIÓN / TASA / SINIESTRALIDADES: cada año cuenta solo si la PRIMA MÍNIMA de ese
       año ya se emitió dentro del corte (fecha de emisión de la prima mínima como referencia).
       La proyección además exige tener proyección y prima mínima. */
  const grupos = {};
  for(const p of polArr){
    const k = p.rubro || '(sin rubro)';
    (grupos[k] = grupos[k] || []).push(p);
  }
  const filas = Object.entries(grupos).map(([rubro, pols])=>{
    let emi25=0, emi26=0, nEmi25=0, nEmi26=0;
    let proy25=0, proy26=0, nProy25=0, nProy26=0;
    let tasaSum25=0, tasaSum26=0, nTasa25=0, nTasa26=0;
    let uvSum25=0, uvSum26=0, nUV25=0, nUV26=0;
    let hSum25=0, hSum26=0, nH25=0, nH26=0;
    for(const p of pols){
      const fe25=calcEmisionFiltrada(p,2025,mesCorte), fe26=calcEmisionFiltrada(p,2026,mesCorte);
      emi25+=useUSD?fe25.totUSD:fe25.totARS; emi26+=useUSD?fe26.totUSD:fe26.totARS;
      /* CONTEO de emisión = emitió ese año en CUALQUIER moneda (no solo la de la vista). */
      if(fe25.totARS>0||fe25.totUSD>0) nEmi25++;
      if(fe26.totARS>0||fe26.totUSD>0) nEmi26++;
      const pm25ok = primaMinEmitidaCorte(p,2025,mesCorte);
      const pm26ok = primaMinEmitidaCorte(p,2026,mesCorte);
      const pr25 = useUSD?(p.proyUSD2025||0):(p.proyARS2025||0);
      const pr26 = useUSD?(p.proyUSD2026||0):(p.proyARS2026||0);
      const hayProy25=((p.proyARS2025||0)>0||(p.proyUSD2025||0)>0), hayProy26=((p.proyARS2026||0)>0||(p.proyUSD2026||0)>0);
      if(pm25ok && hayProy25){ proy25+=pr25; nProy25++; }
      if(pm26ok && hayProy26){ proy26+=pr26; nProy26++; }
      if(pm25ok && p.tasa2025!=null){ tasaSum25+=p.tasa2025; nTasa25++; }
      if(pm26ok && p.tasa2026!=null){ tasaSum26+=p.tasa2026; nTasa26++; }
      if(pm25ok && p.sinUV2025!=null){ uvSum25+=p.sinUV2025; nUV25++; }
      if(pm26ok && p.sinUV2026!=null){ uvSum26+=p.sinUV2026; nUV26++; }
      if(pm25ok && p.sinH2025!=null){ hSum25+=p.sinH2025; nH25++; }
      if(pm26ok && p.sinH2026!=null){ hSum26+=p.sinH2026; nH26++; }
    }
    const avg=(s,n)=>n?s/n:0;
    return {
      rubro,
      emi:  (nEmi25>0||nEmi26>0) ? {v25:emi25, v26:emi26, d:emi26-emi25, dpct:emi25?(emi26-emi25)/Math.abs(emi25):null, n:nEmi26||nEmi25} : null,
      proy: (nProy25>0||nProy26>0) ? {v25:proy25, v26:proy26, d:proy26-proy25, dpct:proy25?(proy26-proy25)/Math.abs(proy25):null, n:nProy26||nProy25} : null,
      tasa: (nTasa25>0||nTasa26>0) ? {v25:avg(tasaSum25,nTasa25), v26:avg(tasaSum26,nTasa26), d:avg(tasaSum26,nTasa26)-avg(tasaSum25,nTasa25), n:nTasa26||nTasa25} : null,
      sinUV:(nUV25>0||nUV26>0) ? {v25:avg(uvSum25,nUV25), v26:avg(uvSum26,nUV26), d:avg(uvSum26,nUV26)-avg(uvSum25,nUV25), n:nUV26||nUV25} : null,
      sinH: (nH25>0||nH26>0) ? {v25:avg(hSum25,nH25), v26:avg(hSum26,nH26), d:avg(hSum26,nH26)-avg(hSum25,nH25), n:nH26||nH25} : null,
    };
  });
  /* === Selector dinámico: UNA métrica a la vez, en barras DIVERGENTES por rubro
     (ordenadas por variación) para leerlo rápido y sin saturar. Sube → derecha,
     cae → izquierda; color verde = bueno, rojo = malo (en siniestralidad se invierte). === */
  const FMTm = (v)=>fmtCompact(v, useUSD);
  const METRICS = [
    {k:'emi',  lbl:'Emisión',                 col:'#2d9b6a', invert:false, fmtV:FMTm,         fmtD:(d)=>(d>=0?'+':'')+FMTm(d)},
    {k:'proy', lbl:'Proyección de ventas',     col:'#1e6fd9', invert:false, fmtV:FMTm,         fmtD:(d)=>(d>=0?'+':'')+FMTm(d)},
    {k:'tasa', lbl:'Tasa promedio',            col:'#8b5cf6', invert:false, fmtV:FMT_PCT_TASA, fmtD:(d)=>(d>=0?'+':'')+FMT_PCT_TASA(d)},
    {k:'sinUV',lbl:'Siniestralidad UV',        col:'#e89b1e', invert:true,  fmtV:FMT_PCT_SIN,  fmtD:(d)=>(d>=0?'+':'')+FMT_PCT_SIN(d)},
    {k:'sinH', lbl:'Siniestralidad histórica', col:'#d4751f', invert:true,  fmtV:FMT_PCT_SIN,  fmtD:(d)=>(d>=0?'+':'')+FMT_PCT_SIN(d)},
  ];
  let sel = state._ejecRubroExtSel || 'emi';
  if(!METRICS.some(m=>m.k===sel)) sel = 'emi';
  const panelHTML = (mk)=>{
    const M = METRICS.find(m=>m.k===mk) || METRICS[0];
    const validas = filas.filter(r=>r[M.k] && r[M.k].d!==0);
    if(validas.length===0) return '<div style="font-size:13px;color:var(--ink-3);font-style:italic;padding:18px 4px">— sin variaciones para este concepto —</div>';
    const sorted = [...validas].sort((a,b)=> b[M.k].d - a[M.k].d);
    const maxAbs = Math.max(1, ...validas.map(r=>Math.abs(r[M.k].d)));
    const barRow = (r)=>{
      const o=r[M.k], sube=o.d>0, good=M.invert?!sube:sube;
      const c = good ? 'var(--pos)' : 'var(--neg)';
      const w = Math.max(2, Math.round(Math.abs(o.d)/maxAbs*50));
      const bar = sube
        ? `<div style="position:absolute;left:50%;top:0;bottom:0;width:${w}%;background:${c};border-radius:0 4px 4px 0;opacity:.85"></div>`
        : `<div style="position:absolute;right:50%;top:0;bottom:0;width:${w}%;background:${c};border-radius:4px 0 0 4px;opacity:.85"></div>`;
      return `<div style="display:grid;grid-template-columns:168px 1fr 196px;gap:12px;align-items:center;padding:5px 0;border-bottom:1px solid var(--line)">
        <div style="font-size:13px;font-weight:700;color:var(--accent-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.rubro} <span style="font-size:10.5px;color:var(--ink-3);font-weight:500">${o.n} pól.</span></div>
        <div style="position:relative;height:16px;background:var(--bg-2);border-radius:4px"><div style="position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--line-2)"></div>${bar}</div>
        <div style="text-align:right;font-family:var(--font-mono);font-size:12px;white-space:nowrap"><span style="color:var(--ink-3)">${M.fmtV(o.v25)} → ${M.fmtV(o.v26)}</span> <strong style="color:${c}">${M.fmtD(o.d)}</strong></div>
      </div>`;
    };
    return `<div style="margin-top:4px">${sorted.map(barRow).join('')}</div>`;
  };
  const btns = METRICS.map(m=>{
    const on=m.k===sel;
    return `<button data-mk="${m.k}" onclick="ejecRubroExtSel('${m.k}')" style="border:1.5px solid ${m.col};background:${on?m.col:'transparent'};color:${on?'#fff':m.col};font-size:12.5px;font-weight:800;padding:6px 14px;border-radius:18px;cursor:pointer;white-space:nowrap;transition:all .15s">${m.lbl}</button>`;
  }).join('');
  wrap.innerHTML = `
    <div id="ejecRubroExtBtns" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">${btns}</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;padding:0 2px">
      <span style="font-size:10.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">◀ Cae / Disminuye</span>
      <span style="font-size:10.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Sube / Aumenta ▶</span>
    </div>
    <div id="ejecRubroExtPanel">${panelHTML(sel)}</div>`;
  window.ejecRubroExtSel = function(mk){
    state._ejecRubroExtSel = mk;
    const panel = document.getElementById('ejecRubroExtPanel');
    if(panel) panel.innerHTML = panelHTML(mk);
    const cont = document.getElementById('ejecRubroExtBtns');
    if(cont){
      [...cont.querySelectorAll('button')].forEach(b=>{
        const m = METRICS.find(x=>x.k===b.dataset.mk); if(!m) return;
        const on = m.k===mk;
        b.style.background = on?m.col:'transparent';
        b.style.color = on?'#fff':m.col;
      });
    }
  };
}

/* SUPER-RESUMEN compacto por rubro: cómo varió Proyección de ventas, Tasa promedio y
   Siniestralidad (UV/H) de 2025 a 2026 en cada rubro. Mismo criterio que las tarjetas
   (proy/tasa/sinies gateadas por la fecha de emisión de la prima mínima). Compacto. */
function drawEjecRubroMini(polArr, f, useUSD){
  const wrap = document.getElementById('ejecRubroMiniWrap');
  if(!wrap) return;
  const mesCorte = f.mes;
  const grupos = {};
  for(const p of polArr){ const k=p.rubro||'(sin rubro)'; (grupos[k]=grupos[k]||[]).push(p); }
  const avg=(s,n)=>n?s/n:0;
  const filas = Object.entries(grupos).map(([rubro,pols])=>{
    let p25=0,p26=0,np26=0, t25=0,t26=0,tn25=0,tn26=0, uv25=0,uv26=0,uvn25=0,uvn26=0, h25=0,h26=0,hn25=0,hn26=0;
    for(const p of pols){
      const pm25=primaMinEmitidaCorte(p,2025,mesCorte), pm26=primaMinEmitidaCorte(p,2026,mesCorte);
      const pr25=useUSD?(p.proyUSD2025||0):(p.proyARS2025||0), pr26=useUSD?(p.proyUSD2026||0):(p.proyARS2026||0);
      if(pm25&&pr25>0){p25+=pr25;}
      if(pm26&&pr26>0){p26+=pr26;np26++;}
      if(pm25&&p.tasa2025!=null){t25+=p.tasa2025;tn25++;}
      if(pm26&&p.tasa2026!=null){t26+=p.tasa2026;tn26++;}
      if(pm25&&p.sinUV2025!=null){uv25+=p.sinUV2025;uvn25++;}
      if(pm26&&p.sinUV2026!=null){uv26+=p.sinUV2026;uvn26++;}
      if(pm25&&p.sinH2025!=null){h25+=p.sinH2025;hn25++;}
      if(pm26&&p.sinH2026!=null){h26+=p.sinH2026;hn26++;}
    }
    return {rubro, n:pols.length, p25,p26, t25:avg(t25,tn25),t26:avg(t26,tn26), uv25:avg(uv25,uvn25),uv26:avg(uv26,uvn26),
      h25:avg(h25,hn25),h26:avg(h26,hn26)};
  /* Mostramos TODOS los rubros (aunque varíen 0 o aún no tengan emisión 2026), ordenados
     de mayor a menor por CANTIDAD de pólizas del rubro. */
  }).sort((a,b)=> b.n - a.n || a.rubro.localeCompare(b.rubro));
  if(filas.length===0){ wrap.innerHTML=''; return; }
  const FMTc=(v)=>fmtCompact(v,useUSD);
  const ind=(d, fmt, invert)=>{
    if(Math.abs(d)<1e-9) return `<span style="color:var(--ink-3)">→ 0</span>`;
    const good = invert ? d<0 : d>0;
    const c = good?'var(--pos)':'var(--neg)';
    return `<span style="color:${c};font-weight:700">${d>0?'▲':'▼'} ${d>0?'+':''}${fmt(d)}</span>`;
  };
  /* Siniestralidad: muestra el paso de un año a otro "2025 → 2026" con una flecha coloreada
     (bajar siniestralidad es bueno = verde; subir = rojo). */
  const sinTrans=(a,b)=>{
    const d=b-a, z=Math.abs(d)<1e-9;
    const c=z?'var(--ink-3)':(d<0?'var(--pos)':'var(--neg)');
    return `<span style="color:var(--ink-2)">${FMT_PCT_SIN(a)}</span> <span style="color:${c};font-weight:800;font-size:12px">${z?'→':(d>0?'▲':'▼')}</span> <span style="color:var(--accent-3);font-weight:700">${FMT_PCT_SIN(b)}</span>`;
  };
  const grid = 'grid-template-columns:minmax(90px,1fr) 1.4fr 1.2fr 2.6fr';
  const rows = filas.map(r=>{
    const dProy=r.p26-r.p25, dPp=r.p25?dProy/Math.abs(r.p25):null;
    const dTasa=r.t26-r.t25, dUV=r.uv26-r.uv25, dH=r.h26-r.h25;
    const dTp=r.t25?dTasa/Math.abs(r.t25):null;
    return `<div style="display:grid;${grid};gap:14px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);font-size:12px">
      <div style="font-weight:800;color:var(--accent-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.rubro}</div>
      <div style="font-family:var(--font-mono);white-space:nowrap">${ind(dProy, FMTc, false)}${dPp!=null?` <span style="font-size:10px;color:var(--ink-3)">(${dProy>=0?'+':''}${FMT_PCT(dPp)})</span>`:''}</div>
      <div style="font-family:var(--font-mono);white-space:nowrap">${ind(dTasa, FMT_PCT_TASA, false)}${dTp!=null?` <span style="font-size:10px;color:var(--ink-3)">(${dTasa>=0?'+':''}${FMT_PCT(dTp)})</span>`:''}</div>
      <div style="display:flex;gap:26px;align-items:baseline;font-family:var(--font-mono);font-size:11px;white-space:nowrap">
        <span><span style="font-weight:800;color:var(--ink-3);margin-right:6px">UV</span>${sinTrans(r.uv25,r.uv26)}</span>
        <span><span style="font-weight:800;color:var(--ink-3);margin-right:6px">H</span>${sinTrans(r.h25,r.h26)}</span>
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = `<div style="border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:var(--panel);box-shadow:0 1px 3px rgba(10,31,58,.04)">
    <div style="padding:8px 12px;background:#f3f1fb;color:#5a3db8;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line-2)">Resumen por rubro · proyección · tasa · siniestralidad</div>
    <div style="display:grid;${grid};gap:14px;padding:6px 12px;background:var(--bg-2);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);font-weight:700">
      <div>Rubro</div><div>Proyección</div><div>Tasa prom.</div><div>Siniestralidad UV / H (2025 → 2026)</div>
    </div>
    ${rows}
  </div>`;
}

/* Mini-gráfico comparativo: emisión 2025 vs 2026 por rubro, en la moneda y mes
   de corte seleccionados en los filtros de la sección. */
function drawEjecRubroChart(polArr, f, useUSD){
  const wrap = document.getElementById('ejecRubroChartWrap');
  if(!wrap) return;
  const mesCorte = f.mes;
  const mon = efectivoMonedas(f);
  const mLbl = (useUSD || (mon.showUSD && !mon.showARS)) ? 'USD' : 'ARS$';
  const grupos = {};
  for(const p of polArr){
    const k = p.rubro || '(sin rubro)';
    /* EMISIÓN: 2025 y 2026 acumulados hasta el MES DE CORTE (suma PM+ajuste+bono+malus).
       Cada año cuenta lo que emitió ese año hasta el corte; la cantidad de pólizas y el
       monto pueden DIFERIR entre años (pedido del usuario). */
    const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
    if(!grupos[k]) grupos[k]={u25:0,u26:0,a25:0,a26:0,n:0,n25:0,n26:0};
    grupos[k].u25+=f25.totUSD; grupos[k].u26+=f26.totUSD;
    grupos[k].a25+=f25.totARS; grupos[k].a26+=f26.totARS;
    /* CONTEO por año = pólizas que emitieron ese año cualquier concepto (incl. bono negativo),
       en cualquier moneda, para que el número coincida con el real de pólizas emitidas. */
    if(tuvoEmision(f25)) grupos[k].n25++;
    if(tuvoEmision(f26)) grupos[k].n26++;
    grupos[k].n++;
  }
  const v25 = (g)=>useUSD?g.u25:g.a25;
  const v26 = (g)=>useUSD?g.u26:g.a26;
  const items = Object.entries(grupos).map(([k,g])=>({rubro:k, ...g, v25:v25(g), v26:v26(g)}))
    .sort((a,b)=>b.v26-a.v26);
  const max = Math.max(1, ...items.flatMap(it=>[it.v25, it.v26]));
  const FMTc = (v)=>fmtCompact(v, useUSD);
  const filas = items.map((it, idx)=>{
    const w25 = Math.round(it.v25/max*100);
    const w26 = Math.round(it.v26/max*100);
    const d = it.v26 - it.v25;
    const dc = d>=0?'var(--pos)':'var(--neg)';
    return `<div style="border-bottom:1px solid var(--line)">
      <div onclick="toggleEjecRubroChartRow(${idx},'${it.rubro.replace(/'/g,"\\'")}')" style="display:grid;grid-template-columns:18px 150px 1fr 120px;gap:10px;align-items:center;padding:6px 0;cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background=''">
        <span id="ejecRubroChartCar_${idx}" style="font-size:11px;color:var(--accent)">▸</span>
        <div style="font-size:13.5px;font-weight:800;color:var(--accent-3)">${it.rubro}</div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:10.5px;color:var(--ink-3);width:32px;font-weight:700">2025</span><div style="flex:1;height:14px;background:var(--bg-2);border-radius:3px;position:relative"><div style="position:absolute;left:0;top:0;bottom:0;width:${w25}%;background:rgba(94,179,232,.75);border-radius:3px"></div></div><span style="font-family:var(--font-mono);font-size:12px;font-weight:700;width:135px;text-align:right">${FMTc(it.v25)} <span style="color:var(--ink-3);font-weight:600;font-size:10.5px">· ${it.n25} pól.</span></span></div>
          <div style="display:flex;align-items:center;gap:6px"><span style="font-size:10.5px;color:var(--ink-3);width:32px;font-weight:700">2026</span><div style="flex:1;height:14px;background:var(--bg-2);border-radius:3px;position:relative"><div style="position:absolute;left:0;top:0;bottom:0;width:${w26}%;background:rgba(30,111,217,.9);border-radius:3px"></div></div><span style="font-family:var(--font-mono);font-size:12px;font-weight:800;width:135px;text-align:right">${FMTc(it.v26)} <span style="color:var(--ink-3);font-weight:600;font-size:10.5px">· ${it.n26} pól.</span></span></div>
        </div>
        <div style="font-family:var(--font-mono);font-size:14px;font-weight:800;color:${dc};text-align:right">${d>=0?'+':''}${FMTc(d)}</div>
      </div>
      <div id="ejecRubroChartDet_${idx}" style="display:none;padding:8px 4px 14px"></div>
    </div>`;
  }).join('');
  wrap.innerHTML = `<div style="font-size:18px;color:#fff;background:linear-gradient(90deg,#1e6fd9,#0a3d7a);padding:10px 16px;border-radius:9px;letter-spacing:.02em;font-weight:800;margin-bottom:14px;box-shadow:0 2px 6px rgba(10,31,58,.18)">Emisión por rubro · 2025 vs 2026 · ${mLbl}</div>
    ${filas || '<div style="font-size:12px;color:var(--ink-3);font-style:italic">— sin datos —</div>'}`;
}

function drawEjecRubroTabla(polArr, f, useUSD){
  const wrap = document.getElementById('ejecRubroTabla');
  if(!wrap) return;
  const mesCorte = f.mes;
  const grupos = {};
  for(const p of polArr){
    const k = p.rubro || '(sin rubro)';
    /* EMISIÓN: 2025 y 2026 acumulados hasta el mes de corte. La póliza entra al detalle si
       emitió en cualquiera de los dos años; los conteos por año (n25/n26) pueden diferir,
       igual que en el comparativo de barras. */
    const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
    const em25=tuvoEmision(f25), em26=tuvoEmision(f26);
    if(!em25 && !em26) continue;
    if(!grupos[k]) grupos[k]={u25:0,u26:0,a25:0,a26:0,n:0,n25:0,n26:0, polizas:[]};
    grupos[k].u25+=f25.totUSD; grupos[k].u26+=f26.totUSD;
    grupos[k].a25+=f25.totARS; grupos[k].a26+=f26.totARS;
    if(em25) grupos[k].n25++;
    if(em26) grupos[k].n26++;
    grupos[k].n++; grupos[k].polizas.push(p);
  }
  const val25 = (it)=> useUSD ? it.u25 : it.a25;
  const val26 = (it)=> useUSD ? it.u26 : it.a26;
  /* Orden: por magnitud del desvío de EMISIÓN (|2026 − 2025|) descendente —
     los rubros con mayor variación absoluta de emisión (suma prima mínima +
     ajuste + bono + malus) van primero. */
  const items = Object.entries(grupos).map(([k,v])=>({rubro:k, ...v}))
    .sort((a,b)=> Math.abs(val26(b)-val25(b)) - Math.abs(val26(a)-val25(a)));
  state._ejecRubroItems = items;
  state._ejecRubroUseUSD = useUSD;
  state._ejecRubroMesCorte = mesCorte;
  /* La tabla NO se muestra de entrada — los cards se abren on-demand
     desde el comparativo "Emisión por rubro · 2025 vs 2026" haciendo
     click en la fila correspondiente. Igual dejamos el wrapper vacío
     para que el container exista por compatibilidad. */
  wrap.innerHTML = '';
}

/* Toggle del detalle por rubro disparado desde el comparativo (foto 2 →
   foto 1). Recibe el índice del rubro en `items` del CHART y el nombre
   para buscar el match en state._ejecRubroItems (que tiene otro orden). */
window.toggleEjecRubroChartRow = function(idx, rubroName){
  const detEl = document.getElementById('ejecRubroChartDet_'+idx);
  const car = document.getElementById('ejecRubroChartCar_'+idx);
  if(!detEl) return;
  if(detEl.dataset.open==='1'){
    detEl.style.display='none'; detEl.dataset.open=''; if(car) car.textContent='▸';
    return;
  }
  const items = state._ejecRubroItems || [];
  const useUSD = state._ejecRubroUseUSD;
  const mesCorte = state._ejecRubroMesCorte || 0;
  /* Buscar el item por nombre — el orden del chart no coincide con el de
     la tabla (chart por emisión 2026 desc; tabla por |delta| desc). */
  const realIdx = items.findIndex(it=>it.rubro===rubroName);
  if(realIdx<0){ detEl.innerHTML = '<div style="font-size:12px;color:var(--ink-3);font-style:italic">— sin detalle disponible —</div>'; }
  else {
    detEl.innerHTML = renderRubroCard(items[realIdx], realIdx, useUSD, mesCorte);
  }
  detEl.style.display='block'; detEl.dataset.open='1'; if(car) car.textContent='▾';
};

/* Tarjeta por rubro: header (nombre + n pól. + variación de emisión) + conclusión
   visual + 3 grupos de conceptos (Cadena de prima · Emisión · Siniestralidad). Cada
   concepto trae el arrow 25→26 y, al click, abre su drilldown propio
   (Aumentos / Disminuciones / Pendientes — pendientes NO aplica a tasa/sin). */
function renderRubroCard(it, idx, useUSD, mesCorte, opts){
  opts = opts || {};
  const _stat = !!opts.static; /* hoja 05: tarjetas expandidas sin sub-drill clickeable */
  const V = computarVariacionesRubro(it, mesCorte);
  const val25 = useUSD ? it.u25 : it.a25;
  const val26 = useUSD ? it.u26 : it.a26;
  const d = val26 - val25;
  const dP = val25 ? d/Math.abs(val25) : null;
  const dC = d>=0?'var(--pos)':'var(--neg)';
  const FMTc = (v)=>fmtCompact(v, useUSD);
  /* Agregadores por concepto. Para sume/baje sumamos los .d; para tasa y siniestralidad
     promediamos 25/26 entre pólizas con datos en ambos años. */
  const sumV25 = (arr)=>arr.reduce((a,r)=>a+(r.v25||0),0);
  const sumV26 = (arr)=>arr.reduce((a,r)=>a+(r.v26||0),0);
  const avgPair = (arr, k)=>{
    if(arr.length===0) return null;
    const s25 = arr.reduce((a,r)=>a+r[k+'25'],0);
    const s26 = arr.reduce((a,r)=>a+r[k+'26'],0);
    return {v25:s25/arr.length, v26:s26/arr.length};
  };
  const proyAll = [...V.proySube, ...V.proyBaja];
  const tasaAll = [...V.tasaSube, ...V.tasaBaja];
  const uvAll   = [...V.uvSube,   ...V.uvBaja];
  const sinHAll = [...V.sinHSube, ...V.sinHBaja];
  const pmAll = [...V.pmSube, ...V.pmBaja];
  const ajAll = [...V.ajSube, ...V.ajBaja];
  const boAll = [...V.boSube, ...V.boBaja];
  const maAll = [...V.maSube, ...V.maBaja];
  const tasaAvg = avgPair(tasaAll, 't');
  const uvAvg   = avgPair(uvAll,   's');
  const sinHAvg = avgPair(sinHAll, 's');
  /* Conceptos y su info para mostrar */
  const concDinero = (lbl, cid, arr, pend)=>{
    const s25=sumV25(arr), s26=sumV26(arr);
    const dd=s26-s25;
    const has = arr.length>0 || pend.length>0;
    if(!has) return '';
    const c = dd>=0?'var(--pos)':'var(--neg)';
    const dStr = arr.length>0 ? `<span style="color:${c};font-weight:800">${dd>=0?'+':''}${FMTc(dd)}</span>` : '';
    const arrow = arr.length>0 ? `${FMTc(s25)} → <strong>${FMTc(s26)}</strong>` : '<span style="color:var(--ink-3);font-style:italic">— sin variación real —</span>';
    const pendChip = pend.length>0 ? `<span style="font-size:11px;color:#4ba3c7;background:rgba(75,163,199,.10);padding:2px 7px;border-radius:4px;margin-left:6px;font-weight:700">${pend.length} pend.</span>` : '';
    return concRow(idx, cid, lbl, arr.length, arrow, dStr, pendChip);
  };
  const concTasaSin = (lbl, cid, avg, arr, isTasa)=>{
    if(arr.length===0) return '';
    const dd = avg.v26 - avg.v25;
    const c = dd>=0?'var(--pos)':'var(--neg)';
    const fmt = isTasa ? FMT_PCT_TASA : FMT_PCT_SIN;
    const arrow = `${fmt(avg.v25)} → <strong>${fmt(avg.v26)}</strong>`;
    const dStr = `<span style="color:${c};font-weight:800">${dd>=0?'+':''}${fmt(dd)}</span>`;
    return concRow(idx, cid, lbl, arr.length, arrow, dStr, '');
  };
  /* Conclusión */
  const conclTxt = conclusionRubro(V, it, useUSD);
  /* === Resumen formato foto 4: por moneda original (Emisión · Proyección · Tasa ·
     Sin. UV · Sin. Hist. · Pendientes), con 2025 → 2026 y variación. === */
  const _pols = it.polizas || [];
  const aggCur = (isUS)=>{
    const pols = _pols.filter(p=> (p.moneda==='US')===isUS);
    let e25=0,e26=0,n25=0,n26=0;
    let p25=0,p26=0,np25=0,np26=0;
    let t25=0,t26=0,tn25=0,tn26=0,uv25=0,uv26=0,uvn25=0,uvn26=0,h25=0,h26=0,hn25=0,hn26=0;
    let pend=0;
    for(const p of pols){
      /* EMISIÓN: el TOTAL y los conteos se basan en las pólizas que EMITIERON en 2026
         (mismo conjunto que el desglose por póliza), comparando su 2026 contra SU 2025.
         Las que solo emitieron en 2025 NO entran al total (van a Pendientes), así el total
         y el desglose coinciden. n26 = emitidas 2026; n25 = de esas, cuántas también en 2025. */
      const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
      const emitio26 = tuvoEmision(f26);
      if(emitio26){
        e25 += isUS?f25.totUSD:f25.totARS;
        e26 += isUS?f26.totUSD:f26.totARS;
        if(tuvoEmision(f25)) n25++;
        n26++;
      }
      /* PROYECCIÓN / TASA / SINIESTRALIDAD: la póliza cuenta para un año SOLO si su PRIMA
         MÍNIMA de ese año ya se emitió dentro del corte (fecha de emisión de la prima mínima
         como referencia para ubicarla en el mes). Cada año filtra por separado. */
      const pm25ok = primaMinEmitidaCorte(p,2025,mesCorte);
      const pm26ok = primaMinEmitidaCorte(p,2026,mesCorte);
      const pr25=isUS?(p.proyUSD2025||0):(p.proyARS2025||0), pr26=isUS?(p.proyUSD2026||0):(p.proyARS2026||0);
      const hayProy25=((p.proyARS2025||0)>0||(p.proyUSD2025||0)>0), hayProy26=((p.proyARS2026||0)>0||(p.proyUSD2026||0)>0);
      if(pm25ok && hayProy25){ p25+=pr25; np25++; }
      if(pm26ok && hayProy26){ p26+=pr26; np26++; }
      if(pm25ok && p.tasa2025!=null){ t25+=p.tasa2025; tn25++; }
      if(pm26ok && p.tasa2026!=null){ t26+=p.tasa2026; tn26++; }
      if(pm25ok && p.sinUV2025!=null){ uv25+=p.sinUV2025; uvn25++; }
      if(pm26ok && p.sinUV2026!=null){ uv26+=p.sinUV2026; uvn26++; }
      if(pm25ok && p.sinH2025!=null){ h25+=p.sinH2025; hn25++; }
      if(pm26ok && p.sinH2026!=null){ h26+=p.sinH2026; hn26++; }
      const pi=pendPolizaInfo(p,mesCorte); pend+=isUS?pi.usd:pi.ars;
    }
    return {n25,n26,e25,e26,p25,p26,np25,np26,
      t25:tn25?t25/tn25:0,t26:tn26?t26/tn26:0,
      uv25:uvn25?uv25/uvn25:0,uv26:uvn26?uv26/uvn26:0,
      h25:hn25?h25/hn25:0,h26:hn26?h26/hn26:0,pend};
  };
  const gA=aggCur(false), gU=aggCur(true);
  /* Total del HEADER en la moneda de la vista, sobre el MISMO conjunto que la grilla y el
     desglose (solo pólizas emitidas en 2026), para que todo coincida. */
  let hv25=0, hv26=0, hn25=0, hn26=0;
  for(const p of _pols){
    const ff26=calcEmisionFiltrada(p,2026,mesCorte);
    if(!tuvoEmision(ff26)) continue;
    const ff25=calcEmisionFiltrada(p,2025,mesCorte);
    hv25 += useUSD?ff25.totUSD:ff25.totARS;
    hv26 += useUSD?ff26.totUSD:ff26.totARS;
    if(tuvoEmision(ff25)) hn25++;
    hn26++;
  }
  /* Mismo formato que el desglose de Emisión 2026: tarjetas resaltadas, conteo de
     pólizas al lado de la moneda original, año arriba de cada valor, siniestralidad
     unificada (UV/H). Las celdas siguen siendo clickeables (drilldown por concepto). */
  const _card = "background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06)";
  const cH=(label,bg,txt,bd)=>`<div style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 6px;border-radius:7px;text-align:center;background:${bg};color:${txt};border:1.5px solid ${bd};white-space:nowrap">${label}</div>`;
  const rC=(sym,n25,n26)=>{const c=sym==='US'?'#8b5cf6':'#e89b1e';return `<div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:4px 8px;text-align:right;line-height:1.15"><span style="font-size:10px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Pólizas<br>Moneda Orig</span><span style="font-size:16px;font-weight:900;color:${c};margin-top:2px">${sym}</span><span style="font-size:11px;font-weight:800;color:var(--ink-2);font-family:var(--font-mono);margin-top:3px">${n25||0} <span style="color:var(--ink-3);font-weight:600">→</span> ${n26||0} <span style="color:var(--ink-3);font-weight:600">pól.</span></span></div>`;};
  const _ay=(v25,v26)=>`<div style="display:flex;align-items:flex-end;justify-content:center;gap:6px;margin-top:2px"><div style="text-align:center;line-height:1.1"><div style="font-size:9.5px;color:var(--ink-3);font-weight:800">2025</div><div style="font-family:var(--font-mono);font-size:13px;color:var(--ink-2);white-space:nowrap">${v25}</div></div><span style="color:var(--ink-3);font-size:13px;padding-bottom:1px">→</span><div style="text-align:center;line-height:1.1"><div style="font-size:9.5px;color:var(--ink-3);font-weight:800">2026</div><strong style="font-family:var(--font-mono);font-size:13px;color:var(--accent-3);white-space:nowrap">${v26}</strong></div></div>`;
  const _clk = (cid)=> _stat ? '' : `onclick="toggleEjrConcepto(${idx},'${cid}')" title="Ver pólizas de este concepto"`;
  const _cur = _stat ? '' : ';cursor:pointer';
  const cMon=(v25,v26,isUS,cid)=>{const dd=v26-v25,c=dd>=0?'var(--pos)':'var(--neg)',pct=v25?dd/Math.abs(v25):null;return `<div ${_clk(cid)} style="${_card}${_cur}">${_ay(fmtCompact(v25,isUS),fmtCompact(v26,isUS))}<div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${dd>=0?'+':''}${fmtCompact(dd,isUS)}${pct!=null?' ('+(dd>=0?'+':'')+FMT_PCT(pct)+')':''}</div></div>`;};
  const cPct=(v25,v26,neg,fmt,cid)=>{const dd=v26-v25,c=dd===0?'var(--accent)':(dd>0?(neg?'var(--neg)':'var(--pos)'):(neg?'var(--pos)':'var(--neg)'));const rel=v25?dd/Math.abs(v25):null;return `<div ${_clk(cid)} style="${_card}${_cur}">${_ay(fmt(v25),fmt(v26))}<div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${dd>=0?'+':''}${fmt(dd)}${rel!=null?` <span style="font-size:12px">(${dd>=0?'+':''}${FMT_PCT(rel)})</span>`:''}</div></div>`;};
  const cSin=(uv25,uv26,h25,h26)=>{const linea=(lbl,a,b,cid)=>{const dd=b-a,c26=dd>0?'var(--neg)':(dd<0?'var(--pos)':'var(--accent-3)');return `<div ${_clk(cid)} style="display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;font-family:var(--font-mono);cursor:pointer"><strong style="color:var(--accent-3);min-width:24px;font-family:Calibri">${lbl}:</strong><span style="font-size:13px;color:var(--ink-2)">${FMT_PCT_SIN(a)} <span style="color:var(--ink-3)">→</span> <strong style="color:${c26};font-size:14.5px">${FMT_PCT_SIN(b)}</strong></span></div>`;};return `<div style="${_card};display:flex;flex-direction:column;gap:8px;justify-content:center">${linea('UV',uv25,uv26,'uv')}<div style="border-top:1px dashed var(--line)"></div>${linea('H',h25,h26,'sinh')}</div>`;};
  const cPend=(v,isUS)=>`<div ${_clk('pend')} style="${_card}${_cur};display:flex;flex-direction:column;justify-content:center"><div style="font-family:var(--font-mono);font-size:16px;font-weight:800;color:${v>0?'var(--neg)':'var(--ink-3)'};text-align:center">${v>0?'−':''}${fmtCompact(v,isUS)}</div></div>`;
  const foto4Grid = `<div style="overflow-x:auto;margin-top:14px"><div style="display:grid;grid-template-columns:auto repeat(4,minmax(94px,1fr));gap:5px;align-items:stretch;min-width:480px">
    <div></div>
    ${cH('Emisión','#2d9b6a','#fff','#2d9b6a')}${cH('Proyección','rgba(30,111,217,.10)','#1e6fd9','#1e6fd9')}${cH('Tasa promedio','rgba(139,92,246,.12)','#7c4ddb','#8b5cf6')}${cH('Siniestralidad','rgba(232,155,30,.14)','#b9760f','#e89b1e')}
    ${rC('$',gA.n25,gA.n26)}${cMon(gA.e25,gA.e26,false,'emi')}${cMon(gA.p25,gA.p26,false,'proy')}${cPct(gA.t25,gA.t26,false,FMT_PCT_TASA,'tasa')}${cSin(gA.uv25,gA.uv26,gA.h25,gA.h26)}
    ${rC('US',gU.n25,gU.n26)}${cMon(gU.e25,gU.e26,true,'emi')}${cMon(gU.p25,gU.p26,true,'proy')}${cPct(gU.t25,gU.t26,false,FMT_PCT_TASA,'tasa')}${cSin(gU.uv25,gU.uv26,gU.h25,gU.h26)}
  </div></div>`;
  return `<div style="border:1px solid var(--line-2);border-radius:10px;padding:16px 18px;background:var(--panel);box-shadow:0 1px 3px rgba(10,31,58,.04)">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px">
      <div style="display:flex;align-items:baseline;gap:14px">
        <span style="font-size:19px;font-weight:800;color:var(--accent-3)">${it.rubro}</span>
        <span style="font-size:13px;color:var(--ink-3);font-weight:600">${hn25} → ${hn26} pólizas (emitidas 2026; con dato 2025 → 2026)</span>
      </div>
      <div style="font-family:var(--font-mono);text-align:right">
        <span style="font-size:14px;color:var(--ink-3)">${FMTc(hv25)} → <strong style="color:var(--accent-3)">${FMTc(hv26)}</strong></span>
        <span style="font-size:17px;color:${(hv26-hv25)>=0?'var(--pos)':'var(--neg)'};font-weight:800;margin-left:10px">${(hv26-hv25)>=0?'+':''}${FMTc(hv26-hv25)}</span>
        ${hv25?`<span style="font-size:13px;color:${(hv26-hv25)>=0?'var(--pos)':'var(--neg)'};font-weight:800;margin-left:4px">(${(hv26-hv25)>=0?'+':''}${FMT_PCT((hv26-hv25)/Math.abs(hv25))})</span>`:''}
      </div>
    </div>
    ${conclTxt}
    <!-- Conceptos: cada uno en su propio cuadrito para diferenciarlos -->
    ${foto4Grid}
    <!-- Drilldown del concepto seleccionado -->
    ${_stat ? '' : `<div id="ejrDrill_${idx}" style="margin-top:14px"></div>`}
  </div>`;
}

/* Fila de concepto dentro del card del rubro. Click → expande el drilldown
   (Aumentos / Disminuciones / Pendientes) en el contenedor del rubro. */
function concRow(rubroIdx, cid, lbl, n, arrow, dStr, pendChip){
  /* Cada concepto va en su propia mini-tarjeta con borde, para que se
     diferencien visualmente cuando hay 8 en una grid (pedido del usuario). */
  return `<div style="background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:10px 12px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--bg-2)';this.style.borderColor='var(--accent-2)'" onmouseout="this.style.background='var(--panel)';this.style.borderColor='var(--line)'" onclick="toggleEjrConcepto(${rubroIdx},'${cid}')">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      <span style="font-size:12px;color:var(--accent-3);font-weight:800;text-transform:uppercase;letter-spacing:.03em">${lbl}</span>
      ${pendChip}
    </div>
    <div style="font-family:var(--font-mono);font-size:12.5px;color:var(--ink-2);margin-bottom:4px;line-height:1.4">${arrow}</div>
    <div style="font-family:var(--font-mono);font-size:14.5px;font-weight:800;line-height:1">${dStr}</div>
  </div>`;
}

/* Drilldown por concepto dentro de un rubro: muestra Aumentos / Disminuciones /
   Pendientes (Pendientes NO aplica a tasa/siniestralidad). */
window.toggleEjrConcepto = function(rubroIdx, cid){
  const cont = document.getElementById(`ejrDrill_${rubroIdx}`);
  if(!cont) return;
  /* Si está abierto el mismo cid, cerrar. Si abierto otro, reabrir con el nuevo. */
  if(cont.dataset.open === cid){ cont.innerHTML=''; cont.dataset.open=''; return; }
  const items = state._ejecRubroItems || [];
  const it = items[rubroIdx]; if(!it) return;
  const useUSD = state._ejecRubroUseUSD;
  const mesCorte = state._ejecRubroMesCorte || 0;
  const V = computarVariacionesRubro(it, mesCorte);
  const mc = (v,uu)=>fmtCompact(v,uu);
  /* Filas en formato GRILLA: columnas alineadas (2025 · → · 2026 · variación) para que
     los valores de la derecha queden ordenados verticalmente entre todas las pólizas. */
  const _rowBase = "padding:7px 0;border-bottom:1px solid var(--line);align-items:baseline;font-size:13.5px";
  const _aseg = (r,extra)=>`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,22)}</span>${extra||''}</span>`;
  const _arrow = '<span style="color:var(--ink-3);text-align:center">→</span>';
  const filaMonto = (r)=>{
    const cc = r.d>=0?'var(--pos)':'var(--neg)';
    return `<div style="${_rowBase};display:grid;grid-template-columns:minmax(0,1fr) 92px 16px 92px 74px;gap:6px">
      ${_aseg(r, ` <span style="font-size:11px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span>`)}
      <span style="font-family:var(--font-mono);text-align:right;color:var(--ink-2)">${mc(r.v25,r.moneda==='US')}</span>
      ${_arrow}
      <span style="font-family:var(--font-mono);text-align:right;font-weight:700">${mc(r.v26,r.moneda==='US')}</span>
      <span style="font-family:var(--font-mono);text-align:right;color:${cc};font-weight:800">${r.dpct!=null?(r.d>=0?'+':'')+FMT_PCT(r.dpct):''}</span>
    </div>`;
  };
  const filaTasa = (r)=>{
    const cc = r.d>=0?'var(--pos)':'var(--neg)';
    return `<div style="${_rowBase};display:grid;grid-template-columns:minmax(0,1fr) 66px 16px 66px 66px;gap:6px">
      ${_aseg(r)}
      <span style="font-family:var(--font-mono);text-align:right;color:var(--ink-2)">${FMT_PCT_TASA(r.t25)}</span>
      ${_arrow}
      <span style="font-family:var(--font-mono);text-align:right;font-weight:700">${FMT_PCT_TASA(r.t26)}</span>
      <span style="font-family:var(--font-mono);text-align:right;color:${cc};font-weight:800">${r.d>=0?'+':''}${FMT_PCT_TASA(r.d)}${r.t25?` <span style="font-size:9.5px;color:var(--ink-3)">(${(r.d>=0?'+':'')+FMT_PCT(r.d/Math.abs(r.t25))})</span>`:''}</span>
    </div>`;
  };
  const filaSin = (lbl)=>(r)=>{
    const cc = r.d>=0?'var(--neg)':'var(--pos)';
    return `<div style="${_rowBase};display:grid;grid-template-columns:minmax(0,1fr) 40px 58px 16px 58px 64px;gap:6px">
      ${_aseg(r)}
      <span style="font-family:var(--font-mono);text-align:right;color:var(--ink-3);font-size:11px">${lbl}</span>
      <span style="font-family:var(--font-mono);text-align:right;color:var(--ink-2)">${FMT_PCT_SIN(r.s25)}</span>
      ${_arrow}
      <span style="font-family:var(--font-mono);text-align:right;font-weight:700">${FMT_PCT_SIN(r.s26)}</span>
      <span style="font-family:var(--font-mono);text-align:right;color:${cc};font-weight:800">${r.d>=0?'+':''}${FMT_PCT_SIN(r.d)}</span>
    </div>`;
  };
  const filaPend = (r)=>{
    const motivo = r.esAA ? 'Anualidad Anterior' : 'sin categoría';
    const v25Disp = (r.v25!=null) ? mc(r.v25, r.moneda==='US')
      : (r.t25!=null ? FMT_PCT_TASA(r.t25)
      : (r.s25!=null ? FMT_PCT_SIN(r.s25) : '—'));
    return `<div style="${_rowBase};display:grid;grid-template-columns:minmax(0,1fr) 92px 16px 92px;gap:6px">
      ${_aseg(r, ` <span style="font-size:11px;color:var(--ink-3);font-style:italic">${motivo}</span>`)}
      <span style="font-family:var(--font-mono);text-align:right;color:var(--ink-2)">${v25Disp}</span>
      ${_arrow}
      <span style="font-family:var(--font-mono);text-align:right"><span style="color:#4ba3c7;font-weight:800;background:rgba(75,163,199,.10);padding:1px 7px;border-radius:4px">Pendiente</span></span>
    </div>`;
  };
  const concMap = {
    proy: {lbl:'Proyección de ventas', sube:V.proySube, baja:V.proyBaja, pend:V.proyPend, fila:filaMonto, hasPend:true},
    tasa: {lbl:'Tasa',                  sube:V.tasaSube, baja:V.tasaBaja, pend:[],         fila:filaTasa,  hasPend:false},
    pm:   {lbl:'Prima mínima',          sube:V.pmSube,   baja:V.pmBaja,   pend:V.pmPend,   fila:filaMonto, hasPend:true},
    aj:   {lbl:'Ajuste',                sube:V.ajSube,   baja:V.ajBaja,   pend:V.ajPend,   fila:filaMonto, hasPend:true},
    bo:   {lbl:'Bono',                  sube:V.boSube,   baja:V.boBaja,   pend:V.boPend,   fila:filaMonto, hasPend:true},
    ma:   {lbl:'Malus',                 sube:V.maSube,   baja:V.maBaja,   pend:V.maPend,   fila:filaMonto, hasPend:true},
    sinh: {lbl:'Siniestralidad histórica', sube:V.sinHSube, baja:V.sinHBaja, pend:[], fila:filaSin('Sin.H'), hasPend:false},
    uv:   {lbl:'Siniestralidad UV',     sube:V.uvSube,   baja:V.uvBaja,   pend:[],         fila:filaSin('UV'), hasPend:false},
    emi:  {lbl:'Emisión (Prima + Ajuste + Bono + Malus)', sube:V.emiSube, baja:V.emiBaja, pend:V.emiPend, fila:filaMonto, hasPend:true},
    pend: {lbl:'Pendientes de emisión (hasta el mes de corte)', sube:[], baja:[], pend:V.emiPend, fila:filaMonto, hasPend:true},
  };
  const c = concMap[cid]; if(!c) return;
  const bloque = (arr, titulo, color, bg, formatter)=>{
    if(arr.length===0) return '';
    return `<div style="margin-bottom:10px">
      <div style="font-size:12px;font-weight:800;color:${color};background:${bg};padding:5px 10px;border-radius:4px;border-left:3px solid ${color};text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${titulo} · ${arr.length} pól.</div>
      <div style="padding:0 4px">${arr.map(formatter).join('')}</div>
    </div>`;
  };
  const pendBlock = c.hasPend ? bloque(c.pend, 'Pendientes 2026', '#4ba3c7', 'rgba(75,163,199,.08)', filaPend) : '';
  cont.innerHTML = `<div style="background:var(--bg-2);border-radius:8px;padding:12px 14px;border:1px solid var(--line)">
    <div style="font-size:13.5px;font-weight:800;color:var(--accent-3);margin-bottom:10px">${c.lbl} — desglose por póliza</div>
    ${bloque(c.sube, 'Aumentos respecto al 2025', 'var(--pos)', 'rgba(45,155,106,.08)', c.fila)}
    ${bloque(c.baja, 'Disminuciones respecto al 2025', 'var(--neg)', 'rgba(217,71,71,.08)', c.fila)}
    ${pendBlock}
    ${c.sube.length===0 && c.baja.length===0 && (!c.hasPend || c.pend.length===0) ? '<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin variaciones ni pendientes en este concepto —</div>' : ''}
  </div>`;
  cont.dataset.open = cid;
};

/* Variaciones por rubro: separa CADA concepto en variación REAL (categoría 2026
   con texto y distinta de "Anualidad Anterior") vs PENDIENTE (categoría vacía
   o = AA). Aplica a TODOS los ítems: Proyección, Tasa, Siniestralidad UV/H,
   Prima Mínima, Ajuste, Bono, Malus. Devuelve sube/baja/pend por concepto. */
function computarVariacionesRubro(it, mesCorte){
  const proySube=[], proyBaja=[], proyPend=[];
  const tasaSube=[], tasaBaja=[], tasaPend=[];
  const uvSube=[], uvBaja=[], uvPend=[];
  const sinHSube=[], sinHBaja=[], sinHPend=[];
  const pmSube=[], pmBaja=[], pmPend=[];
  const ajSube=[], ajBaja=[], ajPend=[];
  const boSube=[], boBaja=[], boPend=[];
  const maSube=[], maBaja=[], maPend=[];
  /* EMISIÓN TOTAL por póliza (UNA línea por póliza = suma PM+ajuste+bono+malus), para que
     en el desglose de Emisión no se repita la misma póliza una vez por concepto. */
  const emiSube=[], emiBaja=[], emiPend=[];
  /* Helper: ¿una categoría implica que el concepto está pendiente?
     (vacía o "Corresponde a la Anualidad Anterior"). */
  const esPend = (cat)=>{
    const s = cat ? String(cat).trim() : '';
    return !s || categoriaEsAnualidadAnterior(s);
  };
  /* TIMING 2026 (pedido del usuario): una póliza solo entra a los desgloses si su anualidad
     2026 YA DEBÍA emitirse hasta el mes de corte. Si el inicio de la anualidad 2026 cae
     DESPUÉS del corte (p.ej. MATESUR inicia en diciembre y el corte es mayo), todavía no
     corresponde ni como pendiente ni como baja: se excluye. Si ya emitió algo en 2026, está
     activa y entra igual. Aplica a TODOS los desgloses por rubro. */
  const dueEnCorte2026 = (p, f26)=>{
    if(tuvoEmision(f26)) return true; /* ya emitió (cualquier concepto, incl. bono): está activa */
    const espKey = mesEsperadoEmision(p.vigDesde, p.vigHasta, 2026, p.inicioAnualidad2026);
    if(!espKey) return false; /* sin anualidad 2026 esperada → no corresponde aún */
    const [ey,em] = espKey.split('-').map(Number);
    let cutoffMes = mesCorte===0 ? 12 : mesCorte;
    if(state.globalMes2026 && state.globalMes2026 > 0) cutoffMes = Math.min(cutoffMes, state.globalMes2026);
    return (ey < 2026) || (ey===2026 && em <= cutoffMes);
  };
  for(const p of it.polizas){
    const uu = p.moneda==='US';
    const base={poliza:p.poliza, asegurado:p.asegurado, moneda:p.moneda};
    /* EMISIÓN (PM/ajuste/bono/malus): 2025 y 2026 acumulados hasta el mes de corte. */
    const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
    if(!dueEnCorte2026(p, f26)) continue; /* 2026 no vencido al corte → fuera de los desgloses */
    /* ----- EMISIÓN TOTAL de la póliza (una sola línea): suma de los 4 conceptos.
       DETALLE = SOLO lo EFECTIVAMENTE EMITIDO en 2026, comparado contra su 2025. La póliza
       entra si emitió en 2026 en CUALQUIER moneda (igual que el conteo de las barras), para
       no perder ninguna por la moneda. Se muestra en la moneda en que emitió (la propia si
       tiene monto ahí; si no, la otra). Si emitió en 2025 pero NO en 2026 → no va al detalle
       (irá a Pendientes si corresponde), así no infla el conteo ni los totales. */
    const emitio26 = tuvoEmision(f26);
    if(emitio26){
      const enUSD = uu ? !(f26.totUSD<=0 && f26.totARS>0) : (f26.totARS<=0 && f26.totUSD>0);
      const v25 = enUSD ? f25.totUSD : f25.totARS;
      const v26 = enUSD ? f26.totUSD : f26.totARS;
      const de = v26 - v25;
      const recE = {poliza:p.poliza, asegurado:p.asegurado, moneda: enUSD?'US':'$',
                    v25, v26, d:de, dpct: v25?de/Math.abs(v25):null};
      (de>=0?emiSube:emiBaja).push(recE);
    }
    /* Pendiente TOTAL de la póliza (estimado según 2025, timing-aware vía pendPolizaInfo).
       Solo informativo: se lista en Pendientes y NO suma en el detalle ni en los totales. */
    const _pi = pendPolizaInfo(p, mesCorte);
    const ePend = uu?_pi.usd:_pi.ars;
    if(ePend > 0.5) emiPend.push({...base, v25:ePend, v26:null, cat:(_pi.concepts||[]).join(', ')||null});
    /* PROYECCIÓN / TASA / SINIESTRALIDAD: cada año cuenta solo si la PRIMA MÍNIMA de ese
       año ya se emitió dentro del corte (fecha de emisión de la prima mínima como referencia). */
    const pm25ok = primaMinEmitidaCorte(p,2025,mesCorte);
    const pm26ok = primaMinEmitidaCorte(p,2026,mesCorte);
    const tasa25 = pm25ok ? p.tasa2025 : null, tasa26 = pm26ok ? p.tasa2026 : null;
    const sinUV25 = pm25ok ? p.sinUV2025 : null, sinUV26 = pm26ok ? p.sinUV2026 : null;
    const sinH25  = pm25ok ? p.sinH2025  : null, sinH26  = pm26ok ? p.sinH2026  : null;
    /* ----- Proyección de ventas ----- */
    const pr25=pm25ok?(uu?(p.proyUSD2025||0):(p.proyARS2025||0)):0, pr26=pm26ok?(uu?(p.proyUSD2026||0):(p.proyARS2026||0)):0;
    if(esPend(p.proyCategoria) && pr25>0){
      proyPend.push({...base, v25:pr25, v26:null, cat:p.proyCategoria||null, det:p.proyDetalle||null, esAA:categoriaEsAnualidadAnterior(p.proyCategoria)});
    } else if(pr25!==pr26 && (pr25>0||pr26>0)){
      const d=pr26-pr25;
      const rec={...base, v25:pr25, v26:pr26, d, dpct: pr25?d/Math.abs(pr25):null, cat:p.proyCategoria||null, det:p.proyDetalle||null};
      (d>0?proySube:proyBaja).push(rec);
    }
    /* ----- Tasa ----- */
    if(esPend(p.tasaCategoria) && tasa25!=null){
      tasaPend.push({...base, t25:tasa25, t26:null, cat:p.tasaCategoria||null, det:p.tasaDetalle||null, esAA:categoriaEsAnualidadAnterior(p.tasaCategoria)});
    } else if(tasa25!=null && tasa26!=null && tasa25!==tasa26){
      const d=tasa26-tasa25;
      const rec={...base, t25:tasa25, t26:tasa26, d, cat:p.tasaCategoria||null, det:p.tasaDetalle||null};
      (d>0?tasaSube:tasaBaja).push(rec);
    }
    /* ----- Siniestralidad UV ----- */
    if(esPend(p.sinUVCategoria) && sinUV25!=null){
      uvPend.push({...base, s25:sinUV25, s26:null, cat:p.sinUVCategoria||null, det:p.sinUVDetalle||null, esAA:categoriaEsAnualidadAnterior(p.sinUVCategoria)});
    } else if(sinUV25!=null && sinUV26!=null && sinUV25!==sinUV26){
      const d=sinUV26-sinUV25;
      const rec={...base, s25:sinUV25, s26:sinUV26, d, cat:p.sinUVCategoria||null, det:p.sinUVDetalle||null};
      (d>0?uvSube:uvBaja).push(rec);
    }
    /* ----- Siniestralidad histórica (H) ----- */
    if(esPend(p.sinHCategoria) && sinH25!=null){
      sinHPend.push({...base, s25:sinH25, s26:null, cat:p.sinHCategoria||null, det:p.sinHDetalle||null, esAA:categoriaEsAnualidadAnterior(p.sinHCategoria)});
    } else if(sinH25!=null && sinH26!=null && sinH25!==sinH26){
      const d=sinH26-sinH25;
      const rec={...base, s25:sinH25, s26:sinH26, d, cat:p.sinHCategoria||null, det:p.sinHDetalle||null};
      (d>0?sinHSube:sinHBaja).push(rec);
    }
    /* ----- Conceptos con monto: real vs pendiente según categoría 2026 ----- */
    const concSplit = (key, conceptoLabel, arrSube, arrBaja, arrPend)=>{
      const cR = p.conceptos[conceptoLabel];
      const v25 = Math.abs(uu?f25.breakdownUSD[key]:f25.breakdownARS[key]);
      const v26 = Math.abs(uu?f26.breakdownUSD[key]:f26.breakdownARS[key]);
      const cat = (cR && cR.categoria) ? String(cR.categoria).trim() : '';
      if(esPend(cat)){
        /* Pendiente — solo si hay algo que renovar (v25>0). Si no, no aporta info. */
        if(v25>0){
          arrPend.push({...base, v25, v26:null,
            cat:cR?cR.categoria:null, det:cR?cR.detalle:null, esAA:categoriaEsAnualidadAnterior(cat)});
        }
        return;
      }
      if(v25===v26 || (v25===0 && v26===0)) return;
      const d=v26-v25;
      const rec={...base, v25, v26, d, dpct: v25?d/Math.abs(v25):null, cat:cR?cR.categoria:null, det:cR?cR.detalle:null};
      (d>0?arrSube:arrBaja).push(rec);
    };
    concSplit('primaMin','Prima Minima', pmSube, pmBaja, pmPend);
    concSplit('ajuste',  'Ajuste',       ajSube, ajBaja, ajPend);
    concSplit('bono',    'Bono',         boSube, boBaja, boPend);
    concSplit('malus',   'Malus',        maSube, maBaja, maPend);
  }
  const byAbsD=(a,b)=>Math.abs(b.d)-Math.abs(a.d);
  const byV25Desc=(a,b)=>(b.v25||0)-(a.v25||0);
  [proySube,proyBaja,tasaSube,tasaBaja,uvSube,uvBaja,sinHSube,sinHBaja,pmSube,pmBaja,ajSube,ajBaja,boSube,boBaja,maSube,maBaja,emiSube,emiBaja].forEach(a=>a.sort(byAbsD));
  [proyPend, tasaPend, uvPend, sinHPend, pmPend, ajPend, boPend, maPend, emiPend].forEach(a=>a.sort(byV25Desc));
  return {proySube,proyBaja,proyPend, tasaSube,tasaBaja,tasaPend,
    uvSube,uvBaja,uvPend, sinHSube,sinHBaja,sinHPend,
    pmSube,pmBaja,pmPend, ajSube,ajBaja,ajPend,
    boSube,boBaja,boPend, maSube,maBaja,maPend,
    emiSube,emiBaja,emiPend};
}

/* Conclusión visual corta y ÚNICA: explica el principal motivo del desvío del rubro.
   Se elige UN solo concepto — el que más aporta en la MISMA dirección que el desvío
   del rubro. Si el rubro cayó, busca lo que más hizo caer la emisión; si subió, lo
   que más la empujó.
   Contexto del negocio: prima mín = proyección × tasa × (70–80%); ajuste es venta
   por sobre la prima mín.; bono compensa baja siniestralidad (<30% aprox., RESTA
   emisión); malus penaliza alta siniestralidad (>50% aprox., SUMA emisión). */
function conclusionRubro(V, it, useUSD){
  const sumD = (arr)=>arr.reduce((a,r)=>a+(r.d||0),0);
  const netPM   = sumD(V.pmSube)+sumD(V.pmBaja);
  const netAJ   = sumD(V.ajSube)+sumD(V.ajBaja);
  const netBO   = sumD(V.boSube)+sumD(V.boBaja);
  const netMA   = sumD(V.maSube)+sumD(V.maBaja);
  const netProy = sumD(V.proySube)+sumD(V.proyBaja);
  const netTasa = sumD(V.tasaSube)+sumD(V.tasaBaja);
  /* Impacto firmado sobre la EMISIÓN (positivo = sube emisión, negativo = baja).
     Bono se INVIERTE: más bono = más devolución = baja emisión. */
  const conceptos = [
    {k:'pm',   imp:netPM,    up:'Subió la prima mínima',                 dn:'Bajó la prima mínima'},
    {k:'aj',   imp:netAJ,    up:'Mayor ajuste (venta sobre prima)',      dn:'Menor ajuste'},
    {k:'bo',   imp:-netBO,   up:'Menor bono (devolución más chica)',     dn:'Mayor bono (más devolución)'},
    {k:'ma',   imp:netMA,    up:'Mayor malus (siniestralidad alta)',     dn:'Menor malus'},
    {k:'proy', imp:netProy,  up:'Subió la proyección de ventas',         dn:'Bajó la proyección de ventas'},
    {k:'tasa', imp:netTasa,  up:'Subió la tasa',                         dn:'Bajó la tasa'},
  ];
  /* Dirección del desvío del rubro. */
  const dRubro = useUSD ? (it.u26 - it.u25) : (it.a26 - it.a25);
  /* Elegir el concepto dominante en la misma dirección. */
  let principal = null;
  const conImpacto = conceptos.filter(c=>c.imp!==0);
  if(dRubro !== 0){
    const mismaDir = conImpacto.filter(c=>Math.sign(c.imp)===Math.sign(dRubro));
    mismaDir.sort((a,b)=>Math.abs(b.imp)-Math.abs(a.imp));
    principal = mismaDir[0] || null;
  }
  if(!principal){
    conImpacto.sort((a,b)=>Math.abs(b.imp)-Math.abs(a.imp));
    principal = conImpacto[0] || null;
  }
  if(!principal) return '';
  const txt = principal.imp>0 ? principal.up : principal.dn;
  const color = principal.imp>0 ? 'var(--pos)' : 'var(--neg)';
  return `<div style="font-size:13px;color:var(--ink-2);margin-top:6px;padding:6px 0;line-height:1.4">▸ <span style="color:${color};font-weight:700">${txt}</span></div>`;
}

window.toggleEjecRubroMotivo = function(idx){
  const row = document.getElementById('ejecRubroMot_'+idx);
  const content = document.getElementById('ejecRubroMotContent_'+idx);
  if(!row || !content) return;
  if(row.style.display !== 'none'){ row.style.display='none'; return; }
  const items = state._ejecRubroItems || [];
  const it = items[idx]; if(!it) return;
  const useUSD = state._ejecRubroUseUSD;
  const mesCorte = state._ejecRubroMesCorte || 0;
  const V = computarVariacionesRubro(it, mesCorte);
  const {proySube,proyBaja,proyPend, tasaSube,tasaBaja,tasaPend,
    uvSube,uvBaja,uvPend, sinHSube,sinHBaja,sinHPend,
    pmSube,pmBaja,pmPend, ajSube,ajBaja,ajPend,
    boSube,boBaja,boPend, maSube,maBaja,maPend} = V;
  const mc = (v,uu)=>fmtCompact(v,uu);

  const miniJustif = (cat,det)=>{
    const m = miniResumen(cat,det);
    return m?`<div style="font-size:13px;color:var(--ink-3);font-style:italic;margin-top:2px;line-height:1.35">${m}</div>`:'';
  };
  /* Fila para conceptos con MONTO (proyección, prima, ajuste, bono, malus) */
  const filaMonto = (r)=>{
    const cc = r.d>=0?'var(--pos)':'var(--neg)';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${mc(r.v25,r.moneda==='US')} → ${mc(r.v26,r.moneda==='US')} <span style="color:${cc};font-weight:800">${r.dpct!=null?'('+(r.d>=0?'+':'')+FMT_PCT(r.dpct)+')':''}</span></span></div>
      ${miniJustif(r.cat,r.det)}</div>`;
  };
  /* Fila para concepto PENDIENTE: 2026 dice "Pendiente" en vez de un número.
     El motivo (vacía o AA) aparece en gris como etiqueta. */
  const filaPendiente = (r)=>{
    const motivo = r.esAA ? 'Anualidad Anterior' : 'sin categoría';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px;align-items:baseline"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${mc(r.v25,r.moneda==='US')} → <span style="color:#4ba3c7;font-weight:800;background:rgba(75,163,199,.10);padding:1px 7px;border-radius:4px">Pendiente</span></span></div>
      <div style="font-size:12px;color:var(--ink-3);font-style:italic;margin-top:2px">${motivo}${r.det?' · '+String(r.det).substring(0,60):''}</div>
    </div>`;
  };
  /* Pendiente de tasa: 2025 → "Pendiente" (sin valor 2026 aún). */
  const filaTasaPend = (r)=>{
    const motivo = r.esAA ? 'Anualidad Anterior' : 'sin categoría';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px;align-items:baseline"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${FMT_PCT_TASA(r.t25)} → <span style="color:#4ba3c7;font-weight:800;background:rgba(75,163,199,.10);padding:1px 7px;border-radius:4px">Pendiente</span></span></div>
      <div style="font-size:12px;color:var(--ink-3);font-style:italic;margin-top:2px">${motivo}${r.det?' · '+String(r.det).substring(0,60):''}</div>
    </div>`;
  };
