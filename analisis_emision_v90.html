}

/* Picker de variables: el usuario selecciona variables y se grafican mini-charts agrupados */
function fieldDetailVariablePicker(rowId, M){
  const totalM = M;
  /* Variables disponibles. Sin. H y Sin. UV se quitaron de Detalle por rubro/producto
     (pedido del usuario); siguen estando en otros gráficos y en Justificación por póliza. */
  const varDef = [
    {id:'proy', label:'Proyección de ventas', group:'proy'},
    {id:'pm', label:'Prima Mínima', group:'pm'},
    {id:'aj', label:'Ajuste', group:'abm'},
    {id:'bn', label:'Bono', group:'abm'},
    {id:'ml', label:'Malus', group:'abm'},
    {id:'tasa', label:'Tasa promedio', group:'tasa'},
  ];
  const chips = varDef.map(v=>`<button class="var-chip" data-row="${rowId}" data-var="${v.id}" data-group="${v.group}">${v.label}</button>`).join('');
  return `<div class="var-picker">
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-bottom:6px">Click en variables para graficar (mismo grupo se combina, otros se grafican aparte):</div>
    <div class="var-chips">${chips}</div>
    <div class="var-charts-area" id="${rowId}_charts" data-charts-for="${rowId}"></div>
  </div>`;
}

/* Toggle expandir/colapsar */
window.toggleFieldDetail = function(rowId){
  const row = document.getElementById(rowId);
  if(!row) return;
  const body = row.querySelector('.field-detail-body');
  const toggle = row.querySelector('.field-detail-toggle');
  const isOpen = body.style.display==='block';
  body.style.display = isOpen ? 'none' : 'block';
  if(toggle) toggle.textContent = isOpen ? '▼' : '▲';
};

/* Manejo del picker: guardar variables seleccionadas por row y dibujar */
const _selectedVars = {}; /* rowId -> Set */
document.body.addEventListener('click', (ev)=>{
  const chip = ev.target.closest('.var-chip');
  if(chip){
    const rowId = chip.dataset.row;
    const v = chip.dataset.var;
    if(!_selectedVars[rowId]) _selectedVars[rowId] = new Set();
    if(_selectedVars[rowId].has(v)){
      _selectedVars[rowId].delete(v); chip.classList.remove('active');
      /* Quitar también la marca selected de la celda asociada */
      document.querySelectorAll(`.cruzada-cell[data-row="${rowId}"][data-varid="${v}"]`).forEach(c=>c.classList.remove('selected'));
    }
    else {
      _selectedVars[rowId].add(v); chip.classList.add('active');
      document.querySelectorAll(`.cruzada-cell[data-row="${rowId}"][data-varid="${v}"]`).forEach(c=>c.classList.add('selected'));
    }
    renderVarCharts(rowId);
    return;
  }
  /* Click en celda cruzada → toggle on/off de la variable */
  const cell = ev.target.closest('.cruzada-cell');
  if(cell){
    const rowId = cell.dataset.row;
    const vId = cell.dataset.varid;
    if(!vId) return;
    /* Mostrar la card del rubro */
    const card = document.getElementById(rowId);
    if(!card) return;
    if(!_selectedVars[rowId]) _selectedVars[rowId] = new Set();
    /* Toggle: si ya está seleccionada, deseleccionar y borrar; si no, seleccionar */
    if(_selectedVars[rowId].has(vId)){
      _selectedVars[rowId].delete(vId);
      cell.classList.remove('selected');
      const chip = card.querySelector(`.var-chip[data-var="${vId}"]`);
      if(chip) chip.classList.remove('active');
    } else {
      _selectedVars[rowId].add(vId);
      cell.classList.add('selected');
      const chip = card.querySelector(`.var-chip[data-var="${vId}"]`);
      if(chip) chip.classList.add('active');
    }
    /* Si quedaron variables seleccionadas mostrar card, sino ocultarla */
    if(_selectedVars[rowId].size > 0){
      card.style.display = 'block';
      card.scrollIntoView({behavior:'smooth', block:'center'});
    } else {
      card.style.display = 'none';
    }
    renderVarCharts(rowId);
    return;
  }
});

function renderVarCharts(rowId){
  const area = document.querySelector(`[data-charts-for="${rowId}"]`);
  if(!area) return;
  const sel = _selectedVars[rowId] || new Set();
  /* Encontrar el M de la fila */
  const row = document.getElementById(rowId);
  const idx = row.dataset.rowIdx;
  /* Necesitamos la M; la guardamos en el dataset al renderizar — workaround: reconstruir desde state */
  /* Mejor: pasamos rowId al picker y guardamos M en una map global */
  const M = _fieldRowMetrics[rowId];
  if(!M){ area.innerHTML='<div style="color:var(--ink-3);font-size:12px">No se pudieron cargar las métricas.</div>'; return; }

  /* Agrupar variables por su "group" */
  const groups = {proy:[], pm:[], abm:[], tasa:[], sin:[]};
  const varDef = {
    proy:{label:'Proyección', useUSD:true, getU25:(m)=>sumStat(m.proyU.todo).v25, getU26:(m)=>sumStat(m.proyU.todo).v26, getA25:(m)=>sumStat(m.proyA.todo).v25, getA26:(m)=>sumStat(m.proyA.todo).v26, fmt:'money'},
    pm:{label:'Prima Mínima', getU25:(m)=>m.concU25.primaMin, getU26:(m)=>m.concU26.primaMin, getA25:(m)=>m.concA25.primaMin, getA26:(m)=>m.concA26.primaMin, fmt:'money'},
    aj:{label:'Ajuste', getU25:(m)=>m.concU25.ajuste, getU26:(m)=>m.concU26.ajuste, getA25:(m)=>m.concA25.ajuste, getA26:(m)=>m.concA26.ajuste, fmt:'money'},
    bn:{label:'Bono', getU25:(m)=>m.concU25.bono, getU26:(m)=>m.concU26.bono, getA25:(m)=>m.concA25.bono, getA26:(m)=>m.concA26.bono, fmt:'money'},
    ml:{label:'Malus', getU25:(m)=>m.concU25.malus, getU26:(m)=>m.concU26.malus, getA25:(m)=>m.concA25.malus, getA26:(m)=>m.concA26.malus, fmt:'money'},
    tasa:{label:'Tasa', get25:(m)=>avgStat(m.tasa.todo).v25, get26:(m)=>avgStat(m.tasa.todo).v26, fmt:'pct'},
    sH:{label:'Sin. H', get25:(m)=>avgStat(m.sinH.todo).v25, get26:(m)=>avgStat(m.sinH.todo).v26, fmt:'pct'},
    sUV:{label:'Sin. UV', get25:(m)=>avgStat(m.sinUV.todo).v25, get26:(m)=>avgStat(m.sinUV.todo).v26, fmt:'pct'},
  };
  const groupOf = {proy:'proy', pm:'pm', aj:'abm', bn:'abm', ml:'abm', tasa:'tasa', sH:'sin', sUV:'sin'};
  for(const v of sel){ groups[groupOf[v]].push(v); }

  if(sel.size===0){ area.innerHTML='<div style="color:var(--ink-3);font-size:12px;font-style:italic;padding:10px">Sin variables seleccionadas.</div>'; return; }

  /* Render: una columna de mini-charts por grupo activo */
  const blocks = [];
  let chartCounter = 0;
  for(const grpKey of Object.keys(groups)){
    const vs = groups[grpKey];
    if(vs.length===0) continue;
    const cid = `vc_${rowId}_${grpKey}_${chartCounter++}`;
    blocks.push(`<div class="var-chart-block">
      <div class="var-chart-title">${vs.map(v=>varDef[v].label).join(' · ')}</div>
      <div class="chart-box short" style="height:180px"><canvas id="${cid}"></canvas></div>
    </div>`);
    setTimeout(()=>renderVarMiniChart(cid, grpKey, vs, varDef, M), 30);
  }
  area.innerHTML = `<div class="var-charts-grid">${blocks.join('')}</div>`;
}
function renderVarMiniChart(cid, grpKey, vs, varDef, M){
  if(!document.getElementById(cid)) return;
  const COL_25='rgba(94,179,232,.85)', BRD_25='#5eb3e8';
  const COL_26='rgba(30,111,217,.90)', BRD_26='#1e6fd9';
  const BAR_OPTS = {barPercentage:0.85, categoryPercentage:0.85};
  const isPct = (grpKey==='tasa' || grpKey==='sin');
  if(isPct){
    const labels = vs.map(v=>varDef[v].label);
    const data25 = vs.map(v=>{ const x = varDef[v].get25(M); return x==null?0:x*100; });
    const data26 = vs.map(v=>{ const x = varDef[v].get26(M); return x==null?0:x*100; });
    drawChart(cid,{
      type:'bar',
      data:{labels,datasets:[
        {label:'2025',data:data25,backgroundColor:COL_25,borderColor:BRD_25,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
        {label:'2026',data:data26,backgroundColor:COL_26,borderColor:BRD_26,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
      ]},
      options:chartOpts({yPct:true,yPctDecimals:grpKey==='tasa'?3:0,legend:true})
    });
    return;
  }

  /* Conceptos monetarios: UN SOLO gráfico con 2 columnas (2025 izquierda, 2026 derecha).
     Si hay solo una variable y dos monedas con valores, combinar en un solo gráfico
     mostrando ambas monedas. */
  const data25u = vs.map(v=>varDef[v].getU25(M)||0);
  const data26u = vs.map(v=>varDef[v].getU26(M)||0);
  const data25a = vs.map(v=>varDef[v].getA25(M)||0);
  const data26a = vs.map(v=>varDef[v].getA26(M)||0);
  const hasUSD = data25u.some(v=>v!==0) || data26u.some(v=>v!==0);
  const hasARS = data25a.some(v=>v!==0) || data26a.some(v=>v!==0);

  /* Labels: solo "2025" y "2026" — el detalle por concepto va en el legend.
     Si hay varias variables seleccionadas (vs.length > 1), las apilamos. */
  if(hasUSD && hasARS){
    /* Mostramos ambas monedas como datasets distintos en el mismo gráfico,
       con 2 categorías: 2025 (izq) y 2026 (der). Cada variable suma sus valores. */
    const sumU25 = data25u.reduce((a,b)=>a+b,0);
    const sumU26 = data26u.reduce((a,b)=>a+b,0);
    const sumA25 = data25a.reduce((a,b)=>a+b,0);
    const sumA26 = data26a.reduce((a,b)=>a+b,0);
    const lbl = vs.map(v=>varDef[v].label).join(' + ');
    /* Como mezclar USD y ARS$ en un solo eje no es comparable, usamos 2 ejes Y. */
    drawChart(cid,{
      type:'bar',
      data:{
        labels:['2025','2026'],
        datasets:[
          {label:`USD · ${lbl}`,data:[sumU25,sumU26],backgroundColor:'rgba(45,155,106,.85)',borderColor:'#2d9b6a',borderWidth:1.5,borderRadius:3,yAxisID:'yU',barPercentage:.7,categoryPercentage:.55},
          {label:`ARS$ · ${lbl}`,data:[sumA25,sumA26],backgroundColor:'rgba(30,111,217,.85)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,yAxisID:'yA',barPercentage:.7,categoryPercentage:.55},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top',labels:{color:'#3d5475',font:{family:"Calibri",size:11},boxWidth:10,padding:10}},
          tooltip:{backgroundColor:'#ffffff',titleColor:'#0a1f3a',bodyColor:'#3d5475',borderColor:'#c5d2e3',borderWidth:1,padding:10,
            callbacks:{label:(c)=>{ const isU=c.datasetIndex===0; const fmt=isU?FMT_USD_FULL:FMT_ARS_FULL; return `${c.dataset.label}: ${fmt(c.parsed.y)}`; }}}
        },
        scales:{
          x:{ticks:{color:'#7a8ca8',font:{family:"Calibri",size:12,weight:'600'}},grid:{display:false},border:{color:'#dfe7f2'}},
          yU:{position:'left',ticks:{color:'#2d9b6a',font:{family:"Calibri",size:10},callback:(v)=>FMT_USD(v)},grid:{color:'rgba(45,155,106,.10)'},border:{color:'#2d9b6a'},title:{display:true,text:'USD',color:'#2d9b6a',font:{family:"Calibri",size:10,weight:'700'}}},
          yA:{position:'right',ticks:{color:'#1e6fd9',font:{family:"Calibri",size:10},callback:(v)=>FMT_ARS(v)},grid:{display:false},border:{color:'#1e6fd9'},title:{display:true,text:'ARS$',color:'#1e6fd9',font:{family:"Calibri",size:10,weight:'700'}}}
        }
      }
    });
    return;
  }
  /* Solo USD o solo ARS: un gráfico con 2 columnas (2025 / 2026). Si hay varias
     variables seleccionadas, las apilamos. */
  const useUSD = hasUSD;
  const lbl = vs.map(v=>varDef[v].label).join(' + ');
  if(vs.length === 1){
    const d25 = useUSD ? data25u[0] : data25a[0];
    const d26 = useUSD ? data26u[0] : data26a[0];
    drawChart(cid,{
      type:'bar',
      data:{labels:['2025','2026'],datasets:[{
        label:lbl,
        data:[d25,d26],
        backgroundColor:['rgba(94,179,232,.85)','rgba(30,111,217,.90)'],
        borderColor:['#5eb3e8','#1e6fd9'],
        borderWidth:1.5,borderRadius:3,
        barThickness:80
      }]},
      options:chartOpts({yMoney:useUSD?'usd':'ars',legend:true})
    });
    return;
  }
  /* Múltiples variables: barras agrupadas (un dataset por variable) */
  drawChart(cid,{
    type:'bar',
    data:{
      labels:['2025','2026'],
      datasets: vs.map((v,idx)=>{
        const c25 = useUSD ? varDef[v].getU25(M)||0 : varDef[v].getA25(M)||0;
        const c26 = useUSD ? varDef[v].getU26(M)||0 : varDef[v].getA26(M)||0;
        const palette = ['rgba(94,179,232,.85)','rgba(30,111,217,.90)','rgba(45,155,106,.85)','rgba(232,155,30,.85)','rgba(217,71,71,.85)'];
        return {label:varDef[v].label,data:[c25,c26],backgroundColor:palette[idx%palette.length],borderWidth:1.5,borderRadius:3,...BAR_OPTS};
      })
    },
    options:chartOpts({yMoney:useUSD?'usd':'ars',legend:true})
  });
}

/* Hoja 05 — Por Rubro: mismo bloque que el Resumen Ejecutivo pero AMPLIADO:
   cada rubro como tarjeta completa (grilla Emisión/Proyección/Tasa/Siniestralidad/
   Pendientes por moneda), expandidas. Dinámico al corte del Excel. */
function renderRubro(){
  const sec = document.getElementById('sec-rubro');
  if(!sec) return;
  sec.innerHTML = `
    <div class="section-head"><h2>Emisión <em>por rubro · 2025 vs 2026</em></h2></div>
    ${sectionFiltersBarHTML('rubro')}
    <div id="rubroResumenWrap" style="margin-bottom:18px"></div>
    <div id="rubroFullWrap"></div>`;
  bindSectionFilters('rubro', ()=>drawRubroFull());
  drawRubroFull();
}
function drawRubroFull(){
  const f = getSectionFilters('rubro');
  setActiveCtx(f);
  const mesCorte = f.mes;
  const mon = efectivoMonedas(f);
  const useUSD = mon.showUSD && !mon.showARS;
  const polFiltradas = aplicarFiltrosPolizas(state.polizas, f);
  const grupos = {};
  for(const p of polFiltradas){
    const k = p.rubro || '(sin rubro)';
    /* EMISIÓN: 2025 y 2026 acumulados hasta el mes de corte. Entra si emitió en cualquiera
       de los dos años; los conteos por año (n25/n26) pueden diferir. Mismo criterio que el
       comparativo de barras y la tarjeta del Resumen Ejecutivo. */
    const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
    const em25=tuvoEmision(f25), em26=tuvoEmision(f26);
    if(!em25 && !em26) continue;
    if(!grupos[k]) grupos[k]={rubro:k,u25:0,u26:0,a25:0,a26:0,n:0,n25:0,n26:0,polizas:[]};
    grupos[k].u25+=f25.totUSD; grupos[k].u26+=f26.totUSD; grupos[k].a25+=f25.totARS; grupos[k].a26+=f26.totARS;
    if(em25) grupos[k].n25++;
    if(em26) grupos[k].n26++;
    grupos[k].n++; grupos[k].polizas.push(p);
  }
  const v26=(g)=>useUSD?g.u26:g.a26;
  const items = Object.values(grupos).sort((a,b)=> v26(b)-v26(a));
  drawRubroResumen(items, useUSD, mesCorte);
  const wrap = document.getElementById('rubroFullWrap');
  if(!wrap) return;
  wrap.innerHTML = items.length
    ? items.map((it,idx)=>`<div style="margin-bottom:16px">${renderRubroCard(it, idx, useUSD, mesCorte, {static:true})}</div>`).join('')
    : '<div style="font-size:13px;color:var(--ink-3);font-style:italic;padding:20px">— sin datos para el corte seleccionado —</div>';
}

/* Cuadro-resumen de TODOS los rubros: por rubro muestra cantidad de pólizas y los totales
   2025→2026 de Emisión (con barra), Proyección, Tasa promedio, Siniestralidad (UV/H) y
   Pendientes. Mismo criterio que las tarjetas (emitidas 2026; proy/tasa/sinies según la
   fecha de emisión de la prima mínima). En la moneda de la vista. */
function drawRubroResumen(items, useUSD, mesCorte){
  const wrap = document.getElementById('rubroResumenWrap');
  if(!wrap) return;
  const FMTc=(v)=>fmtCompact(v,useUSD);
  const mLbl = useUSD?'USD':'ARS$';
  const avg=(s,n)=>n?s/n:0;
  const rows = items.map(it=>{
    let e25=0,e26=0,n25=0,n26=0, p25=0,p26=0, t25=0,t26=0,tn25=0,tn26=0,
        uv25=0,uv26=0,uvn25=0,uvn26=0, h25=0,h26=0,hn25=0,hn26=0, pend=0;
    for(const p of (it.polizas||[])){
      const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
      if(tuvoEmision(f26)){
        e25+=useUSD?f25.totUSD:f25.totARS;
        e26+=useUSD?f26.totUSD:f26.totARS;
        if(tuvoEmision(f25)) n25++;
        n26++;
      }
      const pm25ok=primaMinEmitidaCorte(p,2025,mesCorte), pm26ok=primaMinEmitidaCorte(p,2026,mesCorte);
      const pr25=useUSD?(p.proyUSD2025||0):(p.proyARS2025||0), pr26=useUSD?(p.proyUSD2026||0):(p.proyARS2026||0);
      if(pm25ok && pr25>0) p25+=pr25;
      if(pm26ok && pr26>0) p26+=pr26;
      if(pm25ok && p.tasa2025!=null){ t25+=p.tasa2025; tn25++; }
      if(pm26ok && p.tasa2026!=null){ t26+=p.tasa2026; tn26++; }
      if(pm25ok && p.sinUV2025!=null){ uv25+=p.sinUV2025; uvn25++; }
      if(pm26ok && p.sinUV2026!=null){ uv26+=p.sinUV2026; uvn26++; }
      if(pm25ok && p.sinH2025!=null){ h25+=p.sinH2025; hn25++; }
      if(pm26ok && p.sinH2026!=null){ h26+=p.sinH2026; hn26++; }
      const pi=pendPolizaInfo(p,mesCorte); pend += useUSD?pi.usd:pi.ars;
    }
    return {rubro:it.rubro, n25,n26, e25,e26, p25,p26,
      t25:avg(t25,tn25),t26:avg(t26,tn26),
      uv25:avg(uv25,uvn25),uv26:avg(uv26,uvn26),
      h25:avg(h25,hn25),h26:avg(h26,hn26), pend};
  }).filter(r=> r.n26>0 || Math.abs(r.e25)>0.5 || Math.abs(r.e26)>0.5);
  rows.sort((a,b)=> b.e26 - a.e26);
  if(rows.length===0){ wrap.innerHTML=''; return; }
  const maxE = Math.max(1, ...rows.map(r=>Math.abs(r.e26)), ...rows.map(r=>Math.abs(r.e25)));
  /* Totales generales */
  const T = rows.reduce((a,r)=>({e25:a.e25+r.e25,e26:a.e26+r.e26,p25:a.p25+r.p25,p26:a.p26+r.p26,
    n25:a.n25+r.n25,n26:a.n26+r.n26,pend:a.pend+r.pend}),{e25:0,e26:0,p25:0,p26:0,n25:0,n26:0,pend:0});
  const fT=(v)=>FMT_PCT_TASA(v), fS=(v)=>FMT_PCT_SIN(v);
  const ab=(a,b,fmt,inv)=>{const d=b-a;const c=d===0?'var(--ink-3)':((inv? d<0 : d>0)?'var(--pos)':'var(--neg)');return `<span style="color:var(--ink-2)">${fmt(a)}</span> <span style="color:var(--ink-3)">→</span> <strong style="color:var(--accent-3)">${fmt(b)}</strong> <span style="color:${c};font-weight:800">${d>=0?'+':''}${fmt(d)}</span>`;};
  const trs = rows.map(r=>{
    const dE=r.e26-r.e25, cE=dE>=0?'var(--pos)':'var(--neg)', wE25=Math.round(Math.abs(r.e25)/maxE*100), wE26=Math.round(Math.abs(r.e26)/maxE*100);
    const dEp=r.e25?dE/Math.abs(r.e25):null;
    const dP=r.p26-r.p25, cP=dP>=0?'var(--pos)':'var(--neg)', dPp=r.p25?dP/Math.abs(r.p25):null;
    return `<tr style="border-bottom:1px solid var(--line)">
      <td style="padding:9px 10px;vertical-align:top"><div style="font-weight:800;color:var(--accent-3);font-size:13.5px">${r.rubro}</div><div style="font-size:11px;color:var(--ink-3);font-family:var(--font-mono)">${r.n25} → ${r.n26} pól.</div></td>
      <td style="padding:9px 10px;min-width:230px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-size:10px;color:var(--ink-3);width:26px">25</span><div style="flex:1;height:9px;background:var(--bg-2);border-radius:3px"><div style="height:100%;width:${wE25}%;background:rgba(94,179,232,.8);border-radius:3px"></div></div><span style="font-family:var(--font-mono);font-size:11.5px;width:64px;text-align:right">${FMTc(r.e25)}</span></div>
        <div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:var(--ink-3);width:26px">26</span><div style="flex:1;height:9px;background:var(--bg-2);border-radius:3px"><div style="height:100%;width:${wE26}%;background:rgba(30,111,217,.9);border-radius:3px"></div></div><span style="font-family:var(--font-mono);font-size:11.5px;font-weight:800;width:64px;text-align:right">${FMTc(r.e26)}</span></div>
        <div style="text-align:right;font-family:var(--font-mono);font-size:11px;font-weight:800;color:${cE};margin-top:2px">${dE>=0?'+':''}${FMTc(dE)}${dEp!=null?' ('+(dE>=0?'+':'')+FMT_PCT(dEp)+')':''}</div>
      </td>
      <td style="padding:9px 10px;font-family:var(--font-mono);font-size:11.5px;white-space:nowrap">${FMTc(r.p25)} <span style="color:var(--ink-3)">→</span> <strong>${FMTc(r.p26)}</strong> <span style="color:${cP};font-weight:800">${dPp!=null?(dP>=0?'+':'')+FMT_PCT(dPp):''}</span></td>
      <td style="padding:9px 10px;font-family:var(--font-mono);font-size:11.5px;white-space:nowrap">${ab(r.t25,r.t26,fT,false)}</td>
      <td style="padding:9px 10px;font-family:var(--font-mono);font-size:11px;white-space:nowrap"><div>UV ${ab(r.uv25,r.uv26,fS,true)}</div><div style="margin-top:2px">H ${ab(r.h25,r.h26,fS,true)}</div></td>
      <td style="padding:9px 10px;font-family:var(--font-mono);font-size:11.5px;text-align:right;font-weight:800;color:${r.pend>0.5?'var(--neg)':'var(--ink-3)'}">${r.pend>0.5?'−'+FMTc(r.pend):FMTc(0)}</td>
    </tr>`;
  }).join('');
  const dET=T.e26-T.e25, cET=dET>=0?'var(--pos)':'var(--neg)';
  const totRow = `<tr style="border-top:2px solid var(--line-2);background:var(--bg-2)">
    <td style="padding:9px 10px;font-weight:800;color:var(--accent-3)">TOTAL<div style="font-size:11px;color:var(--ink-3);font-family:var(--font-mono);font-weight:600">${T.n25} → ${T.n26} pól.</div></td>
    <td style="padding:9px 10px;font-family:var(--font-mono);font-size:12px;text-align:right;font-weight:800">${FMTc(T.e25)} → ${FMTc(T.e26)} <span style="color:${cET}">${dET>=0?'+':''}${FMTc(dET)}</span></td>

/* ============================================================
   07 JUSTIFICACIÓN POR PÓLIZA
============================================================ */
function justificarPoliza(p, mesCorte){
  const reasons = [];
  const motivos = [];
  const f25 = calcEmisionFiltrada(p,2025,mesCorte);
  const f26 = calcEmisionFiltrada(p,2026,mesCorte);

  /* REGLA PRINCIPAL: si Prima Mínima 2026 no está emitida → Pendiente emisión.
     Otros conceptos como Ajuste/Bono/Malus pueden estar emitidos pero
     corresponden a 2025; sin Prima Mínima 2026 la nueva anualidad no se emitió. */
  const esPendiente = polizaPendienteEmision(p, mesCorte);
  const esPendienteMayor = polizaPendienteMayor2m(p, mesCorte);
  if(esPendiente){
    const esp26 = mesEsperadoEmision(p.vigDesde,p.vigHasta,2026,p.inicioAnualidad2026);
    if(esPendienteMayor){
      /* Diferenciamos si lo pendiente es RENOVACIÓN o SEGUNDA ANUALIDAD según
         la posición de "Inicio Anualidad 2026" respecto a "Vigencia Hasta". */
      const lblTipo = etiquetaTipoPendiente(p);
      motivos.push(lblTipo + ' >2m');
      reasons.push(`<strong>${lblTipo} &gt; 2 meses:</strong> Prima Mínima 2026 sin emitir, esperada en ${monthLabel(esp26)}.`);
    } else {
      const lblTipo = etiquetaTipoPendiente(p);
      motivos.push(lblTipo);
      reasons.push(`<strong>${lblTipo}:</strong> Prima Mínima 2026 sin emitir, esperada en ${monthLabel(esp26)} (≤2 meses).`);
    }
  }

  /* Emitido con desvío (sólo si NO está pendiente) */
  if(!esPendiente){
    let tieneEmitDesvio = false;
    for(const c of CONCEPTOS_EMISIBLES){
      const e25 = estadoConcepto(p,c,2025,mesCorte);
      const e26 = estadoConcepto(p,c,2026,mesCorte);
      if(e25==='emitido_con_desvio'||e26==='emitido_con_desvio'){ tieneEmitDesvio = true; break; }
    }
    if(tieneEmitDesvio){
      motivos.push('Emitido con desvío');
      reasons.push(`<strong>Emisión realizada fuera del mes esperado.</strong>`);
    }
  }

  /* Análisis Proyección de Ventas — sólo si NO está pendiente */
  const tieneProy25 = (p.proyARS2025||p.proyUSD2025);
  const tieneProy26 = (p.proyARS2026||p.proyUSD2026);
  if(esPendiente){
    if(!tieneProy26){
      reasons.push(`<em>La proyección de ventas 2026 todavía no se cargó porque la póliza está pendiente de emisión.</em>`);
    }
  } else if(!tieneProy26){
    reasons.push(`<strong>Proyección de ventas 2026 sin cargar.</strong>`);
  } else if(tieneProy25 && tieneProy26){
    const dPu = (p.proyUSD2026||0) - (p.proyUSD2025||0);
    const dPpct = p.proyUSD2025 ? dPu/p.proyUSD2025 : null;
    let etiqueta = dPu>0 ? 'Aumento' : (dPu<0?'Disminución':'Sin cambio en');
    if(p.tipoRenovacion){
      etiqueta += ` (${p.tipoRenovacion})`;
    }
    if(dPu!==0){
      motivos.push(dPu>0?'Aumento proyección':'Disminución proyección');
      reasons.push(`<strong>${etiqueta} de proyección:</strong> ${FMT_USD_FULL(p.proyUSD2025)} → ${FMT_USD_FULL(p.proyUSD2026)} (${dPu>=0?'+':''}${FMT_PCT(dPpct)}) · ARS$ ${FMT_ARS_FULL(p.proyARS2025)} → ${FMT_ARS_FULL(p.proyARS2026)}.`);
    } else {
      reasons.push(`<strong>Proyección sin cambios:</strong> ${FMT_USD_FULL(p.proyUSD2025)}.`);
    }
  }

  /* Tasa — sólo se compara si HAY Prima Mínima que corresponda a la anualidad vigente
     (la justificación NO debe decir "Corresponde a la Anualidad Anterior"). */
  const rPMforTasa = p.conceptos['Prima Minima'];
  const tasaPrimaOk = rPMforTasa && !categoriaEsAnualidadAnterior(rPMforTasa.categoria) && (rPMforTasa.ars2026 || rPMforTasa.usd2026 || rPMforTasa.ars2025 || rPMforTasa.usd2025);
  if(tasaPrimaOk && p.tasa2025!==null && p.tasa2026!==null && p.tasa2025!==p.tasa2026){
    const dT = p.tasa2026 - p.tasa2025;
    const dTpct = p.tasa2025 ? dT/p.tasa2025 : null;
    motivos.push(dT>0?'Aumento de tasa':'Disminución de tasa');
    reasons.push(`<strong>${dT>0?'Aumento':'Disminución'} de tasa:</strong> ${FMT_PCT_TASA(p.tasa2025)} → ${FMT_PCT_TASA(p.tasa2026)} (${dT>0?'+':''}${FMT_PCT_TASA(dTpct)}).`);
  } else if(tasaPrimaOk && p.tasa2025!==null && p.tasa2026===null && !esPendiente){
    reasons.push(`<strong>Tasa 2026 sin cargar.</strong> Tasa 2025: ${FMT_PCT_TASA(p.tasa2025)}.`);
  }

  /* Siniestralidad */
  const sinChange = (a,b,label)=>{
    if(a===null||b===null||a===b) return null;
    const d = b-a;
    return `<strong>Siniestralidad ${label}:</strong> ${FMT_PCT(a)} → ${FMT_PCT(b)} (${d>0?'+':''}${FMT_PCT(d)}).`;
  };
  const sH = sinChange(p.sinH2025,p.sinH2026,'Histórica');
  const sUV = sinChange(p.sinUV2025,p.sinUV2026,'Última Vigencia');
  if(sH){ motivos.push('Siniestralidad'); reasons.push(sH); }
  if(sUV){ motivos.push('Siniestralidad'); reasons.push(sUV); }

  /* "Póliza nueva 2026": SOLO las marcadas explícitamente en la columna 2026 del Excel
     (no las heredadas de 2025) y que no estén terminadas. Coincide con la regla del
     card "Pólizas nuevas" en Resumen Ejecutivo. */
  if(p.tipo2026==='Póliza nueva' && p.tipo2026Explicito && !polizaTerminada(p)){
    motivos.push('Póliza nueva 2026');
    if(reasons.length===0) reasons.push('Emisión nueva 2026.');
  } else if(reasons.length===0){
    if(f25.totUSD>0 && f26.totUSD>0) reasons.push('Sin cambios significativos.');
  }

  /* Detección de conceptos "No corresponde" — para que la póliza aparezca al filtrar por
     ese motivo y se pueda rastrear de dónde salen los descuentos. */
  const conceptosNC = [];
  for(const c of CONCEPTOS_EMISIBLES){
    const r = p.conceptos[c];
    if(r && r.categoria === 'No corresponde'){
      conceptosNC.push(c);
    }
  }
  if(conceptosNC.length > 0){
    motivos.push('No corresponde');
    reasons.push(`<strong>Concepto(s) marcado(s) "No corresponde" para 2026:</strong> ${conceptosNC.join(', ')} (no se emitirán; los montos 2025 se descuentan del proyectado 2026).`);
  }
  return {motivos:[...new Set(motivos)],reasons,f25,f26};
}

function drawPolizas(){
  const f = getSectionFilters('polizas');
  /* Justificación por póliza muestra todo; no aplicamos filtro Anualidad Anterior */
  setActiveCtx({anualAnt:'incluir'});
  const mesCorte = 0; /* siempre año completo */
  /* En esta sección no filtramos por universo (mostramos todas) */
  let polFiltradas = state.polizas;
  if(f.segmento === 'arsArs') polFiltradas = polFiltradas.filter(p=>p.moneda==='$');
  else if(f.segmento === 'usdUsd') polFiltradas = polFiltradas.filter(p=>p.moneda==='US');

  const q = (document.getElementById('fPolBuscar').value||'').toLowerCase();
  const motF = document.getElementById('fPolMotivo').value;
  const rubF = document.getElementById('fPolRubro').value;
  const tipo26F = document.getElementById('fPolTipo26').value;
  const catF = document.getElementById('fPolCategoria').value;
  const ord = document.getElementById('fPolOrden').value;

  const items = polFiltradas
    .map(p=>({p, _just:justificarPoliza(p,mesCorte)}))
    .filter(x=>{
      /* Mantener si tiene montos */
      if(x._just.f25.totUSD>0 || x._just.f26.totUSD>0 || x._just.f25.totARS>0 || x._just.f26.totARS>0) return true;
      /* O si tiene motivos calculados */
      if(x._just.motivos.length>0) return true;
      /* O si tiene categorías cargadas en algún concepto */
      const tieneCats = Object.values(x.p.conceptos||{}).some(r=>r && (r.categoria||r.detalle));
      return tieneCats;
    });

  let arr = items.filter(({p,_just})=>{
    if(rubF && p.rubro!==rubF) return false;
    if(tipo26F && p.tipo2026!==tipo26F) return false;
    if(motF && !_just.motivos.some(m=>m.toLowerCase().includes(motF.toLowerCase()))) return false;
    if(catF){
      const tieneCat = Object.values(p.conceptos||{}).some(r=>r && r.categoria===catF);
      if(!tieneCat) return false;
    }
    if(q){
      /* Buscar también en categorías/detalles para "buscar en motivos" */
      const motivosBlob = Object.values(p.conceptos||{})
        .filter(r=>r && (r.categoria||r.detalle))
        .map(r=>(r.categoria||'')+' '+(r.detalle||''))
        .join(' ').toLowerCase();
      const blob = (p.poliza+' '+(p.asegurado||'')+' '+(p.rubro||'')+' '+(p.producto||'')+' '+(p.broker||'')+' '+motivosBlob).toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
  if(ord==='impacto-desc') arr.sort((a,b)=>Math.abs(b._just.f26.totUSD-b._just.f25.totUSD)-Math.abs(a._just.f26.totUSD-a._just.f25.totUSD));
  else if(ord==='var-desc') arr.sort((a,b)=>(b._just.f26.totUSD-b._just.f25.totUSD)-(a._just.f26.totUSD-a._just.f25.totUSD));
  else if(ord==='var-asc') arr.sort((a,b)=>(a._just.f26.totUSD-a._just.f25.totUSD)-(b._just.f26.totUSD-b._just.f25.totUSD));
  else if(ord==='nombre') arr.sort((a,b)=>(a.p.asegurado||'').localeCompare(b.p.asegurado||''));

  const limit = 200;
  const html = arr.slice(0,limit).map(({p,_just})=>polizaRowHTML(p,_just,f)).join('');

  const lblSeg  = f.segmento==='arsArs'?'$ en $':(f.segmento==='usdUsd'?'US en US':(f.segmento==='vs'?'US vs $':'Todas las monedas'));
  const lblCur = f.cur==='dual'?'Moneda Original':(f.cur==='usd'?'USD':'ARS$');
  document.getElementById('polizas-nlabel').innerHTML = `<div class="n-label-bar">N = ${polFiltradas.length} pólizas (${arr.length} mostrables) · ${lblCur} · ${lblSeg}</div>`;

  document.getElementById('polizasContainer').innerHTML =
    html + (arr.length>limit?`<div style="text-align:center;color:var(--ink-3);padding:14px;font-size:12px">Mostrando ${limit} de ${arr.length} pólizas — refiná los filtros</div>`:'');
}
function polizaRowHTML(p,_just,filters){
  const f = filters || getSectionFilters('polizas');
  const mon = efectivoMonedas(f);
  /* Decidir qué moneda mostrar para cada póliza */
  const monPoliza = p.moneda==='$' ? 'ars' : 'usd';
  let showMode;
  if(f.segmento==='vs') showMode = 'dual';
  else if(f.segmento==='arsArs') showMode = 'ars';
  else if(f.segmento==='usdUsd') showMode = 'usd';
  else if(f.cur==='ars') showMode = 'ars';
  else if(f.cur==='usd') showMode = 'usd';
  else showMode = monPoliza; /* dual con todo: moneda original */

  /* Pill simple: sólo Emitida / Pendiente emisión / Pendiente emisión >2m / Cancelada */
  const esPendiente = _just.motivos.includes('Pendiente emisión') || _just.motivos.includes('Pendiente emisión >2m');
  const esPendienteMayor = _just.motivos.includes('Pendiente emisión >2m');
  let estadoPill = '';
  if(p.tipo2026 === 'Póliza terminada') estadoPill = `<span class="pill neu" style="background:rgba(217,71,71,.12);color:var(--neg)">Cancelada 2026</span>`;
  else if(esPendienteMayor) estadoPill = `<span class="pill neg">Pendiente emisión &gt;2m</span>`;
  else if(esPendiente) estadoPill = `<span class="pill warn">Pendiente emisión</span>`;
  else estadoPill = `<span class="pill pos">Emitida</span>`;
  /* Tipo pill: Renovación, Nueva, etc. */
  const tipoLbl = (t)=>{
    if(!t) return '';
    if(t==='Renovación') return 'Renov.';
    if(t==='Segunda anualidad') return '2da Anual.';
    if(t==='Póliza nueva') return 'Nueva';
    if(t==='Póliza terminada') return 'Cancelada';
    return t;
  };
  const tipoColor = (t)=>{
    if(t==='Póliza terminada') return 'neg';
    if(t==='Póliza nueva') return 'pos';
    if(t==='Segunda anualidad') return 'neu';
    if(t==='Renovación') return 'neu';
    return 'neu';
  };
  const tipoChips = `<span style="display:inline-flex;gap:4px;font-family:var(--font-mono);font-size:10px">
    ${p.tipo2025?`<span class="pill ${tipoColor(p.tipo2025)}" style="font-size:9.5px">'25 ${tipoLbl(p.tipo2025)}</span>`:''}
    ${p.tipo2026?`<span class="pill ${tipoColor(p.tipo2026)}" style="font-size:9.5px">'26 ${tipoLbl(p.tipo2026)}</span>`:''}
  </span>`;
  const motPills = estadoPill + ' ' + tipoChips;

  /* Render de un concept-card (sirve para Prima Mín, Ajuste, Bono, Malus, y también Proyección)
     isBono: el bono siempre es negativo; más negativo = más bono (pos verde) */
  const buildCard = (label, u25, a25, u26, a26, isBono, categoria, detalle)=>{
    const tieneAlgo = u25||a25||u26||a26;
    const dU = (u26||0)-(u25||0), dA = (a26||0)-(a25||0);
    const dUPct = u25? dU/u25 : (u26?1:null);
    const dAPct = a25? dA/a25 : (a26?1:null);
    const cls4U = isBono ? (dU<0?'pos':(dU>0?'neg':'neu')) : (dU>0?'pos':(dU<0?'neg':'neu'));
    const cls4A = isBono ? (dA<0?'pos':(dA>0?'neg':'neu')) : (dA>0?'pos':(dA<0?'neg':'neu'));

    let body='';
    let varHTML='';
    if(showMode==='ars'){
      body = `<div class="cv-row"><span class="yr">25</span><span>${a25?FMT_ARS_FULL(a25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span>${a26?FMT_ARS_FULL(a26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4A}">${dA>=0?'+':''}${FMT_ARS(dA)} · ${dAPct!==null?FMT_PCT(dAPct):'—'}</div>`;
    } else if(showMode==='usd'){
      body = `<div class="cv-row"><span class="yr">25</span><span>${u25?FMT_USD_FULL(u25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span>${u26?FMT_USD_FULL(u26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4U}">${dU>=0?'+':''}${FMT_USD(dU)} · ${dUPct!==null?FMT_PCT(dUPct):'—'}</div>`;
    } else {
      /* dual: USD vs $ — ambos con su propia variación */
      body = `<div class="cv-row"><span class="yr">25</span><span style="font-size:10px">${u25?FMT_USD_FULL(u25):'—'}<br>${a25?FMT_ARS_FULL(a25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span style="font-size:10px">${u26?FMT_USD_FULL(u26):'—'}<br>${a26?FMT_ARS_FULL(a26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4U}" style="font-size:10px">USD ${dU>=0?'+':''}${FMT_USD(dU)} · ${dUPct!==null?FMT_PCT(dUPct):'—'}</div>
                 <div class="cv-var ${cls4A}" style="font-size:10px;border-top:none;padding-top:0">$ ${dA>=0?'+':''}${FMT_ARS(dA)} · ${dAPct!==null?FMT_PCT(dAPct):'—'}</div>`;
    }
    /* La justificación (categoría + detalle) ya NO se muestra inline en la card.
       Se muestra exclusivamente en el panel "Motivos" más abajo. */
    return `<div class="concept-card ${tieneAlgo?'has-data':'no-data'}">
      <div class="cn">${label}${isBono?' <span style="font-size:9px;color:var(--ink-3);font-style:italic">(neg)</span>':''}</div>
      ${body}${varHTML}
    </div>`;
  };

  /* Proyección de Ventas */
  const proyR = p.conceptos['Proyeccion de Ventas']||{};
  const proyectionCard = buildCard('Proy. Ventas',
    p.proyUSD2025, p.proyARS2025, p.proyUSD2026, p.proyARS2026, false, proyR.categoria, proyR.detalle);

  /* 4 conceptos — Bono lleva el flag */
  const conceptCards = CONCEPTOS_EMISIBLES.map(c=>{
    const r = p.conceptos[c]||{};
    return buildCard(CONCEPTO_LABEL[c], r.usd2025, r.ars2025, get26usd(r), get26ars(r), c==='Bono', r.categoria, r.detalle);
  }).join('');

  /* Siniestralidad H y UV */
  const sinChange = (a,b,label)=>{
    if(a===null && b===null) return `<div class="concept-card no-data"><div class="cn">${label}</div><div style="font-size:10.5px;color:var(--ink-3)">sin datos</div></div>`;
    const d = (b!=null && a!=null) ? b-a : null;
    const cls = (d===null||d===0)?'neu':(d>0?'pos':'neg');
    return `<div class="concept-card has-data">
      <div class="cn">${label}</div>
      <div class="cv-row"><span class="yr">25</span><span>${a!=null?FMT_PCT(a):'—'}</span></div>
      <div class="cv-row"><span class="yr">26</span><span>${b!=null?FMT_PCT(b):'—'}</span></div>
      <div class="cv-var ${cls}">${d!==null?(d>=0?'+':'')+FMT_PCT(d):'—'}</div>
    </div>`;
  };
  const sinHCard = sinChange(p.sinH2025,p.sinH2026,'Sin. H');
  const sinUVCard = sinChange(p.sinUV2025,p.sinUV2026,'Sin. UV');

  /* Tasa */
  const tasaCard = (()=>{
    if(p.tasa2025===null && p.tasa2026===null) return `<div class="concept-card no-data"><div class="cn">Tasa</div><div style="font-size:10.5px;color:var(--ink-3)">sin datos</div></div>`;
    const d = (p.tasa2026!=null && p.tasa2025!=null) ? p.tasa2026-p.tasa2025 : null;
    const cls = (d===null||d===0)?'neu':(d>0?'pos':'neg');
    return `<div class="concept-card has-data">
      <div class="cn">Tasa</div>
      <div class="cv-row"><span class="yr">25</span><span>${p.tasa2025!=null?FMT_PCT_TASA(p.tasa2025):'—'}</span></div>
      <div class="cv-row"><span class="yr">26</span><span>${p.tasa2026!=null?FMT_PCT_TASA(p.tasa2026):'—'}</span></div>
      <div class="cv-var ${cls}">${d!==null?(d>=0?'+':'')+FMT_PCT_TASA(d):'—'}</div>
    </div>`;
  })();

  /* Layout: Proy | 4 conceptos | Tasa, SinH, SinUV */
  const allCards = `
    <div style="display:grid;grid-template-columns:1fr 4fr 3fr;gap:8px;margin:8px 0">
      <div style="display:grid;grid-template-columns:1fr;gap:8px">${proyectionCard}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${conceptCards}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${tasaCard}${sinHCard}${sinUVCard}</div>
    </div>`;

  /* Recolectar motivos por concepto. Mostramos TODOS los 8 conceptos.
     Si no tiene categoría/detalle, mostramos "— sin información —". */
  const conceptoLabel = {'Proyeccion de Ventas':'Proyección','Prima Minima':'Prima Mínima','Ajuste':'Ajuste','Bono':'Bono','Malus':'Malus','Tasa aplicable':'Tasa','Siniestralidad H':'Sin. H','Siniestralidad UV':'Sin. UV'};
  const motivosOrden = ['Proyeccion de Ventas','Prima Minima','Ajuste','Bono','Malus','Tasa aplicable','Siniestralidad H','Siniestralidad UV'];
  const motivosCon = motivosOrden.map(c=>{
    const r = p.conceptos[c];
    return {
      concepto: conceptoLabel[c]||c,
      categoria: r ? r.categoria : null,
      detalle: r ? r.detalle : null,
      tieneInfo: !!(r && (r.categoria || r.detalle)),
    };
  });
  const motivosConCount = motivosCon.filter(m=>m.tieneInfo).length;
  const motivosBlockId = `motivos_${p.clave.replace(/[^a-zA-Z0-9]/g,'_')}`;
  const motivosBtn = `<button class="motivos-btn" onclick="toggleMotivos('${motivosBlockId}')" style="margin-top:8px;padding:6px 14px;font-size:11px;font-family:var(--font-mono);background:var(--bg-2);color:var(--accent-3);border:1px solid var(--accent-2);border-radius:4px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.04em">▶ Motivos${motivosConCount>0?` (${motivosConCount}/8)`:''}</button>`;
  /* Diseño compacto: 4 columnas en grid (no 2), tipografía y padding reducidos */
  const motivosPanel = `<div id="${motivosBlockId}" class="motivos-panel" style="display:none;margin-top:6px;padding:8px;background:var(--bg-2);border-radius:5px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        ${motivosCon.map(m=>`
          <div style="padding:6px 8px;background:var(--panel);border-radius:4px;border-left:2px solid ${m.tieneInfo?'var(--accent)':'var(--line-2)'};min-height:42px">
            <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px">${m.concepto}</div>
            ${m.tieneInfo
              ? `${m.categoria?`<div style="font-size:10.5px;color:var(--accent-3);font-weight:600;margin-bottom:2px;line-height:1.3">${m.categoria}</div>`:''}${m.detalle?`<div style="font-size:9.5px;color:var(--ink-2);line-height:1.35">${m.detalle}</div>`:''}`
              : `<div style="font-size:9.5px;color:var(--ink-3);font-style:italic">—</div>`}
          </div>`).join('')}
      </div>
    </div>`;

  return `<div class="justif-row">
    <div class="justif-head">
      <div>
        <div class="pol-name">${p.asegurado||'—'}<span class="pol-num">#${fmtPoliza(p.poliza)} · ${p.producto||''} · ${p.rubro||''} · ${p.moneda||''}</span></div>
        <div class="pol-pills">${motPills}</div>
      </div>
      <div class="pol-meta">
        Vigencia: ${p.vigDesde?p.vigDesde.toLocaleDateString('es-AR'):'—'} → ${p.vigHasta?p.vigHasta.toLocaleDateString('es-AR'):'—'}<br>
        Broker: ${p.broker||'—'}
      </div>
    </div>
    ${allCards}
    ${motivosBtn}
    ${motivosPanel}
  </div>`;
}
/* ============================================================
   MÉTRICAS AGREGADAS: 4 vistas
   - todos: todas las pólizas con dato
   - emit26: pólizas que efectivamente emitieron en 2026
   - arsArs: pólizas $ comparando emisión $
   - usdUsd: pólizas US comparando emisión US
============================================================ */
function buildAggregateMetrics(polizasArr, mesCorte){
  const M = {
    polizasCount: polizasArr.length,
    totA25:0, totA26:0, totU25:0, totU26:0,
    concA25:{primaMin:0,ajuste:0,bono:0,malus:0},
    concA26:{primaMin:0,ajuste:0,bono:0,malus:0},
    concU25:{primaMin:0,ajuste:0,bono:0,malus:0},
    concU26:{primaMin:0,ajuste:0,bono:0,malus:0},
    arsArs25:0, arsArs26:0, countArs:0,
    conArsArs25:{primaMin:0,ajuste:0,bono:0,malus:0},
    conArsArs26:{primaMin:0,ajuste:0,bono:0,malus:0},
    usdUsd25:0, usdUsd26:0, countUsd:0,
    conUsdUsd25:{primaMin:0,ajuste:0,bono:0,malus:0},
    conUsdUsd26:{primaMin:0,ajuste:0,bono:0,malus:0},
    emit26_25u:0, emit26_25a:0, emit26_26u:0, emit26_26a:0, countEmit26:0,
    conEmit25u:{primaMin:0,ajuste:0,bono:0,malus:0},
    conEmit26u:{primaMin:0,ajuste:0,bono:0,malus:0},
    conEmit25a:{primaMin:0,ajuste:0,bono:0,malus:0},
    conEmit26a:{primaMin:0,ajuste:0,bono:0,malus:0},
    tasa: {todo:{s25:0,s26:0,n25:0,n26:0}, emit:{s25:0,s26:0,n25:0,n26:0}, ars:{s25:0,s26:0,n25:0,n26:0}, usd:{s25:0,s26:0,n25:0,n26:0}},
    sinH: {todo:{s25:0,s26:0,n25:0,n26:0}, emit:{s25:0,s26:0,n25:0,n26:0}, ars:{s25:0,s26:0,n25:0,n26:0}, usd:{s25:0,s26:0,n25:0,n26:0}},
    sinUV:{todo:{s25:0,s26:0,n25:0,n26:0}, emit:{s25:0,s26:0,n25:0,n26:0}, ars:{s25:0,s26:0,n25:0,n26:0}, usd:{s25:0,s26:0,n25:0,n26:0}},
    proyU:{todo:{s25:0,s26:0,n25:0,n26:0}, emit:{s25:0,s26:0,n25:0,n26:0}, ars:{s25:0,s26:0,n25:0,n26:0}, usd:{s25:0,s26:0,n25:0,n26:0}},
    proyA:{todo:{s25:0,s26:0,n25:0,n26:0}, emit:{s25:0,s26:0,n25:0,n26:0}, ars:{s25:0,s26:0,n25:0,n26:0}, usd:{s25:0,s26:0,n25:0,n26:0}},
    pend26Count:0,pend26USD:0,pend26ARS:0,
    pend26mayorCount:0,pend26mayorUSD:0,pend26mayorARS:0,
    pend25Count:0,pend25USD:0,pend25ARS:0,
    emitDesvCount:0,emitDesvUSD:0,emitDesvARS:0,
    desvPorConcepto:{
      'Prima Minima':{p26:0,p26m:0,p25:0,emit:0,sd25:0,sd26:0,naAjBM:0,p26USD:0,p26ARS:0,p26mUSD:0,p26mARS:0,p25USD:0,p25ARS:0,emitUSD:0,emitARS:0},
      'Ajuste':{p26:0,p26m:0,p25:0,emit:0,sd25:0,sd26:0,naAjBM:0,p26USD:0,p26ARS:0,p26mUSD:0,p26mARS:0,p25USD:0,p25ARS:0,emitUSD:0,emitARS:0},
      'Bono':{p26:0,p26m:0,p25:0,emit:0,sd25:0,sd26:0,naAjBM:0,p26USD:0,p26ARS:0,p26mUSD:0,p26mARS:0,p25USD:0,p25ARS:0,emitUSD:0,emitARS:0},
      'Malus':{p26:0,p26m:0,p25:0,emit:0,sd25:0,sd26:0,naAjBM:0,p26USD:0,p26ARS:0,p26mUSD:0,p26mARS:0,p25USD:0,p25ARS:0,emitUSD:0,emitARS:0},
    }
  };
  /* accStat: contabiliza cada año por separado. Antes pedía que AMBOS años
     estuvieran presentes (para que n25===n26 en promedios), pero eso dejaba
     afuera del total a las pólizas con sólo un año cargado (típico en proyección
     de ventas cuando 2026 todavía no se cargó en algunas). avgStat ya maneja
     n25 y n26 separadamente, así que el promedio sigue siendo el correcto. */
  const accStat = (target, v25, v26)=>{
    if(v25!=null){ target.s25+=v25; target.n25++; }
    if(v26!=null){ target.s26+=v26; target.n26++; }
  };
  for(const p of polizasArr){
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    M.totA25 += f25.totARS; M.totA26 += f26.totARS;
    M.totU25 += f25.totUSD; M.totU26 += f26.totUSD;
    for(const k of Object.keys(M.concA25)){
      M.concA25[k]+=f25.breakdownARS[k]; M.concA26[k]+=f26.breakdownARS[k];
      M.concU25[k]+=f25.breakdownUSD[k]; M.concU26[k]+=f26.breakdownUSD[k];
    }
    if(p.moneda==='$'){
      M.arsArs25 += f25.totARS; M.arsArs26 += f26.totARS; M.countArs++;
      for(const k of Object.keys(M.conArsArs25)){
        M.conArsArs25[k]+=f25.breakdownARS[k]; M.conArsArs26[k]+=f26.breakdownARS[k];
      }
    } else if(p.moneda==='US'){
      M.usdUsd25 += f25.totUSD; M.usdUsd26 += f26.totUSD; M.countUsd++;
      for(const k of Object.keys(M.conUsdUsd25)){
        M.conUsdUsd25[k]+=f25.breakdownUSD[k]; M.conUsdUsd26[k]+=f26.breakdownUSD[k];
      }
    }
    /* emitio26 ESTRICTO: la póliza tiene Prima Mínima 2026 efectivamente emitida.
       Sin Prima Mínima → no contabiliza (regla del usuario). */
    const pm26 = p.conceptos['Prima Minima'];
    const emitio26 = !!(pm26 && pm26.fechaEm2026 && (pm26.ars2026 || pm26.usd2026));
    if(emitio26){
      M.emit26_25u += f25.totUSD; M.emit26_26u += f26.totUSD;
      M.emit26_25a += f25.totARS; M.emit26_26a += f26.totARS;
      M.countEmit26++;
      for(const k of Object.keys(M.conEmit25u)){
        M.conEmit25u[k]+=f25.breakdownUSD[k]; M.conEmit26u[k]+=f26.breakdownUSD[k];
        M.conEmit25a[k]+=f25.breakdownARS[k]; M.conEmit26a[k]+=f26.breakdownARS[k];
      }
    }
    accStat(M.tasa.todo, p.tasa2025, p.tasa2026);
    accStat(M.sinH.todo, p.sinH2025, p.sinH2026);
    accStat(M.sinUV.todo, p.sinUV2025, p.sinUV2026);
    accStat(M.proyU.todo, p.proyUSD2025, p.proyUSD2026);
    accStat(M.proyA.todo, p.proyARS2025, p.proyARS2026);
    if(emitio26){
      accStat(M.tasa.emit, p.tasa2025, p.tasa2026);
      accStat(M.sinH.emit, p.sinH2025, p.sinH2026);
      accStat(M.sinUV.emit, p.sinUV2025, p.sinUV2026);
      accStat(M.proyU.emit, p.proyUSD2025, p.proyUSD2026);
      accStat(M.proyA.emit, p.proyARS2025, p.proyARS2026);
    }
    if(p.moneda==='$'){
      accStat(M.tasa.ars, p.tasa2025, p.tasa2026);
      accStat(M.sinH.ars, p.sinH2025, p.sinH2026);
      accStat(M.sinUV.ars, p.sinUV2025, p.sinUV2026);
      accStat(M.proyU.ars, p.proyUSD2025, p.proyUSD2026);
      accStat(M.proyA.ars, p.proyARS2025, p.proyARS2026);
    }
    if(p.moneda==='US'){
      accStat(M.tasa.usd, p.tasa2025, p.tasa2026);
      accStat(M.sinH.usd, p.sinH2025, p.sinH2026);
      accStat(M.sinUV.usd, p.sinUV2025, p.sinUV2026);
      accStat(M.proyU.usd, p.proyUSD2025, p.proyUSD2026);
      accStat(M.proyA.usd, p.proyARS2025, p.proyARS2026);
    }
    for(const c of CONCEPTOS_EMISIBLES){
      const e26 = estadoConcepto(p,c,2026,mesCorte);
      const e25 = estadoConcepto(p,c,2025,mesCorte);
      const r = p.conceptos[c];
      const a25=(r&&r.ars2025)||0, u25=(r&&r.usd2025)||0;
      const a26=get26ars(r), u26=get26usd(r);
      const dpc = M.desvPorConcepto[c];
      if(e25==='sin_desvio') dpc.sd25++;
      if(e26==='sin_desvio') dpc.sd26++;
      if(c!=='Prima Minima' && e25===null && e26===null) dpc.naAjBM++;
      if(e26==='desvio_emision_pendiente'){
        M.pend26Count++; M.pend26USD+=u25; M.pend26ARS+=a25;
        dpc.p26++; dpc.p26USD+=u25; dpc.p26ARS+=a25;
      }
      if(e26==='desvio_pendiente_mayor_2m'){
        M.pend26mayorCount++; M.pend26mayorUSD+=u25; M.pend26mayorARS+=a25;
        dpc.p26m++; dpc.p26mUSD+=u25; dpc.p26mARS+=a25;
      }
      if(e25==='pendiente_2025'){
        M.pend25Count++; M.pend25USD+=u25; M.pend25ARS+=a25;
        dpc.p25++; dpc.p25USD+=u25; dpc.p25ARS+=a25;
      }
      if(e25==='emitido_con_desvio'||e26==='emitido_con_desvio'){
        M.emitDesvCount++; M.emitDesvUSD+=(u26||u25); M.emitDesvARS+=(a26||a25);
        dpc.emit++; dpc.emitUSD+=(u26||u25); dpc.emitARS+=(a26||a25);
      }
    }
  }
  M.varA = M.totA26-M.totA25;
  M.varU = M.totU26-M.totU25;
  M.varAPct = M.totA25? M.varA/M.totA25 : null;
  M.varUPct = M.totU25? M.varU/M.totU25 : null;
  return M;
}

function avgStat(s){ return {v25: s.n25? s.s25/s.n25 : null, v26: s.n26? s.s26/s.n26 : null, n25:s.n25, n26:s.n26}; }
/* sumStat: para Proyección de Ventas (y otros conceptos sumables por póliza).
   Devuelve la SUMA total, no el promedio. La proyección anual de una póliza es un
   valor único; al agrupar por rubro/producto se debe SUMAR (Agro = $500 = suma de
   sus 5 pólizas con proy $100), NO promediar ($100). */
function sumStat(s){ return {v25: s.n25? s.s25 : null, v26: s.n26? s.s26 : null, n25:s.n25, n26:s.n26}; }
function clasificarCambio(v25,v26,umbral=0.001,isBono=false){
  if(v25===null||v26===null) return {label:'sin datos',cls:'neu',d:null,dPct:null};
  const d = v26-v25;
  const dPct = v25 ? d/v25 : null;
  /* Bono: como siempre es negativo, más negativo (d<0) = más bono = pos */
  const determinarLado = ()=>{
    if(d === 0) return {label:'sin cambios', cls:'neu'};
    if(isBono){
      return d < 0 ? {label:'aumentó (más bono)', cls:'pos'} : {label:'bajó (menos bono)', cls:'neg'};
    }
    return d > 0 ? {label:'aumentó', cls:'pos'} : {label:'bajó', cls:'neg'};
  };
  if(dPct === null){
    const r = determinarLado();
    return {...r, d, dPct};
  }
  if(Math.abs(dPct) < umbral) return {label:'sin cambios',cls:'neu',d,dPct};
  const r = determinarLado();
  return {...r, d, dPct};
}

function comparePairBoxStat(label, v25, v26, n25, n26, fmt, isBono){
  const c = clasificarCambio(v25,v26,0.001,isBono);
  const dPctTxt = c.dPct!==null ? `${c.dPct>=0?'+':''}${FMT_PCT(c.dPct)}` : '';
  const n25Txt = (n25!=null) ? `<span style="font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3)">n=${n25}</span>` : '';
  const n26Txt = (n26!=null) ? `<span style="font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3)">n=${n26}</span>` : '';
  return `<div class="compare-pair">
    <div class="compare-pair-item y25">
      <div class="yr"><span>2025</span>${n25Txt}</div>
      <div class="label-mini">${label}</div>
      <div class="val-main">${v25===null?'—':fmt(v25)}</div>
    </div>
    <div class="compare-pair-item y26">
      <div class="yr"><span>2026</span>${n26Txt}</div>
      <div class="label-mini">${label}</div>
      <div class="val-main" style="color:${c.cls==='pos'?'var(--pos)':c.cls==='neg'?'var(--neg)':'var(--accent-3)'}">${v26===null?'—':fmt(v26)}</div>
      <div class="val-sub" style="color:${c.cls==='pos'?'var(--pos)':c.cls==='neg'?'var(--neg)':'var(--ink-3)'}">${c.label} ${dPctTxt}</div>
    </div>
  </div>`;
}
function comparePairBoxDualEqual(label, u25, a25, u26, a26, n25, n26, isBono){
  const c = clasificarCambio(u25,u26,0.001,isBono);
  const dPctTxt = c.dPct!==null ? `${c.dPct>=0?'+':''}${FMT_PCT(c.dPct)}` : '';
  const n25Txt = (n25!=null) ? `<span style="font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3)">n=${n25}</span>` : '';
  const n26Txt = (n26!=null) ? `<span style="font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3)">n=${n26}</span>` : '';
  return `<div class="compare-pair">
    <div class="compare-pair-item y25">
      <div class="yr"><span>2025</span>${n25Txt}</div>
      <div class="label-mini">${label}</div>
      <div class="val-main" style="font-size:13px;color:var(--accent-3)">${FMT_USD_FULL(u25)}</div>
      <div class="val-main" style="font-size:13px;color:var(--accent-3)">${FMT_ARS_FULL(a25)}</div>
    </div>
    <div class="compare-pair-item y26">
      <div class="yr"><span>2026</span>${n26Txt}</div>
      <div class="label-mini">${label}</div>
      <div class="val-main" style="font-size:13px;color:${c.cls==='pos'?'var(--pos)':c.cls==='neg'?'var(--neg)':'var(--accent-3)'}">${FMT_USD_FULL(u26)}</div>
      <div class="val-main" style="font-size:13px;color:${c.cls==='pos'?'var(--pos)':c.cls==='neg'?'var(--neg)':'var(--accent-3)'}">${FMT_ARS_FULL(a26)}</div>
      <div class="val-sub">${c.label} ${dPctTxt}</div>
    </div>
  </div>`;
}
function comparePairBoxConcepto(label, u25, a25, u26, a26, cur){
  const isBono = label === 'Bono';
  if(cur==='dual') return comparePairBoxDualEqual(label, u25, a25, u26, a26, null, null, isBono);
  if(cur==='ars') return comparePairBoxStat(label, a25, a26, null, null, FMT_ARS_FULL, isBono);
  return comparePairBoxStat(label, u25, u26, null, null, FMT_USD_FULL, isBono);
}

/* ============================================================
   CONCLUSIÓN — bloque principal
============================================================ */
let _conclSeq = 0;
const _conclMetricas = {};

function buildConclusionHTML(title, subtitle, M){
  const blockId = 'cb_'+(++_conclSeq);
  _conclMetricas[blockId] = M;
  M._blockId = blockId;
  const universoId = blockId+'_universo';
  const monedaSetId = blockId+'_monedaSet';
  const curId = blockId+'_cur';
  setCur(universoId, 'todos');         /* todos | emit26 */
  setCur(monedaSetId, 'all');           /* all | arsArs | usdUsd */
  setCur(curId, 'dual');

  /* Chart inicial */
  setTimeout(()=>drawConclChart(blockId, M, 'todos', 'all', 'dual'), 100);

  return `<div class="concl-block" data-block="${blockId}">
    <div class="concl-block-head">
      <div><div class="h">${title}<span class="meta">${subtitle}</span></div></div>
      <div class="delta-big">
        <div style="font-size:14px;color:${M.varU>=0?'var(--pos)':'var(--neg)'}">USD ${M.varU>=0?'+':''}${FMT_USD_FULL(M.varU)} (${M.varUPct!==null?FMT_PCT(M.varUPct):'—'})</div>
        <div style="font-size:14px;color:${M.varA>=0?'var(--pos)':'var(--neg)'}">ARS$ ${M.varA>=0?'+':''}${FMT_ARS_FULL(M.varA)} (${M.varAPct!==null?FMT_PCT(M.varAPct):'—'})</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:6px 0 10px 0;align-items:center">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em">Universo</div>
        ${viewToggleHTML(universoId,[{value:'todos',label:'Todas'},{value:'emit26',label:'Emitidas 2026'}],'todos')}
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-left:6px">Moneda</div>
        ${viewToggleHTML(monedaSetId,[{value:'all',label:'Todas'},{value:'arsArs',label:'$ en $'},{value:'usdUsd',label:'US en US'}],'all')}
      </div>
      <div>${curToggleHTML(curId,{def:'dual'})}</div>
    </div>
    <div data-block-content="${blockId}">${renderConclContent(M, 'todos', 'all', 'dual')}</div>
  </div>`;
}

function getConclMetricSet(M, universo, monedaSet){
  /* Devuelve un slice consistente según universo + filtro de moneda combinables.
     universo: 'todos' | 'emit26'
     monedaSet: 'all' | 'arsArs' | 'usdUsd' */
  let totU25, totU26, totA25, totA26, conU25, conU26, conA25, conA26, count;
  let tasaCut, sinHCut, sinUVCut, proyUCut, proyACut;
  let label = '';
  /* Para el filtro combinado necesitaríamos un crossover, pero como simplificación:
     - todos+all = todos
     - todos+arsArs = arsArs (todas las pólizas $ en su moneda)
     - todos+usdUsd = usdUsd
     - emit26+all = emitidas en 2026
     - emit26+arsArs = emitidas en 2026 EN moneda $ (subset)
     - emit26+usdUsd = emitidas en 2026 EN moneda US (subset) */
  if(universo==='todos' && monedaSet==='all'){
    totU25=M.totU25; totU26=M.totU26; totA25=M.totA25; totA26=M.totA26;
    conU25=M.concU25; conU26=M.concU26; conA25=M.concA25; conA26=M.concA26;
    count=M.polizasCount;
    tasaCut=avgStat(M.tasa.todo); sinHCut=avgStat(M.sinH.todo); sinUVCut=avgStat(M.sinUV.todo);
    proyUCut=sumStat(M.proyU.todo); proyACut=sumStat(M.proyA.todo);
    label = `Todas las pólizas (${count})`;
  } else if(universo==='todos' && monedaSet==='arsArs'){
    totU25=0; totU26=0; totA25=M.arsArs25; totA26=M.arsArs26;
    conU25={primaMin:0,ajuste:0,bono:0,malus:0}; conU26={primaMin:0,ajuste:0,bono:0,malus:0};
    conA25=M.conArsArs25; conA26=M.conArsArs26;
    count=M.countArs;
    tasaCut=avgStat(M.tasa.ars); sinHCut=avgStat(M.sinH.ars); sinUVCut=avgStat(M.sinUV.ars);
    proyUCut=sumStat(M.proyU.ars); proyACut=sumStat(M.proyA.ars);
    label = `Pólizas $ en $ (${count})`;
  } else if(universo==='todos' && monedaSet==='usdUsd'){
    totU25=M.usdUsd25; totU26=M.usdUsd26; totA25=0; totA26=0;
    conU25=M.conUsdUsd25; conU26=M.conUsdUsd26;
    conA25={primaMin:0,ajuste:0,bono:0,malus:0}; conA26={primaMin:0,ajuste:0,bono:0,malus:0};
    count=M.countUsd;
    tasaCut=avgStat(M.tasa.usd); sinHCut=avgStat(M.sinH.usd); sinUVCut=avgStat(M.sinUV.usd);
    proyUCut=sumStat(M.proyU.usd); proyACut=sumStat(M.proyA.usd);
    label = `Pólizas US en US (${count})`;
  } else if(universo==='emit26' && monedaSet==='all'){
    totU25=M.emit26_25u; totU26=M.emit26_26u; totA25=M.emit26_25a; totA26=M.emit26_26a;
    conU25=M.conEmit25u; conU26=M.conEmit26u; conA25=M.conEmit25a; conA26=M.conEmit26a;
    count=M.countEmit26;
    tasaCut=avgStat(M.tasa.emit); sinHCut=avgStat(M.sinH.emit); sinUVCut=avgStat(M.sinUV.emit);
    proyUCut=sumStat(M.proyU.emit); proyACut=sumStat(M.proyA.emit);
    label = `Emitidas en 2026 (${count})`;
  } else if(universo==='emit26' && monedaSet==='arsArs'){
    /* Subset: emit26 ∩ moneda $ — usamos los stats arsArs porque
       las pólizas $ que están emitidas son comparable */
    totU25=0; totU26=0; totA25=M.arsArs25; totA26=M.arsArs26;
    conU25={primaMin:0,ajuste:0,bono:0,malus:0}; conU26={primaMin:0,ajuste:0,bono:0,malus:0};
    conA25=M.conArsArs25; conA26=M.conArsArs26;
    count=M.countArs;
    tasaCut=avgStat(M.tasa.ars); sinHCut=avgStat(M.sinH.ars); sinUVCut=avgStat(M.sinUV.ars);
    proyUCut=sumStat(M.proyU.ars); proyACut=sumStat(M.proyA.ars);
    label = `Pólizas $ en $ emitidas (${count})`;
  } else {
    /* emit26 + usdUsd */
    totU25=M.usdUsd25; totU26=M.usdUsd26; totA25=0; totA26=0;
    conU25=M.conUsdUsd25; conU26=M.conUsdUsd26;
    conA25={primaMin:0,ajuste:0,bono:0,malus:0}; conA26={primaMin:0,ajuste:0,bono:0,malus:0};
    count=M.countUsd;
    tasaCut=avgStat(M.tasa.usd); sinHCut=avgStat(M.sinH.usd); sinUVCut=avgStat(M.sinUV.usd);
    proyUCut=sumStat(M.proyU.usd); proyACut=sumStat(M.proyA.usd);
    label = `Pólizas US en US emitidas (${count})`;
  }
  return {totU25,totU26,totA25,totA26,conU25,conU26,conA25,conA26,count,tasaCut,sinHCut,sinUVCut,proyUCut,proyACut,label};
}

function renderConclContent(M, universo, monedaSet, cur){
  const S = getConclMetricSet(M, universo, monedaSet);
  const {totU25,totU26,totA25,totA26,conU25,conU26,conA25,conA26,count,tasaCut,sinHCut,sinUVCut,proyUCut,proyACut,label:vistaLabel} = S;

  const dU = totU26-totU25, dA = totA26-totA25;
  const dUPct = totU25? dU/totU25 : null;
  const dAPct = totA25? dA/totA25 : null;

  /* Narrativa con monedas explícitas */
  let narrativa = '';
  const partsUSD = (totU25!==0 || totU26!==0) ? `USD: ${dU>=0?'+':''}${FMT_USD_FULL(dU)} (${FMT_PCT(dUPct)}) [${FMT_USD_FULL(totU25)} → ${FMT_USD_FULL(totU26)}]` : '';
  const partsARS = (totA25!==0 || totA26!==0) ? `ARS$: ${dA>=0?'+':''}${FMT_ARS_FULL(dA)} (${FMT_PCT(dAPct)}) [${FMT_ARS_FULL(totA25)} → ${FMT_ARS_FULL(totA26)}]` : '';
  if(partsUSD || partsARS) narrativa = [partsUSD, partsARS].filter(x=>x).join(' · ') + '. ';
  if(M.pend26mayorCount>0) narrativa += `<strong>${M.pend26mayorCount} pólizas pendientes &gt; 2 meses</strong>. `;
  if(M.pend26Count>0) narrativa += `${M.pend26Count} pólizas con pendiente ≤2m. `;

  const blockId = M._blockId || ('cb_'+_conclSeq);

  /* Helper para layout métrica+gráfico */
  const filaMetrica = (titulo, boxHTML, canvasId)=>{
    return `<div style="display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-bottom:12px;align-items:start">
      <div>
        <h4 class="section-title" style="margin:6px 0 6px 0">${titulo}</h4>
        ${boxHTML}
      </div>
      <div>
        <div class="chart-box short" style="height:180px;margin-top:24px"><canvas id="${canvasId}"></canvas></div>
      </div>
    </div>`;
  };

  /* Box de Emisión total */
  let emisionTotalBox;
  if(cur==='dual' && totU25!==0 && totA25!==0){
    emisionTotalBox = comparePairBoxDualEqual('Emisión total',totU25,totA25,totU26,totA26,count,count);
  } else if(totA25!==0 && totU25===0){
    emisionTotalBox = comparePairBoxStat('Emisión total', totA25, totA26, count, count, FMT_ARS_FULL);
  } else {
    emisionTotalBox = comparePairBoxStat('Emisión total', totU25, totU26, count, count, FMT_USD_FULL);
  }

  /* Box Proyección */
  let proyectionBox;
  if(cur==='dual' && proyUCut.v25!==null && proyACut.v25!==null){
    proyectionBox = comparePairBoxDualEqual('Proyección ventas', proyUCut.v25, proyACut.v25, proyUCut.v26, proyACut.v26, proyUCut.n25, proyUCut.n26);
  } else if(cur==='ars' || (proyACut.v25!==null && proyUCut.v25===null)){
    proyectionBox = comparePairBoxStat('Proyección ventas', proyACut.v25, proyACut.v26, proyACut.n25, proyACut.n26, FMT_ARS_FULL);
  } else {
    proyectionBox = comparePairBoxStat('Proyección ventas', proyUCut.v25, proyUCut.v26, proyUCut.n25, proyUCut.n26, FMT_USD_FULL);
  }

  return `
    <h4 class="section-title" style="margin-bottom:6px">Vista: ${vistaLabel}</h4>

    ${filaMetrica('Emisión total — 2025 vs 2026',
      emisionTotalBox + `<div style="font-family:var(--font-mono);font-size:11.5px;color:var(--ink-2);margin-top:6px;padding:8px 12px;background:var(--bg-2);border-radius:4px">
        ${partsUSD?`<div style="color:${dU>=0?'var(--pos)':'var(--neg)'};font-weight:700">▶ ${partsUSD}</div>`:''}
        ${partsARS?`<div style="color:${dA>=0?'var(--pos)':'var(--neg)'};font-weight:700">▶ ${partsARS}</div>`:''}
      </div>`, `chartConcl_total_${blockId}`)}

    <h4 class="section-title" style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">Conceptos emisibles</h4>
    ${filaMetrica('Prima Mínima', comparePairBoxConcepto('Prima Mínima', conU25.primaMin, conA25.primaMin, conU26.primaMin, conA26.primaMin, cur), `chartConcl_pm_${blockId}`)}
    ${filaMetrica('Ajuste', comparePairBoxConcepto('Ajuste', conU25.ajuste, conA25.ajuste, conU26.ajuste, conA26.ajuste, cur), `chartConcl_aj_${blockId}`)}
    ${filaMetrica('Bono', comparePairBoxConcepto('Bono', conU25.bono, conA25.bono, conU26.bono, conA26.bono, cur), `chartConcl_bn_${blockId}`)}
    ${filaMetrica('Malus', comparePairBoxConcepto('Malus', conU25.malus, conA25.malus, conU26.malus, conA26.malus, cur), `chartConcl_ml_${blockId}`)}

    <h4 class="section-title" style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">Variables técnicas — promedios</h4>
    ${filaMetrica('Tasa promedio', comparePairBoxStat('Tasa promedio', tasaCut.v25, tasaCut.v26, tasaCut.n25, tasaCut.n26, FMT_PCT_TASA), `chartConcl_tasa_${blockId}`)}
    ${filaMetrica('Proyección de ventas', proyectionBox, `chartConcl_proy_${blockId}`)}
    ${filaMetrica('Siniestralidad Histórica', comparePairBoxStat('Siniestralidad H', sinHCut.v25, sinHCut.v26, sinHCut.n25, sinHCut.n26, FMT_PCT), `chartConcl_sH_${blockId}`)}
    ${filaMetrica('Siniestralidad Última Vigencia', comparePairBoxStat('Siniestralidad UV', sinUVCut.v25, sinUVCut.v26, sinUVCut.n25, sinUVCut.n26, FMT_PCT), `chartConcl_sUV_${blockId}`)}

    <div class="concl-grid" style="margin-top:14px">
      <div class="concl-cell warn"><span class="l">Pendiente emisión ≤2m</span><span class="v">${M.pend26Count} pólizas<br>${FMT_USD_FULL(M.pend26USD)}<br>${FMT_ARS_FULL(M.pend26ARS)}</span></div>
      <div class="concl-cell neg"><span class="l">Pendiente emisión &gt; 2m</span><span class="v">${M.pend26mayorCount} pólizas<br>${FMT_USD_FULL(M.pend26mayorUSD)}<br>${FMT_ARS_FULL(M.pend26mayorARS)}</span></div>
      <div class="concl-cell warn-s"><span class="l">Emitido c/ desvío</span><span class="v">${M.emitDesvCount} pólizas<br>${FMT_USD_FULL(M.emitDesvUSD)}<br>${FMT_ARS_FULL(M.emitDesvARS)}</span></div>
    </div>

    <h4 class="section-title" style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">Vistas conjuntas</h4>
    <div class="grid-2">
      <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px">Proyección de ventas</div><div class="chart-box short"><canvas id="chartConj_proy_${blockId}"></canvas></div></div>
      <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px">Prima Mínima</div><div class="chart-box short"><canvas id="chartConj_pm_${blockId}"></canvas></div></div>
      <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px">Ajuste · Bono · Malus</div><div class="chart-box short"><canvas id="chartConj_abm_${blockId}"></canvas></div></div>
      <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px">Tasa promedio</div><div class="chart-box short"><canvas id="chartConj_tasa_${blockId}"></canvas></div></div>
      <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px">Siniestralidad H y UV</div><div class="chart-box short"><canvas id="chartConj_sin_${blockId}"></canvas></div></div>
    </div>

    <div class="concl-final" style="margin-top:14px"><strong>Conclusión:</strong> ${narrativa || 'Sin variaciones significativas.'}</div>
  `;
}

/* Gráficos del bloque concl */
function drawConclChart(blockId, M, universo, monedaSet, cur){
  const S = getConclMetricSet(M, universo, monedaSet);
  /* useUSD/useARS según monedaSet (combinable) y cur */
  const allowUSD = (monedaSet!=='arsArs') && (cur!=='ars');
  const allowARS = (monedaSet!=='usdUsd') && (cur!=='usd');

  const drawDual = (canvasId, val25u, val26u, val25a, val26a)=>{
    if(!document.getElementById(canvasId)) return;
    const datasets = [];
    if(allowUSD && (val25u!==null && val26u!==null)){
      datasets.push({label:'2025 USD',data:[val25u||0, null],backgroundColor:'rgba(94,179,232,.85)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'usd'});
      datasets.push({label:'2026 USD',data:[null, val26u||0],backgroundColor:'rgba(45,155,106,.85)',borderColor:'#2d9b6a',borderWidth:1.5,borderRadius:3,stack:'usd'});
    }
    if(allowARS && (val25a!==null && val26a!==null)){
      datasets.push({label:'2025 ARS$',data:[val25a||0, null],backgroundColor:'rgba(94,179,232,.55)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'ars'});
      datasets.push({label:'2026 ARS$',data:[null, val26a||0],backgroundColor:'rgba(30,111,217,.85)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,stack:'ars'});
    }
    drawChart(canvasId,{type:'bar',data:{labels:['2025','2026'],datasets},options:chartOpts({legend:datasets.length>0})});
  };
  const drawPct = (canvasId, v25, v26, isTasa)=>{
    if(!document.getElementById(canvasId)) return;
    drawChart(canvasId,{
      type:'bar',
      data:{labels:['2025','2026'],datasets:[{
        label:'%',data:[v25!=null?v25*100:null, v26!=null?v26*100:null],
        backgroundColor:['rgba(94,179,232,.85)','rgba(45,155,106,.85)'],
        borderColor:['#5eb3e8','#2d9b6a'],borderWidth:1.5,borderRadius:3
      }]},
      options:chartOpts({yPct:true,yPctDecimals:isTasa?3:0})
    });
  };

  setTimeout(()=>{
    drawDual(`chartConcl_total_${blockId}`, S.totU25, S.totU26, S.totA25, S.totA26);
    drawDual(`chartConcl_pm_${blockId}`,    S.conU25.primaMin, S.conU26.primaMin, S.conA25.primaMin, S.conA26.primaMin);
    drawDual(`chartConcl_aj_${blockId}`,    S.conU25.ajuste,   S.conU26.ajuste,   S.conA25.ajuste,   S.conA26.ajuste);
    drawDual(`chartConcl_bn_${blockId}`,    S.conU25.bono,     S.conU26.bono,     S.conA25.bono,     S.conA26.bono);
    drawDual(`chartConcl_ml_${blockId}`,    S.conU25.malus,    S.conU26.malus,    S.conA25.malus,    S.conA26.malus);
    drawPct(`chartConcl_tasa_${blockId}`, S.tasaCut.v25, S.tasaCut.v26, true);
    drawDual(`chartConcl_proy_${blockId}`, S.proyUCut.v25, S.proyUCut.v26, S.proyACut.v25, S.proyACut.v26);
    drawPct(`chartConcl_sH_${blockId}`,  S.sinHCut.v25,  S.sinHCut.v26, false);
    drawPct(`chartConcl_sUV_${blockId}`, S.sinUVCut.v25, S.sinUVCut.v26, false);

    /* CONJUNTOS — agrupados según la regla */
    /* Proyección: USD y ARS$ lado a lado, 2025 vs 2026 */
    if(document.getElementById('chartConj_proy_'+blockId)){
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:[S.proyUCut.v25||0, null],backgroundColor:'rgba(94,179,232,.85)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'usd'},
        {label:'2026 USD',data:[null, S.proyUCut.v26||0],backgroundColor:'rgba(45,155,106,.85)',borderColor:'#2d9b6a',borderWidth:1.5,borderRadius:3,stack:'usd'},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:[S.proyACut.v25||0, null],backgroundColor:'rgba(94,179,232,.55)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'ars'},
        {label:'2026 ARS$',data:[null, S.proyACut.v26||0],backgroundColor:'rgba(30,111,217,.85)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,stack:'ars'},
      );
      drawChart('chartConj_proy_'+blockId,{type:'bar',data:{labels:['2025','2026'],datasets},options:chartOpts({legend:true})});
    }
    /* Prima Mínima sola: 2025 vs 2026 (USD + ARS$ stacks) */
    if(document.getElementById('chartConj_pm_'+blockId)){
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:[S.conU25.primaMin||0, null],backgroundColor:'rgba(94,179,232,.85)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'usd'},
        {label:'2026 USD',data:[null, S.conU26.primaMin||0],backgroundColor:'rgba(45,155,106,.85)',borderColor:'#2d9b6a',borderWidth:1.5,borderRadius:3,stack:'usd'},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:[S.conA25.primaMin||0, null],backgroundColor:'rgba(94,179,232,.55)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'ars'},
        {label:'2026 ARS$',data:[null, S.conA26.primaMin||0],backgroundColor:'rgba(30,111,217,.85)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,stack:'ars'},
      );
      drawChart('chartConj_pm_'+blockId,{type:'bar',data:{labels:['2025','2026'],datasets},options:chartOpts({legend:true})});
    }
    /* Ajuste / Bono / Malus juntos */
    if(document.getElementById('chartConj_abm_'+blockId)){
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:[S.conU25.ajuste||0, S.conU25.bono||0, S.conU25.malus||0],backgroundColor:'rgba(94,179,232,.85)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'25usd'},
        {label:'2026 USD',data:[S.conU26.ajuste||0, S.conU26.bono||0, S.conU26.malus||0],backgroundColor:'rgba(45,155,106,.85)',borderColor:'#2d9b6a',borderWidth:1.5,borderRadius:3,stack:'26usd'},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:[S.conA25.ajuste||0, S.conA25.bono||0, S.conA25.malus||0],backgroundColor:'rgba(94,179,232,.55)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,stack:'25ars'},
        {label:'2026 ARS$',data:[S.conA26.ajuste||0, S.conA26.bono||0, S.conA26.malus||0],backgroundColor:'rgba(30,111,217,.85)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,stack:'26ars'},
      );
      drawChart('chartConj_abm_'+blockId,{type:'bar',data:{labels:['Ajuste','Bono','Malus'],datasets},options:chartOpts({legend:true})});
