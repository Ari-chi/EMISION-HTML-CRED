/* Desvío REAL (emitido, con signo) de una póliza: suma de las bajas reales de Prima Mínima +
   Ajuste + Bono + Malus, aplicando las reglas de categoría del Excel — excluye conceptos
   PENDIENTES y los que dicen "corresponde a la anualidad anterior"; "no corresponde" = se emitió
   0 (baja real, no pendiente). Devuelve montos NEGATIVOS por moneda. Misma lógica que el
   desglose "Menor Emisión" del Resumen Ejecutivo, para que el Top 5 de CAÍDAS muestre solo
   movimientos efectivamente emitidos (no pendientes). */
function desvioRealPoliza(p, mesCorte){
  if(polizaTerminada(p)) return {mARS:0, mUSD:0};
  let mARS=0, mUSD=0;
  /* Prima Mínima: solo cuenta si NO tiene cuotas pendientes (si está pendiente, no es caída). */
  if(!primaMinTienePendiente(p, mesCorte)){
    const nc = primaNoCorrespondeDesvio(p, mesCorte);
    if(nc.entra){ mARS+=nc.mARS; mUSD+=nc.mUSD; }
    else {
      const parA = conceptoBajaPareada(p,'Prima Minima',false,mesCorte);
      const parU = conceptoBajaPareada(p,'Prima Minima',true,mesCorte);
      if(parA.baja || parU.baja){
        const rPM = p.conceptos['Prima Minima'];
        const dARS=(rPM && typeof rPM.desvioARS==='number' && rPM.desvioARS<0)?rPM.desvioARS:null;
        const dUSD=(rPM && typeof rPM.desvioUSD==='number' && rPM.desvioUSD<0)?rPM.desvioUSD:null;
        const bajaA=parA.pm25-parA.pm26, bajaU=parU.pm25-parU.pm26;
        mARS += (dARS!=null)?dARS:-(bajaA>0?bajaA:0);
        mUSD += (dUSD!=null)?dUSD:-(bajaU>0?bajaU:0);
      }
    }
  }
  /* Ajuste / Bono / Malus: desvioConceptoABM ya excluye pendientes y "anualidad anterior",
     y trata "no corresponde" como emisión 0 (baja real). */
  for(const cn of ['Ajuste','Bono','Malus']){
    const dv = desvioConceptoABM(p, cn, mesCorte);
    if(dv.entra){ mARS+=dv.mARS; mUSD+=dv.mUSD; }
  }
  return {mARS, mUSD};
}
function drawTop10(){
  const f = getSectionFilters('top10');
  setActiveCtx(f);
  const mesCorte = f.mes;
  const motF = document.getElementById('fTop10Motivo') ? document.getElementById('fTop10Motivo').value : '';
  const polFiltradas = aplicarFiltrosPolizas(state.polizas, f);
  /* MONEDA (botón 4°): "Moneda Original" (dual) muestra cada póliza en su moneda; si se
     elige USD o ARS$, se UNIFICA todo a esa única moneda (columna $/US del Excel). Se lee
     directo de f.cur, que es lo que setea el botón. */
  const modoUnico = (f.cur === 'usd' || f.cur === 'ars');
  const unicoUSD = (f.cur === 'usd');
  /* RANKING FIJO (pedido del usuario): el Top 5 de mejoras/caídas NO debe cambiar según la
     moneda que se muestre. Se rankea por el IMPACTO en una base común (USD), tomando la
     variación de EMISIÓN TOTAL (prima+ajuste+bono+malus) en la moneda ORIGINAL de cada póliza
     y convirtiéndola con el TC del 7° (f.tc). El botón 4° de moneda SOLO cambia la conversión
     visual de los valores, no qué pólizas entran al Top. */
  const TC = (f.tc && f.tc>0) ? f.tc : 1400;
  /* TOP 10 — mayor emisión 2025 por GRUPO ECONÓMICO (hoja "Grupos"): se suma la prima (prima mínima
     + ajuste + bono + malus) de todas las pólizas del mismo grupo. TODO en PESOS: las pólizas en US
     se convierten con el TC del botón 3°. Si no hay hoja Grupos, agrupa por nombre de asegurado. */
  (()=>{
    const wrap = document.getElementById('top2025'); if(!wrap) return;
    const grupos = state._grupos || {};
    const gruposAseg = state._gruposByAseg || {};
    const TCv = (TC>0)?TC:1400;
    const acc = {};   /* grupo → {tot, primaMin, ajuste, bono, malus, n} en ARS */
    for(const p of polFiltradas){
      const f25 = calcEmisionFiltrada(p,2025,0);
      const esUS = (p.moneda==='US');
      const conv = esUS ? TCv : 1;
      const bd = esUS ? f25.breakdownUSD : f25.breakdownARS;
      const tot = (esUS ? f25.totUSD : f25.totARS) * conv;
      if(!(tot>0.5)) continue;
      const gk = grupos[_digitsKey(p.poliza)] || gruposAseg[_normProyKey(p.asegurado)] || p.asegurado || '—';
      const g = acc[gk] || (acc[gk]={nombre:gk, tot:0, primaMin:0, ajuste:0, bono:0, malus:0, n:0});
      g.tot += tot;
      g.primaMin += (bd.primaMin||0)*conv;
      g.ajuste   += (bd.ajuste||0)*conv;
      g.bono     += (bd.bono||0)*conv;
      g.malus    += (bd.malus||0)*conv;
      g.n++;
    }
    const arr = Object.values(acc).filter(g=>g.tot>0.5).sort((a,b)=>b.tot-a.tot).slice(0,10);
    const cell=(v)=>`<td style="text-align:right;font-family:var(--font-mono);font-size:11.5px;color:var(--ink-2);padding:5px 8px">${Math.abs(v)>0.5?fmtCompact(v,false):'<span style="color:var(--line-2)">—</span>'}</td>`;
    const rows = arr.map((g,i)=>`<tr style="border-top:1px solid var(--line)">
        <td style="color:var(--ink-3);font-family:var(--font-mono);font-size:11px;padding:5px 8px">${String(i+1).padStart(2,'0')}</td>
        <td style="padding:5px 8px"><div style="font-weight:700;color:var(--accent-3);font-size:12.5px">${g.nombre}</div><div style="font-size:10px;color:var(--ink-3)">${g.n} pól.</div></td>
        <td style="text-align:right;font-family:var(--font-mono);font-weight:800;color:var(--accent-3);font-size:12.5px;padding:5px 8px">${fmtCompact(g.tot,false)}</td>
        ${cell(g.primaMin)}${cell(g.ajuste)}${cell(g.bono)}${cell(g.malus)}
      </tr>`).join('');
    wrap.innerHTML = arr.length ? `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:700">
        <th style="text-align:left;padding:4px 8px">#</th><th style="text-align:left;padding:4px 8px">Grupo económico</th>
        <th style="text-align:right;padding:4px 8px">Emisión 2025</th><th style="text-align:right;padding:4px 8px">Prima mín.</th>
        <th style="text-align:right;padding:4px 8px">Ajuste</th><th style="text-align:right;padding:4px 8px">Bono</th><th style="text-align:right;padding:4px 8px">Malus</th>
      </tr></thead><tbody>${rows}</tbody></table>`
      : '<span style="color:var(--ink-3);font-style:italic">— sin emisión 2025 —</span>';
  })();
  const calcVar = (x)=>{
    const varU = x._just.f26.totUSD - x._just.f25.totUSD;
    const varA = x._just.f26.totARS - x._just.f25.totARS;
    return (x.p.moneda==='US') ? varU : (TC>0 ? varA/TC : varA);
  };
  let arr = polFiltradas
    .map(p=>{
      const _just = justificarPoliza(p, mesCorte);
      /* El 2025 es la REFERENCIA del año anterior: se toma COMPLETO (sin recortar al mes de
         corte), porque la emisión puede caer en meses distintos cada año. Así, si una póliza
         emitió lo mismo en 2025 y 2026, la variación es 0 (no aparece como "nuevo"). */
      _just.f25 = calcEmisionFiltrada(p, 2025, 0);
      /* 2026: si la CATEGORÍA del concepto dice "Corresponde a la Anualidad Anterior", esa
         emisión pertenece a la anualidad PREVIA (se emitió con retraso), NO es un aumento real
         del 2026. Se excluye del cálculo de mejoras/caídas para no contar un falso aumento
         (caso CODINI). El detalle igual muestra el concepto con su categoría. */
      _just.f26 = calcEmisionFiltrada(p, 2026, mesCorte, {excluirAnualAnt:true});
      return {p, _just};
    })
    .filter(x=>x._just.f25.totUSD>0 || x._just.f26.totUSD>0 || x._just.f25.totARS>0 || x._just.f26.totARS>0 || x._just.motivos.length>0)
    /* Excluir pendientes: la hoja de Top 5 muestra movimientos reales, no
       casos pendientes (regla unificada con el Resumen Ejecutivo). */
    .filter(x=> !polizaPendienteEmision(x.p, mesCorte));
  if(motF){
    arr = arr.filter(x=> x._just.motivos.some(m=>m.toLowerCase().includes(motF.toLowerCase())));
  }
  /* CAÍDAS: se rankean por el desvío REAL emitido (prima/ajuste/bono/malus efectivamente
     emitidos a la baja, sin pendientes), NO por la variación total de emisión (que podría
     bajar solo porque un concepto está pendiente). Base común USD para que el Top sea fijo. */
  const calcCaida = (x)=>{
    const dr = desvioRealPoliza(x.p, mesCorte);
    return (x.p.moneda==='US') ? dr.mUSD : (TC>0 ? dr.mARS/TC : dr.mARS);
  };
  const mejoras = [...arr].sort((a,b)=>calcVar(b)-calcVar(a)).filter(x=>calcVar(x)>0).slice(0,5);
  const caidas = [...arr].sort((a,b)=>calcCaida(a)-calcCaida(b)).filter(x=>calcCaida(x)<-0.5).slice(0,5);

  const buildCard = (item, idx, esPos)=>{
    /* CAÍDAS: el valor mostrado es el desvío REAL emitido (mismo criterio que el ranking);
       MEJORAS: la variación total de emisión 2025→2026. */
    const _dr = esPos ? null : desvioRealPoliza(item.p, mesCorte);
    const v = _dr ? _dr.mUSD : (item._just.f26.totUSD - item._just.f25.totUSD);   /* variación USD */
    const vAr = _dr ? _dr.mARS : (item._just.f26.totARS - item._just.f25.totARS); /* variación ARS */
    const pctU = item._just.f25.totUSD>0 ? FMT_PCT(v/item._just.f25.totUSD) : (item._just.f26.totUSD>0?'nuevo':'—');
    const pctA = item._just.f25.totARS>0 ? FMT_PCT(vAr/item._just.f25.totARS) : (item._just.f26.totARS>0?'nuevo':'—');
    /* Moneda a mostrar: unificada si se eligió una; si "Moneda Original", la propia. */
    const esUS = modoUnico ? unicoUSD : (item.p.moneda === 'US');
    const cardId = `top10_card_${esPos?'mej':'cai'}_${idx}`;
    const colorPrincipal = esPos ? 'var(--pos)' : 'var(--neg)';
    /* Tipo 2026 destacado (Renovación / Segunda anualidad / Póliza nueva /
       Tercera anualidad / Póliza terminada). Si vino heredado, igual lo
       mostramos. */
    const t26 = item.p.tipo2026 || '';
    const t26Abrev = t26==='Renovación'?'Renovación'
      : (t26==='Segunda anualidad'?'2ª anualidad'
      : (t26==='Tercera anualidad'?'3ª anualidad'
      : (t26==='Póliza nueva'?'Póliza nueva'
      : (t26==='Póliza terminada'?'Terminada':t26))));
    const t26Color = t26==='Póliza terminada'?'var(--neg)':(t26==='Póliza nueva'?'var(--pos)':'var(--accent-3)');
    const t26Bg = t26==='Póliza terminada'?'rgba(217,71,71,.10)':(t26==='Póliza nueva'?'rgba(45,155,106,.10)':'rgba(30,111,217,.08)');
    /* Chips destacados de rubro / producto / moneda. */
    const chipBig = (label, val, color, bg)=>val?`<span style="display:inline-flex;align-items:center;background:${bg};color:${color};font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:14px;margin-right:6px;margin-bottom:4px">${val}</span>`:'';
    /* Valor principal en MONEDA ORIGINAL + línea de equivalente clickeable. */
    const vPrim = esUS ? v : vAr;
    const pctPrim = esUS ? pctU : pctA;
    const fmtPrim = esUS ? FMT_USD : FMT_ARS;
    const vEquiv = esUS ? vAr : v;
    const pctEquiv = esUS ? pctA : pctU;
    const fmtEquiv = esUS ? FMT_ARS : FMT_USD;
    const detId = `${cardId}_det`;
    /* COMPACTO: fila clickeable (rank · asegurado · chips · valor); el detalle (polizaRowDetalle +
       motivos) queda colapsado y se abre al tocar la fila. */
    return `<div id="${cardId}" data-pol-clave="${item.p.clave}" data-pol-idx="${esPos?'mej':'cai'}_${idx}" style="margin-bottom:8px;border:1px solid var(--line);border-radius:8px;background:var(--panel)">
      <div onclick="toggleTopDetalle('${detId}')" style="display:grid;grid-template-columns:34px 1fr auto;gap:12px;align-items:center;padding:9px 13px;cursor:pointer">
        <div class="top-rank" style="font-size:17px">${String(idx+1).padStart(2,'0')}</div>
        <div style="min-width:0">
          <div style="font-size:13.5px;font-weight:700;color:var(--accent-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.p.asegurado||'—'}</div>
          <div style="font-size:10.5px;color:var(--ink-3)">${item.p.rubro||'—'} · ${item.p.moneda||'—'}${t26Abrev?` · <span style="color:${t26Color};font-weight:700">${t26Abrev}</span>`:''}</div>
        </div>
        <div style="font-family:var(--font-mono);text-align:right;white-space:nowrap">
          <div style="font-size:16px;font-weight:800;color:${colorPrincipal}">${esPos?'+':''}${fmtPrim(vPrim)} <span style="font-size:12px;font-weight:700">(${pctPrim})</span></div>
          ${modoUnico ? '' : `<div style="font-size:11px;font-weight:600;color:var(--ink-3)">${esPos?'+':''}${fmtEquiv(vEquiv)} (${pctEquiv})</div>`}
        </div>
      </div>
      <div id="${detId}" style="display:none;padding:0 13px 13px 13px;border-top:1px solid var(--line)">
        <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);margin:8px 0 4px">Vig: ${item.p.vigDesde?item.p.vigDesde.toLocaleDateString('es-AR'):'—'} → ${item.p.vigHasta?item.p.vigHasta.toLocaleDateString('es-AR'):'—'} · Broker: ${item.p.broker||'—'} · Producto: ${item.p.producto||'—'}</div>
        <div class="top10-detalle" data-moneda="${esUS?'usd':'ars'}">${polizaRowDetalle(item.p, item._just, {...f, cur:(esUS?'usd':'ars')})}</div>
        ${(()=>{
          const conceptoLabel = {'Proyeccion de Ventas':'Proyección','Prima Minima':'Prima Mínima','Ajuste':'Ajuste','Bono':'Bono','Malus':'Malus','Tasa aplicable':'Tasa','Siniestralidad H':'Sin. H','Siniestralidad UV':'Sin. UV'};
          const motivosOrden = ['Proyeccion de Ventas','Prima Minima','Ajuste','Bono','Malus','Tasa aplicable','Siniestralidad H','Siniestralidad UV'];
          const motivosCon = motivosOrden.map(c=>{
            const r = item.p.conceptos[c];
            return {concepto: conceptoLabel[c]||c, categoria: r?r.categoria:null, detalle: r?r.detalle:null, tieneInfo: !!(r && (r.categoria || r.detalle))};
          });
          const motCount = motivosCon.filter(m=>m.tieneInfo).length;
          const motivosBlockId = `top10_motivos_${esPos?'mej':'cai'}_${idx}_${item.p.clave.replace(/[^a-zA-Z0-9]/g,'_')}`;
          const motBtn = `<button class="motivos-btn" onclick="toggleMotivos('${motivosBlockId}')" style="margin-top:8px;padding:5px 12px;font-size:10.5px;font-family:var(--font-mono);background:var(--bg-2);color:var(--accent-3);border:1px solid var(--accent-2);border-radius:4px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.04em">▶ Motivos${motCount>0?` (${motCount}/8)`:''}</button>`;
          const motPanel = `<div id="${motivosBlockId}" class="motivos-panel" style="display:none;margin-top:6px;padding:8px;background:var(--bg-2);border-radius:5px">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
              ${motivosCon.map(m=>`
                <div style="padding:6px 8px;background:var(--panel);border-radius:4px;border-left:2px solid ${m.tieneInfo?'var(--accent)':'var(--line-2)'};min-height:42px">
                  <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px">${m.concepto}</div>
                  ${m.tieneInfo
                    ? `${m.categoria?`<div style="font-size:10.5px;color:var(--accent-3);font-weight:600;margin-bottom:2px;line-height:1.3">${m.categoria}</div>`:''}${m.detalle?`<div style="font-size:9.5px;color:var(--ink-2);line-height:1.35">${m.detalle}</div>`:''}`
                    : `<div style="font-size:9.5px;color:var(--ink-3);font-style:italic">—</div>`}
                </div>`).join('')}
            </div>
          </div>`;
          return motBtn + motPanel;
        })()}
      </div>
    </div>`;
  };
  document.getElementById('topMejoras').innerHTML = mejoras.map((m,i)=>buildCard(m,i,true)).join('');
  document.getElementById('topCaidas').innerHTML = caidas.map((m,i)=>buildCard(m,i,false)).join('');
  state._top10Mejoras = mejoras;
  state._top10Caidas = caidas;
}

/* Top Casos: abre/cierra el detalle de una fila de mejoras/caídas. */
window.toggleTopDetalle = function(id){ const d=document.getElementById(id); if(d) d.style.display = (d.style.display==='none'||!d.style.display)?'block':'none'; };
/* Toggle de un mes del Presupuesto (drill). Cambia el estado, re-dibuja el Resumen Ejecutivo y
   re-abre el desglose de "Presupuesto" para seguir editando. */
window.ejecTogglePresMes = function(m){
  state._ejecPresMes = state._ejecPresMes || {};
  const cur = state._ejecPresMes[m];
  const def = (()=>{ const corte=state._ejecPresCorte||12; const le26=state._ejecLastEmis26||0; return (m>=le26+2)&&(m<=corte); })();
  state._ejecPresMes[m] = (cur===undefined) ? !def : !cur;
  if(typeof drawEjecutivo==='function') drawEjecutivo();
  setTimeout(()=>{ if(typeof window.toggleEjecCausa==='function') window.toggleEjecCausa('pend_presup'); }, 0);
};
/* Botón OCULTO (◦ tenue al lado de "Estimaciones anteriores"): muestra/oculta la Estimación
   Inicial (gris) en TODO el año Ene–Dic. No togglea el checkbox. */
/* Toggle entre moneda original y equivalente: click swap los valores principal
   y secundario; el "click" se pinta de azul cuando está en modo equivalente
   para dar señal visual. */
window.cambiarMonedaTop10 = function(cardId){
  const card = document.getElementById(cardId);
  if(!card) return;
  const idx = card.dataset.polIdx;
  const [tipo, n] = idx.split('_');
  const arr = tipo==='mej' ? state._top10Mejoras : state._top10Caidas;
  const item = arr[parseInt(n,10)];
  if(!item) return;
  const f = getSectionFilters('top10');
  const valEl = card.querySelector('[data-role="topVal"]');
  const equivEl = card.querySelector('[data-role="topEquiv"]');
  const clickLbl = equivEl ? equivEl.querySelector('[data-role="clickLbl"]') : null;
  const det = card.querySelector('.top10-detalle');
  if(!valEl || !equivEl || !det) return;
  const esPos = tipo==='mej';
  const esUS = item.p.moneda==='US';
  const v = item._just.f26.totUSD - item._just.f25.totUSD;
  const vAr = item._just.f26.totARS - item._just.f25.totARS;
  const pctU = item._just.f25.totUSD>0 ? FMT_PCT(v/item._just.f25.totUSD) : (item._just.f26.totUSD>0?'nuevo':'—');
  const pctA = item._just.f25.totARS>0 ? FMT_PCT(vAr/item._just.f25.totARS) : (item._just.f26.totARS>0?'nuevo':'—');
  const cur = card.dataset.curMode || 'orig';
  const nextCur = cur==='orig' ? 'equiv' : 'orig';
  card.dataset.curMode = nextCur;
  const showUS = (nextCur==='orig' && esUS) || (nextCur==='equiv' && !esUS);
  const sgn = esPos?'+':'';
  const colorPrincipal = esPos ? 'var(--pos)' : 'var(--neg)';
  if(showUS){
    valEl.innerHTML = `${sgn}${FMT_USD(v)} <span style="font-size:13px;font-weight:700">(${pctU})</span>`;
    equivEl.innerHTML = `<span style="font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;margin-right:5px" data-role="clickLbl">click</span>${sgn}${FMT_ARS(vAr)} <span style="font-size:11px">(${pctA})</span>`;
    det.innerHTML = polizaRowDetalle(item.p, item._just, {...f, cur:'usd'});
  } else {
    valEl.innerHTML = `${sgn}${FMT_ARS(vAr)} <span style="font-size:13px;font-weight:700">(${pctA})</span>`;
    equivEl.innerHTML = `<span style="font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;margin-right:5px" data-role="clickLbl">click</span>${sgn}${FMT_USD(v)} <span style="font-size:11px">(${pctU})</span>`;
    det.innerHTML = polizaRowDetalle(item.p, item._just, {...f, cur:'ars'});
  }
  valEl.style.color = colorPrincipal;
  /* "click" en azul cuando estamos viendo el equivalente, gris cuando orig. */
  const cl = equivEl.querySelector('[data-role="clickLbl"]');
  if(cl){
    cl.style.color = (nextCur==='equiv') ? 'var(--accent)' : 'var(--ink-3)';
    cl.style.fontWeight = (nextCur==='equiv') ? '800' : '500';
  }
  equivEl.style.color = (nextCur==='equiv') ? 'var(--accent)' : 'var(--ink-3)';
};

/* Genera el bloque de cards de proyección, conceptos y siniestralidad para top10 */
function polizaRowDetalle(p, _just, filters){
  const f = filters || getSectionFilters('top10');
  const monPoliza = p.moneda==='$' ? 'ars' : 'usd';
  let showMode;
  if(f.segmento==='vs') showMode = 'dual';
  else if(f.segmento==='arsArs') showMode = 'ars';
  else if(f.segmento==='usdUsd') showMode = 'usd';
  else if(f.cur==='ars') showMode = 'ars';
  else if(f.cur==='usd') showMode = 'usd';
  else showMode = monPoliza; /* 'dual' = Moneda Original */

  const buildCard = (label, u25, a25, u26, a26, isBono)=>{
    const tieneAlgo = u25||a25||u26||a26;
    const dU = (u26||0)-(u25||0), dA = (a26||0)-(a25||0);
    const dUPct = u25? dU/u25 : (u26?1:null);
    const dAPct = a25? dA/a25 : (a26?1:null);
    const cls4U = isBono ? (dU<0?'pos':(dU>0?'neg':'neu')) : (dU>0?'pos':(dU<0?'neg':'neu'));
    const cls4A = isBono ? (dA<0?'pos':(dA>0?'neg':'neu')) : (dA>0?'pos':(dA<0?'neg':'neu'));
    let body='';
    let varHTML='';
    if(showMode==='ars'){
      body = `<div class="cv-row"><span class="yr">25</span><span>${a25?FMT_ARS_FULL(a25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span>${a26?FMT_ARS_FULL(a26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4A}">${dA>=0?'+':''}${FMT_ARS(dA)} · ${dAPct!==null?FMT_PCT(dAPct):'—'}</div>`;
    } else if(showMode==='usd'){
      body = `<div class="cv-row"><span class="yr">25</span><span>${u25?FMT_USD_FULL(u25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span>${u26?FMT_USD_FULL(u26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4U}">${dU>=0?'+':''}${FMT_USD(dU)} · ${dUPct!==null?FMT_PCT(dUPct):'—'}</div>`;
    } else {
      body = `<div class="cv-row"><span class="yr">25</span><span style="font-size:10px">${u25?FMT_USD_FULL(u25):'—'}<br>${a25?FMT_ARS_FULL(a25):'—'}</span></div>
              <div class="cv-row"><span class="yr">26</span><span style="font-size:10px">${u26?FMT_USD_FULL(u26):'—'}<br>${a26?FMT_ARS_FULL(a26):'—'}</span></div>`;
      varHTML = `<div class="cv-var ${cls4U}" style="font-size:10px">USD ${dU>=0?'+':''}${FMT_USD(dU)}</div>
                 <div class="cv-var ${cls4A}" style="font-size:10px;border-top:none;padding-top:0">$ ${dA>=0?'+':''}${FMT_ARS(dA)}</div>`;
    }
    return `<div class="concept-card ${tieneAlgo?'has-data':'no-data'}">
      <div class="cn">${label}${isBono?' <span style="font-size:9px;color:var(--ink-3);font-style:italic">(neg)</span>':''}</div>
      ${body}${varHTML}
    </div>`;
  };
  const proyectionCard = buildCard('Proy. Ventas', p.proyUSD2025, p.proyARS2025, p.proyUSD2026, p.proyARS2026, false);
  const conceptCards = CONCEPTOS_EMISIBLES.map(c=>{
    const r = p.conceptos[c]||{};
    return buildCard(CONCEPTO_LABEL[c], r.usd2025, r.ars2025, get26usd(r), get26ars(r), c==='Bono');
  }).join('');
  const sinChange = (a,b,label)=>{
    if(a===null && b===null) return `<div class="concept-card no-data"><div class="cn">${label}</div><div style="font-size:10.5px;color:var(--ink-3)">sin datos</div></div>`;
    const d = (b!=null && a!=null) ? b-a : null;
    const cls = (d===null||d===0)?'neu':(d>0?'pos':'neg');
    return `<div class="concept-card has-data">
      <div class="cn">${label}</div>
      <div class="cv-row"><span class="yr">25</span><span>${a!=null?FMT_PCT(a):'—'}</span></div>
      <div class="cv-row"><span class="yr">26</span><span>${b!=null?FMT_PCT(b):'—'}</span></div>
      <div class="cv-var ${cls}">${d!==null?(d>=0?'+':'')+FMT_PCT(d):'—'}</div>
    </div>`;
  };
  const sinHCard = sinChange(p.sinH2025,p.sinH2026,'Sin. H');
  const sinUVCard = sinChange(p.sinUV2025,p.sinUV2026,'Sin. UV');
  const tasaCard = (()=>{
    if(p.tasa2025===null && p.tasa2026===null) return `<div class="concept-card no-data"><div class="cn">Tasa</div><div style="font-size:10.5px;color:var(--ink-3)">sin datos</div></div>`;
    const d = (p.tasa2026!=null && p.tasa2025!=null) ? p.tasa2026-p.tasa2025 : null;
    const cls = (d===null||d===0)?'neu':(d>0?'pos':'neg');
    return `<div class="concept-card has-data">
      <div class="cn">Tasa</div>
      <div class="cv-row"><span class="yr">25</span><span>${p.tasa2025!=null?FMT_PCT_TASA(p.tasa2025):'—'}</span></div>
      <div class="cv-row"><span class="yr">26</span><span>${p.tasa2026!=null?FMT_PCT_TASA(p.tasa2026):'—'}</span></div>
      <div class="cv-var ${cls}">${d!==null?(d>=0?'+':'')+FMT_PCT_TASA(d):'—'}</div>
    </div>`;
  })();
  return `<div style="display:grid;grid-template-columns:1fr 4fr 3fr;gap:8px;margin-top:8px">
    <div style="display:grid;grid-template-columns:1fr;gap:8px">${proyectionCard}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${conceptCards}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${tasaCard}${sinHCard}${sinUVCard}</div>
  </div>`;
}

/* ============================================================
   CHART HELPERS
============================================================ */
function drawChart(id,cfg){
  const el = document.getElementById(id);
  if(!el) return;
  if(charts[id]){try{charts[id].destroy()}catch(e){}}
  charts[id] = new Chart(el,cfg);
}
function chartOpts({yMoney=false,yPct=false,yPctDecimals=0,legend=false,xAngle=0,isDoughnut=false}={}){
  if(isDoughnut){
    return {responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:legend,position:'right',labels:{color:'#3d5475',font:{family:"Calibri",size:12},boxWidth:12,padding:10}},
        tooltip:{backgroundColor:'#ffffff',titleColor:'#0a1f3a',bodyColor:'#3d5475',borderColor:'#c5d2e3',borderWidth:1,padding:10,
          titleFont:{family:"Calibri",weight:'600'},bodyFont:{family:"Calibri"}}}};
  }
  const fmtFull = (v)=> yMoney==='usd'?FMT_USD_FULL(v):(yMoney==='ars'?FMT_ARS_FULL(v):'');
  const fmtShort = (v)=> yMoney==='usd'?FMT_USD(v):(yMoney==='ars'?FMT_ARS(v):'');
  return {
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:legend,position:'top',labels:{color:'#3d5475',font:{family:"Calibri",size:11},boxWidth:10,padding:14}},
      tooltip:{backgroundColor:'#ffffff',titleColor:'#0a1f3a',bodyColor:'#3d5475',borderColor:'#c5d2e3',borderWidth:1,padding:12,
        titleFont:{family:"Calibri",weight:'600'},bodyFont:{family:"Calibri"},
        callbacks: yMoney ? {label:(c)=> `${c.dataset.label||''}: ${fmtFull(c.parsed.y)}`} : (yPct?{label:(c)=> `${c.dataset.label||''}: ${c.parsed.y.toFixed(yPctDecimals)}%`}:{})
      }
    },
    scales:{
      x:{ticks:{color:'#7a8ca8',font:{family:"Calibri",size:11},maxRotation:Math.abs(xAngle)||0,minRotation:Math.abs(xAngle)||0},
         grid:{color:'rgba(223,231,242,.6)',display:false},border:{color:'#dfe7f2'}},
      y:{ticks:{color:'#7a8ca8',font:{family:"Calibri",size:11},callback:(v)=>yMoney?fmtShort(v):(yPct?v.toFixed(yPctDecimals)+'%':v)},
         grid:{color:'rgba(223,231,242,.8)'},border:{color:'#dfe7f2'}}
    }
  };
}

/* ============================================================
   FILE INPUT + DRAG&DROP
============================================================ */
const dz = document.getElementById('dropzone');
window.toggleDetalleCategoria = function(el){
  /* Busca el sibling .cat-detalle y lo toggle */
  const sib = el.nextElementSibling;
  if(sib && sib.classList.contains('cat-detalle')){
    sib.style.display = sib.style.display === 'none' ? 'block' : 'none';
  }
};

const fi = document.getElementById('fileInput');
fi.addEventListener('change',(e)=>{ if(e.target.files[0]) readExcel(e.target.files[0]); });
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,(e)=>{e.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,(e)=>{e.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop',(e)=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])readExcel(e.dataTransfer.files[0]);});
