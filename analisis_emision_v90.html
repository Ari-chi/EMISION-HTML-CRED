  const isConceptRow = (t)=> t && ['Proyeccion de Ventas','Prima Minima','Ajuste','Bono','Malus','Tasa aplicable','Siniestralidad H','Siniestralidad UV'].includes(String(t).trim());
  /* Como los bloques tienen 2 monedas, generamos DOS pseudo-pólizas por bloque:
     una con moneda='$' (valores ARS) y otra con moneda='US' (valores USD).
     Esto mantiene compatibilidad con el resto del código que asume moneda nativa. */
  let blockBuffer = null; /* {tipo2025, vigDesde, vigHasta, ejecutivo, asistente, conceptos:[{tipo, ars25, usd25, ars26, usd26, fecha25, fecha26, cat, det}]} */
  const flushBlock = ()=>{
    if(!blockBuffer || blockBuffer.conceptos.length===0) return;
    polCount++;
    /* Crear UNA "póliza" sintética con ambas monedas; el resto del código la verá
       como moneda='$' por default pero usaremos los valores ARS y USD nativos. */
    const baseRow = (moneda)=>({
      ejecutivo: blockBuffer.ejecutivo,
      asistente: blockBuffer.asistente,
      poliza: `BLOCK_${polCount}`,
      asegurado: blockBuffer.asegurado || `Póliza ${polCount}`,
      codigo: null,
      producto: blockBuffer.producto || '(sin producto)',
      moneda,
      rubro: blockBuffer.rubro || '(sin rubro)',
      broker: blockBuffer.broker || '(sin broker)',
      vigDesde: blockBuffer.vigDesde,
      vigHasta: blockBuffer.vigHasta,
      inicioAnualidad2026: blockBuffer.inicioAnualidad2026 || null,
      tipoPoliza25: blockBuffer.tipoPoliza25,
      tipoPoliza26: blockBuffer.tipoPoliza26,
    });
    for(const moneda of ['$','US']){
      for(const c of blockBuffer.conceptos){
        const row = baseRow(moneda);
        row.tipo = c.tipo;
        row.fechaEm2025 = c.fecha25;
        row.fechaEm2026 = c.fecha26;
        /* Para conceptos numéricos como Tasa o Siniestralidad, el valor está en col 13 (rawCol12) */
        row.rawCol12 = c.rawCol12;
        row.rawCol17 = c.rawCol17;
        row.real2025 = c.real2025;
        row.real2026 = c.real2026;
        row.ars2025 = c.ars25;
        row.usd2025 = c.usd25;
        row.ars2026 = c.ars26;
        row.usd2026 = c.usd26;
        row.categoria = c.cat;
        row.detalle = c.det;
        row.desvioARS = (typeof c.desvioARS==='number') ? c.desvioARS : null;
        row.desvioUSD = (typeof c.desvioUSD==='number') ? c.desvioUSD : null;
        state.raw.push(row);
      }
    }
    blockBuffer = null;
  };
  for(let i=0;i<rows.length;i++){
    const r = rows[i];
    if(!r) continue;
    const tipoCol = (typeof r[CFGCOL.tipo2025] === 'string') ? r[CFGCOL.tipo2025].trim() : r[CFGCOL.tipo2025];
    /* Fila marcadora de inicio de bloque (Tipo de póliza) */
    if(typeof tipoCol === 'string' && TIPOS_POLIZA.has(tipoCol)){
      flushBlock();
      blockBuffer = {
        ejecutivo: r[CFGCOL.ejecutivo], asistente: r[CFGCOL.asistente],
        vigDesde: excelDate(r[CFGCOL.vigDesde]), vigHasta: excelDate(r[CFGCOL.vigHasta]),
        inicioAnualidad2026: (CFGCOL.inicioAnualidad2026!=null) ? excelDate(r[CFGCOL.inicioAnualidad2026]) : null,
        tipoPoliza25: null, tipoPoliza26: null,
        asegurado: null, producto: null, rubro: null, broker: null,
        conceptos: [],
      };
      /* En el Excel: col 12 (idx 11) = Tipo 2025, col 17 (idx 16) = Tipo 2026.
         Son columnas PARALELAS. Asignar cada una a su año.
         Notar que el texto puede traer el sufijo "2025" o "2026" (ej. "Póliza terminada 2025"),
         pero la posición de la columna ya define el año. */
      const tipoNorm = (t)=>{
        if(!t) return null;
        const s = String(t).trim();
        const lo = s.toLowerCase();
        if(lo.startsWith('renovacion') || lo.startsWith('renovación')) return 'Renovación';
        if(lo.startsWith('segunda')) return 'Segunda anualidad';
        if(lo.startsWith('tercera')) return 'Tercera anualidad';
        if(lo.startsWith('cuarta')) return 'Cuarta anualidad';
        if(lo.includes('terminada') || lo.includes('cancelada')) return 'Póliza terminada';
        if(lo.includes('nueva')) return 'Póliza nueva';
        return s;
      };
      /* Tipo 2025 (col L) */
      blockBuffer.tipoPoliza25 = tipoNorm(tipoCol);
      /* Tipo 2026 (col Q) — lectura literal, si está vacía queda null */
      const tipo26Col = (typeof r[CFGCOL.tipo2026] === 'string') ? r[CFGCOL.tipo2026].trim() : null;
      if(tipo26Col){
        blockBuffer.tipoPoliza26 = tipoNorm(tipo26Col);
      } else {
        blockBuffer.tipoPoliza26 = null;
      }
      continue;
    }
    /* Filas de concepto dentro del bloque */
    if(blockBuffer && isConceptRow(tipoCol)){
      const ars25 = typeof r[CFGCOL.ars2025]==='number'?r[CFGCOL.ars2025]:null;
      const usd25 = typeof r[CFGCOL.usd2025]==='number'?r[CFGCOL.usd2025]:null;
      const ars26 = typeof r[CFGCOL.ars2026]==='number'?r[CFGCOL.ars2026]:null;
      const usd26 = typeof r[CFGCOL.usd2026]==='number'?r[CFGCOL.usd2026]:null;
      blockBuffer.conceptos.push({
        tipo: tipoCol,
        fecha25: excelDate(r[CFGCOL.fechaEm2025]),
        fecha26: excelDate(r[CFGCOL.fechaEm2026]),
        rawCol12: typeof r[CFGCOL.fechaEm2025]==='number'?r[CFGCOL.fechaEm2025]:null,
        rawCol17: typeof r[CFGCOL.fechaEm2026]==='number'?r[CFGCOL.fechaEm2026]:null,
        real2025: typeof r[CFGCOL.real2025]==='number'?r[CFGCOL.real2025]:null,
        real2026: typeof r[CFGCOL.real2026]==='number'?r[CFGCOL.real2026]:null,
        ars25, usd25, ars26, usd26,
        desvioARS: typeof r[CFGCOL.desvioARS]==='number'?r[CFGCOL.desvioARS]:null,
        desvioUSD: typeof r[CFGCOL.desvioUSD]==='number'?r[CFGCOL.desvioUSD]:null,
        cat: (typeof r[CFGCOL.categoria] === 'string' && r[CFGCOL.categoria].trim() && r[CFGCOL.categoria].trim() !== 'Categoría') ? r[CFGCOL.categoria].trim() : null,
        det: (typeof r[CFGCOL.detalle] === 'string' && r[CFGCOL.detalle].trim() && !r[CFGCOL.detalle].trim().startsWith('Detalle')) ? r[CFGCOL.detalle].trim() : null,
      });
    }
  }
  flushBlock();
}

/* Normalizador de tipo de póliza — usado en ambos formatos.
   Las variantes del Excel se normalizan a 4 etiquetas canónicas:
   'Renovación' | 'Segunda anualidad' | 'Póliza nueva' | 'Póliza terminada'
   Devuelve null si no es uno de los 4 tipos reconocidos. */
function tipoPolizaNorm(t){
  if(!t) return null;
  const s = String(t).trim();
  const lo = s.toLowerCase();
  if(lo.startsWith('renovacion') || lo.startsWith('renovación')) return 'Renovación';
  if(lo.startsWith('segunda')) return 'Segunda anualidad';
  if(lo.startsWith('tercera')) return 'Tercera anualidad';
  if(lo.startsWith('cuarta')) return 'Cuarta anualidad';
  if(lo.includes('terminada') || lo.includes('cancelada')) return 'Póliza terminada';
  if(lo.includes('nueva')) return 'Póliza nueva';
  return null;
}

function aggregatePolizas(){
  const map = new Map();
  for(const r of state.raw){
    const key = `${r.poliza}__${r.asegurado||''}__${r.broker||''}__${r.vigDesde?r.vigDesde.getTime():''}`;
    if(!map.has(key)){
      map.set(key,{
        clave:key, poliza:r.poliza, asegurado:r.asegurado, codigo:r.codigo,
        producto:r.producto, moneda:r.moneda, rubro:r.rubro,
        vigDesde:r.vigDesde, vigHasta:r.vigHasta,
        inicioAnualidad2026: r.inicioAnualidad2026 || null,
        broker:r.broker, ejecutivo:r.ejecutivo,
        conceptos:{},
        tasa2025:null, tasa2026:null,
        proyARS2025:null,proyARS2026:null,proyUSD2025:null,proyUSD2026:null,
        proyCategoria:null, proyDetalle:null, tasaCategoria:null, tasaDetalle:null,
        sinH2025:null, sinH2026:null, sinUV2025:null, sinUV2026:null,
        tipo2025: null, /* "Póliza nueva" | "Renovación" | "Segunda anualidad" */
        tipo2026: null, /* "Renovación" | "Segunda anualidad" | "Póliza cancelada" */
        tipoRenovacion: null, /* legacy: para Justif por póliza */
      });
    }
    const p = map.get(key);
    /* Si la fecha de inicio de anualidad 2026 vino en otra fila de la misma póliza, completarla. */
    if(!p.inicioAnualidad2026 && r.inicioAnualidad2026) p.inicioAnualidad2026 = r.inicioAnualidad2026;
    /* ACUMULAR cuando hay múltiples filas del mismo concepto (p.ej. Prima Mínima mensual).
       Sumar montos; conservar la PRIMERA fecha encontrada (más temprana) para el desvío;
       conservar la categoría/detalle si está; las "anualidad anterior" se marcan aparte.
       _entries25/_entries26 guardan cada (fecha, ars, usd) original para el desglose mensual. */
    if(CONCEPTOS_EMISIBLES.includes(r.tipo)){
      const existing = p.conceptos[r.tipo];
      const entry25 = (r.fechaEm2025 || r.ars2025 || r.usd2025) ? {fecha:r.fechaEm2025, ars:r.ars2025||0, usd:r.usd2025||0} : null;
      const entry26 = (r.fechaEm2026 || r.ars2026 || r.usd2026) ? {fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0} : null;
      if(!existing){
        /* Clonamos para no mutar la fila original (que puede compartirse) */
        p.conceptos[r.tipo] = {
          ...r,
          ars2025: r.ars2025 || 0,
          usd2025: r.usd2025 || 0,
          ars2026: r.ars2026 || 0,
          usd2026: r.usd2026 || 0,
          _nRows: 1,
          _entries25: entry25 ? [entry25] : [],
          _entries26: entry26 ? [entry26] : [],
        };
      } else {
        existing.ars2025 = (existing.ars2025||0) + (r.ars2025||0);
        existing.usd2025 = (existing.usd2025||0) + (r.usd2025||0);
        existing.ars2026 = (existing.ars2026||0) + (r.ars2026||0);
        existing.usd2026 = (existing.usd2026||0) + (r.usd2026||0);
        /* Acumular los desvíos del Excel (si son numéricos). */
        if(typeof r.desvioUSD==='number') existing.desvioUSD = (typeof existing.desvioUSD==='number'?existing.desvioUSD:0) + r.desvioUSD;
        if(typeof r.desvioARS==='number') existing.desvioARS = (typeof existing.desvioARS==='number'?existing.desvioARS:0) + r.desvioARS;
        existing._nRows = (existing._nRows||1) + 1;
        if(entry25) existing._entries25.push(entry25);
        if(entry26) existing._entries26.push(entry26);
        /* Fecha más temprana (relevante para el mes esperado) */
        if(r.fechaEm2025 && (!existing.fechaEm2025 || r.fechaEm2025 < existing.fechaEm2025)) existing.fechaEm2025 = r.fechaEm2025;
        if(r.fechaEm2026 && (!existing.fechaEm2026 || r.fechaEm2026 < existing.fechaEm2026)) existing.fechaEm2026 = r.fechaEm2026;
        /* Categoría/detalle: PRIORIZAR una categoría "emitida" (válida) sobre "No corresponde"
           o "anualidad anterior". Si una póliza tiene una prima con cat="No corresponde" y otra
           con una categoría real de emisión, vale la real (no está pendiente). */
        if(r.categoria){
          const exVale = categoriaEsEmitido(existing.categoria);
          const nuVale = categoriaEsEmitido(r.categoria);
          if(!existing.categoria || (nuVale && !exVale)){
            existing.categoria = r.categoria;
            if(r.detalle) existing.detalle = r.detalle;
          } else if(!existing.detalle && r.detalle){
            existing.detalle = r.detalle;
          }
        } else if(!existing.detalle && r.detalle){
          existing.detalle = r.detalle;
        }
      }
    } else {
      p.conceptos[r.tipo] = r;
    }
    if(r.tipo==='Tasa aplicable'){ p.tasa2025=r.rawCol12; p.tasa2026=r.rawCol17; p.tasaCategoria=r.categoria; p.tasaDetalle=r.detalle; }
    if(r.tipo==='Proyeccion de Ventas'){
      p.proyARS2025=r.ars2025; p.proyUSD2025=r.usd2025;
      p.proyARS2026=r.ars2026; p.proyUSD2026=r.usd2026;
      /* Guardamos categoría y detalle de PROY para los chequeos posteriores */
      p.proyCategoria = r.categoria;
      p.proyDetalle = r.detalle;
    }
    if(r.tipo==='Siniestralidad H'){ p.sinH2025=r.rawCol12; p.sinH2026=r.rawCol17; p.sinHCategoria=r.categoria; p.sinHDetalle=r.detalle; }
    if(r.tipo==='Siniestralidad UV'){ p.sinUV2025=r.rawCol12; p.sinUV2026=r.rawCol17; p.sinUVCategoria=r.categoria; p.sinUVDetalle=r.detalle; }
    /* La fila "Tipo" trae el tipo de póliza separado por año: col11 = tipo 2025, col16 = tipo 2026.
       Normalizamos todas las variantes (con o sin sufijo de año) a las 4 etiquetas canónicas. */
    const tn25 = tipoPolizaNorm(r.tipoPoliza25);
    const tn26 = tipoPolizaNorm(r.tipoPoliza26);
    if(tn25 && !p.tipo2025){
      p.tipo2025 = tn25;
      p.tipoRenovacion = tn25;
    }
    if(tn26 && !p.tipo2026){
      p.tipo2026 = tn26;
      /* Marcador: el tipo 2026 vino EXPLÍCITO de la columna (no heredado).
         Se usa para "Pólizas nuevas 2026": solo cuenta cuando 2026 dice
         literalmente "Póliza nueva", no cuando se heredó desde tipo 2025. */
      p.tipo2026Explicito = true;
    }
  }
  /* Si alguna póliza quedó sin tipo 2026 explícito (columna vacía) pero sí tiene tipo 2025,
     heredamos el tipo 2025 como tipo 2026. Una renovación/segunda anualidad de 2025 sigue
     siéndolo en 2026 salvo que se indique lo contrario (terminada/nueva). Evita que pólizas
     queden como tipo2026=null y se clasifiquen mal. */
  for(const p of map.values()){
    if(!p.tipo2026 && p.tipo2025){ p.tipo2026 = p.tipo2025; p.tipo2026Explicito = false; }
  }
  state.polizas = [...map.values()];
}

/* ============================================================
   CÁLCULOS DE EMISIÓN FILTRADA Y POR MONEDA
============================================================ */
function calcEmisionFiltrada(p, anio, mesCorte, opts){
  /* mesCorte = "Acumulado hasta" PER-SECCIÓN. Filtra AMBOS años (2025 y 2026).
     state.globalMes2026 = "Mes Corte 2026" GLOBAL. SOLO afecta 2026 (cap adicional).
     Si están ambos activos, prevalece el más restrictivo PARA 2026.
     opts.excluirAnualAnt = true → para el AÑO 2026, los conceptos cuya categoría
     indica "anualidad anterior" NO se suman (porque el monto pertenece a la anualidad
     previa, no al período vigente de 2026).
     Si no se pasan opts, usar el contexto activo (state._activeCtx). */
  if(!opts){ opts = state._activeCtx || {}; }
  /* "1° Acumulado hasta" (mesCorte de sección) filtra AMBOS años al mismo mes:
     compara mismo período contra mismo período (Ene–MesCorte 2025 vs Ene–MesCorte 2026).
     El "🌐 Mes Corte 2026" (state.globalMes2026) es una cota ADICIONAL que aplica
     SOLO a 2026 (acota la info real de 2026 a ese mes), nunca a 2025. */
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  if(anio === 2026 && state.globalMes2026 && state.globalMes2026 > 0){
    cutoff = Math.min(cutoff, state.globalMes2026);
  }
  let totARS = 0, totUSD = 0;
  const breakdownARS = {primaMin:0,ajuste:0,bono:0,malus:0};
  const breakdownUSD = {primaMin:0,ajuste:0,bono:0,malus:0};
  for(const c of CONCEPTOS_EMISIBLES){
    const r = p.conceptos[c]; if(!r) continue;
    const k = KEYMAP[c];
    /* Si pidieron excluir "Anualidad Anterior" y este concepto del 2026 está marcado
       como tal, lo saltamos completo para 2026. Para 2025 la categoría no aplica
       (los montos 2025 siempre pertenecen a 2025). */
    if(anio === 2026 && opts.excluirAnualAnt && categoriaEsAnualidadAnterior(r.categoria)) continue;
    /* Iterar sobre las entradas individuales (puede haber múltiples filas, p. ej. Prima Mín mensual) */
    const entries = anio===2025 ?
      ((r._entries25 && r._entries25.length) ? r._entries25 : [{fecha: r.fechaEm2025, ars: r.ars2025, usd: r.usd2025}]) :
      ((r._entries26 && r._entries26.length) ? r._entries26 : [{fecha: r.fechaEm2026, ars: r.ars2026, usd: r.usd2026}]);
    for(const e of entries){
      const ars = e.ars || 0;
      const usd = e.usd || 0;
      if(!ars && !usd) continue;
      /* Filtro de mes:
         - Si hay fecha: aplicar el cutoff por mes
         - Si NO hay fecha: contar el monto cuando es año completo (cutoff=12) */
      if(e.fecha){
        if((e.fecha.getMonth()+1) <= cutoff){
          totARS += ars; totUSD += usd;
          breakdownARS[k] += ars;
          breakdownUSD[k] += usd;
        }
      } else {
        /* Sin fecha: solo contar si NO hay filtro de mes activo (cutoff=12) */
        if(cutoff === 12){
          totARS += ars; totUSD += usd;
          breakdownARS[k] += ars;
          breakdownUSD[k] += usd;
        }
      }
    }
  }
  return {totARS, totUSD, breakdownARS, breakdownUSD};
}

/* ¿La póliza tuvo ALGUNA emisión en el año (cualquier concepto: prima/ajuste/bono/malus),
   INCLUIDO el bono que es NEGATIVO? El check por total (>0) dejaba afuera pólizas cuyo neto
   2026 era ≤0 (p.ej. solo un bono, o bono > prima), perdiendo ese bono. Acá miramos los
   componentes, así un bono también cuenta como emisión. Recibe el resultado de calcEmisionFiltrada. */
function tuvoEmision(f){
  if(!f) return false;
  const a=f.breakdownARS||{}, u=f.breakdownUSD||{};
  return Math.abs(a.primaMin||0)>0.005 || Math.abs(a.ajuste||0)>0.005 || Math.abs(a.bono||0)>0.005 || Math.abs(a.malus||0)>0.005
      || Math.abs(u.primaMin||0)>0.005 || Math.abs(u.ajuste||0)>0.005 || Math.abs(u.bono||0)>0.005 || Math.abs(u.malus||0)>0.005;
}

/* Suma SOLO de los conceptos con categoría "Anualidad Anterior" de una póliza, por año,
   hasta el corte. (Para el bucket "Corr. Anualidad Anterior".) */
function _aaSumYr(p, year, mesCorte){
  let ars=0, usd=0;
  let cutoff = mesCorte===0?12:mesCorte;
  if(year===2026 && state.globalMes2026 && state.globalMes2026>0) cutoff = Math.min(cutoff, state.globalMes2026);
  for(const c of CONCEPTOS_EMISIBLES){
    const r = p.conceptos[c]; if(!r) continue;
    if(!categoriaEsAnualidadAnterior(r.categoria)) continue;
    const entries = year===2025
      ? ((r._entries25 && r._entries25.length) ? r._entries25 : [{fecha:r.fechaEm2025, ars:r.ars2025, usd:r.usd2025}])
      : ((r._entries26 && r._entries26.length) ? r._entries26 : [{fecha:r.fechaEm2026, ars:r.ars2026, usd:r.usd2026}]);
    for(const e of entries){
      const a=e.ars||0, u=e.usd||0; if(!a && !u) continue;
      if(e.fecha){ if((e.fecha.getMonth()+1)<=cutoff){ ars+=a; usd+=u; } }
      else if(cutoff===12){ ars+=a; usd+=u; }
    }
  }
  return {ars, usd};
}
/* Arma, para un AÑO dado y hasta el corte, las pólizas de cada concepto de Emisión:
   tipo-based (Segunda/Renovación/Tercera/Pólizas nuevas) por tipo del año con prima
   mínima emitida; Ajuste/Bono/Malus por ese concepto; Anualidad Anterior por categoría.
   Cada registro trae el valor del concepto (ars/usd) + proy/tasa/siniestralidad del año. */
function buildEmiConceptos(POL, year, mesCorte){
  const out = {seg:[],ren:[],ter:[],nuevas:[],ajuste:[],bono:[],malus:[],anualant:[]};
  for(const p of POL){
    const f = calcEmisionFiltrada(p, year, mesCorte);
    const tipo = p['tipo'+year];
    const mk = (v)=>({clave:p.clave,poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,moneda:p.moneda,
      val_ars:v.ars||0, val_usd:v.usd||0,
      proy_ars: year===2025?(p.proyARS2025||0):(p.proyARS2026||0), proy_usd: year===2025?(p.proyUSD2025||0):(p.proyUSD2026||0),
      tasa: year===2025?p.tasa2025:p.tasa2026, sinUV: year===2025?p.sinUV2025:p.sinUV2026, sinH: year===2025?p.sinH2025:p.sinH2026});
    const prima={ars:f.breakdownARS.primaMin,usd:f.breakdownUSD.primaMin};
    if(prima.ars>0||prima.usd>0){
      if(tipo==='Segunda anualidad') out.seg.push(mk(prima));
      else if(tipo==='Renovación') out.ren.push(mk(prima));
      else if(tipo==='Tercera anualidad') out.ter.push(mk(prima));
      else if(tipo==='Póliza nueva') out.nuevas.push(mk(prima));
    }
    const aj={ars:f.breakdownARS.ajuste,usd:f.breakdownUSD.ajuste}; if(aj.ars!==0||aj.usd!==0) out.ajuste.push(mk(aj));
    const bo={ars:f.breakdownARS.bono,usd:f.breakdownUSD.bono};    if(bo.ars!==0||bo.usd!==0) out.bono.push(mk(bo));
    const ma={ars:f.breakdownARS.malus,usd:f.breakdownUSD.malus};  if(ma.ars!==0||ma.usd!==0) out.malus.push(mk(ma));
    const aa=_aaSumYr(p,year,mesCorte); if(aa.ars!==0||aa.usd!==0) out.anualant.push(mk(aa));
  }
  return out;
}

/* ============================================================
   ESTADO DE DESVÍO POR PÓLIZA-CONCEPTO
============================================================ */
/* ============================================================
   NUEVO MODELO DE ESTADOS (basado en columna Categoría)
   - categoría === 'No corresponde'  → 'no_corresponde' (no se emite, descontar)
   - categoría con texto significativo (Mantiene, Incremento, etc.) → 'emitido'
     · Si la fecha de emisión 2026 está fuera del rango esperado → 'emitido_con_desvio'
     · Si no → 'emitido_sin_desvio'
   - categoría vacía/null → 'pendiente'
     · Si la anualidad aún no venció → 'pendiente_ok'
     · Si pasaron ≤2m desde la anualidad → 'desvio_emision_pendiente'
     · Si pasaron >2m → 'desvio_pendiente_mayor_2m'
============================================================ */

/* Categorías "emitidas" reconocidas (cualquier texto que no sea null/empty/No corresponde/Anualidad Anterior) */
function categoriaEsEmitido(cat){
  if(!cat) return false;
  const s = String(cat).trim();
  if(!s) return false;
  if(categoriaEsNoCorresponde(s)) return false;
  /* "Corresponde a la Anualidad Anterior" → el monto figura en la columna del año pero
     pertenece a la anualidad anterior; NO cuenta como emisión del nuevo período */
  if(/anualidad\s+anterior/i.test(s)) return false;
  return true;
}
function categoriaEsNoCorresponde(cat){
  /* "No corresponde" / "NO CORRESPONDE" / "no corresponde emitir", etc. Insensible a
     mayúsculas y a texto adicional. Es el caso típico cuando la emisión 2026 = 0:
     no es ni "menor" ni "pendiente", simplemente no aplica. */
  return !!(cat && /no\s+corresponde/i.test(String(cat)));
}
function categoriaEsAnualidadAnterior(cat){
  return cat && /anualidad\s+anterior/i.test(String(cat));
}
/* ¿El concepto tiene una justificación (categoría o detalle//observación con texto)?
   Si NO tiene NINGÚN comentario, no podemos saber por qué se emitió menos o nada →
   se trata como PENDIENTE de emisión, no como "menor emisión" real.
   (pedido del usuario: el concepto vacío sin comentario está pendiente). */
function conceptoTieneJustificacion(r){
  if(!r) return false;
  const cat = r.categoria ? String(r.categoria).trim() : '';
  const det = r.detalle ? String(r.detalle).trim() : '';
  return !!(cat || det);
}

/* Devuelve los conceptos PENDIENTES de emisión de una póliza (prima, ajuste, bono, malus),
   con el monto pendiente de cada uno en ambas monedas.
   Un concepto está pendiente si:
   - NO tiene justificación en su categoría (categoría/detalle vacíos), y
   - en 2025 se había emitido algo de ese concepto (hay un valor a renovar), o es la
     prima mínima (que siempre debe emitirse por anualidad), y
   - YA pasó su plazo máximo de emisión respecto al mes de corte.
   PLAZO (pedido del usuario, anclado en el FIN DE LA ANUALIDAD):
   - La anualidad de 2026 termina justo antes de su aniversario. El mes esperado de
     emisión (mesEsperadoEmision) es el mes del aniversario.
     Ej: vigencia 01/01/2025–31/12/2026 → anualidad termina 31/12/2025 →
         aniversario/esperado = enero 2026.
   - PRIMA MÍNIMA: plazo máximo = mes esperado (1 mes tras finalizar la anualidad).
         En el ejemplo: enero 2026.
   - AJUSTE / BONO / MALUS: plazo máximo = mes esperado + 1 (2 meses tras finalizar).
         En el ejemplo: febrero 2026.
   Si no hay anualidad futura dentro de la vigencia (mesEsperadoEmision = null), se usa
   el FIN DE VIGENCIA como fin de anualidad de referencia.
   La prima/ABM con categoría "anualidad anterior" no cuenta como emitida (sigue pendiente).
   Devuelve { items: [{concepto, ars, usd}], totalARS, totalUSD }. */
function conceptosPendientes(p, mesCorte){
  const out = {items:[], totalARS:0, totalUSD:0};
  if(polizaTerminada(p)) return out;
  /* MONTO A RENOVAR = lo emitido en 2025 del concepto. Es la REFERENCIA del año anterior,
     así que se toma 2025 COMPLETO (corte=0), independiente del "Acumulado hasta" de la
     vista. Esto evita perder entradas 2025 que no tienen fecha de emisión cuando hay un
     mes de corte parcial activo. */
  const f25 = calcEmisionFiltrada(p,2025,0,{excluirAnualAnt:false});
  const f26full = calcEmisionFiltrada(p,2026,mesCorte,{excluirAnualAnt:false});
  /* ===== Timing: plazo máximo de emisión ANCLADO EN EL FIN DE LA ANUALIDAD =====
     "ahora" del análisis = fin del mes de corte de 2026 (si corte=0, dic 2026 cerrado).
     El Mes Corte 2026 global también acota "ahora" (no podemos saber emisiones futuras). */
  let cutoffMes = mesCorte===0 ? 12 : mesCorte;
  if(state.globalMes2026 && state.globalMes2026 > 0) cutoffMes = Math.min(cutoffMes, state.globalMes2026);
  const ahora = new Date(2026, cutoffMes-1, 28);
  /* Mes en que ARRANCA la anualidad 2026 (= cuándo debe emitirse la prima de ese período).
     Si NO hay una anualidad que arranque en 2026 (espKey null), entonces esta póliza no
     tiene prima mínima 2026 que emitir → no está pendiente. */
  const espKey = mesEsperadoEmision(p.vigDesde, p.vigHasta, 2026, p.inicioAnualidad2026);
  if(!espKey) return out;
  const [ey,em] = espKey.split('-').map(Number);
  const mesEsperado = new Date(ey, em-1, 1); /* 1° del mes en que arranca la anualidad 2026 */

  /* Plazo de CADA concepto. La anualidad no siempre dura 12 meses exactos y cada concepto
     (prima, ajuste, bono, malus) puede emitirse en un mes distinto. La mejor señal del mes
     en que se emite cada concepto es la FECHA DE EMISIÓN 2025 de ese concepto: el plazo 2026
     es ese mismo mes trasladado al inicio de la anualidad 2026.
     - Si el concepto tiene fecha 2025: plazo 2026 = inicioAnualidad2026 + (mes2025 − mesInicioAnualidad2025).
       En la práctica, como el inicio de anualidad se desplaza año a año, usamos el OFFSET en
       meses entre la fecha de emisión 2025 del concepto y el inicio de la anualidad anterior.
     - Si no tiene fecha 2025: la prima vence en el mes de inicio; ajuste/bono/malus, un mes
       después (default conservador). */
  /* PLAZO DE EMISIÓN POR CONCEPTO (regla del usuario, anclada en "Inicio Anualidad 2026"):
     - Prima mínima: debe emitirse en el MISMO mes en que arranca la anualidad (offset 0).
     - Ajuste / Bono / Malus: un mes después como máximo (offset +1).
     Ej.: anualidad arranca en enero → prima mínima vence en enero; ajuste/bono/malus en febrero.
     El plazo se evalúa al día 28 del mes correspondiente (fin de mes a efectos prácticos). */
  const limiteDeConcepto = (cKey, offset)=>{
    return new Date(mesEsperado.getFullYear(), mesEsperado.getMonth()+offset, 28);
  };
  const limitePrima = limiteDeConcepto('Prima Minima', 0);
  const limiteAjuste = limiteDeConcepto('Ajuste', 1);
  const limiteBono   = limiteDeConcepto('Bono', 1);
  const limiteMalus  = limiteDeConcepto('Malus', 1);

  const conceptos = [
    {k:'primaMin', nombre:'Prima mínima', cKey:'Prima Minima', limite:limitePrima},
    {k:'ajuste',   nombre:'Ajuste',       cKey:'Ajuste',       limite:limiteAjuste},
    {k:'bono',     nombre:'Bono',         cKey:'Bono',         limite:limiteBono},
    {k:'malus',    nombre:'Malus',        cKey:'Malus',        limite:limiteMalus},
  ];
  for(const c of conceptos){
    /* Cada concepto tiene su propio plazo: solo está pendiente si su plazo YA venció. */
    if(ahora < c.limite) continue; /* todavía dentro del plazo para emitir este concepto */
    const r = p.conceptos[c.cKey];
    /* CASO CUOTAS PARCIALES (pedido del usuario) — aplica a prima/ajuste/bono/malus:
       emitió algunas cuotas 2026 pero le faltan otras (cantidad 2026 < 2025 y/o categoría
       sin cargar). La justificación de las cuotas ya emitidas no cubre las que faltan.
       La porción no emitida (emisión año anterior − lo emitido en 2026) es emisión PENDIENTE
       y debe figurar en "Pendiente de emisión", aunque haya monto 2026 o categoría cargada. */
    if(conceptoTieneCuotasPendientes(p, c.cKey, mesCorte)){
      const esAAc = r ? categoriaEsAnualidadAnterior(r.categoria) : false;
      const esNoCorrc = r ? categoriaEsNoCorresponde(r.categoria) : false;
      if(!esAAc && !esNoCorrc){
        const faltARS = Math.abs(f25.breakdownARS[c.k]) - Math.abs(f26full.breakdownARS[c.k]);
        const faltUSD = Math.abs(f25.breakdownUSD[c.k]) - Math.abs(f26full.breakdownUSD[c.k]);
        const fA = faltARS>0?faltARS:0, fU = faltUSD>0?faltUSD:0;
        const faltOrig = (p.moneda==='US')?fU:fA;
        if(faltOrig>0){
          out.items.push({concepto:c.nombre, ars:fA, usd:fU});
          out.totalARS += fA; out.totalUSD += fU;
        }
      }
      continue; /* concepto resuelto como pendiente parcial; no seguir con la lógica estándar */
    }
    /* REGLA (pedido del usuario) — pendiente si:
         · categoría VACÍA  → no se emitió este concepto del 2026, o
         · categoría = "Corresponde a la Anualidad Anterior"  → el monto pertenece
           a la anualidad anterior, así que el 2026 sigue pendiente.
       Cualquier otra categoría con texto (Mantiene, Incremento, No corresponde,
       etc.) significa que el concepto ya tiene resolución → NO pendiente.
       Si la póliza tiene VARIAS filas del mismo concepto (típico de Prima Mínima
       cuando convive una fila de "Anualidad Anterior" con la del nuevo período),
       el aggregator ya seleccionó la categoría VÁLIDA si existe alguna; por eso
       evaluar `cat` post-agregación es suficiente para cubrir el caso "AA + otra
       fila con categoría real → deja de estar pendiente". */
    const cat = (r && r.categoria) ? String(r.categoria).trim() : '';
    const esAA = categoriaEsAnualidadAnterior(cat);
    const esNoCorr = categoriaEsNoCorresponde(cat);
    if(esNoCorr) continue; /* "No corresponde" = no se emite este año → no pendiente */
    const pendiente = (!cat) || esAA;
    if(!pendiente) continue;
    /* monto a renovar = lo emitido en 2025 de este concepto */
    /* MONTO PENDIENTE = la emisión 2025 del concepto (lo que se emitió el año anterior y
       falta renovar), tomada de cada moneda por separado. El equivalente en la otra moneda
       es la emisión 2025 de al lado (no se convierte con TC). Si no hubo emisión 2025 del
       concepto, no hay monto a renovar → no se cuenta. */
    const mARS = Math.abs(f25.breakdownARS[c.k]);
    const mUSD = Math.abs(f25.breakdownUSD[c.k]);
    const aOrig = (p.moneda==='US')?mUSD:mARS;
    if(!(aOrig>0)) continue; /* nada que renovar de este concepto */
    out.items.push({concepto:c.nombre, ars:mARS, usd:mUSD});
    out.totalARS += mARS; out.totalUSD += mUSD;
  }
  return out;
}

/* Estado de un concepto:
   - 'emitido_sin_desvio' : tiene categoría con texto y fecha emisión 26 dentro del mes esperado
   - 'emitido_con_desvio' : tiene categoría pero fecha fuera del rango (o sin fecha)
   - 'no_corresponde'     : categoría = "No corresponde"
   - 'desvio_emision_pendiente'   : categoría vacía y anualidad pasó hace ≤2m
   - 'desvio_pendiente_mayor_2m'  : categoría vacía y anualidad pasó hace >2m
   - 'pendiente_ok'       : categoría vacía pero anualidad aún no vence
   - null                 : no aplica (sin info)
*/
function estadoConcepto(p, concepto, anio, mesCorte){
  const r = p.conceptos[concepto];
  /* Si el concepto no existe en la póliza, no aplica (no es pendiente). */
  if(!r) return null;
  const esp = mesEsperadoEmision(p.vigDesde,p.vigHasta,anio,p.inicioAnualidad2026);
  /* Cutoff = "hasta qué mes consideramos info actualizada" (fin de mes inclusive).
     Para 2026: si hay un Mes Corte 2026 GLOBAL activo, lo respetamos como cota
     superior (la info está actualizada solo hasta ese mes; emitir después de ese
     mes todavía es "futuro" desde el punto de vista del análisis). */
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  if(anio === 2026 && state.globalMes2026 && state.globalMes2026 > 0){
    cutoff = Math.min(cutoff, state.globalMes2026);
  }
  if(!esp) return null;
  /* PLAZO POR CONCEPTO (regla del usuario): la prima mínima debe emitirse en el mes de
     inicio de la anualidad; ajuste/bono/malus tienen un mes más de plazo (inicio + 1).
     espMesPlazo = mes (1-12) a partir del cual el concepto ya debería estar emitido. */
  const offsetConcepto = (concepto==='Prima Minima') ? 0 : 1;
  const espMesPlazo = (()=>{ const base = monthOfKey(esp); if(base==null) return null; const m = base + offsetConcepto; return m>12 ? 12 : m; })();

  /* Si la categoría dice "No corresponde" → no emite (independiente del corte) */
  if(r && categoriaEsNoCorresponde(r.categoria)) return 'no_corresponde';

  /* Si tiene categoría con texto → potencialmente emitido.
     PERO: solo cuenta como emitido si la fecha de emisión está dentro del mes de corte
     (fin de mes inclusive, p.ej. cutoff=4 incluye todo abril).
     Si la fecha es posterior al corte, todavía no fue emitido (en el período evaluado). */
  if(r && categoriaEsEmitido(r.categoria)){
    const fecha = anio===2025 ? r.fechaEm2025 : r.fechaEm2026;
    if(!fecha) return 'emitido_con_desvio'; /* categoría sin fecha → con desvío */
    const mesEm = fecha.getMonth() + 1;
    /* Si la fecha de emisión está después del corte → aún no emitido en este período */
    if(mesEm > cutoff){
      /* Si el plazo del concepto (inicio + offset) es posterior al corte → pendiente_ok */
      if(espMesPlazo > cutoff) return 'pendiente_ok';
      /* Si el plazo ya pasó pero la fecha de emisión está fuera del corte → desvío */
      const mesesPasados = cutoff - espMesPlazo;
      if(anio === 2025) return 'pendiente_2025';
      if(mesesPasados > 2) return 'desvio_pendiente_mayor_2m';
      return 'desvio_emision_pendiente';
    }
    const desv = diffMeses(monthKey(fecha), esp);
    if(desv >= -1 && desv <= 1) return 'emitido_sin_desvio';
    return 'emitido_con_desvio';
  }

  /* Categoría vacía → ver si el plazo del concepto ya venció dentro del corte.
     Si el plazo (inicio de anualidad + offset del concepto) es POSTERIOR al corte →
     todavía no es momento de emitir (pendiente_ok). */
  if(espMesPlazo > cutoff) return 'pendiente_ok';

  const mesesPasados = cutoff - espMesPlazo;
  if(anio === 2025) return 'pendiente_2025';
  if(mesesPasados > 2) return 'desvio_pendiente_mayor_2m';
  return 'desvio_emision_pendiente';
}

/* ¿La póliza está vigente al cierre del mes de corte?
   Vigente 2026: vigHasta >= último día del mes de corte de 2026 y vigDesde <= ese día.
   Es decir, la cobertura sigue activa al cierre del mes indicado. */
function polizaVigente(p, anio, mesCorte){
  if(!p.vigDesde || !p.vigHasta) return false;
  const cutoff = mesCorte===0 ? 12 : mesCorte;
  /* "Vigente al corte" = la cobertura de la póliza sigue activa DURANTE el mes de corte:
     ya había empezado (vigDesde ≤ fin del mes de corte) y su vencimiento NO ocurrió antes
     del inicio de ese mes (vigHasta ≥ inicio del mes de corte). Así, si la póliza vence
     DENTRO del mes de corte (p.ej. vence el 15/5 con corte a mayo), igual cuenta como
     vigente porque estuvo vigente a esa fecha. */
  const inicioMes = new Date(anio, cutoff-1, 1);   /* 1° del mes de corte */
  const finMes    = new Date(anio, cutoff, 0);     /* último día del mes de corte */
  return p.vigDesde <= finMes && p.vigHasta >= inicioMes;
}

/* ¿La póliza emitió algo en 2026 dentro del corte? Definición NUEVA:
   - La póliza "emitió 2026" si TIENE AL MENOS UN concepto con categoría que indica emisión
     (es decir, AL MENOS un concepto en estado 'emitido_sin_desvio' o 'emitido_con_desvio')
   - Esto permite el modelo de "parcialmente emitida": una póliza puede tener Prima Mín
     emitida (categoría = "Mantiene") y Bono pendiente (categoría = vacía). */
function polizaEmitioEnAnio(p, anio, mesCorte){
  if(anio === 2026){
    if(p.tipo2026 === 'Póliza terminada') return false;
    const est = estadoPolizaConsolidado(p, mesCorte);
    return est === 'sin_desvio' || est === 'emitido_con_desvio';
  }
  /* Para 2025 mantenemos cuenta amplia (cualquier concepto emitido por monto) */
  const f = calcEmisionFiltrada(p, anio, mesCorte);
  return (f.totUSD>0 || f.totARS>0);
}

/* ¿La póliza está pendiente de emitir 2026?
   - Si la póliza tiene AL MENOS UN concepto emitido → NO está pendiente
     (cuenta como emitida con o sin desvío)
   - Si NO emitió nada Y tiene al menos un concepto pendiente con desvío → pendiente
   - Si NO emitió nada y solo tiene pendiente_ok → no es pendiente (todavía no vence) */
function polizaPendienteEmision(p, mesCorte){
  if(p.tipo2026 === 'Póliza terminada') return false;
  const est = estadoPolizaConsolidado(p, mesCorte);
  return est === 'desvio_emision_pendiente' || est === 'desvio_pendiente_mayor_2m';
}

/* ¿El pendiente es mayor a 2 meses? */
function polizaPendienteMayor2m(p, mesCorte){
  if(p.tipo2026 === 'Póliza terminada') return false;
  return estadoPolizaConsolidado(p, mesCorte) === 'desvio_pendiente_mayor_2m';
}

/* Estado consolidado de la póliza al corte — NUEVO MODELO:
   - 'no_corresponde' : todos los conceptos relevantes son no_corresponde
   - 'desvio_pendiente_mayor_2m' : algún concepto con desvío >2m
   - 'desvio_emision_pendiente' : algún concepto con desvío ≤2m (sin >2m)
   - 'emitido_con_desvio' : todos emitidos pero alguno con desvío
   - 'sin_desvio' : todos emitidos sin desvío
   - 'pendiente_ok' : algún concepto pendiente pero la anualidad aún no venció
   - 'parcialmente_emitida' : mezcla emitidos + pendientes_ok (algunos sí, otros aún no)
*/
/* Determina si un CONCEPTO (fila) está realmente emitido en 2026:
   debe tener fecha de emisión 2026 Y monto (ars o usd) > 0 dentro del corte.
   Si no, NO está emitido (está pendiente o no corresponde). */
function conceptoEmitido26(r, mesCorte){
  if(!r) return false;
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  if(state.globalMes2026 && state.globalMes2026>0) cutoff = Math.min(cutoff, state.globalMes2026);
  const entries = (r._entries26 && r._entries26.length) ? r._entries26 :
                  ((r.fechaEm2026 || r.ars2026 || r.usd2026) ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
  for(const e of entries){
    if(!(e.ars||e.usd)) continue;
    if(!e.fecha) continue;          /* sin fecha de emisión → no se considera emitido */
    if((e.fecha.getMonth()+1) <= cutoff) return true;
  }
  return false;
}
/* ¿Un CONCEPTO (prima/ajuste/bono/malus) todavía tiene cuotas PENDIENTES de emitir en 2026?
   Regla del usuario (señal definitiva de NO-pendiente):
   Un concepto (prima/ajuste/bono/malus) ya NO está pendiente cuando se cumplen LAS DOS
   condiciones a la vez:
     (1) hay MONTO emitido en 2026 para ese concepto (dinero > 0, dentro del corte), y
     (2) la CATEGORÍA tiene justificación: texto no vacío y distinto de "corresponde a la
         anualidad anterior".
   Si falta cualquiera de las dos → PENDIENTE.
   Plazo: el concepto recién puede estar pendiente cuando ya venció su plazo de emisión
   dentro del corte. La PRIMA MÍNIMA vence en el mes de inicio de la anualidad 2026;
   AJUSTE/BONO/MALUS un mes más tarde (inicio + 1). Si el plazo aún no venció → no pendiente.
   nombreConcepto: 'Prima Minima' | 'Ajuste' | 'Bono' | 'Malus'. */
function conceptoTieneCuotasPendientes(p, nombreConcepto, mesCorte){
  if(polizaTerminada(p)) return false;
  const r = p.conceptos && p.conceptos[nombreConcepto];
  if(!r) return false;
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  let cutoff26 = cutoff;
  if(state.globalMes2026 && state.globalMes2026>0) cutoff26 = Math.min(cutoff26, state.globalMes2026);
  /* Plazo del concepto: inicio de anualidad (+1 mes para ajuste/bono/malus). Si aún no
     venció dentro del corte → todavía no le toca emitir → no pendiente. */
  const espKey = mesEsperadoEmision(p.vigDesde, p.vigHasta, 2026, p.inicioAnualidad2026);
  if(espKey){
    const base = monthOfKey(espKey);
    const offset = (nombreConcepto==='Prima Minima') ? 0 : 1;
    const plazoMes = Math.min(12, base + offset);
    if(plazoMes > cutoff26) return false;
  }
  /* (1) ¿Hay MONTO emitido en 2026 dentro del corte? (en cualquiera de las dos monedas) */
  const e26 = (r._entries26 && r._entries26.length) ? r._entries26 :
              ((r.fechaEm2026 || r.ars2026 || r.usd2026) ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
  let hayMonto26 = false;
  for(const e of e26){
    if(!(e.ars||e.usd)) continue;
    if(e.fecha){ if((e.fecha.getMonth()+1) <= cutoff26){ hayMonto26 = true; break; } }
    else if(cutoff26 === 12){ hayMonto26 = true; break; }
  }
  /* (2) ¿Categoría con justificación? (texto no vacío y distinto de "anualidad anterior").
     "no corresponde" SÍ cuenta como justificación (no se emite este año → baja, no pendiente). */
  const catJustificada = !!(r.categoria && String(r.categoria).trim()) && !categoriaEsAnualidadAnterior(r.categoria);
  /* Caso EMISIÓN 2026 = 0 con categoría JUSTIFICADA (incluye "no corresponde"):
     es una baja del 100% que va a "Menor", NO a pendiente. */
  if(!hayMonto26 && catJustificada) return false;
  /* NO pendiente solo si se cumplen LAS DOS. Si falta cualquiera → pendiente. */
  return !(hayMonto26 && catJustificada);
}
/* Wrapper retrocompatible: ¿la PRIMA MÍNIMA está pendiente de emitir en 2026? */
function primaMinTienePendiente(p, mesCorte){
  return conceptoTieneCuotasPendientes(p, 'Prima Minima', mesCorte);
}
/* ¿BAJA un concepto en su moneda, comparando las MISMAS cuotas? (pedido del usuario)
   Cuando una póliza ya NO está pendiente (tiene monto + categoría) pero emitió MENOS
   cuotas en 2026 que en 2025 (p. ej. 4 de 6), NO hay que compararla contra el total 2025:
   eso la haría parecer una baja por el solo hecho de tener menos cuotas. Se comparan las N
   cuotas emitidas en 2026 contra las PRIMERAS N cuotas de 2025 (a igual cantidad). Si a igual
   cantidad de cuotas el monto 2026 no baja respecto del 2025 → NO es "menor".
   Devuelve {pm25:..., pm26:..., baja:Boolean} en la moneda pedida (usd o ars).
   Ordena las cuotas por fecha (las sin fecha al final) y respeta el corte por año. */
function conceptoBajaPareada(p, nombreConcepto, monedaUSD, mesCorte, pair25FullYear){
  const r = p.conceptos && p.conceptos[nombreConcepto];
  const campo = monedaUSD ? 'usd' : 'ars';
  if(!r) return {pm25:0, pm26:0, baja:false};
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  let cutoff26 = cutoff;
  if(state.globalMes2026 && state.globalMes2026>0) cutoff26 = Math.min(cutoff26, state.globalMes2026);
  const tomar = (entries, cut)=>{
    const arr = (entries && entries.length) ? entries : [];
    const v = [];
    for(const e of arr){
      const val = Math.abs(e[campo]||0);
      if(!val) continue;                 /* cuota sin monto en esta moneda → no se cuenta */
      if(e.fecha){ if((e.fecha.getMonth()+1) <= cut) v.push({mes:e.fecha.getMonth()+1, val}); }
      else if(cut === 12) v.push({mes:99, val});  /* sin fecha → al final, solo a año completo */
    }
    v.sort((a,b)=>a.mes-b.mes);
    return v;
  };
  const e25 = (r._entries25 && r._entries25.length) ? r._entries25 :
              ((r.fechaEm2025 || r.ars2025 || r.usd2025) ? [{fecha:r.fechaEm2025, ars:r.ars2025||0, usd:r.usd2025||0}] : []);
  const e26 = (r._entries26 && r._entries26.length) ? r._entries26 :
              ((r.fechaEm2026 || r.ars2026 || r.usd2026) ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
  /* Para parear cuotas, el AÑO ANTERIOR (2025) es la referencia y ya está cerrado:
     no debe recortarse por el mes de corte, porque la misma cuota puede emitirse en
     meses distintos en cada año (p.ej. bono 2025 en septiembre vs 2026 en mayo). Si
     filtramos 2025 por el corte, perderíamos esa cuota y el desvío quedaría inflado.
     pair25FullYear=true compara contra el 2025 completo (igual que la columna Desvío
     del Excel, que usa el total emitido del año). */
  const c25 = tomar(e25, pair25FullYear ? 12 : cutoff);
  const c26 = tomar(e26, cutoff26);
  const n = c26.length;                  /* cantidad de cuotas EMITIDAS en 2026 */
  /* ¿La categoría tiene justificación que cuente como BAJA real? Debe tener texto y NO ser
     "anualidad anterior" (eso significa que el monto es de la anualidad previa → pendiente).
     IMPORTANTE: "no corresponde" SÍ es una justificación de baja (significa que ESTE año no
     se emite ese concepto), así que cuenta como "menor" (desvío del 100%). */
  const catJustificada = !!(r.categoria && String(r.categoria).trim())
                         && !categoriaEsAnualidadAnterior(r.categoria);
  if(n === 0){
    /* EMISIÓN 2026 = 0 → baja del 100% respecto del 2025 (regla del usuario). Para saber si
       cuenta como "menor" hay que MIRAR LA CATEGORÍA:
         - categoría con palabra justificada, INCLUIDO "no corresponde" (= no se emite este
           concepto este año) → SÍ es "menor": baja total = todo 2025 (desvío −100%).
         - categoría vacía o "corresponde a la anualidad anterior" → NO es "menor"
           (es emisión pendiente: no hay explicación de por qué no se emitió). */
    const sum25total = c25.reduce((a,x)=>a+x.val, 0);
    if(catJustificada && sum25total > 0.5){
      return {pm25:sum25total, pm26:0, baja:true};
    }
    return {pm25:sum25total, pm26:0, baja:false};
  }
  /* Sumar las N cuotas 2026 contra las PRIMERAS N cuotas 2025 (a igual cantidad). */
  const sum26 = c26.reduce((a,x)=>a+x.val, 0);
  const sum25 = c25.slice(0, n).reduce((a,x)=>a+x.val, 0);
  return {pm25:sum25, pm26:sum26, baja: sum26 < sum25 - 0.5};
}

/* ¿La PRIMA MÍNIMA del año `anio` tiene al menos una emisión dentro del corte?
   Se usa como REFERENCIA para ubicar a la póliza en un mes (pedido del usuario):
   la proyección, la tasa y las siniestralidades de un año solo cuentan si la prima
   mínima de ese año ya se emitió hasta la fecha acumulada. Respeta globalMes2026
   para 2026. Devuelve true/false. */
function primaMinEmitidaCorte(p, anio, mesCorte){
  const r = p.conceptos && p.conceptos['Prima Minima'];
  if(!r) return false;
  let cutoff = mesCorte===0 ? 12 : mesCorte;
  if(anio===2026 && state.globalMes2026 && state.globalMes2026>0) cutoff = Math.min(cutoff, state.globalMes2026);
  const entries = anio===2025
    ? ((r._entries25 && r._entries25.length) ? r._entries25 : ((r.fechaEm2025||r.ars2025||r.usd2025) ? [{fecha:r.fechaEm2025, ars:r.ars2025||0, usd:r.usd2025||0}] : []))
    : ((r._entries26 && r._entries26.length) ? r._entries26 : ((r.fechaEm2026||r.ars2026||r.usd2026) ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []));
  for(const e of entries){
    if(!(e.ars||e.usd)) continue;
    if(e.fecha){ if((e.fecha.getMonth()+1) <= cutoff) return true; }
    else if(cutoff === 12) return true;
  }
  return false;
}
/* ============================================================
   DESVÍO DE UN CONCEPTO ABM (Ajuste / Bono / Malus) — FUENTE ÚNICA
   (pedido del usuario). Decide si el concepto entra en el desvío
   "Menor Ajuste / Bono / Malus" y devuelve el monto CON SIGNO por
   moneda, usando la columna Desvío del Excel como verdad.
   Lógica (regla del usuario):
   1) Excluir terminadas, sin el concepto, o categoría vacía /
      "corresponde a la anualidad anterior" (esos están PENDIENTES,
      no son "menor emisión").
   2) Excluir si el concepto aún tiene cuotas PENDIENTES de emitir.
   3) Categoría "No corresponde" → en 2026 se emitió un endoso $0/US0
      por ese concepto. El desvío es la emisión 2025 COMPLETA del
      concepto (signo correcto), SIN importar el mes de corte (la
      emisión 2025 puede haber caído en cualquier mes; igual cuenta).
      Esto cubre el caso de la póliza de Granar (Ajuste 2025 = 20M,
      2026 = 0, "No corresponde" → desvío −20M) aunque el Ajuste 2025
      se haya emitido en julio y el corte sea anterior.
   4) Categoría emitida normal (Mantiene/Incremento/Disminución/etc.):
      solo entra si BAJÓ en alguna moneda (comparación pareada de
      mismas cuotas). El monto sale de la columna Desvío del Excel.
   El SIGNO sale del Excel: negativo = menor emisión (desvío en contra,
   rojo −); positivo = mayor emisión (a favor, verde +). Esto corrige
   el caso del BONO negativo (devolución) que al pasar a "No corresponde"
   SUBE la emisión y debe contarse a favor (+), no como desvío.
   Devuelve {entra, mARS, mUSD, montoOrig} (montoOrig = monto en la
   moneda original de la póliza, con signo). ============================================================ */
function desvioConceptoABM(p, nombreConcepto, mesCorte){
  const r = p.conceptos && p.conceptos[nombreConcepto];
  if(!r) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  if(polizaTerminada(p)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  const catTxt = r.categoria ? String(r.categoria).trim() : '';
  /* ===== BONO (regla del usuario) =====
     El bono es nota de crédito (negativo). Si AUMENTA de un año a otro (se hace MÁS
     negativo: 0 → −100, −4 → −10, etc.) ese incremento es un DESVÍO, porque emitir más
     bono nos resta emisión. Se EXCLUYEN las pólizas cuya categoría (Excel) sea "Anualidad
     Anterior". El desvío es la DIFERENCIA: −4 → −10 ⇒ −6 (solo cuando se hizo más negativo). */
  if(nombreConcepto === 'Bono'){
    if(categoriaEsAnualidadAnterior(catTxt)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
    /* MISMO criterio de diferencia que el resto (cuotas PAREADAS, igual N). conceptoBajaPareada
       devuelve magnitudes |bono| por moneda. El bono "aumenta" (peor) cuando |bono2026| >
       |bono2025|; el desvío es ese AUMENTO en negativo (−6 para −4 → −10). */
    const parA = conceptoBajaPareada(p, 'Bono', false, mesCorte, true);
    const parU = conceptoBajaPareada(p, 'Bono', true, mesCorte, true);
    const incA = parA.pm26 - parA.pm25;
    const incU = parU.pm26 - parU.pm25;
    let dARS = incA > 0.5 ? -incA : 0;
    let dUSD = incU > 0.5 ? -incU : 0;
    if(Math.abs(dARS) < 0.5 && Math.abs(dUSD) < 0.5) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
    const montoOrig = (p.moneda==='US') ? dUSD : dARS;
    return {entra:true, mARS:dARS, mUSD:dUSD, montoOrig};
  }
  /* (1) categoría con texto y que NO sea "anualidad anterior" */
  const cuentaCat = !!catTxt && !categoriaEsAnualidadAnterior(catTxt);
  if(!cuentaCat) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  /* (2) sin cuotas pendientes */
  if(conceptoTieneCuotasPendientes(p, nombreConcepto, mesCorte)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  const esNoCorr = categoriaEsNoCorresponde(catTxt);
  /* Monto base: columna Desvío del Excel (signo correcto). */
  let dARS = (typeof r.desvioARS==='number') ? r.desvioARS : null;
  let dUSD = (typeof r.desvioUSD==='number') ? r.desvioUSD : null;
  if(esNoCorr){
    /* (3) endoso $0/US0 → desvío = −(emisión 2025 completa del concepto).
       Si el Excel no trajo desvío numérico, lo calculamos con el 2025 completo. */
    if(dARS==null) dARS = -(r.ars2025||0);
    if(dUSD==null) dUSD = -(r.usd2025||0);
  } else {
    /* (4) categoría emitida: solo entra si bajó en alguna moneda. */
    const parA = conceptoBajaPareada(p, nombreConcepto, false, mesCorte);
    const parU = conceptoBajaPareada(p, nombreConcepto, true, mesCorte);
    if(!parA.baja && !parU.baja) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
    if(dARS==null) dARS = -Math.max(0, parA.pm25 - parA.pm26);
    if(dUSD==null) dUSD = -Math.max(0, parU.pm25 - parU.pm26);
  }
  dARS = dARS||0; dUSD = dUSD||0;
  /* Debe haber algo material en alguna moneda. */
  if(Math.abs(dARS) < 0.5 && Math.abs(dUSD) < 0.5) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  const montoOrig = (p.moneda==='US') ? dUSD : dARS;
  return {entra:true, mARS:dARS, mUSD:dUSD, montoOrig};
}
/* Desvío de la PRIMA MÍNIMA cuando la categoría dice "No corresponde"
   (endoso $0/US0): mismo criterio que ABM, monto = emisión 2025 completa
   con signo (desvío del Excel si vino numérico). Para el resto de los
   casos de prima se sigue usando conceptoBajaPareada (sin cambios). */
function primaNoCorrespondeDesvio(p, mesCorte){
  const r = p.conceptos && p.conceptos['Prima Minima'];
  if(!r) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  if(polizaTerminada(p)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  const catTxt = r.categoria ? String(r.categoria).trim() : '';
  if(!categoriaEsNoCorresponde(catTxt)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  if(conceptoTieneCuotasPendientes(p, 'Prima Minima', mesCorte)) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  let dARS = (typeof r.desvioARS==='number') ? r.desvioARS : -(r.ars2025||0);
  let dUSD = (typeof r.desvioUSD==='number') ? r.desvioUSD : -(r.usd2025||0);
  dARS = dARS||0; dUSD = dUSD||0;
  if(Math.abs(dARS) < 0.5 && Math.abs(dUSD) < 0.5) return {entra:false, mARS:0, mUSD:0, montoOrig:0};
  const montoOrig = (p.moneda==='US') ? dUSD : dARS;
  return {entra:true, mARS:dARS, mUSD:dUSD, montoOrig};
}
/* ¿La póliza terminó? (tipo dice "terminada") */
function polizaTerminada(p){
  return /terminada/i.test(p.tipo2026||'') || /terminada/i.test(p.tipo2025||'');
}

/* Tipo de pendiente cuando la póliza está pendiente de emitir 2026, según
   reglas del negocio (pedido del usuario):
     · Si "Inicio Anualidad 2026" > "Vigencia Hasta" → la anualidad arranca
       DESPUÉS del fin de la vigencia, así que lo pendiente es la RENOVACIÓN
       (la póliza tiene que renovarse para cubrir el nuevo período).
     · Si "Inicio Anualidad 2026" ≤ "Vigencia Hasta" → la nueva anualidad cae
       DENTRO del período vigente, así que lo pendiente es la SEGUNDA (o
       tercera, etc.) anualidad de la misma póliza.
     · Si falta alguna fecha → 'desconocido' (se muestra label genérico).
   Devuelve 'renovacion' | 'segunda' | 'desconocido'. */
function tipoPendientePol(p){
  if(!p || !p.inicioAnualidad2026 || !p.vigHasta) return 'desconocido';
  return p.inicioAnualidad2026 > p.vigHasta ? 'renovacion' : 'segunda';
}
function etiquetaTipoPendiente(p){
  const t = tipoPendientePol(p);
  if(t==='renovacion') return 'Pendiente renovación';
  if(t==='segunda')    return 'Pendiente 2ª anualidad';
  return 'Pendiente';
}

function estadoPolizaConsolidado(p, mesCorte){
  /* MODELO COHERENTE para acumulado:
     - Si terminada → 'terminada'
     - "Anualidad Emitida 2026" se define como: tiene PRIMA MÍNIMA 2026 emitida
       (con monto > 0 dentro del corte) Y la categoría de esa Prima Mínima NO
       indica "Anualidad Anterior" (en cuyo caso el monto corresponde a la
       anualidad previa, no a la nueva).
     - Si la póliza no tiene Prima Mínima 2026 propia → clasificar por pendientes
       o estados de otros conceptos.
  */
  if(p.tipo2026 === 'Póliza terminada') return 'terminada';

  const cutoff = mesCorte===0 ? 12 : mesCorte;

  /* Verificar si la PRIMA MÍNIMA está emitida en 2026 dentro del corte.
     Si el toggle de "Anualidad Anterior" está en "incluir" (sumar), también
     consideramos como emitida la Prima Mín. con categoría "anualidad anterior".
     Si está en "excluir", la excluimos (default histórico). */
  const incluirAnualAnt = !(state._activeCtx && state._activeCtx.excluirAnualAnt);
  const rPM = p.conceptos['Prima Minima'];
  let primaMin26Emitida = false;
  if(rPM){
    const noEsAnualAnterior = !categoriaEsAnualidadAnterior(rPM.categoria);
    /* Hay monto 2026 dentro del corte: revisamos las entradas individuales para respetar mesCorte */
    const entries26 = (rPM._entries26 && rPM._entries26.length) ? rPM._entries26 :
                       (rPM.fechaEm2026 || rPM.ars2026 || rPM.usd2026 ? [{fecha:rPM.fechaEm2026, ars:rPM.ars2026||0, usd:rPM.usd2026||0}] : []);
    let tieneMontoEnCorte = false;
    for(const e of entries26){
      if(!(e.ars||e.usd)) continue;
      if(e.fecha){
        if((e.fecha.getMonth()+1) <= cutoff){ tieneMontoEnCorte = true; break; }
      } else if(cutoff === 12){
        tieneMontoEnCorte = true; break;
      }
    }
    /* CLAVE (pedido del usuario): la prima mínima con categoría "anualidad anterior"
       NUNCA cuenta como emisión del período actual. Tiene que haber al menos una prima
       mínima que corresponda a ESTA anualidad para no estar pendiente. */
    primaMin26Emitida = noEsAnualAnterior && tieneMontoEnCorte;
  }

  let hasEmit=false, hasEmitDesv=false, hasEmitSinDesv=false;
  let hasPendMayor=false, hasPendMenor=false, hasPendOk=false, hasNoCorresponde=false;
  for(const c of CONCEPTOS_EMISIBLES){
    const e = estadoConcepto(p, c, 2026, mesCorte);
    if(e === 'emitido_con_desvio'){ hasEmit=true; hasEmitDesv=true; }
    else if(e === 'emitido_sin_desvio'){ hasEmit=true; hasEmitSinDesv=true; }
    else if(e === 'desvio_pendiente_mayor_2m') hasPendMayor=true;
    else if(e === 'desvio_emision_pendiente') hasPendMenor=true;
    else if(e === 'pendiente_ok') hasPendOk=true;
    else if(e === 'no_corresponde') hasNoCorresponde=true;
  }
  /* REGLA NUEVA: solo se considera "emitida 2026" si la Prima Mínima 2026 está efectivamente emitida
     y NO es de la anualidad anterior. Si tiene emisión en otros conceptos pero NO Prima Mínima
     válida del 2026 → no es "anualidad emitida 2026". */
  if(primaMin26Emitida){
    if(hasEmitDesv) return 'emitido_con_desvio';
    return 'sin_desvio';
  }
  /* Sin Prima Mínima 2026 válida: clasificar por pendientes */
  if(hasPendMayor) return 'desvio_pendiente_mayor_2m';
  if(hasPendMenor) return 'desvio_emision_pendiente';
  if(hasPendOk) return 'pendiente_ok';
  if(hasNoCorresponde) return 'no_corresponde';
  /* CASO RENOVACIÓN PENDIENTE (pedido del usuario):
     Si la póliza NO está terminada por tipo, NO tiene prima mínima 2026 válida, y su
     vigencia ya venció o vence dentro del año de análisis (es decir, ya debería haberse
     renovado/emitido la anualidad 2026), entonces está PENDIENTE la renovación.
     mesEsperadoEmision da null para pólizas vencidas, por eso no entró en hasPend*. */
  if(!polizaTerminada(p) && !primaMin26Emitida && p.vigHasta){
    const cutoffMes = mesCorte===0 ? 12 : mesCorte;
    const finCorte = new Date(2026, cutoffMes-1, 28);
    /* Venció antes o durante el período de corte de 2026 → la renovación debió emitirse */
    const vencioDentroDe2026oAntes = p.vigHasta <= finCorte;
    /* Tuvo actividad previa (emitió en 2025 o tiene vigencia que arrancó antes) → es
       una póliza que existía y debería renovar, no una nueva. */
    const teniaVigencia = p.vigDesde && p.vigDesde < finCorte;
    if(vencioDentroDe2026oAntes && teniaVigencia){
      return 'desvio_pendiente_mayor_2m'; /* pendiente la renovación */
    }
  }
  return null;
}

/* ============================================================
   FILTROS GLOBALES POR SECCIÓN
   Cada sección tiene 4 filtros independientes que se aplican
   uniformemente. Estado persistido en state.sectionFilters[sectionId].
   - mes: 0-12 (0=todo el año, 1-12=acumulado hasta ese mes)
   - universo: 'todos' | 'emit26' (todas las pólizas vs solo las emitidas en 2026)
   - cur: 'dual' | 'usd' | 'ars' (Ambas/USD/ARS)
   - segmento: 'all' | 'arsArs' | 'usdUsd' | 'vs' (Todas/$en$/USenUS/Comparación)
============================================================ */
state.sectionFilters = {};
function getSectionFilters(sectionId){
  if(!state.sectionFilters[sectionId]){
    state.sectionFilters[sectionId] = {mes: 0, universo:'todos', cur:'dual', segmento:'all', polNuevas:'incluir', anualAnt:'incluir', tc:null, proy:0};
  }
  /* Compat: si el filtro existía sin polNuevas/anualAnt, agregarlo */
  if(!state.sectionFilters[sectionId].polNuevas) state.sectionFilters[sectionId].polNuevas = 'incluir';
  if(!state.sectionFilters[sectionId].anualAnt) state.sectionFilters[sectionId].anualAnt = 'excluir';
  if(!('tc' in state.sectionFilters[sectionId])) state.sectionFilters[sectionId].tc = null;
  if(!('proy' in state.sectionFilters[sectionId])) state.sectionFilters[sectionId].proy = 0;
  /* UNIFICADO (pedido del usuario): el "Mes de corte" es UNO solo. El acumulado (f.mes) que
     filtra AMBOS años sigue al mes de corte global (state.globalMes2026). Así un único botón
     fija "dónde estamos parados" (2026) Y "acumular 2025/2026 hasta ese mes". */
  state.sectionFilters[sectionId].mes = state.globalMes2026 || 0;
  return state.sectionFilters[sectionId];
}

/* Bind: cuando cambia cualquier filtro, dispara onChange(filters).
   IMPORTANTE: el "Acumulado hasta" es PER-SECCIÓN (filtra ambos años 2025 y 2026).
   El "Mes Corte 2026" (botón global en cabecera) es DISTINTO y solo filtra 2026. */
function bindSectionFilters(sectionId, onChange){
  const gMesId = `${sectionId}_SF_globalMes`;
  const mesId  = `${sectionId}_SF_mes`;
  const univId = `${sectionId}_SF_universo`;
  const curId  = `${sectionId}_SF_cur`;
  const segId  = `${sectionId}_SF_segmento`;
  const nuevId = `${sectionId}_SF_polNuevas`;
  const aantId = `${sectionId}_SF_anualAnt`;
  const trigger = ()=>{
    const f = getSectionFilters(sectionId);
    /* f.mes (acumulado) sigue al mes de corte unificado (getSectionFilters ya lo deriva de
       state.globalMes2026). */
    f.universo = getCur(univId,'todos');
    f.cur = getCur(curId,'dual');
    f.segmento = 'all'; /* Segmento eliminado: siempre todas las monedas */
    f.polNuevas = getCur(nuevId,'incluir');
    f.anualAnt = getCur(aantId,'excluir');
    if(onChange) onChange(f);
  };
  /* 1° Mes de corte 2026 UNIFICADO (desplegable) — un solo botón que fija "dónde estamos
     parados" (2026) Y el acumulado de AMBOS años hasta ese mes. Afecta a todas las secciones
     (state.globalMes2026) y dispara un re-render completo. */
  const gSel = document.getElementById(gMesId);
  if(gSel) gSel.addEventListener('change', ()=>{
    const v = parseInt(gSel.value,10) || 0;
    if(v === state.globalMes2026) return;
    state.globalMes2026 = v;
    /* Sincronizar el botón legacy de la cabecera (si todavía existe) */
    const lbl = document.getElementById('globalMesBtnLabel');
    if(lbl) lbl.textContent = v===0 ? 'Todo el año' : MESES[v-1].toUpperCase();
    setCur('GLOBAL_mes', String(v));
    if(typeof renderAll==='function') renderAll();
  });
  bindCur(univId, trigger);
  bindCur(curId, trigger);
  bindCur(segId, trigger);
  bindCur(nuevId, trigger);
  bindCur(aantId, trigger);
  /* 7° TC: input numérico. Al cambiar (input o Enter), recalcula el equivalente de lo
     PENDIENTE. Valor vacío o <=0 → sin TC (vuelve al equivalente real del Excel). */
  const tcEl = document.getElementById(`${sectionId}_SF_tc`);
  if(tcEl){
    const onTc = ()=>{
      const f = getSectionFilters(sectionId);
      const v = parseFloat(tcEl.value);
      f.tc = (isFinite(v) && v>0) ? v : null;
      if(onChange) onChange(f);
    };
    tcEl.addEventListener('change', onTc);
    tcEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); onTc(); } });
  }
}

/* Helper: setear el contexto activo de cálculo desde los filtros de la sección.
   Llamar al inicio de cada draw* para que calcEmisionFiltrada (y todo lo derivado)
   respete los toggles de Anualidad Anterior. */
function setActiveCtx(filters){
  state._activeCtx = {
    excluirAnualAnt: (filters && filters.anualAnt === 'excluir'),
    tcPendiente: (filters && typeof filters.tc==='number' && filters.tc>0) ? filters.tc : null,
  };
}
/* Convierte un PENDIENTE a su par {ars, usd} usando el TC del filtro (si está activo).
   Regla del usuario (solo lo pendiente):
   - El monto en la moneda ORIGINAL de la póliza NO se toca.
   - El equivalente en la OTRA moneda se recalcula con el TC:
       · póliza $  → usd = ars / TC
       · póliza US → ars = usd * TC
   Si no hay TC activo, devuelve el par original tal cual (equivalente real del Excel).
   `monedaOrig` = '$' | 'US'. */
function convertirPendienteTC(ars, usd, monedaOrig){
  const tc = state._activeCtx && state._activeCtx.tcPendiente;
  if(!tc || tc<=0) return {ars: ars||0, usd: usd||0};
  if(monedaOrig === 'US'){
    /* US se mantiene; $ = US * TC */
    return {ars: (usd||0) * tc, usd: usd||0};
  }
  /* $ se mantiene; US = $ / TC */
  return {ars: ars||0, usd: (ars||0) / tc};
}

/* Helpers para acceder a montos 2026 de un concepto respetando:
   1) el filtro "Excluir Anualidad Anterior", y
   2) el "Mes Corte 2026" global (simula estar parado a fin de ese mes → no cuenta
      emisiones posteriores). Si globalMes2026=0, cuenta el año completo. */
function _corte26Entries(r, campo){
  /* Suma el campo ('ars'|'usd') de las entradas 2026 que caen dentro del corte global.
     Entradas SIN fecha solo cuentan si no hay corte global activo (año completo). */
  const cut = (state.globalMes2026 && state.globalMes2026 > 0) ? state.globalMes2026 : 12;
  const entries = (r._entries26 && r._entries26.length) ? r._entries26 :
       (r.fechaEm2026 || r.ars2026 || r.usd2026 ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
  let sum = 0;
  for(const e of entries){
    const val = e[campo] || 0;
    if(!val) continue;
    if(e.fecha){ if((e.fecha.getMonth()+1) <= cut) sum += val; }
    else { if(cut === 12) sum += val; }
  }
  return sum;
}
function get26ars(r){
  if(!r) return 0;
  if(state._activeCtx && state._activeCtx.excluirAnualAnt && categoriaEsAnualidadAnterior(r.categoria)) return 0;
  return _corte26Entries(r, 'ars');
}
function get26usd(r){
  if(!r) return 0;
  if(state._activeCtx && state._activeCtx.excluirAnualAnt && categoriaEsAnualidadAnterior(r.categoria)) return 0;
  return _corte26Entries(r, 'usd');
}
/* Entradas 2026 filtradas por Anualidad Anterior Y por el Mes Corte 2026 global. */
function get26entries(r){
  if(!r) return [];
  if(state._activeCtx && state._activeCtx.excluirAnualAnt && categoriaEsAnualidadAnterior(r.categoria)) return [];
  const cut = (state.globalMes2026 && state.globalMes2026 > 0) ? state.globalMes2026 : 12;
  const entries = (r._entries26 && r._entries26.length) ? r._entries26 :
         (r.fechaEm2026 || r.ars2026 || r.usd2026 ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
  return entries.filter(e=>{
    if(!(e.ars||e.usd)) return false;
    if(e.fecha) return (e.fecha.getMonth()+1) <= cut;
    return cut === 12;
  });
}

/* Helper: construir etiqueta consolidada de filtros activos para el N-label */
function lblFiltrosActivos(f){
  const lblUniv = f.universo==='emit26'?'Emitidas 2026':'Todas';
  const lblSeg  = f.segmento==='arsArs'?'$ en $':(f.segmento==='usdUsd'?'US en US':(f.segmento==='vs'?'US vs $':'Todas las monedas'));
  const labelPer = f.mes===0?'año completo':`acumulado Ene–${MESES[f.mes-1]}`;
  const lblNue = (f.polNuevas==='excluir') ? ' · <span style="color:var(--warn);font-weight:700">sin pólizas nuevas</span>' : '';
  const lblAA = (f.anualAnt==='incluir') ? ' · <span style="color:var(--warn);font-weight:700">+ anualidad anterior</span>' : '';
  return `${lblUniv} · ${lblSeg} · ${labelPer}${lblNue}${lblAA}`;
}

/* Helper: aplicar filtros a un array de pólizas. Devuelve un subset */
function aplicarFiltrosPolizas(polizas, filters){
  let arr = polizas;
  if(filters.universo === 'emit26'){
    /* Coherente con estadoPolizaConsolidado: una póliza está "Emitida 2026" si
       su Prima Mínima 2026 está emitida con monto > 0 dentro del corte.
       Si el toggle anualAnt es 'excluir' (default), descartamos las "anualidad anterior".
       Si está en 'incluir', las sumamos. */
    const mesCorte = filters.mes || 0;
    let cutoff = mesCorte === 0 ? 12 : mesCorte;
    /* El "Mes Corte 2026" global simula estar parado a fin de ese mes: acota 2026. */
    if(state.globalMes2026 && state.globalMes2026 > 0) cutoff = Math.min(cutoff, state.globalMes2026);
    const incluirAA = (filters.anualAnt === 'incluir');
    arr = arr.filter(p=>{
      const r = p.conceptos['Prima Minima'];
      if(!r) return false;
      if(!incluirAA && r.categoria && /anualidad\s+anterior/i.test(String(r.categoria))) return false;
      const entries26 = (r._entries26 && r._entries26.length) ? r._entries26 :
                         (r.fechaEm2026 || r.ars2026 || r.usd2026 ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []);
      for(const e of entries26){
        if(!(e.ars||e.usd)) continue;
        if(e.fecha){ if((e.fecha.getMonth()+1) <= cutoff) return true; }
        else if(cutoff === 12) return true;
      }
      return false;
    });
  }
  if(filters.segmento === 'arsArs') arr = arr.filter(p=>p.moneda==='$');
  else if(filters.segmento === 'usdUsd') arr = arr.filter(p=>p.moneda==='US');
  /* 'all' y 'vs' = no filtran (vs muestra ambas comparativamente) */

  /* 5° filtro: Pólizas Nuevas 2025/2026 */
  if(filters.polNuevas === 'excluir'){
    arr = arr.filter(p=> p.tipo2025!=='Póliza nueva' && p.tipo2026!=='Póliza nueva');
  }
  return arr;
}

/* Helper: efectivos showUSD/showARS según filtros (segmento manda sobre cur) */
function efectivoMonedas(filters){
  if(filters.segmento === 'arsArs') return {showUSD:false, showARS:true};
  if(filters.segmento === 'usdUsd') return {showUSD:true, showARS:false};
  if(filters.segmento === 'vs') return {showUSD:true, showARS:true}; /* en comparación, ambas */
  /* segment all → respeta cur */
  return {
    showUSD: filters.cur !== 'ars',
    showARS: filters.cur !== 'usd',
  };
}
/* ============================================================
   RENDER PRINCIPAL
============================================================ */
function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); Object.keys(charts).forEach(k=>delete charts[k]); }

/* mapa de monedas seleccionadas por componente, persistente */
const _curState = {};
function getCur(id, def){ if(!(id in _curState)) _curState[id] = def||'dual'; return _curState[id]; }
function setCur(id, v){ _curState[id] = v; }

/* Toggle 3-modos (Ambas/USD/ARS$) — SIEMPRE muestra activo el seleccionado */
function curToggleHTML(id, opts={}){
  const cur = getCur(id, opts.def||'dual');
  const showDual = opts.showDual!==false;

/* Toggle de vista (genérico) */
function viewToggleHTML(id, options, def){

  }</div>`;

let _togglesBound = false;
function bindGlobalToggles(){
  if(_togglesBound) return; _togglesBound = true;
  /* Preservar el scroll de la página al togglear filtros/botones que re-renderizan
     (pedido del usuario: que la hoja no salte, en TODAS las hojas). Se captura la
     posición ANTES del re-render (fase de captura) y se restaura después. */
  const _preserveScroll = ()=>{
    const y = window.scrollY || window.pageYOffset || 0;
    /* Los gráficos (Chart.js) reflowean DESPUÉS del re-render y mueven la vista.
       Restauramos en cada frame por ~1s, PERO si el usuario scrollea a propósito
       (rueda/touch) cortamos para no pelearnos con él. */
    let stop = false;
    const onUser = ()=>{ stop = true; };
    window.addEventListener('wheel', onUser, {passive:true});
    window.addEventListener('touchmove', onUser, {passive:true});
    const start = Date.now();
    const cleanup = ()=>{ window.removeEventListener('wheel', onUser); window.removeEventListener('touchmove', onUser); };
    const tick = ()=>{
      if(stop){ cleanup(); return; }
      if(Math.abs((window.scrollY||0)-y) > 2) window.scrollTo(0, y);
      if(Date.now()-start < 1000) requestAnimationFrame(tick); else cleanup();
    };
    requestAnimationFrame(tick);
  };
  document.addEventListener('click', (e)=>{
    if(e.target.closest('button,[data-vt] button,[data-curt] button,[onclick]')) _preserveScroll();
  }, true);
  document.addEventListener('change', (e)=>{
    if(e.target.closest('select,input')) _preserveScroll();
  }, true);
  document.body.addEventListener('click', (ev)=>{
    /* Currency toggles */
    const ct = ev.target.closest('[data-curt] button');
    if(ct){
      const wrap = ct.closest('[data-curt]');
      const id = wrap.dataset.curt;
      const cur = ct.dataset.curr;
      setCur(id, cur);
      wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===ct));
      const cb = _curCallbacks[id];
      if(cb) cb(cur);
      return;
    }
    /* View toggles */
    const vt = ev.target.closest('[data-vt] button');
    if(vt){
      const wrap = vt.closest('[data-vt]');
      const id = wrap.dataset.vt;
      const v = vt.dataset.vv;
      setCur(id, v);

function totalesGlobales(mesCorte, polizasArr){
  const arr = polizasArr || state.polizas;
  let totARS25=0, totARS26=0, totUSD25=0, totUSD26=0;
  const concARS25 = {primaMin:0,ajuste:0,bono:0,malus:0};
  const concARS26 = {primaMin:0,ajuste:0,bono:0,malus:0};
  const concUSD25 = {primaMin:0,ajuste:0,bono:0,malus:0};
  const concUSD26 = {primaMin:0,ajuste:0,bono:0,malus:0};
  let arsArs25=0,arsArs26=0, usdUsd25=0, usdUsd26=0;
  let countArs=0, countUsd=0;
  const conArsArs25={primaMin:0,ajuste:0,bono:0,malus:0};
  const conArsArs26={primaMin:0,ajuste:0,bono:0,malus:0};
  const conUsdUsd25={primaMin:0,ajuste:0,bono:0,malus:0};
  const conUsdUsd26={primaMin:0,ajuste:0,bono:0,malus:0};
  for(const p of arr){
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    totARS25 += f25.totARS; totARS26 += f26.totARS;
    totUSD25 += f25.totUSD; totUSD26 += f26.totUSD;
    for(const k of Object.keys(concARS25)){
      concARS25[k] += f25.breakdownARS[k]; concARS26[k] += f26.breakdownARS[k];
      concUSD25[k] += f25.breakdownUSD[k]; concUSD26[k] += f26.breakdownUSD[k];
    }
    if(p.moneda==='$'){
      arsArs25 += f25.totARS; arsArs26 += f26.totARS; countArs++;
      for(const k of Object.keys(conArsArs25)){
        conArsArs25[k] += f25.breakdownARS[k]; conArsArs26[k] += f26.breakdownARS[k];
      }
    } else if(p.moneda==='US'){
      usdUsd25 += f25.totUSD; usdUsd26 += f26.totUSD; countUsd++;
      for(const k of Object.keys(conUsdUsd25)){
        conUsdUsd25[k] += f25.breakdownUSD[k]; conUsdUsd26[k] += f26.breakdownUSD[k];
      }
    }
  }
  return {
    totARS25,totARS26,totUSD25,totUSD26,
    concARS25,concARS26,concUSD25,concUSD26,
    arsArs25,arsArs26,usdUsd25,usdUsd26,countArs,countUsd,
    conArsArs25,conArsArs26,conUsdUsd25,conUsdUsd26,
    nPolizas: arr.length,
  };
}
