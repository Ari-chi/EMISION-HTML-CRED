  /* Pendiente de siniestralidad (UV o H): 2025 → "Pendiente". */
  const filaSinPend = (lbl)=>(r)=>{
    const motivo = r.esAA ? 'Anualidad Anterior' : 'sin categoría';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px;align-items:baseline"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${lbl} ${FMT_PCT_SIN(r.s25)} → <span style="color:#4ba3c7;font-weight:800;background:rgba(75,163,199,.10);padding:1px 7px;border-radius:4px">Pendiente</span></span></div>
      <div style="font-size:12px;color:var(--ink-3);font-style:italic;margin-top:2px">${motivo}${r.det?' · '+String(r.det).substring(0,60):''}</div>
    </div>`;
  };
  /* Fila para TASA (porcentaje con 3 decimales) */
  const filaTasa = (r)=>{
    const cc = r.d>=0?'var(--pos)':'var(--neg)';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${FMT_PCT_TASA(r.t25)} → ${FMT_PCT_TASA(r.t26)} <span style="color:${cc};font-weight:800">${r.d>=0?'+':''}${FMT_PCT_TASA(r.d)}${r.t25?` (${(r.d>=0?'+':'')+FMT_PCT(r.d/Math.abs(r.t25))})`:''}</span></span></div>
      ${miniJustif(r.cat,r.det)}</div>`;
  };
  /* Fila para SINIESTRALIDAD (UV o H) — porcentaje; subir siniestralidad es malo */
  const filaSin = (lbl)=>(r)=>{
    const cc = r.d>=0?'var(--neg)':'var(--pos)';
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:14.5px"><span><strong>${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2)">${(r.asegurado||'').substring(0,24)}</span> <span style="font-size:12px;color:${r.moneda==='US'?'var(--pos)':'var(--accent)'};font-weight:700">${r.moneda}</span></span>
      <span style="font-family:var(--font-mono);font-weight:700">${lbl} ${FMT_PCT_SIN(r.s25)} → ${FMT_PCT_SIN(r.s26)} <span style="color:${cc};font-weight:800">(${r.d>=0?'+':''}${FMT_PCT_SIN(r.d)})</span></span></div>
      ${miniJustif(r.cat,r.det)}</div>`;
  };
  /* ===== Acordeón anidado =====
     Nivel 1: concepto (Proyección, Tasa, ...) → al tocar despliega sus direcciones.
     Nivel 2: dirección (Aumentos / Disminuciones) → al tocar despliega las pólizas.
     Todo arranca colapsado. IDs únicos por rubro (idx) + concepto + dirección. */
  const flecha = (open)=>`<span class="ejr-caret" style="display:inline-block;transition:transform .15s;transform:rotate(${open?90:0}deg);margin-right:6px;color:var(--accent);font-size:11px">▶</span>`;
  /* Sub-sección dirección (Aumentos / Disminuciones) — colapsable */
  const dirSec = (cid, dir, titulo, color, arr, fila)=>{
    if(arr.length===0) return '';
    const did = `ejrDir_${idx}_${cid}_${dir}`;
    return `<div style="margin:4px 0 4px 14px">
      <div onclick="toggleEjrNode('${did}')" style="cursor:pointer;display:flex;align-items:center;font-size:13px;font-weight:800;color:${color};padding:5px 8px;border-left:3px solid ${color};background:var(--bg-2);border-radius:4px;text-transform:uppercase;letter-spacing:.03em">
        ${flecha(false)}${titulo} · ${arr.length} pól.</div>
      <div id="${did}" style="display:none;padding:2px 0 6px 12px">${arr.map(fila).join('')}</div>
    </div>`;
  };
  /* Bloque concepto — colapsable; contiene las dos direcciones reales y, opcionalmente,
     un bloque de PENDIENTES (categoría vacía o "Anualidad Anterior" en 2026). El
     formateador de fila de pendientes (pendFila) puede diferir del de variación
     real (p.ej. tasa muestra %, prima muestra monto). */
  const conceptoBloque = (cid, titulo, subeArr, bajaArr, fila, labelSube, labelBaja, pendArr, pendFila)=>{
    pendArr = pendArr || [];
    pendFila = pendFila || filaPendiente;
    if(subeArr.length===0 && bajaArr.length===0 && pendArr.length===0) return '';
    const cidNode = `ejrCon_${idx}_${cid}`;
    const totalN = subeArr.length+bajaArr.length+pendArr.length;
    const pendSec = pendArr.length>0 ? `
      <div style="margin:4px 0 4px 14px">
        <div onclick="toggleEjrNode('ejrDir_${idx}_${cid}_pend')" style="cursor:pointer;display:flex;align-items:center;font-size:13px;font-weight:800;color:#4ba3c7;padding:5px 8px;border-left:3px solid #4ba3c7;background:rgba(75,163,199,.06);border-radius:4px;text-transform:uppercase;letter-spacing:.03em">
          ${flecha(false)}Pendientes 2026 · ${pendArr.length} pól.</div>
        <div id="ejrDir_${idx}_${cid}_pend" style="display:none;padding:2px 0 6px 12px">${pendArr.map(pendFila).join('')}</div>
      </div>` : '';
    return `<div style="margin-bottom:8px">
      <div onclick="toggleEjrNode('${cidNode}')" style="cursor:pointer;display:flex;align-items:center;font-size:15px;font-weight:800;color:var(--accent-3);padding:5px 7px;background:rgba(30,111,217,.06);border-radius:6px">
        ${flecha(false)}${titulo} <span style="color:var(--ink-3);font-weight:600;margin-left:8px;font-size:13px">(${totalN} pól.)</span></div>
      <div id="${cidNode}" style="display:none;padding-top:4px">
        ${dirSec(cid,'sube',labelSube,'var(--pos)',subeArr,fila)}
        ${dirSec(cid,'baja',labelBaja,'var(--neg)',bajaArr,fila)}
        ${pendSec}
      </div>
    </div>`;
  };

  const totalVar = proySube.length+proyBaja.length+proyPend.length+
    tasaSube.length+tasaBaja.length+tasaPend.length+
    uvSube.length+uvBaja.length+uvPend.length+
    sinHSube.length+sinHBaja.length+sinHPend.length+
    pmSube.length+pmBaja.length+pmPend.length+
    ajSube.length+ajBaja.length+ajPend.length+
    boSube.length+boBaja.length+boPend.length+
    maSube.length+maBaja.length+maPend.length;

  content.innerHTML = `
    <div style="font-size:16px;font-weight:800;color:var(--accent-3);margin-bottom:10px">Variaciones en ${it.rubro}</div>
    ${conceptoBloque('proy','Proyección de ventas', proySube, proyBaja, filaMonto, 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', proyPend, filaPendiente)}
    ${conceptoBloque('tasa','Tasa',                  tasaSube, tasaBaja, filaTasa,  'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', tasaPend, filaTasaPend)}
    ${conceptoBloque('uv','Siniestralidad UV',       uvSube,   uvBaja,   filaSin('UV'),    'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', uvPend,   filaSinPend('UV'))}
    ${conceptoBloque('sinh','Siniestralidad histórica', sinHSube, sinHBaja, filaSin('Sin.H'), 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', sinHPend, filaSinPend('Sin.H'))}
    ${conceptoBloque('pm','Prima mínima',            pmSube,   pmBaja,   filaMonto, 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', pmPend, filaPendiente)}
    ${conceptoBloque('aj','Ajuste',                  ajSube,   ajBaja,   filaMonto, 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', ajPend, filaPendiente)}
    ${conceptoBloque('bo','Bono',                    boSube,   boBaja,   filaMonto, 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', boPend, filaPendiente)}
    ${conceptoBloque('ma','Malus',                   maSube,   maBaja,   filaMonto, 'Aumentos respecto al 2025', 'Disminuciones respecto al 2025', maPend, filaPendiente)}
    ${totalVar===0?'<div style="font-size:14px;color:var(--ink-3);font-style:italic">Sin variaciones de conceptos en este rubro.</div>':''}`;
  row.style.display='';
};

/* Toggle genérico de un nodo del acordeón del detalle por rubro (concepto o dirección).
   Alterna display y rota la flecha del encabezado que lo precede. */
window.toggleEjrNode = function(nodeId){
  const node = document.getElementById(nodeId);
  if(!node) return;
  const open = node.style.display === 'none';
  node.style.display = open ? '' : 'none';
  /* Rotar la flecha del header (elemento previo) */
  const header = node.previousElementSibling;
  if(header){
    const caret = header.querySelector('.ejr-caret');
    if(caret) caret.style.transform = `rotate(${open?90:0}deg)`;
  }
};

/* ============================================================
   01 RESUMEN
============================================================ */
function renderResumen(){
  const sec = document.getElementById('sec-resumen');
  sec.innerHTML = `
    <div class="section-head"><h2>General</h2></div>
    ${sectionFiltersBarHTML('resumen')}
    <div id="resumen-body"></div>`;
  bindSectionFilters('resumen', ()=>drawResumen());
  drawResumen();
}
function drawResumen(){
  const f = getSectionFilters('resumen');
  setActiveCtx(f);
  const mesCorte = f.mes;
  const polFiltradas = aplicarFiltrosPolizas(state.polizas, f);
  const t = totalesGlobales(mesCorte, polFiltradas);
  const labelPer = mesCorte===0 ? 'año completo' : `acumulado Ene–${MESES[mesCorte-1]}`;
  const lblUniv = f.universo==='emit26'?'Emitidas 2026':'Todas';
  const lblSeg  = f.segmento==='arsArs'?'$ en $':(f.segmento==='usdUsd'?'US en US':(f.segmento==='vs'?'US vs $':'Todas las monedas'));
  const nLabel = `N = ${polFiltradas.length} pólizas · ${lblUniv} · ${lblSeg}`;

  /* PORTFOLIO según anualidad */
  let polEmitidas=0, polPendientes=0, polDesvMayor=0, polVigentes=0;
  /* Breakdown 2026 por concepto y por grupo (emitidas, pendientes ≤2m, pendientes >2m) */
  const grpEmpty = ()=>({primaMin_U:0,primaMin_A:0, ajuste_U:0,ajuste_A:0, bono_U:0,bono_A:0, malus_U:0,malus_A:0});
  const breakdownEmit = grpEmpty();
  const breakdownPend2m = grpEmpty();
  const breakdownPendMayor = grpEmpty();
  /* "No corresponde": emisión 2025 de conceptos cuyo r.categoria === 'No corresponde'
     Esto se descuenta de pendientes (no se va a emitir en 2026) */
  const breakdownNoCorresp = grpEmpty();
  /* Para pólizas terminadas / nuevas — separadas por año */
  let polTerminadas25=0, polTerminadas26=0, polNuevas25=0, polNuevas26=0;
  /* Cada grupo guarda dos snapshots: emisión 2025 y emisión 2026, con desglose por concepto */
  const mkSnap = ()=>({
    e25:{primaMin_U:0,primaMin_A:0,ajuste_U:0,ajuste_A:0,bono_U:0,bono_A:0,malus_U:0,malus_A:0},
    e26:{primaMin_U:0,primaMin_A:0,ajuste_U:0,ajuste_A:0,bono_U:0,bono_A:0,malus_U:0,malus_A:0},
  });
  const term25 = mkSnap();
  const term26 = mkSnap();
  const nuev25 = mkSnap();
  const nuev26 = mkSnap();
  /* Arrays de pólizas por grupo, para click-expand */
  const arrTerm25=[], arrTerm26=[], arrNuev25=[], arrNuev26=[];
  for(const p of polFiltradas){
    if(polizaVigente(p,2026,mesCorte)) polVigentes++;
    const est = estadoPolizaConsolidado(p, mesCorte);
    const isPend2m = (est==='desvio_emision_pendiente');
    const isPendMayor = (est==='desvio_pendiente_mayor_2m');
    const isEmitDesv = (est==='emitido_con_desvio');
    const isSinDesv = (est==='sin_desvio');
    const isEmit = isEmitDesv || isSinDesv;
    /* Emitidas 2026 = sin_desvio + emitido_con_desvio */
    if(isEmit) polEmitidas++;
    if(isPend2m) polPendientes++;
    if(isPendMayor) polDesvMayor++;

    const useYear = (isPend2m || isPendMayor) ? 2025 : 2026;
    const target = isPendMayor ? breakdownPendMayor : (isPend2m ? breakdownPend2m : (isEmit ? breakdownEmit : null));
    /* Iterar concepto por concepto:
       - Si la categoría del concepto es "No corresponde", SIEMPRE sumamos su emisión 2025
         al bucket No corresponde (dinero que no se va a emitir en 2026).
       - Si no, va al target según el estado de la póliza (con su año correspondiente). */
    for(const c of CONCEPTOS_EMISIBLES){
      const r = p.conceptos[c]; if(!r) continue;
      const k = KEYMAP[c];
      const esNoCorresp = categoriaEsNoCorresponde(r.categoria);
      if(esNoCorresp){
        /* SIEMPRE acumular emisión 2025 (lo que se "pierde" porque no se va a emitir) */
        breakdownNoCorresp[k+'_U'] += (r.usd2025 || 0);
        breakdownNoCorresp[k+'_A'] += (r.ars2025 || 0);
      } else if(target){
        const u = (useYear===2026 ? get26usd(r) : (r.usd2025||0));
        const a = (useYear===2026 ? get26ars(r) : (r.ars2025||0));
        target[k+'_U'] += u;
        target[k+'_A'] += a;
      }
    }

    /* Terminadas y nuevas — contar SIEMPRE por tipo. Acumulamos TANTO 2025 como 2026
       para todos los conceptos (Prima Mín, Ajuste, Bono, Malus). */
    const sumAmbosAnios = (p)=>{
      const out = {
        e25:{primaMin_U:0,primaMin_A:0,ajuste_U:0,ajuste_A:0,bono_U:0,bono_A:0,malus_U:0,malus_A:0},
        e26:{primaMin_U:0,primaMin_A:0,ajuste_U:0,ajuste_A:0,bono_U:0,bono_A:0,malus_U:0,malus_A:0},
      };
      for(const c of CONCEPTOS_EMISIBLES){
        const r = p.conceptos[c]; if(!r) continue;
        const k = KEYMAP[c];
        out.e25[k+'_U'] += (r.usd2025||0);
        out.e25[k+'_A'] += (r.ars2025||0);
        out.e26[k+'_U'] += (r.usd2026||0);
        out.e26[k+'_A'] += (r.ars2026||0);
      }
      return out;
    };
    const acumGrupo = (snap, polSnap)=>{
      for(const k of ['primaMin_U','primaMin_A','ajuste_U','ajuste_A','bono_U','bono_A','malus_U','malus_A']){
        snap.e25[k] += polSnap.e25[k];
        snap.e26[k] += polSnap.e26[k];
      }
    };
    /* Pólizas terminadas 2025: tipo2025 = "Póliza cancelada" (raro pero por completitud) */
    if(p.tipo2025 === 'Póliza terminada'){
      polTerminadas25++;
      acumGrupo(term25, sumAmbosAnios(p));
      arrTerm25.push(p);
    }
    /* Pólizas terminadas 2026: tipo2026 = "Póliza cancelada" */
    if(p.tipo2026 === 'Póliza terminada'){
      polTerminadas26++;
      acumGrupo(term26, sumAmbosAnios(p));
      arrTerm26.push(p);
    }
    /* Pólizas nuevas 2025: tipo2025 = "Póliza nueva" */
    if(p.tipo2025 === 'Póliza nueva'){
      polNuevas25++;
      acumGrupo(nuev25, sumAmbosAnios(p));
      arrNuev25.push(p);
    }
    /* Pólizas nuevas 2026: tipo2026 EXPLÍCITO = "Póliza nueva" y no terminada
       (consistente con la regla del card "Pólizas nuevas" del Resumen Ejecutivo). */
    if(p.tipo2026 === 'Póliza nueva' && p.tipo2026Explicito && !polizaTerminada(p)){
      polNuevas26++;
      acumGrupo(nuev26, sumAmbosAnios(p));
      arrNuev26.push(p);
    }
  }

  const varARS = t.totARS26 - t.totARS25;
  const varUSD = t.totUSD26 - t.totUSD25;
  const varARSPct = t.totARS25 ? varARS/t.totARS25 : null;
  const varUSDPct = t.totUSD25 ? varUSD/t.totUSD25 : null;
  const dArsArs = t.arsArs26 - t.arsArs25;
  const dArsArsPct = t.arsArs25 ? dArsArs/t.arsArs25 : null;
  const dUsdUsd = t.usdUsd26 - t.usdUsd25;
  const dUsdUsdPct = t.usdUsd25 ? dUsdUsd/t.usdUsd25 : null;

  /* === Cuadro principal adaptativo según filtros ===
     Decide qué mostrar según segmento + cur:
     - segmento 'arsArs' → solo ARS$
     - segmento 'usdUsd' → solo USD
     - segmento 'vs'     → ambas en formato comparativo
     - segmento 'all' + cur 'usd' → solo USD
     - segmento 'all' + cur 'ars' → solo ARS$
     - segmento 'all' + cur 'dual' → ambas */
  const mon = efectivoMonedas(f);
  const monedaLbl = f.segmento==='arsArs' ? 'Pólizas en $ · ARS$'
                  : f.segmento==='usdUsd' ? 'Pólizas en US · USD'
                  : f.segmento==='vs' ? 'Comparación US vs $'
                  : (f.cur==='ars' ? 'Total · ARS$' : (f.cur==='usd' ? 'Total · USD' : 'Comparación Emisión'));

  /* Box compacto por moneda */
  const boxUSD = (v25, v26, dV, dPct)=>`
    <div class="dual-card mini-emision">
      <div class="dual-card-head usd">USD · ${labelPer}</div>
      <div class="mini-row">
        <div class="mini-item"><div class="mini-lbl">2025</div><div class="mini-val">${FMT_USD(v25)}</div></div>
        <div class="mini-item"><div class="mini-lbl">2026</div><div class="mini-val">${FMT_USD(v26)}</div></div>
        <div class="mini-item"><div class="mini-lbl">Δ</div><div class="mini-val ${dV>=0?'pos':'neg'}">${dV>=0?'+':''}${FMT_USD(dV)}<span class="mini-pct"> · ${FMT_PCT(dPct)}</span></div></div>
      </div>
    </div>`;
  const boxARS = (v25, v26, dV, dPct)=>`
    <div class="dual-card mini-emision">
      <div class="dual-card-head ars">ARS$ · ${labelPer}</div>
      <div class="mini-row">
        <div class="mini-item"><div class="mini-lbl">2025</div><div class="mini-val">${FMT_ARS(v25)}</div></div>
        <div class="mini-item"><div class="mini-lbl">2026</div><div class="mini-val">${FMT_ARS(v26)}</div></div>
        <div class="mini-item"><div class="mini-lbl">Δ</div><div class="mini-val ${dV>=0?'pos':'neg'}">${dV>=0?'+':''}${FMT_ARS(dV)}<span class="mini-pct"> · ${FMT_PCT(dPct)}</span></div></div>
      </div>
    </div>`;

  /* Determinar qué box(es) mostrar */
  let cuadroPrincipal = '';
  if(f.segmento==='arsArs'){
    cuadroPrincipal = boxARS(t.arsArs25, t.arsArs26, dArsArs, dArsArsPct);
  } else if(f.segmento==='usdUsd'){
    cuadroPrincipal = boxUSD(t.usdUsd25, t.usdUsd26, dUsdUsd, dUsdUsdPct);
  } else if(f.segmento==='vs'){
    cuadroPrincipal = boxUSD(t.usdUsd25, t.usdUsd26, dUsdUsd, dUsdUsdPct) + boxARS(t.arsArs25, t.arsArs26, dArsArs, dArsArsPct);
  } else { /* all */
    if(mon.showUSD && mon.showARS){
      cuadroPrincipal = boxUSD(t.totUSD25, t.totUSD26, varUSD, varUSDPct) + boxARS(t.totARS25, t.totARS26, varARS, varARSPct);
    } else if(mon.showUSD){
      cuadroPrincipal = boxUSD(t.totUSD25, t.totUSD26, varUSD, varUSDPct);
    } else {
      cuadroPrincipal = boxARS(t.totARS25, t.totARS26, varARS, varARSPct);
    }
  }

  /* Promedios técnicos */
  const tasaPromedio = avgPromedio(polFiltradas, 'tasa');
  const sinHPromedio = avgPromedio(polFiltradas, 'sinH');
  const sinUVPromedio = avgPromedio(polFiltradas, 'sinUV');
  /* Proyección: total acumulado (suma de pólizas que tienen proy 25 y 26) */
  let proyU25=0, proyU26=0, proyA25=0, proyA26=0, nProy=0;
  for(const p of polFiltradas){
    if((p.proyUSD2025!=null || p.proyARS2025!=null) && (p.proyUSD2026!=null || p.proyARS2026!=null)){
      proyU25 += (p.proyUSD2025||0);
      proyU26 += (p.proyUSD2026||0);
      proyA25 += (p.proyARS2025||0);
      proyA26 += (p.proyARS2026||0);
      nProy++;
    }
  }
  const proyTotal = {u25:proyU25, u26:proyU26, a25:proyA25, a26:proyA26, n:nProy};

  /* Cantidad de cards en el cuadro principal */
  const nBoxes = (f.segmento==='vs' || (f.segmento==='all' && mon.showUSD && mon.showARS)) ? 2 : 1;
  const gridCols = nBoxes === 2 ? 'repeat(2,1fr)' : '1fr';

  /* Helper para filas del breakdown de PORTFOLIO */
  const rowBreakdown = (label, cls, b, mon)=>{
    const totU = b.primaMin_U + b.ajuste_U + b.bono_U + b.malus_U;
    const totA = b.primaMin_A + b.ajuste_A + b.bono_A + b.malus_A;
    const fmtCell = (u, a)=>{
      const parts = [];
      if(mon.showUSD) parts.push(`<div>${FMT_USD(u)}</div>`);
      if(mon.showARS) parts.push(`<div style="color:var(--ink-2)">${FMT_ARS(a)}</div>`);
      return parts.join('');
    };
    const colorMap = {pos:'var(--pos)', warn:'var(--warn)', neg:'var(--neg)', neu:'var(--ink-3)'};
    return `<tr>
      <td style="padding:8px;border-bottom:1px solid var(--line);font-weight:700;color:${colorMap[cls]}">${label}</td>
      <td style="padding:8px;border-bottom:1px solid var(--line);text-align:right">${fmtCell(b.primaMin_U,b.primaMin_A)}</td>
      <td style="padding:8px;border-bottom:1px solid var(--line);text-align:right">${fmtCell(b.ajuste_U,b.ajuste_A)}</td>
      <td style="padding:8px;border-bottom:1px solid var(--line);text-align:right">${fmtCell(b.bono_U,b.bono_A)}</td>
      <td style="padding:8px;border-bottom:1px solid var(--line);text-align:right">${fmtCell(b.malus_U,b.malus_A)}</td>
      <td style="padding:8px;border-bottom:1px solid var(--line);text-align:right;font-weight:700">${fmtCell(totU,totA)}</td>
    </tr>`;
  };

  document.getElementById('resumen-body').innerHTML = `
    <div class="n-label-bar">${nLabel}</div>

    <div class="grid-2 resumen-top-row">
      <div class="card">
        <h3 style="margin-bottom:12px">${monedaLbl}</h3>
        <div class="resumen-stack">
          ${cuadroPrincipal}
        </div>
      </div>
      <div class="card">
        <h3>Emisión total — comparativa</h3>
        <div class="chart-box"><canvas id="chartTotal"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head-with-toggle">
        <div><h3>Real 2025/2026 vs Presupuesto</h3></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${viewToggleHTML('resumenPresup',[{value:'cont',label:'Presup. Continental'},{value:'arg',label:'Presup. Argentina'}],'cont')}
        </div>
      </div>
      <div class="chart-box tall"><canvas id="chartResumenMensual"></canvas></div>
    </div>

    <div class="dual-kpi single-full">
      <div class="dual-card">
        <div class="dual-card-head" style="background:#0a3d7a">PORTFOLIO · ${labelPer}</div>
        <div class="portfolio-layout">
          <div class="portfolio-kpis">
            <div class="dual-kpi-item"><div class="label">Pólizas totales</div><div class="value">${polFiltradas.length}</div><div class="delta neu">filtradas</div></div>
            <div class="dual-kpi-item"><div class="label">Vigentes 2026</div><div class="value">${polVigentes}</div><div class="delta neu">activas al corte</div></div>
            <div class="dual-kpi-item dual-kpi-pendientes">
              <div class="label">Emisión Pendiente Anualidad</div>
              <div style="display:flex;gap:14px;align-items:flex-end;margin-top:4px">
                <div>
                  <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--warn);font-weight:700;text-transform:uppercase;letter-spacing:.04em">≤ 2m</div>
                  <div class="value" style="color:var(--warn);font-size:22px">${polPendientes}</div>
                </div>
                <div>
                  <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--neg);font-weight:700;text-transform:uppercase;letter-spacing:.04em">&gt; 2m</div>
                  <div class="value" style="color:var(--neg);font-size:22px">${polDesvMayor}</div>
                </div>
              </div>
            </div>
            <div class="dual-kpi-item"><div class="label">Anualidades Emitidas 2026</div><div class="value">${polEmitidas}</div></div>
          </div>
          <div class="portfolio-detalle">
            <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:700">Detalle por concepto 2026 — emisión real (emitidas) y proyectada según 2025 (pendientes)</div>
            <table class="portfolio-breakdown" style="width:100%;font-size:11.5px;font-family:var(--font-mono)">
              <thead><tr>
                <th style="text-align:left;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Grupo</th>
                <th style="text-align:right;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Prima Mín.</th>
                <th style="text-align:right;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Ajuste</th>
                <th style="text-align:right;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Bono</th>
                <th style="text-align:right;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Malus</th>
                <th style="text-align:right;color:var(--ink-3);font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line-2)">Total</th>
              </tr></thead>
              <tbody>
                ${rowBreakdown('Emitidas 2026','pos',breakdownEmit,mon)}
                ${rowBreakdown('Pendientes ≤ 2m','warn',breakdownPend2m,mon)}
                ${rowBreakdown('Pendientes > 2m','neg',breakdownPendMayor,mon)}
                ${rowBreakdown('No corresponde','neu',breakdownNoCorresp,mon)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-2">
        <div class="card">

/* Gráfico mensual de Resumen — muestra cada mes sin acumular, hasta mesCorte si está activo */
function drawResumenMensualChart(d, filters){
  const f = filters || getSectionFilters('resumen');
  const mon = efectivoMonedas(f);
  const cur = mon.showUSD ? 'usd' : 'ars';
  const presup = getCur('resumenPresup','cont');
  const mesCorte = f.mes;
  let p25, p26, p25Lbl, p26Lbl;
  if(presup==='cont'){
    p25 = cur==='usd'? state.presup.cont25_usd : state.presup.cont25_ars;
    p26 = cur==='usd'? state.presup.cont26_usd : state.presup.cont26_ars;
    p25Lbl = 'Presupuesto 2025 Continental'; p26Lbl='Presupuesto 2026 Continental';
  } else {
    p25 = cur==='usd'? state.presup.arg25_usd : state.presup.arg25_ars;
    p26 = cur==='usd'? state.presup.arg26_usd : state.presup.arg26_ars;
    p25Lbl = 'Presupuesto 2025 Argentina (Total)'; p26Lbl='Presupuesto 2026 Argentina (Total)';
  }
  /* No acumular: solo mostrar los meses hasta mesCorte (si=0, todos) */
  const limit = mesCorte===0 ? 12 : mesCorte;
  const labels = MESES.slice(0, limit);
  const r25 = (cur==='usd'? d.real25.usd : d.real25.ars).slice(0, limit);
  const r26 = (cur==='usd'? d.real26.usd : d.real26.ars).slice(0, limit);
  const p25Sliced = p25.slice(0, limit);
  const p26Sliced = p26.slice(0, limit);
  /* Celeste claro (2025) a la izquierda, azul oscuro (2026) a la derecha por cada mes
     Los datasets se posicionan según el orden del array dentro de cada grupo */
  drawChart('chartResumenMensual',{
    type:'bar',
    data:{labels, datasets:[
      {type:'bar',label:'Real 2025',data:r25,backgroundColor:'rgba(180,215,240,.92)',borderColor:'#7fb9dc',borderWidth:1.5,borderRadius:3,barPercentage:.9,categoryPercentage:.85},
      {type:'bar',label:'Real 2026',data:r26,backgroundColor:'rgba(30,111,217,.92)',borderColor:'#0a3d7a',borderWidth:1.5,borderRadius:3,barPercentage:.9,categoryPercentage:.85},
      {type:'line',label:p25Lbl,data:p25Sliced,borderColor:'#a0b3d0',borderDash:[6,3],backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#a0b3d0',borderWidth:2,tension:.2},
      {type:'line',label:p26Lbl,data:p26Sliced,borderColor:'#0a3d7a',backgroundColor:'transparent',pointRadius:3,pointBackgroundColor:'#0a3d7a',borderWidth:2,tension:.2},
    ]},
    options:chartOpts({yMoney:cur,legend:true,xAngle:0})
  });
}

/* Vista Total/Rubro/Producto para Emisión por concepto */
function drawResumenChartConceptoVista(polArr, f, vista){
  if(!document.getElementById('chartConcepto')) return;
  const mon = efectivoMonedas(f);
  const useUSD = mon.showUSD;
  const useARS = mon.showARS;
  const showDual = useUSD && useARS && f.segmento==='all';
  const fmtMoney = useUSD?'usd':'ars';
  /* Etiqueta de moneda visible al lado del título */
  const lbl = document.getElementById('resumenConceptoMonedaLbl');
  if(lbl){
    if(showDual) lbl.textContent = '· USD y ARS$ (dos gráficos)';
    else if(useUSD) lbl.textContent = '· en USD';
    else lbl.textContent = '· en ARS$';
  }

  if(vista==='total'){
    /* Como antes: 4 conceptos, 2 barras (25 y 26). totalesGlobales YA usa calcEmisionFiltrada

/* Promedio simple v25/v26 sobre las pólizas (incluyendo solo las que tienen ambos valores) */
function avgPromedio(polArr, prop){
  let s25=0, n25=0, s26=0, n26=0;
  for(const p of polArr){
    const v25 = p[prop+'2025'];
    const v26 = p[prop+'2026'];
    if(v25!=null && v26!=null){
      s25 += v25; n25++;
      s26 += v26; n26++;
    }
  }
  return {v25:n25?s25/n25:null, v26:n26?s26/n26:null, n25, n26};
}

/* Promedio condicional: por tipo de póliza ("Segunda anualidad", "Renovación", etc.) */
function avgTasaPorTipo(polArr, tipoMatch){
  let s25=0, n25=0, s26=0, n26=0, count=0;
  for(const p of polArr){
    /* Se considera al tipo de 2026 (la anualidad vigente). Si el tipo NO matchea, salteamos. */
    if(p.tipo2026 !== tipoMatch) continue;
    count++;
    if(p.tasa2025!=null && p.tasa2026!=null){
      s25 += p.tasa2025; n25++;
      s26 += p.tasa2026; n26++;
    }
  }
  return {v25:n25?s25/n25:null, v26:n26?s26/n26:null, n25, n26, count};
}

/* Detalle textual abajo del gráfico de Tasa: cuántas pólizas por tipo y la variación */
function drawTasaDetalleTipo(polFiltradas, f){
  const wrap = document.getElementById('tasaDetalleTipo');
  if(!wrap) return;
  const ren = avgTasaPorTipo(polFiltradas, 'Renovación');
  const seg = avgTasaPorTipo(polFiltradas, 'Segunda anualidad');
  const nue = avgTasaPorTipo(polFiltradas, 'Póliza nueva');
  const ter = avgTasaPorTipo(polFiltradas, 'Póliza terminada');

  const renderTipo = (label, d, color)=>{
    if(d.count === 0) return '';
    let txt = `<strong style="color:${color}">${label}:</strong> ${d.count} póliza${d.count===1?'':'s'}`;
    if(d.v25!=null && d.v26!=null){
      const delta = d.v26 - d.v25;
      const dcls = delta===0?'neu':(delta>0?'pos':'neg');
      const dcolor = dcls==='pos'?'var(--pos)':(dcls==='neg'?'var(--neg)':'var(--ink-3)');
      txt += ` · tasa promedio ${FMT_PCT_TASA(d.v25)} → ${FMT_PCT_TASA(d.v26)} · <span style="color:${dcolor};font-weight:700">${delta>=0?'+':''}${FMT_PCT_TASA(delta)}</span>`;
    } else if(d.v26!=null){
      txt += ` · tasa 2026: ${FMT_PCT_TASA(d.v26)}`;
    } else {
      txt += ` · sin datos de tasa`;
    }
    return `<div>${txt}</div>`;
  };
  const html = renderTipo('Renovación', ren, 'var(--accent)')
             + renderTipo('Segunda anualidad', seg, 'var(--pos)')
             + renderTipo('Póliza nueva', nue, 'var(--ink-2)')
             + renderTipo('Póliza terminada', ter, 'var(--neg)');
  wrap.innerHTML = html || '<div style="color:var(--ink-3);font-style:italic">— sin pólizas con tipo definido —</div>';
}

/* Variación de emisión 2026 vs 2025 según tipo de póliza (Segunda anualidad / Renovación).
   Se compara la SUMA de Prima Mín + Ajuste + Bono + Malus (respetando cutoff + filtros). */
function drawVarPorTipo(polArr, f){
  const mon = efectivoMonedas(f);
  const useUSD = mon.showUSD;
  const fmtMoney = useUSD?'usd':'ars';
  /* Acumular sumas por tipo */
  const acc = (tipoMatch)=>{
    let s25=0, s26=0, count=0;
    for(const p of polArr){
      if(p.tipo2026 !== tipoMatch) continue;
      count++;
      const f25 = calcEmisionFiltrada(p,2025,f.mes);
      const f26 = calcEmisionFiltrada(p,2026,f.mes);
      s25 += useUSD ? f25.totUSD : f25.totARS;
      s26 += useUSD ? f26.totUSD : f26.totARS;
    }
    return {s25, s26, count};
  };
  const ren = acc('Renovación');
  const seg = acc('Segunda anualidad');

  drawChart('chartVarTipo',{type:'bar',
    data:{labels:['Renovación','Segunda anualidad'],datasets:[
      {label:'2025',data:[ren.s25, seg.s25],backgroundColor:'rgba(94,179,232,.85)',borderColor:'#5eb3e8',borderWidth:1.5,borderRadius:3,barPercentage:.7,categoryPercentage:.65},
      {label:'2026',data:[ren.s26, seg.s26],backgroundColor:'rgba(30,111,217,.90)',borderColor:'#1e6fd9',borderWidth:1.5,borderRadius:3,barPercentage:.7,categoryPercentage:.65},
    ]},
    options:chartOpts({yMoney:fmtMoney,legend:true})});

  /* Detalle textual */
  const wrap = document.getElementById('varTipoDetalle');
  if(wrap){
    const FMT = useUSD ? FMT_USD_FULL : FMT_ARS_FULL;
    const renderLine = (label, d, color)=>{
      if(d.count === 0) return `<div><strong style="color:${color}">${label}:</strong> 0 pólizas</div>`;
      const delta = d.s26 - d.s25;
      const dpct = d.s25 ? delta/d.s25 : null;
      const dcls = delta===0?'neu':(delta>0?'pos':'neg');
      const dcolor = dcls==='pos'?'var(--pos)':(dcls==='neg'?'var(--neg)':'var(--ink-3)');
      return `<div><strong style="color:${color}">${label}:</strong> ${d.count} pólizas · ${FMT(d.s25)} → ${FMT(d.s26)} · <span style="color:${dcolor};font-weight:700">${delta>=0?'+':''}${FMT(delta)} (${dpct!=null?(delta>=0?'+':'')+FMT_PCT(dpct):'—'})</span></div>`;
    };
    wrap.innerHTML = renderLine('Renovación', ren, 'var(--accent)')
                   + renderLine('Segunda anualidad', seg, 'var(--pos)');
  }
}

function computeMensual(polArr){
  const arr = polArr || state.polizas;
  const empty = ()=>({usd:Array(12).fill(0), ars:Array(12).fill(0)});
  /* Breakdown por concepto: 12 meses × 4 conceptos × 2 monedas */
  const emptyConcept = ()=>({
    primaMin: empty(), ajuste: empty(), bono: empty(), malus: empty()
  });
  const out = {
    real25:empty(), real26:empty(),
    real25_arsArs:empty(), real26_arsArs:empty(),
    real25_usdUsd:empty(), real26_usdUsd:empty(),
    /* Breakdown por mes y concepto */
    concept25: emptyConcept(),
    concept26: emptyConcept(),
    concept25_arsArs: emptyConcept(),
    concept26_arsArs: emptyConcept(),
    concept25_usdUsd: emptyConcept(),
    concept26_usdUsd: emptyConcept(),
  };
  for(const p of arr){
    for(const c of CONCEPTOS_EMISIBLES){
      const r = p.conceptos[c]; if(!r) continue;
      const k = KEYMAP[c];
      /* Si el filtro Anualidad Anterior está activo y este concepto pertenece a la
         anualidad anterior, saltamos las entradas 2026 (pero conservamos las 2025). */
      const skipAA26 = (state._activeCtx && state._activeCtx.excluirAnualAnt && categoriaEsAnualidadAnterior(r.categoria));
      /* Para multi-fila (Prima Mín mensual), distribuir cada entrada en su mes.
         Si no hay _entries (concepto único), usar la fila agregada como entrada única. */
      const entries25 = (r._entries25 && r._entries25.length) ? r._entries25 :
                        (r.fechaEm2025 ? [{fecha:r.fechaEm2025, ars:r.ars2025||0, usd:r.usd2025||0}] : []);
      const entries26 = skipAA26 ? [] : ((r._entries26 && r._entries26.length) ? r._entries26 :
                        (r.fechaEm2026 ? [{fecha:r.fechaEm2026, ars:r.ars2026||0, usd:r.usd2026||0}] : []));
      for(const e of entries25){
        if(!e.fecha || (!e.ars && !e.usd)) continue;
        const m = e.fecha.getMonth();
        out.real25.usd[m] += (e.usd||0); out.real25.ars[m] += (e.ars||0);
        out.concept25[k].usd[m] += (e.usd||0);
        out.concept25[k].ars[m] += (e.ars||0);
        if(p.moneda==='$'){
          out.real25_arsArs.ars[m] += (e.ars||0);
          out.concept25_arsArs[k].ars[m] += (e.ars||0);
        }
        if(p.moneda==='US'){
          out.real25_usdUsd.usd[m] += (e.usd||0);
          out.concept25_usdUsd[k].usd[m] += (e.usd||0);
        }
      }
      for(const e of entries26){
        if(!e.fecha || (!e.ars && !e.usd)) continue;
        const m = e.fecha.getMonth();
        out.real26.usd[m] += (e.usd||0); out.real26.ars[m] += (e.ars||0);
        out.concept26[k].usd[m] += (e.usd||0);
        out.concept26[k].ars[m] += (e.ars||0);
        if(p.moneda==='$'){
          out.real26_arsArs.ars[m] += (e.ars||0);
          out.concept26_arsArs[k].ars[m] += (e.ars||0);
        }
        if(p.moneda==='US'){
          out.real26_usdUsd.usd[m] += (e.usd||0);
          out.concept26_usdUsd[k].usd[m] += (e.usd||0);
        }
      }
    }
  }
  return out;
}
/* Acumular array hasta un mes (mes 1-indexado). 0 = todo el año (1..12) */
function acumularHastaMes(arr, mesCorte){
  const cutoff = mesCorte===0 ? 12 : mesCorte;
  const out = []; let s = 0;
  for(let i=0;i<12;i++){
    if(i+1 <= cutoff){
      s += arr[i] || 0;
      out.push(s);
    } else {
      out.push(null);
    }
  }
  return out;
}

function drawMensualTable(d, filters){
  const f = filters || getSectionFilters('mensual');
  const mon = efectivoMonedas(f);
  const cur = (mon.showUSD && mon.showARS) ? 'dual' : (mon.showUSD ? 'usd' : 'ars');
  /* Si el segmento es 'vs' mostramos vista nativaAmbas (ambas separadas) */
  const vista = f.segmento==='vs' ? 'nativaAmbas' : (f.segmento==='arsArs' ? 'arsArs' : (f.segmento==='usdUsd' ? 'usdUsd' : 'todo'));
  const mesCorte = f.mes;

  /* Construye sub-fila con breakdown por concepto para un mes */
  const subRowConceptos = (mIdx, c25, c26, curEff, colspan)=>{
    /* c25/c26 son los breakdowns: {primaMin, ajuste, bono, malus} con .usd/.ars */
    const cellFor = (year, k)=>{
      const usd = (year==='25'?c25:c26)[k].usd[mIdx];
      const ars = (year==='25'?c25:c26)[k].ars[mIdx];
      if(curEff==='ars') return FMT_ARS_FULL(ars);
      if(curEff==='usd') return FMT_USD_FULL(usd);
      return `<div style="line-height:1.4">${FMT_USD_FULL(usd)}<br><span style="color:var(--ink-2)">${FMT_ARS_FULL(ars)}</span></div>`;
    };
    const cellDelta = (k)=>{
      const dU = c26[k].usd[mIdx] - c25[k].usd[mIdx];
      const dA = c26[k].ars[mIdx] - c25[k].ars[mIdx];
      const isBono = (k === 'bono');
      /* Bono: más negativo = más bono = pos verde; menos negativo (cerca de 0) = neg rojo */
      const evalCls = (delta)=>{
        if(delta === 0) return 'neu';
        if(isBono) return delta < 0 ? 'pos' : 'neg';
        return delta > 0 ? 'pos' : 'neg';
      };
      const clsU = evalCls(dU);
      const clsA = evalCls(dA);
      const colorOf = (cls)=> cls==='pos'?'var(--pos)':(cls==='neg'?'var(--neg)':'var(--ink-3)');
      if(curEff==='ars') return `<span style="color:${colorOf(clsA)};font-weight:700">${dA>=0?'+':''}${FMT_ARS_FULL(dA)}</span>`;
      if(curEff==='usd') return `<span style="color:${colorOf(clsU)};font-weight:700">${dU>=0?'+':''}${FMT_USD_FULL(dU)}</span>`;
      return `<div style="line-height:1.4"><span style="color:${colorOf(clsU)};font-weight:700">${dU>=0?'+':''}${FMT_USD_FULL(dU)}</span><br><span style="color:${colorOf(clsA)};font-weight:700;font-size:10.5px">${dA>=0?'+':''}${FMT_ARS_FULL(dA)}</span></div>`;
    };
    return `<tr class="mensual-subrow" data-mes="${mIdx}" style="display:none;background:var(--bg-2)">
      <td colspan="${colspan}" style="padding:14px 18px">
        <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:700">Desglose ${MESES[mIdx]} por concepto · ${curEff==='dual'?'USD y ARS$':(curEff==='usd'?'USD':'ARS$')}</div>

          </tr></thead>
          <tbody>
            <tr><td style="padding:8px;font-weight:700">Prima Mínima</td><td style="padding:8px;text-align:right">${cellFor('25','primaMin')}</td><td style="padding:8px;text-align:right">${cellFor('26','primaMin')}</td><td style="padding:8px;text-align:right;font-weight:700">${cellDelta('primaMin')}</td></tr>
            <tr><td style="padding:8px;font-weight:700">Ajuste</td><td style="padding:8px;text-align:right">${cellFor('25','ajuste')}</td><td style="padding:8px;text-align:right">${cellFor('26','ajuste')}</td><td style="padding:8px;text-align:right;font-weight:700">${cellDelta('ajuste')}</td></tr>

          </tbody>

  };

  /* Vista nativaAmbas: dos columnas separadas $ y US */
  if(vista==='nativaAmbas'){

    let totA25=0,totA26=0,totU25=0,totU26=0;

    rows += subRowConceptos(i, c25, c26, curEff, 4);

}

function drawDesvios(){
  const f = getSectionFilters('desvios');
  setActiveCtx(f);
  const mesCorte = f.mes;
  const polFiltradas = aplicarFiltrosPolizas(state.polizas, f);

  const labelPer = mesCorte===0?'año completo':`Ene–${MESES[mesCorte-1]}`;
  const lblUniv = f.universo==='emit26'?'Emitidas 2026':'Todas';
  const lblSeg  = f.segmento==='arsArs'?'$ en $':(f.segmento==='usdUsd'?'US en US':(f.segmento==='vs'?'US vs $':'Todas las monedas'));
  const nLabel = `N = ${polFiltradas.length} pólizas · ${lblUniv} · ${lblSeg} · ${labelPer}`;

  let polEmitidas26=0, polVigentes=0, polPendiente=0, polPendiente_mayor=0, polEmitDesv=0, polSinDesv=0;
  /* Breakdown por concepto en cada grupo */
  const grpEmpty = ()=>({primaMin_U:0,primaMin_A:0, ajuste_U:0,ajuste_A:0, bono_U:0,bono_A:0, malus_U:0,malus_A:0});
  const bEmit = grpEmpty();
  const bPend2m = grpEmpty();
  const bPendMayor = grpEmpty();
  const bEmitDesv = grpEmpty();
  const bNoCorresp = grpEmpty();
  for(const p of polFiltradas){
    if(polizaVigente(p,2026,mesCorte)) polVigentes++;
    const est = estadoPolizaConsolidado(p, mesCorte);
    const isPend2m = (est==='desvio_emision_pendiente');
    const isPendMayor = (est==='desvio_pendiente_mayor_2m');
    const isEmitDesv = (est==='emitido_con_desvio');
    const isSinDesv = (est==='sin_desvio');
    if(isPend2m) polPendiente++;
    if(isPendMayor) polPendiente_mayor++;
    if(isEmitDesv) polEmitDesv++;
    if(isSinDesv) polSinDesv++;
    /* Emitidas 2026 = sin_desvio + emitido_con_desvio (consistente con la suma de los KPIs) */
    if(isEmitDesv || isSinDesv) polEmitidas26++;
    const isEmit = isEmitDesv || isSinDesv;

    /* "No corresponde" se captura aparte SIEMPRE con emisión 2025 (independiente del estado de la póliza).
       El resto va al bucket según el estado. */
    /* Primero acumular No corresponde para esta póliza */
    for(const c of CONCEPTOS_EMISIBLES){
      const r = p.conceptos[c]; if(!r) continue;
      if(r.categoria === 'No corresponde'){
        const k = KEYMAP[c];
        bNoCorresp[k+'_U'] += (r.usd2025 || 0);
        bNoCorresp[k+'_A'] += (r.ars2025 || 0);
      }
    }
    const acumular = (target, year)=>{
      for(const c of CONCEPTOS_EMISIBLES){
        const r = p.conceptos[c]; if(!r) continue;
        if(r.categoria === 'No corresponde') continue; /* ya capturado arriba */
        const k = KEYMAP[c];
        const u = year===2026 ? get26usd(r) : (r.usd2025||0);
        const a = year===2026 ? get26ars(r) : (r.ars2025||0);
        target[k+'_U'] += u;
        target[k+'_A'] += a;
      }
    };
    if(isEmit && !isEmitDesv) acumular(bEmit, 2026);
    if(isPend2m) acumular(bPend2m, 2025);
    if(isPendMayor) acumular(bPendMayor, 2025);
    if(isEmitDesv) acumular(bEmitDesv, 2026);
  }
  /* Pólizas totales = cantidad de pólizas ÚNICAS (sin duplicados por número de póliza). */

/* Descomposición de la variación 2025→2026: cuánto por pendiente y cuánto por baja en concepto */
function calcVariacionDescompuesta(mesCorte, monedaFiltro){
  /* Regla: la póliza está pendiente si NO tiene Prima Mínima 2026.
     Para esas, todo el monto 2025 se considera "pendiente de emitir" (impacto negativo).
     Para el resto, sumamos la diferencia 2026-2025 por concepto.
     Usamos los valores nativos del Excel (USD y ARS$ ya cargados). */
  const out = {
    pendUSD:0, pendARS:0, pendCount:0,
    porConceptoUSD: {primaMin:0,ajuste:0,bono:0,malus:0},
    porConceptoARS: {primaMin:0,ajuste:0,bono:0,malus:0},
    real25USD:0, real25ARS:0, real26USD:0, real26ARS:0,
  };
  for(const p of state.polizas){
    if(monedaFiltro && p.moneda !== monedaFiltro) continue;
    const f25 = calcEmisionFiltrada(p, 2025, mesCorte);
    const f26 = calcEmisionFiltrada(p, 2026, mesCorte);
    out.real25USD += f25.totUSD; out.real25ARS += f25.totARS;
    out.real26USD += f26.totUSD; out.real26ARS += f26.totARS;
    if(polizaPendienteEmision(p, mesCorte)){
      out.pendUSD += -f25.totUSD;
      out.pendARS += -f25.totARS;
      if(f25.totUSD>0 || f25.totARS>0) out.pendCount++;
    } else {
      for(const c of CONCEPTOS_EMISIBLES){
        const k = KEYMAP[c];
        out.porConceptoUSD[k] += (f26.breakdownUSD[k]-f25.breakdownUSD[k]);
        out.porConceptoARS[k] += (f26.breakdownARS[k]-f25.breakdownARS[k]);
      }
    }
  }
  return out;
}

function drawDesviosVar(polFiltradas, filters){
  const mesCorte = filters.mes;
  const seg = filters.segmento;
  const mon = efectivoMonedas(filters);
  /* Si segmento='vs', mostramos comparativo lado a lado */
  if(seg === 'vs'){
    const pAr = calcPendientePorConcepto(mesCorte, polFiltradas.filter(p=>p.moneda==='$'));
    const pUs = calcPendientePorConcepto(mesCorte, polFiltradas.filter(p=>p.moneda==='US'));
    document.getElementById('desvios-var').innerHTML = renderPendienteAgrupada(pAr, pUs);
    return;
  }
  const p = calcPendientePorConcepto(mesCorte, polFiltradas);
  document.getElementById('desvios-var').innerHTML = renderPendienteDescompuesto(p, mon, filters);
}

/* Para pólizas pendientes (Prima Mín 2026 sin emitir): sumar lo que estuvo emitido en 2025
   por cada concepto. Eso es lo "pendiente" — lo que falta emitir en 2026 según el patrón 2025. */
function calcPendientePorConcepto(mesCorte, polArr){
  const out = {
    pendCount: 0,
    USD: {primaMin:0, ajuste:0, bono:0, malus:0, total:0},
    ARS: {primaMin:0, ajuste:0, bono:0, malus:0, total:0},
    /* Bucket separado: lo que no corresponde emitir (según col AB="No corresponde" en Excel) */
    USD_NC: {primaMin:0, ajuste:0, bono:0, malus:0, total:0},
    ARS_NC: {primaMin:0, ajuste:0, bono:0, malus:0, total:0},
  };
  for(const p of polArr){
    if(!polizaPendienteEmision(p, mesCorte)) continue;
    out.pendCount++;
    /* Iterar concepto por concepto y separar según categoría */
    for(const c of CONCEPTOS_EMISIBLES){
      const r = p.conceptos[c]; if(!r) continue;
      const k = KEYMAP[c];
      const u = r.usd2025 || 0;
      const a = r.ars2025 || 0;
      if(r.categoria === 'No corresponde'){
        out.USD_NC[k] += u; out.USD_NC.total += u;
        out.ARS_NC[k] += a; out.ARS_NC.total += a;
      } else {
        out.USD[k] += u; out.USD.total += u;
        out.ARS[k] += a; out.ARS.total += a;
      }
    }
  }
  return out;
}

function buildDesviosRows(mesCorte, polArr){
  const arr = polArr || state.polizas;
  const out=[];
  for(const p of arr){
    for(const c of CONCEPTOS_EMISIBLES){
      const r = p.conceptos[c];
      const esp25 = mesEsperadoEmision(p.vigDesde,p.vigHasta,2025);
      const esp26 = mesEsperadoEmision(p.vigDesde,p.vigHasta,2026,p.inicioAnualidad2026);
      const real25k = (r && r.fechaEm2025) ? monthKey(r.fechaEm2025) : null;
      const real26k = (r && r.fechaEm2026) ? monthKey(r.fechaEm2026) : null;
      const ars25=(r&&r.ars2025)||0, usd25=(r&&r.usd2025)||0;
      const ars26=get26ars(r), usd26=get26usd(r);
      const d25 = diffMeses(real25k,esp25);
      const d26 = diffMeses(real26k,esp26);
      const est25 = estadoConcepto(p,c,2025,mesCorte);
      const est26 = estadoConcepto(p,c,2026,mesCorte);
      let estado = null;
      if(p.tipo2026 === 'Póliza terminada') {
        /* Pólizas terminadas: si emitió algo en 2025 (lo viejo), lo marcamos como sin desvío
           - no es pendiente porque la póliza terminó */
        if(est25==='sin_desvio'||est26==='sin_desvio') estado='sin_desvio';
        else continue;
      }
      else if(est26==='desvio_pendiente_mayor_2m') estado='desvio_pendiente_mayor_2m';
      else if(est25==='pendiente_2025') estado='desvio_pendiente_mayor_2m';
      else if(est26==='desvio_emision_pendiente') estado='desvio_emision_pendiente';
      else if(est25==='emitido_con_desvio'||est26==='emitido_con_desvio') estado='emitido_con_desvio';
      else if(est25==='sin_desvio'||est26==='sin_desvio') estado='sin_desvio';
      else continue;
      /* Si el concepto está marcado como "No corresponde" y está pendiente,
         lo reclasificamos como "no_corresponde" porque no se va a emitir */
      const noCorresponde = (r && r.categoria === 'No corresponde');
      if(noCorresponde && (estado === 'desvio_emision_pendiente' || estado === 'desvio_pendiente_mayor_2m')){
        estado = 'no_corresponde';
      }
      out.push({
        poliza:p.poliza, asegurado:p.asegurado, rubro:p.rubro, producto:p.producto, moneda:p.moneda,
        tipo25:p.tipo2025, tipo26:p.tipo2026,
        concepto:c, esp25, real25:real25k, d25, ars25, usd25,
        esp26, real26:real26k, d26, ars26, usd26, estado,
        noCorresponde,
        categoria: r ? r.categoria : null,
        detalle: r ? r.detalle : null,
        vigDesde:p.vigDesde, vigHasta:p.vigHasta,
      });
    }
  }
  return out;
}

}
/* ============================================================
   AGREGACIÓN POR FIELD (rubro/producto/broker) + DESCOMPOSICIÓN
============================================================ */
function aggregateByFilt(field, mesCorte){
  const m = new Map();
  for(const p of state.polizas){
    const k = p[field]||'(sin)';
    if(!m.has(k)) m.set(k,{key:k,vARS25:0,vARS26:0,vUSD25:0,vUSD26:0,count:0,polizas:[]});
    const r = m.get(k);
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    r.vARS25 += f25.totARS; r.vARS26 += f26.totARS;
    r.vUSD25 += f25.totUSD; r.vUSD26 += f26.totUSD;
    r.count++; r.polizas.push(p);
  }
  return m;
}

function descomponerVariacion(polizasArr, mesCorte){
  /* La descomposición es: ΔTotal = Δ por concepto (sólo lo que SÍ emitió ambos años) + Pendiente
     Para pólizas con estado pendiente: TODO el monto 2025 se considera pendiente
     (porque en 2026 todavía no se emitió, total o parcialmente).
     Usamos valores nativos del Excel (USD y ARS$ ya cargados). */
  let pendUSD=0,pendARS=0;
  const conU={primaMin:0,ajuste:0,bono:0,malus:0};
  const conA={primaMin:0,ajuste:0,bono:0,malus:0};
  let pendCount = 0;
  for(const p of polizasArr){
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    const est = estadoPolizaConsolidado(p, mesCorte);
    const isPend = (est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m');
    if(isPend && f26.totUSD===0 && f26.totARS===0){
      pendUSD += -f25.totUSD; pendARS += -f25.totARS;
      if(f25.totUSD>0 || f25.totARS>0) pendCount++;
    } else {
      for(const c of CONCEPTOS_EMISIBLES){
        const k = KEYMAP[c];
        conU[k] += (f26.breakdownUSD[k]-f25.breakdownUSD[k]);
        conA[k] += (f26.breakdownARS[k]-f25.breakdownARS[k]);
      }
    }
  }
  return {pendUSD,pendARS,conU,conA,pendCount};
}

/* Tabla detalle: rubros en filas (orden por pólizas desc), conceptos en columnas */
function drawFieldDetailTable(sectionId, title, items, mesCorte, universo, monedaSet, cur){
  const wrap = document.getElementById(`${sectionId}-tabla`);
  if(!wrap) return;

  /* Determinar qué columnas mostrar de monto según filtros */
  const showUSD = (monedaSet!=='arsArs') && (cur!=='ars');
  const showARS = (monedaSet!=='usdUsd') && (cur!=='usd');

  /* Cell de Concepto (USD + ARS) — formato espacioso tipo screenshot del usuario.
     isBono: invierte signo porque el bono es negativo: más bono = más negativo */
  const fmtConceptCell = (vU25, vU26, vA25, vA26, rowId, varId, isBono)=>{
    const dU = (vU26||0)-(vU25||0), dA = (vA26||0)-(vA25||0);
    const dUPct = vU25 ? dU/vU25 : null;
    const dAPct = vA25 ? dA/vA25 : null;
    /* Para Bono: aumenta = más negativo = dU < 0 (deseable); el signo visual se invierte */
    const aumentoU = isBono ? (dU < 0) : (dU > 0);
    const aumentoA = isBono ? (dA < 0) : (dA > 0);
    const clsU = dU===0 ? 'neu' : (aumentoU ? 'pos' : 'neg');
    const clsA = dA===0 ? 'neu' : (aumentoA ? 'pos' : 'neg');
    let body = '';
    if(showUSD){

        <div class="cc-line cc-var ${clsU}">${dU>=0?'+':''}${FMT_USD(dU)} (${FMT_PCT(dUPct)})</div>
      </div>`;
    }
    if(showARS){
      body += `<div class="cc-block ars">
        <div class="cc-line cc-base"><span class="cc-currency-tag ars">ARS$</span>${FMT_ARS(vA25||0)} → ${FMT_ARS(vA26||0)}</div>
        <div class="cc-line cc-var ${clsA}">${dA>=0?'+':''}${FMT_ARS(dA)} (${FMT_PCT(dAPct)})</div>
      </div>`;
    }
    return `<td class="num cruzada-cell" data-row="${rowId}" data-varid="${varId}">${body}</td>`;
  };
  const fmtPctCell = (v25, v26, rowId, varId, isTasa)=>{
    const PCT = isTasa ? FMT_PCT_TASA : FMT_PCT;
    if(v25===null && v26===null) return `<td class="num cruzada-cell" data-row="${rowId}" data-varid="${varId}" style="color:var(--ink-3)">—</td>`;
    const d = (v26!=null && v25!=null) ? v26-v25 : null;
    const cls = d===null||d===0?'neu':(d>0?'pos':'neg');
    return `<td class="num cruzada-cell" data-row="${rowId}" data-varid="${varId}">
      <div class="cc-line cc-base">${v25!=null?PCT(v25):'—'} → ${v26!=null?PCT(v26):'—'}</div>
      <div class="cc-line cc-var ${cls}">${d!==null?(d>=0?'+':'')+PCT(d):'—'}</div>
    </td>`;
  };

  /* Encabezado: conceptos como columnas (Sin. H y Sin. UV se quitaron de la tabla detalle
     por pedido del usuario; siguen estando en otros gráficos y en Justificación) */
  const conceptCols = [
    {label:'Proyección', id:'proy'},
    {label:'Prima Mín.', id:'pm'},
    {label:'Ajuste', id:'aj'},
    {label:'Bono', id:'bn'},
    {label:'Malus', id:'ml'},
    {label:'Tasa', id:'tasa'},
    {label:'Emisión Pendiente', id:'pend'},
  ];
  const headerHTML = `<tr><th class="cruzada-th-rubro">${title}</th>${conceptCols.map(c=>`<th class="num cruzada-th-concept">${c.label}</th>`).join('')}</tr>`;

  /* Helper: monto pendiente para un grupo de pólizas */
  const calcPendienteGrupo = (polArr)=>{
    let pendU=0, pendA=0, count=0;
    for(const p of polArr){
      if(!polizaPendienteEmision(p, mesCorte)) continue;
      const f25 = calcEmisionFiltrada(p, 2025, mesCorte);
      pendU += f25.totUSD;
      pendA += f25.totARS;
      count++;
    }
    return {pendU, pendA, count};
  };

  /* Helper: render de celda de pendiente (estilo similar a fmtConceptCell pero solo con monto) */
  const fmtPendCell = (pendU, pendA, count, rowId)=>{
    let body = '';
    if(showUSD) body += `<div class="cc-block usd"><div class="cc-line cc-var neg"><span class="cc-currency-tag usd">USD</span>${FMT_USD(pendU)}</div></div>`;
    if(showARS) body += `<div class="cc-block ars"><div class="cc-line cc-var neg"><span class="cc-currency-tag ars">ARS$</span>${FMT_ARS(pendA)}</div></div>`;
    body += `<div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:4px;text-align:right">${count} pól. pend.</div>`;
    return `<td class="num cruzada-cell" data-row="${rowId}" data-varid="pend">${body}</td>`;
  };

  /* Filas: cada rubro con sus conceptos */
  const trs = items.map((i,idx)=>{
    const rowId = `${sectionId}_row_${idx}`;
    const M = i.M;
    const proyU = sumStat(M.proyU.todo), proyA = sumStat(M.proyA.todo);
    const tasa = avgStat(M.tasa.todo);
    const sinH = avgStat(M.sinH.todo);
    const sinUV = avgStat(M.sinUV.todo);

    /* Variación total para esta fila según filtros */
    const S = getConclMetricSet(M, universo, monedaSet);
    const dU = S.totU26-S.totU25, dA = S.totA26-S.totA25;
    const dUPct = S.totU25 ? dU/S.totU25 : null;
    const dAPct = S.totA25 ? dA/S.totA25 : null;

    const head = `<td class="cruzada-rubro-cell">
      <div class="cr-name">${i.key}</div>
      <div class="cr-count">${i.polizas.length} pól.</div>
      ${showUSD?`<div class="cr-var ${dU>=0?'pos':'neg'}">USD ${dU>=0?'+':''}${FMT_USD(dU)} (${FMT_PCT(dUPct)})</div>`:''}
      ${showARS?`<div class="cr-var ${dA>=0?'pos':'neg'}">ARS$ ${dA>=0?'+':''}${FMT_ARS(dA)} (${FMT_PCT(dAPct)})</div>`:''}
    </td>`;

    const pendData = calcPendienteGrupo(i.polizas);
    const cells = [
      fmtConceptCell(proyU.v25, proyU.v26, proyA.v25, proyA.v26, rowId, 'proy'),
      fmtConceptCell(M.concU25.primaMin, M.concU26.primaMin, M.concA25.primaMin, M.concA26.primaMin, rowId, 'pm'),
      fmtConceptCell(M.concU25.ajuste, M.concU26.ajuste, M.concA25.ajuste, M.concA26.ajuste, rowId, 'aj'),
      fmtConceptCell(M.concU25.bono, M.concU26.bono, M.concA25.bono, M.concA26.bono, rowId, 'bn', true /* isBono */),
      fmtConceptCell(M.concU25.malus, M.concU26.malus, M.concA25.malus, M.concA26.malus, rowId, 'ml'),
      fmtPctCell(tasa.v25, tasa.v26, rowId, 'tasa', true),
      fmtPendCell(pendData.pendU, pendData.pendA, pendData.count, rowId),
    ].join('');

    return `<tr>${head}${cells}</tr>`;
  }).join('');

  wrap.innerHTML = `<div class="tbl-wrap cruzada-wrap" style="max-height:none">
    <table class="cruzada-table cruzada-spacious">
      <thead>${headerHTML}</thead>
      <tbody>${trs}</tbody>
    </table>
  </div>`;

  /* Renderizar cards de detalle (ocultas inicialmente) */
  const cardsWrap = document.getElementById(`${sectionId}-detalle-cards`);
  if(cardsWrap){
    cardsWrap.innerHTML = items.map((i,idx)=>{
      const rowId = `${sectionId}_row_${idx}`;
      return `<div class="field-detail-row" id="${rowId}" data-row-idx="${idx}" style="display:none">
        <div class="field-detail-head"><div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--accent-3)">${i.key}</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:2px">${i.polizas.length} pólizas</div></div>
          <button class="btn-expand" onclick="closeFieldDetail('${rowId}')">Cerrar ✕</button>
        </div>
        <div class="field-detail-body" style="display:block">
          ${fieldDetailVariablePicker(rowId, i.M)}
        </div>
      </div>`;
    }).join('');
  }
}

window.closeFieldDetail = function(rowId){
  const row = document.getElementById(rowId);
  if(!row) return;
  row.style.display = 'none';
  /* Limpiar variables seleccionadas */
  _selectedVars[rowId] = new Set();
  row.querySelectorAll('.var-chip.active').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll(`.cruzada-cell[data-row="${rowId}"].selected`).forEach(c=>c.classList.remove('selected'));
};

function drawPanelGeneral(panelId, items, universo, monedaSet, cur){
  const wrap = document.getElementById(panelId);
  if(!wrap) return;

  /* Calcular varU/varA según filtros para cada item */
  const enriched = items.map(i=>{
    const S = getConclMetricSet(i.M, universo, monedaSet);
    const dU = S.totU26 - S.totU25;
    const dA = S.totA26 - S.totA25;
    const dUPct = S.totU25 ? dU/S.totU25 : null;
    const dAPct = S.totA25 ? dA/S.totA25 : null;
    return {key:i.key, polizas:i.polizas, dU, dA, dUPct, dAPct, totU25:S.totU25, totU26:S.totU26, totA25:S.totA25, totA26:S.totA26};
  });

  /* El criterio para "mejor/peor" depende del cur */
  const sortKey = cur==='ars' ? 'dA' : 'dU';
  /* CRITERIO MEJORADO: Top 3 mejoras = los 3 con MAYOR delta (positivos o, si no hay positivos,
     los menos negativos). Top 3 caídas = los 3 con MENOR delta. De esta forma SIEMPRE hay 3
     elementos en cada lado salvo que haya menos rubros disponibles. */
  const sortedDesc = [...enriched].sort((a,b)=>b[sortKey]-a[sortKey]);
  const sortedAsc  = [...enriched].sort((a,b)=>a[sortKey]-b[sortKey]);
  const positivos = sortedDesc.filter(i=>i[sortKey]>0);
  const negativos = sortedAsc.filter(i=>i[sortKey]<0);
  const topPos = positivos.length>0 ? positivos.slice(0,3) : sortedDesc.slice(0,3);
  const topNeg = negativos.length>0 ? negativos.slice(0,3) : sortedAsc.slice(0,3);
  const nadaMejoraReal = positivos.length === 0;
  const nadaCaidaReal = negativos.length === 0;

  const fmtPct = (v25,v26)=>{
    if(v25===0 && v26>0) return 'nuevo';
    if(v25===null || v26===null) return '—';
    if(v25===0) return '—';
    return FMT_PCT((v26-v25)/Math.abs(v25));
  };
  const renderTopItem = (i, esPos)=>{
    /* "esPos" es la columna (mejoras o caídas), pero el item puede ser realmente
       negativo cuando no hay positivos (caso "todo el año cae"). Renderizamos color
       según el signo REAL del delta, no la columna. */
    const realPos = (i[sortKey] || 0) > 0;
    const bgColor = realPos?'rgba(45,155,106,.06)':'rgba(217,71,71,.06)';
    const bdColor = realPos?'var(--pos)':'var(--neg)';
    const txtColor = realPos?'var(--pos)':'var(--neg)';
    const sign = realPos?'+':'';
    const showUSD = monedaSet!=='arsArs' && cur!=='ars';
    const showARS = monedaSet!=='usdUsd' && cur!=='usd';
    return `<div style="padding:10px;background:${bgColor};border-left:3px solid ${bdColor};border-radius:4px;margin-bottom:6px">
      <div style="font-weight:600;color:var(--accent-3);font-size:14px">${i.key}</div>
      ${showUSD?`<div style="font-family:var(--font-mono);font-size:11.5px;color:${txtColor};font-weight:700">USD ${sign}${FMT_USD_FULL(i.dU)} (${fmtPct(i.totU25,i.totU26)})</div>`:''}
      ${showARS?`<div style="font-family:var(--font-mono);font-size:11.5px;color:${txtColor};font-weight:700">ARS$ ${sign}${FMT_ARS_FULL(i.dA)} (${fmtPct(i.totA25,i.totA26)})</div>`:''}
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);margin-top:3px">${i.polizas.length} pól.</div>
    </div>`;
  };

  const avisoMejoras = nadaMejoraReal
    ? '<div style="font-family:var(--font-mono);font-size:10.5px;color:var(--warn);background:rgba(232,155,30,.10);padding:6px 10px;border-radius:3px;margin-bottom:6px;border-left:3px solid var(--warn)">No hay mejoras netas en este corte — se listan las 3 caídas <strong>menos negativas</strong>.</div>'
    : '';
  const avisoCaidas = nadaCaidaReal
    ? '<div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);font-style:italic;padding:6px 10px;margin-bottom:6px">Sin caídas — todos los grupos mejoran.</div>'
    : '';

  wrap.innerHTML = `
    <div class="grid-2" style="margin-top:10px">
      <div>
        <h4 style="font-size:13px;color:var(--pos);font-weight:700;margin-bottom:8px">▲ Top 3 mejoras</h4>
        ${avisoMejoras}
        ${topPos.length? topPos.map(i=>renderTopItem(i,true)).join('') : '<div style="color:var(--ink-3);font-size:12px">—</div>'}
      </div>
      <div>
        <h4 style="font-size:13px;color:var(--neg);font-weight:700;margin-bottom:8px">▼ Top 3 caídas</h4>
        ${avisoCaidas}
        ${topNeg.length? topNeg.map(i=>renderTopItem(i,false)).join('') : '<div style="color:var(--ink-3);font-size:12px">—</div>'}
      </div>
    </div>`;
}

/* Comparativos: render HTML + draws, respeta filtros */
function drawComparativosFinales(sectionId, items, universo, monedaSet, cur){
  const wrap = document.getElementById(`${sectionId}-comparativos`);
  if(!wrap) return;

  /* Default: USD si no se especifica explícitamente ARS.
     - segmento 'arsArs' → solo ARS
     - segmento 'usdUsd' → solo USD
     - cur 'ars' → solo ARS
     - cur 'usd' o 'dual' → solo USD (USD prioritario por defecto) */
  let allowUSD, allowARS;
  if(monedaSet==='arsArs'){ allowUSD=false; allowARS=true; }
  else if(monedaSet==='usdUsd'){ allowUSD=true; allowARS=false; }
  else if(cur==='ars'){ allowUSD=false; allowARS=true; }
  else { allowUSD=true; allowARS=false; }

  /* Para cada item calcular sus stats según universo + monedaSet */
  const enriched = items.map(i=>{
    const S = getConclMetricSet(i.M, universo, monedaSet);
    return {key:i.key, polizas:i.polizas, S};
  });

  /* HTML wrap — cada concepto individual */
  const cmpCard = (id, label)=>`<div><div class="dual-card-head" style="background:var(--accent-3);border-radius:5px;margin-bottom:6px;color:#fff;padding:8px 14px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">${label}</div><div class="chart-box tall"><canvas id="${id}_${sectionId}"></canvas></div></div>`;
  wrap.innerHTML = `<div class="grid-2">
    ${cmpCard('cmpAll_proy','Proyección de ventas')}
    ${cmpCard('cmpAll_pm','Prima Mínima')}
    ${cmpCard('cmpAll_aj','Ajuste')}
    ${cmpCard('cmpAll_bn','Bono')}
    ${cmpCard('cmpAll_ml','Malus')}
    ${cmpCard('cmpAll_tasa','Tasa promedio')}
  </div>`;

  const labels = enriched.map(i=>i.key);

  setTimeout(()=>{
    /* Paleta: celeste para 2025, azul para 2026 (mismo concepto, distintos años) */
    const COL_25_U='rgba(94,179,232,.85)', BRD_25_U='#5eb3e8';
    const COL_26_U='rgba(30,111,217,.90)', BRD_26_U='#1e6fd9';
    const COL_25_A='rgba(140,200,235,.65)', BRD_25_A='#7fb9dc';
    const COL_26_A='rgba(30,111,217,.65)', BRD_26_A='#1e6fd9';
    const BAR_OPTS = {barPercentage:0.95, categoryPercentage:0.9};

    /* Proyección */
    /* Decidir formato del eje Y según las monedas habilitadas.
       Si solo USD → 'usd'. Si solo ARS → 'ars'. Si ambas, USD por defecto
       (la mayoría de valores en pesos son más grandes y aún así se ven con MM). */
    const yMoneyEje = allowUSD && !allowARS ? 'usd' : (allowARS && !allowUSD ? 'ars' : (allowUSD ? 'usd' : 'ars'));

    if(document.getElementById('cmpAll_proy_'+sectionId)){
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:enriched.map(i=>i.S.proyUCut.v25||0),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,stack:'25u',...BAR_OPTS},
        {label:'2026 USD',data:enriched.map(i=>i.S.proyUCut.v26||0),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,stack:'26u',...BAR_OPTS},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:enriched.map(i=>i.S.proyACut.v25||0),backgroundColor:COL_25_A,borderColor:BRD_25_A,borderWidth:1.5,borderRadius:3,stack:'25a',...BAR_OPTS},
        {label:'2026 ARS$',data:enriched.map(i=>i.S.proyACut.v26||0),backgroundColor:COL_26_A,borderColor:BRD_26_A,borderWidth:1.5,borderRadius:3,stack:'26a',...BAR_OPTS},
      );
      drawChart('cmpAll_proy_'+sectionId,{type:'bar',data:{labels,datasets},options:chartOpts({yMoney:yMoneyEje,legend:true,xAngle:-30})});
    }
    /* Prima Mínima */
    if(document.getElementById('cmpAll_pm_'+sectionId)){
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:enriched.map(i=>i.S.conU25.primaMin||0),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,stack:'25u',...BAR_OPTS},
        {label:'2026 USD',data:enriched.map(i=>i.S.conU26.primaMin||0),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,stack:'26u',...BAR_OPTS},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:enriched.map(i=>i.S.conA25.primaMin||0),backgroundColor:COL_25_A,borderColor:BRD_25_A,borderWidth:1.5,borderRadius:3,stack:'25a',...BAR_OPTS},
        {label:'2026 ARS$',data:enriched.map(i=>i.S.conA26.primaMin||0),backgroundColor:COL_26_A,borderColor:BRD_26_A,borderWidth:1.5,borderRadius:3,stack:'26a',...BAR_OPTS},
      );
      drawChart('cmpAll_pm_'+sectionId,{type:'bar',data:{labels,datasets},options:chartOpts({yMoney:yMoneyEje,legend:true,xAngle:-30})});
    }
    /* Helper para Ajuste/Bono/Malus individual */
    const drawConceptIndividual = (id, key)=>{
      if(!document.getElementById(id+'_'+sectionId)) return;
      const datasets = [];
      if(allowUSD) datasets.push(
        {label:'2025 USD',data:enriched.map(i=>i.S.conU25[key]||0),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,stack:'25u',...BAR_OPTS},
        {label:'2026 USD',data:enriched.map(i=>i.S.conU26[key]||0),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,stack:'26u',...BAR_OPTS},
      );
      if(allowARS) datasets.push(
        {label:'2025 ARS$',data:enriched.map(i=>i.S.conA25[key]||0),backgroundColor:COL_25_A,borderColor:BRD_25_A,borderWidth:1.5,borderRadius:3,stack:'25a',...BAR_OPTS},
        {label:'2026 ARS$',data:enriched.map(i=>i.S.conA26[key]||0),backgroundColor:COL_26_A,borderColor:BRD_26_A,borderWidth:1.5,borderRadius:3,stack:'26a',...BAR_OPTS},
      );
      drawChart(id+'_'+sectionId,{type:'bar',data:{labels,datasets},options:chartOpts({yMoney:yMoneyEje,legend:true,xAngle:-30})});
    };
    drawConceptIndividual('cmpAll_aj','ajuste');
    drawConceptIndividual('cmpAll_bn','bono');
    drawConceptIndividual('cmpAll_ml','malus');

    /* Tasa */
    if(document.getElementById('cmpAll_tasa_'+sectionId)){
      drawChart('cmpAll_tasa_'+sectionId,{
        type:'bar',
        data:{labels,datasets:[
          {label:'2025',data:enriched.map(i=>i.S.tasaCut.v25!=null?i.S.tasaCut.v25*100:null),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
          {label:'2026',data:enriched.map(i=>i.S.tasaCut.v26!=null?i.S.tasaCut.v26*100:null),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
        ]},
        options:chartOpts({yPct:true,yPctDecimals:3,legend:true,xAngle:-30})
      });
    }
    /* Siniestralidad Histórica */
    if(document.getElementById('cmpAll_sH_'+sectionId)){
      drawChart('cmpAll_sH_'+sectionId,{
        type:'bar',
        data:{labels,datasets:[
          {label:'2025',data:enriched.map(i=>i.S.sinHCut.v25!=null?i.S.sinHCut.v25*100:null),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
          {label:'2026',data:enriched.map(i=>i.S.sinHCut.v26!=null?i.S.sinHCut.v26*100:null),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
        ]},
        options:chartOpts({yPct:true,legend:true,xAngle:-30})
      });
    }
    /* Siniestralidad Última Vigencia */
    if(document.getElementById('cmpAll_sUV_'+sectionId)){
      drawChart('cmpAll_sUV_'+sectionId,{
        type:'bar',
        data:{labels,datasets:[
          {label:'2025',data:enriched.map(i=>i.S.sinUVCut.v25!=null?i.S.sinUVCut.v25*100:null),backgroundColor:COL_25_U,borderColor:BRD_25_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
          {label:'2026',data:enriched.map(i=>i.S.sinUVCut.v26!=null?i.S.sinUVCut.v26*100:null),backgroundColor:COL_26_U,borderColor:BRD_26_U,borderWidth:1.5,borderRadius:3,...BAR_OPTS},
        ]},
        options:chartOpts({yPct:true,legend:true,xAngle:-30})
      });
    }
  }, 80);
}

/* Detalle expandible de un único rubro/producto/broker con selector de variables */

        <div style="font-size:13px;font-weight:700;color:var(--${cls})">USD ${dU>=0?'+':''}${FMT_USD_FULL(dU)} (${FMT_PCT(dUPct)})</div>
        <div style="font-size:13px;font-weight:700;color:var(--${cls})">ARS$ ${dA>=0?'+':''}${FMT_ARS_FULL(dA)} (${FMT_PCT(dAPct)})</div>
