<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Análisis Emisión · 2025 vs 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fafcff; --bg-2:#f1f5fb; --panel:#ffffff; --panel-2:#f4f8fd;
  --ink:#0a1f3a; --ink-2:#3d5475; --ink-3:#7a8ca8;
  --line:#dfe7f2; --line-2:#c5d2e3;
  --accent:#1e6fd9; --accent-2:#5eb3e8; --accent-3:#0a3d7a;
  --pos:#2d9b6a; --neg:#d94747; --warn:#e89b1e;
  --usd:#2d9b6a; --ars:#1e6fd9;
  --font: 'Calibri','Segoe UI','Helvetica Neue',Arial,sans-serif;
  --font-mono: 'Consolas','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased}
body{background-image:radial-gradient(1200px 600px at 80% -10%, rgba(94,179,232,.10), transparent 60%),radial-gradient(900px 500px at -10% 20%, rgba(30,111,217,.06), transparent 60%);min-height:100vh;}
.header{display:flex;align-items:flex-end;justify-content:space-between;padding:14px 48px 12px;border-bottom:1px solid var(--line);position:relative;}
.header::after{content:"";position:absolute;left:48px;right:48px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--accent) 30%,var(--accent) 70%,transparent)}
.brand h1{font-size:32px;line-height:1.1;font-weight:600;color:var(--accent-3);letter-spacing:-.01em}
.brand h1 em{font-style:normal;color:var(--accent);font-weight:600}
.brand .sub{font-size:13px;color:var(--ink-3);margin-top:4px}
.header-meta{text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}

.uploader-wrap{padding:6px 48px 4px}
.uploader{border:1px dashed var(--line-2);border-radius:4px;padding:6px 10px;display:inline-flex;align-items:center;gap:8px;background:var(--panel);transition:all .2s ease;cursor:pointer;font-size:11px;color:var(--ink-3)}
.uploader:hover{border-color:var(--accent);color:var(--accent)}
.uploader.drag{border-color:var(--accent);border-style:solid;background:var(--panel-2);color:var(--accent)}
.uploader-text{font-family:var(--font-mono);letter-spacing:.02em}
.uploader .mini-btn{background:var(--accent);color:#fff;border:none;padding:3px 8px;font-size:10.5px;font-weight:700;border-radius:3px;cursor:pointer;font-family:var(--font);letter-spacing:.03em}
.uploader .mini-btn:hover{background:var(--accent-3)}
input[type=file]{display:none}

.tabs-wrap{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);}
.tabs{display:flex;gap:2px;padding:0 48px;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;}
.tabs::-webkit-scrollbar{height:8px}
.tabs::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
.tab{padding:8px 14px;background:transparent;border:none;color:var(--ink-3);font-family:var(--font);font-size:12.5px;font-weight:600;letter-spacing:.02em;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .num{font-family:var(--font-mono);font-size:10px;opacity:.6}

main{padding:28px 32px 60px;max-width:2000px;margin:0 auto}
.section{display:none;animation:fadeIn .3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-head{margin-bottom:10px}
.section-head h2{font-size:20px;font-weight:600;color:var(--accent-3);letter-spacing:-.01em;line-height:1.15}
.section-head h2 em{font-style:normal;color:var(--accent)}

.timeline-filter{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(10,31,58,.04);}

/* Bar de filtros por sección (4 filtros) */
.sf-bar{background:var(--panel);border:1.5px solid var(--accent-2);border-radius:6px;padding:4px 9px;margin-bottom:7px;box-shadow:0 2px 6px rgba(10,31,58,.06);position:sticky;top:34px;z-index:9}
.sf-bar .sf-row{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;row-gap:4px}
.sf-bar .sf-row + .sf-row{margin-top:3px;padding-top:3px;border-top:1px dashed var(--line)}
.sf-bar .sf-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sf-bar .sf-lbl{font-family:var(--font-mono);font-size:9px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;white-space:nowrap}
/* Tamaño uniforme para TODOS los toggles de la barra (view + moneda) */
.sf-bar .view-toggle button,.sf-bar .curr-toggle button{padding:2px 7px;font-size:10px;letter-spacing:.02em}
/* Fila "desglose" (1° y 2°: selectores de mes a ancho completo) */
.sf-bar .sf-row--months{flex-wrap:nowrap}
.sf-bar .sf-row--months .view-toggle{flex-wrap:wrap}
/* Filas 3°–8°: grupos distribuidos izquierda↔derecha para ocupar menos alto */
.sf-bar .sf-row--spread{justify-content:space-between;gap:6px 12px}
/* Layout en columnas de a pares: 1/2 · 3/4 · 5/6 · 7/8 (izquierda→derecha, 2 filas de alto) */
.sf-bar .sf-cols{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px 20px}
.sf-bar .sf-col{display:flex;flex-direction:column;gap:6px}
/* Desplegables compactos para 1° Mes Corte y 2° Acumulado (en vez de filas largas de meses) */
.sf-bar .sf-select{padding:3px 22px 3px 8px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--accent-3);background:var(--panel);border:1px solid var(--line-2);border-radius:5px;cursor:pointer;letter-spacing:.02em;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%231e6fd9' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 7px center}

/* Banner con N (cantidad de pólizas mostradas) */
.n-label-bar{background:linear-gradient(135deg,rgba(30,111,217,.08),rgba(94,179,232,.04));border-left:4px solid var(--accent);padding:8px 14px;margin-bottom:14px;border-radius:5px;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--accent-3);letter-spacing:.02em}

/* === Botón informe + modal === */
.btn-report{background:linear-gradient(135deg,var(--accent),var(--accent-3));color:#fff;border:none;padding:8px 16px;font-family:var(--font);font-size:12.5px;font-weight:700;border-radius:5px;cursor:pointer;letter-spacing:.04em;box-shadow:0 2px 6px rgba(30,111,217,.25);transition:all .15s}
.btn-report:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(30,111,217,.35)}
.btn-print{background:var(--pos);color:#fff;border:none;padding:8px 16px;font-family:var(--font);font-size:12.5px;font-weight:700;border-radius:5px;cursor:pointer;letter-spacing:.04em;transition:background .15s}
.btn-print:hover{background:#249457}
.btn-close{background:transparent;border:1px solid var(--line-2);color:var(--ink-2);padding:6px 12px;font-size:16px;font-weight:700;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-close:hover{background:var(--neg);color:#fff;border-color:var(--neg)}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,31,58,.55);z-index:9999;display:flex;justify-content:center;align-items:flex-start;padding:30px 20px;overflow-y:auto}
.modal-content{background:var(--panel);border-radius:8px;max-width:1100px;width:100%;box-shadow:0 8px 32px rgba(10,31,58,.4);overflow:hidden;margin-bottom:30px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--panel-2);border-bottom:1.5px solid var(--line-2);position:sticky;top:0;z-index:10}
.modal-head h2{margin:0;font-size:18px;color:var(--accent-3);font-weight:700}
.modal-body{padding:30px 40px}

/* Estilos del informe (para impresión + pantalla) */
/* === Títulos destacados del Resumen ejecutivo === */
.ejec-block-title{
  font-size:23px;font-weight:800;color:#fff;letter-spacing:-.01em;line-height:1.2;
  background:linear-gradient(135deg,var(--accent-3),var(--accent));
  padding:13px 20px;border-radius:8px;margin-bottom:16px;
  box-shadow:0 3px 10px rgba(30,111,217,.22);
  display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;
}
.ejec-block-title::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--accent-2)}
/* Mismo tamaño/altura que el resto de los títulos (hereda 23px / padding base);
   solo conserva la separación entre "Presupuesto vs Emisión Real 2026". */
.ejec-block-title--lg{gap:16px;flex-wrap:wrap;letter-spacing:.005em}
.ejec-block-title--lg .ejb-sep{font-weight:600;opacity:.78;font-size:16px;letter-spacing:.06em;text-transform:uppercase}
.ejec-block-title--lg .ejb-year{font-family:var(--font-mono);font-size:21px;color:#fff;background:rgba(255,255,255,.16);padding:1px 11px;border-radius:6px}
.ejec-sub-title{
  font-size:18px;font-weight:800;letter-spacing:-.01em;margin:8px 0 10px;
  padding:9px 14px;border-radius:7px;display:inline-flex;align-items:center;gap:8px;
}
.ejec-sub-title.pos{color:var(--pos);background:rgba(45,155,106,.12);border-left:5px solid var(--pos)}
.ejec-sub-title.neg{color:var(--neg);background:rgba(217,71,71,.10);border-left:5px solid var(--neg)}
.exec-report{font-family:var(--font);color:var(--ink-1)}
.exec-report .er-title{font-size:24px;font-weight:700;color:var(--accent-3);margin-bottom:6px;letter-spacing:-.02em}
.exec-report .er-subtitle{font-size:13px;color:var(--ink-3);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--accent)}
.exec-report .er-section{margin-bottom:30px;page-break-inside:avoid}
.exec-report .er-section-title{font-size:14px;font-weight:700;color:var(--accent-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--line-2)}
.exec-report .er-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.exec-report .er-kpi{background:var(--bg-2);border-radius:6px;padding:14px;border-left:4px solid var(--accent)}
.exec-report .er-kpi.pos{border-left-color:var(--pos)}
.exec-report .er-kpi.neg{border-left-color:var(--neg)}
.exec-report .er-kpi.warn{border-left-color:var(--warn)}
.exec-report .er-kpi .er-kpi-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.exec-report .er-kpi .er-kpi-value{font-size:20px;font-weight:700;color:var(--accent-3);line-height:1.2}
.exec-report .er-kpi .er-kpi-sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-2);margin-top:6px;line-height:1.4}
.exec-report .er-kpi.pos .er-kpi-value{color:var(--pos)}
.exec-report .er-kpi.neg .er-kpi-value{color:var(--neg)}
.exec-report .er-kpi.warn .er-kpi-value{color:var(--warn)}

.exec-report .er-table{width:100%;border-collapse:collapse;font-size:12px}
.exec-report .er-table th{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:700;padding:5px 7px;text-align:left;border-bottom:1.5px solid var(--line-2);background:var(--bg-2)}
.exec-report .er-table td{padding:5px 7px;border-bottom:1px solid var(--line)}
.exec-report .er-table td.num{text-align:right;font-family:var(--font-mono)}
.exec-report .er-table tr:hover td{background:var(--bg-2)}

.exec-report .er-twocols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.exec-report .er-bullet{font-size:13px;line-height:1.7;color:var(--ink-1)}
.exec-report .er-bullet li{margin-bottom:6px}
.exec-report .er-callout{background:linear-gradient(135deg,rgba(45,155,106,.08),rgba(30,111,217,.04));border-left:4px solid var(--accent);padding:14px 18px;border-radius:5px;font-size:13px;line-height:1.6;color:var(--ink-1)}
.exec-report .er-callout strong{color:var(--accent-3)}

@media print{
  body > *:not(.modal-overlay){display:none!important}
  .modal-overlay{position:static;background:none;padding:0;display:block!important}
  .modal-content{box-shadow:none;max-width:none;margin:0}
  .modal-head{display:none}
  .modal-body{padding:0}
  .exec-report .er-section{page-break-inside:avoid}
  @page{margin:1.5cm}
}
.timeline-filter .tf-label{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.timeline-months{display:flex;gap:4px;flex-wrap:wrap}
.tm-btn{padding:6px 12px;background:transparent;border:1px solid var(--line);font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer;border-radius:4px;transition:all .15s;min-width:50px;}
.tm-btn:hover{background:var(--panel-2);border-color:var(--line-2)}
.tm-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tm-btn.all{background:var(--accent-3);color:#fff;border-color:var(--accent-3)}
.tm-btn.all.active{background:var(--accent);border-color:var(--accent)}
.timeline-filter .tf-info{font-family:var(--font-mono);font-size:11.5px;color:var(--accent-3);font-weight:600;margin-left:auto;background:var(--panel-2);padding:6px 12px;border-radius:4px}

/* KPI cards generales */
.dual-kpi{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dual-kpi.single-full{grid-template-columns:1fr}
.dual-kpi.four{grid-template-columns:repeat(4,1fr)}
@media(max-width:1300px){.dual-kpi.four{grid-template-columns:repeat(2,1fr)}}
.dual-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(10,31,58,.04)}
.dual-card-head{padding:10px 16px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:8px;justify-content:space-between}
.dual-card-head.usd{background:var(--usd)}
.dual-card-head.ars{background:var(--ars)}

/* Mini-emision compact (Resumen) */
.mini-emision{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(10,31,58,.04)}
.mini-emision .mini-row{display:grid;grid-template-columns:1fr 1fr 1.4fr;padding:10px 14px;gap:10px}
.mini-emision .mini-item{display:flex;flex-direction:column;gap:2px}
.mini-emision .mini-lbl{font-family:var(--font-mono);font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.mini-emision .mini-val{font-family:var(--font-mono);font-size:14px;color:var(--accent-3);font-weight:700;line-height:1.15}
.mini-emision .mini-val.pos{color:var(--pos)}
.mini-emision .mini-val.neg{color:var(--neg)}
.mini-emision .mini-pct{font-size:10.5px;font-weight:600;opacity:.9}

/* Resumen stack vertical (USD encima de ARS$) */
.resumen-stack{display:flex;flex-direction:column;gap:10px}
.resumen-top-row{align-items:stretch}
.resumen-top-row .card{display:flex;flex-direction:column}
.resumen-top-row .chart-box{flex:1;min-height:280px}

/* Portfolio layout: KPIs a la izq, breakdown a la der */
.portfolio-layout{display:grid;grid-template-columns:minmax(360px,1.1fr) 2fr;gap:16px;padding:14px 16px}
.portfolio-layout .portfolio-kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
.portfolio-layout .portfolio-detalle{background:var(--bg-2);border-radius:6px;padding:14px}
.portfolio-layout .dual-kpi-pendientes{}
@media (max-width:1200px){.portfolio-layout{grid-template-columns:1fr}}
.dual-card-head.usd-only{background:linear-gradient(90deg,var(--usd) 0%,#1e7a52 100%)}
.dual-card-head.ars-only{background:linear-gradient(90deg,var(--ars) 0%,var(--accent-3) 100%)}
.dual-card-head .count-pill{background:rgba(255,255,255,.22);padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.dual-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--line)}
.dual-kpi-item{background:var(--panel);padding:13px 14px 11px;display:flex;flex-direction:column;gap:3px}
.dual-kpi-item .label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.dual-kpi-item .value{font-size:18px;font-weight:700;color:var(--accent-3);letter-spacing:-.01em}
.dual-kpi-item .delta{font-family:var(--font-mono);font-size:11px;font-weight:600}
.dual-kpi-item .delta.pos{color:var(--pos)}
.dual-kpi-item .delta.neg{color:var(--neg)}
.dual-kpi-item .delta.neu{color:var(--ink-3);font-weight:500}

/* Compare boxes */
.compare-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;padding:10px;background:var(--bg-2);border-radius:5px}
.compare-pair-item{padding:5px 7px;border-radius:4px;border-left:3px solid;background:var(--panel)}
.compare-pair-item.y25{border-left-color:var(--accent-2)}
.compare-pair-item.y26{border-left-color:var(--accent)}
.compare-pair-item .yr{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.compare-pair-item .label-mini{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.compare-pair-item .val-main{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--accent-3)}
.compare-pair-item .val-sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-2);margin-top:1px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:18px;box-shadow:0 1px 3px rgba(10,31,58,.04)}
.card h3{font-size:16px;margin-bottom:0;font-weight:600;color:var(--accent-3)}
.card .card-sub{color:var(--ink-3);font-size:11.5px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media (max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr}}

.card-head-with-toggle{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:12px;flex-wrap:wrap}
.card-head-with-toggle h3{margin-bottom:0}

.curr-toggle{display:inline-flex;border:1px solid var(--line-2);border-radius:4px;overflow:hidden;flex-shrink:0}
.curr-toggle button{padding:5px 12px;background:transparent;border:none;font-family:var(--font);font-size:11px;font-weight:600;color:var(--ink-2);cursor:pointer;letter-spacing:.04em;transition:all .15s}
.curr-toggle button.active{background:var(--accent);color:#fff}
.curr-toggle button:not(.active):hover{background:var(--panel-2)}

.view-toggle{display:inline-flex;border:1px solid var(--line-2);border-radius:4px;overflow:hidden;flex-shrink:0}
.view-toggle button{padding:6px 14px;background:transparent;border:none;font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--ink-2);cursor:pointer;letter-spacing:.04em;transition:all .15s;border-right:1px solid var(--line-2)}
.view-toggle button:last-child{border-right:none}
.view-toggle button.active{background:var(--accent-3);color:#fff}
.view-toggle button:not(.active):hover{background:var(--panel-2)}

.tbl-wrap{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel-2);z-index:1;text-align:left;padding:10px 12px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-3);font-weight:700;border-bottom:1.5px solid var(--line-2);white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:rgba(94,179,232,.06)}
td.num,th.num{font-family:var(--font-mono);text-align:right;white-space:nowrap}
td.pos{color:var(--pos);font-weight:600}
td.neg{color:var(--neg);font-weight:600}
td.neu{color:var(--ink-3)}
tr.total-row{background:var(--panel-2);font-weight:700}
tr.total-row td{font-weight:700;color:var(--accent-3)}

.dual-amt{display:flex;flex-direction:column;gap:1px;align-items:flex-end}
.dual-amt .line-1{font-weight:700;color:var(--accent-3);font-size:12.5px}
.dual-amt .line-2{font-weight:700;color:var(--accent-3);font-size:12.5px}
.dual-amt.pos .line-1,.dual-amt.pos .line-2{color:var(--pos)}
.dual-amt.neg .line-1,.dual-amt.neg .line-2{color:var(--neg)}

.pill{display:inline-block;padding:3px 9px;border-radius:3px;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;border:1px solid;font-weight:600;white-space:nowrap}
.pill.pos{color:#1f7a52;border-color:rgba(45,155,106,.4);background:rgba(45,155,106,.08)}
.pill.neg{color:#a83232;border-color:rgba(217,71,71,.4);background:rgba(217,71,71,.08)}
.pill.warn{color:#a86d10;border-color:rgba(232,155,30,.4);background:rgba(232,155,30,.10)}
.pill.warn-soft{color:#1e6fd9;border-color:rgba(30,111,217,.4);background:rgba(30,111,217,.08)}
.pill.neu{color:var(--ink-3);border-color:var(--line-2);background:var(--panel-2)}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters input,.filters select{background:var(--panel);border:1px solid var(--line-2);color:var(--ink);padding:8px 12px;font-family:var(--font);font-size:13px;border-radius:4px;outline:none;transition:border-color .15s;}
.filters input:focus,.filters select:focus{border-color:var(--accent)}
.filters input{min-width:240px}
.filters .label{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;font-weight:600}

.chart-box{position:relative;height:320px}
.chart-box.tall{height:400px}
.chart-box.short{height:240px}

/* Justificación */
.justif-row{padding:14px 0;border-bottom:1px solid var(--line)}
.justif-row:last-child{border-bottom:none}
.justif-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.justif-head .pol-name{font-size:15px;font-weight:600;color:var(--accent-3)}
.justif-head .pol-name .pol-num{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-left:8px;font-weight:500}
.justif-head .pol-meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-align:right}

.concept-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}
.concept-card{padding:5px 7px;background:var(--panel-2);border-radius:4px;border-left:3px solid var(--line-2);font-family:var(--font-mono)}
.concept-card.has-data{border-left-color:var(--accent)}
.concept-card.no-data{opacity:.55}
.concept-card .cn{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.concept-card .cv-row{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink)}
.concept-card .cv-row .yr{color:var(--ink-3)}
.concept-card .cv-var{margin-top:3px;padding-top:3px;border-top:1px solid var(--line);font-size:10.5px;font-weight:600}
.concept-card .cv-var.pos{color:var(--pos)}
.concept-card .cv-var.neg{color:var(--neg)}
.concept-card .cv-var.neu{color:var(--ink-3)}

.justif-reasons{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.justif-reason{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);line-height:1.5}
.justif-reason::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0}
.pol-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* Top10 */
.top-card{display:grid;grid-template-columns:42px 1fr auto;gap:14px;align-items:center;padding:14px 16px;border:1px solid var(--line);background:var(--panel);margin-bottom:8px;transition:all .15s;border-radius:4px}
.top-card:hover{border-color:var(--accent-2);box-shadow:0 2px 8px rgba(30,111,217,.08)}
.top-rank{font-size:24px;font-weight:700;color:var(--accent);line-height:1;font-family:var(--font-mono)}
.top-info .name{font-size:14.5px;font-weight:600;color:var(--accent-3);margin-bottom:3px}
.top-info .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);margin-bottom:5px}
.top-info .reason{font-size:12px;color:var(--ink-2);line-height:1.45}
.top-impact{text-align:right;font-family:var(--font-mono)}
.top-impact .v{font-size:16px;font-weight:700}
.top-impact .v.pos{color:var(--pos)}
.top-impact .v.neg{color:var(--neg)}
.top-impact .l{font-size:10px;color:var(--ink-3);text-transform:uppercase;font-weight:600}

.empty-state{text-align:center;padding:80px 24px;color:var(--ink-3)}
.empty-state h3{font-size:22px;margin-bottom:8px;color:var(--ink-2);font-weight:600}
.empty-state p{font-size:13px}

footer{padding:20px 48px;border-top:1px solid var(--line);font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-align:center}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-2);border-radius:5px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px;border:2px solid var(--bg-2)}
::-webkit-scrollbar-thumb:hover{background:var(--accent-2)}

.btn{background:var(--accent);color:#fff;border:none;padding:9px 18px;font-family:var(--font);font-weight:600;font-size:12.5px;cursor:pointer;border-radius:4px;transition:all .2s;box-shadow:0 1px 2px rgba(30,111,217,.2);}
.btn:hover{background:var(--accent-3);box-shadow:0 2px 6px rgba(30,111,217,.3)}

/* Conclusiones */
.concl-block{padding:14px 0;border-bottom:1px solid var(--line)}
.concl-block:last-child{border-bottom:none}
.concl-block-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.concl-block-head .h{font-size:18px;font-weight:600;color:var(--accent-3)}
.concl-block-head .h .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);font-weight:500;margin-left:8px}
.concl-block-head .delta-big{font-family:var(--font-mono);font-size:14px;font-weight:700;text-align:right}
.concl-block-head .delta-big.pos{color:var(--pos)}
.concl-block-head .delta-big.neg{color:var(--neg)}
.concl-block-head .delta-big .ars-sub{display:block;font-size:13px;color:var(--ink-2);font-weight:500;margin-top:2px}

.concl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin:10px 0}
.concl-cell{padding:5px 7px;background:var(--panel-2);border-left:3px solid var(--accent-2);border-radius:3px;font-family:var(--font-mono);font-size:11px;}
.concl-cell .l{color:var(--ink-3);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px;display:block}
.concl-cell .v{color:var(--ink);font-weight:600;font-size:12px;display:block;line-height:1.35}
.concl-cell.pos{border-left-color:var(--pos)}
.concl-cell.pos .v{color:var(--pos)}
.concl-cell.neg{border-left-color:var(--neg)}
.concl-cell.neg .v{color:var(--neg)}
.concl-cell.warn{border-left-color:var(--warn)}

.concl-final{background:linear-gradient(135deg,rgba(30,111,217,.06),rgba(94,179,232,.04));border-left:3px solid var(--accent);padding:12px 14px;margin-top:10px;border-radius:4px;font-size:13px;color:var(--ink);line-height:1.55;}
.concl-final strong{color:var(--accent-3)}

h4.section-title{margin:14px 0 8px 0;font-size:13px;color:var(--accent-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.section-sub{font-size:11px;color:var(--ink-3);margin-bottom:8px}

.badge-stat{display:inline-flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:11px;color:var(--ink-3);background:var(--bg-2);padding:3px 8px;border-radius:3px;margin-left:8px}
.badge-stat strong{color:var(--accent-3)}

.var-rubro-detalle{margin-top:6px;padding:5px 7px;background:rgba(30,111,217,.04);border-left:2px solid var(--accent-2);border-radius:3px;font-size:11.5px;color:var(--ink-2);line-height:1.5;display:none}
.var-rubro-detalle.show{display:block}
.var-rubro-detalle strong{color:var(--accent-3)}
.btn-expand{background:none;border:1px solid var(--line-2);padding:4px 10px;font-family:var(--font);font-size:11px;color:var(--accent);cursor:pointer;border-radius:3px;font-weight:600;transition:all .15s}
.btn-expand:hover{background:var(--panel-2);border-color:var(--accent)}

/* Tabla cruzada concepto × field */
.cruzada-table{font-size:11.5px}
.cruzada-table thead th{font-size:10px;padding:5px 7px}
.cruzada-table td{padding:5px 7px;vertical-align:top}

/* Layout espacioso (estilo screenshot) */
.cruzada-wrap{overflow-x:auto}
.cruzada-spacious{font-size:12px;border-collapse:separate;border-spacing:0}
.cruzada-spacious thead th{
  font-family:var(--font-mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--ink-3);
  font-weight:700;
  padding:12px 16px;
  text-align:center;
  background:var(--bg-2);
  border-bottom:1.5px solid var(--line-2);
  white-space:nowrap;
}
.cruzada-th-rubro{text-align:left!important;background:var(--panel-2)!important;min-width:200px}
.cruzada-th-concept{text-align:center!important;min-width:175px}
.cruzada-spacious tbody td{
  padding:20px 14px;
  vertical-align:top;
  border-bottom:1.5px solid var(--line);
  background:var(--panel);
  transition:background .15s;
}
.cruzada-spacious tbody tr:hover td{background:rgba(94,179,232,.05)}
.cruzada-spacious tbody tr:nth-child(even) td{background:rgba(244,247,251,.4)}
.cruzada-spacious tbody tr:nth-child(even):hover td{background:rgba(94,179,232,.08)}

/* Celda de cabecera del rubro (izquierda) */
.cruzada-rubro-cell{
  min-width:200px;
  background:var(--panel-2)!important;
  border-right:2px solid var(--line-2);
}
.cruzada-rubro-cell .cr-name{
  font-size:15px;
  font-weight:700;
  color:var(--accent-3);
  margin-bottom:4px;
  line-height:1.2;
}
.cruzada-rubro-cell .cr-count{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--ink-3);
  margin-bottom:10px;
}
.cruzada-rubro-cell .cr-var{
  font-family:var(--font-mono);
  font-size:11.5px;
  font-weight:700;
  line-height:1.6;
  letter-spacing:.02em;
}
.cruzada-rubro-cell .cr-var.pos{color:var(--pos)}
.cruzada-rubro-cell .cr-var.neg{color:var(--neg)}

/* Celdas de concepto */
.cruzada-cell{
  cursor:pointer;
  text-align:right;
}
.cruzada-cell .cc-line{
  font-family:var(--font-mono);
  font-size:11.5px;
  line-height:1.6;
  white-space:nowrap;
  text-align:right;
}
.cruzada-cell .cc-base{color:var(--accent-3)}
.cruzada-cell .cc-var{font-weight:700;font-size:12px;letter-spacing:.02em}
.cruzada-cell .cc-var.pos{color:var(--pos)}
.cruzada-cell .cc-var.neg{color:var(--neg)}
.cruzada-cell .cc-var.neu{color:var(--ink-3)}
.cruzada-cell .cc-sep{
  margin-top:10px;
  padding-top:8px;
  border-top:1px dashed var(--line-2);
}
.cruzada-cell .cc-currency-tag{
  display:inline-block;
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  padding:1px 5px;
  border-radius:3px;
  margin-right:6px;
  vertical-align:middle;
}
.cruzada-cell .cc-currency-tag.usd{background:rgba(45,155,106,.15);color:var(--pos)}
.cruzada-cell .cc-currency-tag.ars{background:rgba(30,111,217,.15);color:var(--accent)}
.cruzada-cell .cc-block{
  display:block;
  padding:4px 6px;
  border-radius:3px;
  margin-bottom:3px;
}
.cruzada-cell .cc-block.usd{background:rgba(45,155,106,.04)}
.cruzada-cell .cc-block.ars{background:rgba(30,111,217,.04)}
.cruzada-cell:hover{background:rgba(94,179,232,.12)!important}
.cruzada-cell.selected{background:rgba(45,155,106,.12)!important;box-shadow:inset 0 0 0 1.5px var(--pos)}

/* Field detail row (expandible) */
.field-detail-row{border:1px solid var(--line);border-radius:5px;margin-bottom:8px;overflow:hidden;background:var(--panel)}
.field-detail-row:hover{border-color:var(--line-2)}
.field-detail-head{display:flex;align-items:center;gap:14px;padding:12px 14px;cursor:pointer;transition:background .15s}
.field-detail-head:hover{background:var(--panel-2)}
.field-detail-toggle{font-family:var(--font-mono);font-size:14px;color:var(--accent);width:24px;text-align:center;transition:transform .15s}
.field-detail-body{padding:14px;border-top:1px solid var(--line);background:var(--bg-2)}
.var-picker{display:block}
.var-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.var-chip{padding:6px 12px;background:var(--panel);border:1px solid var(--line-2);font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--ink-2);cursor:pointer;border-radius:18px;transition:all .15s}
.var-chip:hover{background:var(--panel-2);border-color:var(--accent)}
.var-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.var-charts-area{margin-top:8px}
.var-charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:10px}
.var-chart-block{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px}
.var-chart-title{font-family:var(--font-mono);font-size:11px;color:var(--accent-3);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>
<header class="header">
  <div class="brand">
    <h1>Emisión <em>Comercial Créditos</em></h1>
  </div>
  <div class="header-meta">
    <!-- Botón compacto del Mes de Corte Global — ahora vive como "1° Mes Corte 2026"
         dentro del bar de filtros de cada sección, por pedido del usuario. Se deja
         oculto pero presente para no romper código existente. -->
    <div id="globalMesMenu" style="display:none !important;position:relative">
      <button id="globalMesBtn" onclick="toggleGlobalMesPanel()" style="background:linear-gradient(135deg,#0a3d7a,#1e6fd9);color:#fff;border:none;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:700;border-radius:5px;cursor:pointer;letter-spacing:.02em;box-shadow:0 2px 6px rgba(10,31,58,.25);display:inline-flex;align-items:center;gap:8px">
        <span>🌐 Mes Corte 2026</span>
        <span id="globalMesBtnLabel" style="font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.18);padding:2px 6px;border-radius:3px">Todo el año</span>
        <span style="font-size:9px">▼</span>
      </button>
      <div id="globalMesPanel" style="display:none;position:absolute;right:0;top:100%;margin-top:6px;background:#fff;border:1.5px solid var(--accent);border-radius:6px;padding:12px;box-shadow:0 6px 20px rgba(10,31,58,.18);min-width:300px;z-index:100;text-align:left">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--accent-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Mes de corte para 2026</div>
        <div style="font-size:11px;color:var(--ink-2);margin-bottom:10px;line-height:1.4">
          Filtra <strong>solo 2026</strong> hasta el mes indicado.<br>
          <strong>2025 queda con año completo.</strong><br>
          <em style="color:var(--ink-3);font-size:10.5px">Distinto al "Acumulado hasta" de cada sección, que filtra ambos años.</em>
        </div>
        <div id="globalMesToggle" class="view-toggle" data-vt="GLOBAL_mes" style="flex-wrap:wrap"></div>
      </div>
    </div>
  </div>
</header>

<!-- Modal Informe Ejecutivo eliminado por solicitud del usuario -->

<div class="uploader-wrap">
  <label class="uploader" id="dropzone" for="fileInput">
    <span class="uploader-text">↗ Cargar .xlsx</span>
    <button type="button" class="mini-btn" onclick="document.getElementById('fileInput').click();event.stopPropagation()">Seleccionar</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
  </label>
</div>

<div class="tabs-wrap" id="tabsWrap" style="display:none">
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="ejecutivo"><span class="num">01</span>Resumen Ejecutivo</button>
    <button class="tab" data-tab="polizas"><span class="num">02</span>Justificación por Póliza</button>
    <button class="tab" data-tab="top10"><span class="num">03</span>Top Casos</button>
  </nav>
</div>

<!-- BARRA GLOBAL DE MES — reemplazada por menú compacto en la cabecera -->

<main id="content">
  <div class="empty-state" id="emptyState">
    <h3>Esperando datos</h3>
    <p>Cargá el Excel de emisión para iniciar el análisis.</p>
  </div>
</main>


<script>
/* ============================================================
   STATE
============================================================ */
const state = {
  raw: [], polizas: [], fileName: null,
  /* Presupuestos del Excel (cargados desde filas-cabecera con etiqueta) */
  presup: {
    cont25_ars: Array(12).fill(0), cont25_usd: Array(12).fill(0),
    cont26_ars: Array(12).fill(0), cont26_usd: Array(12).fill(0),
    arg25_ars: Array(12).fill(0), arg25_usd: Array(12).fill(0),
    arg26_ars: Array(12).fill(0), arg26_usd: Array(12).fill(0),
    arg25_solo_ars: Array(12).fill(0), arg25_solo_usd: Array(12).fill(0),
    arg26_solo_ars: Array(12).fill(0), arg26_solo_usd: Array(12).fill(0),
  },
  monthFilters: {resumen:0, desvios:0, rubro:0, producto:0, polizas:0, agregada:0, conclrubro:0, conclprod:0},
  /* Contexto de filtros activo de la sección en render (para que las funciones
     internas tengan acceso a "excluirAnualAnt" sin tener que pasarlo en cada llamada).
     Cada render de sección setea esto al inicio. */
  _activeCtx: {excluirAnualAnt: true},
};
const charts = {};

/* Formato corto de número de póliza: solo los últimos 3 dígitos para no ocupar
   espacio en la UI. El número completo sigue guardado en p.poliza para búsquedas
   y claves internas. */
function fmtPoliza(n){
  if(n===null || n===undefined) return '';
  const s = String(n);
  return s.length>3 ? s.slice(-3) : s;
}

/* Chip de moneda — pequeño badge con el símbolo + label "Pól. en pesos/dólares".
   Usa la paleta unificada: $ ámbar, US violeta. Aparece en headers de columna
   de los drills (Emisión 2026 y Desvío) para identificar la moneda original. */
function monedaChipHTML(esUS){
  const c  = esUS ? '#8b5cf6' : '#e89b1e';
  const bg = esUS ? 'rgba(139,92,246,.10)' : 'rgba(232,155,30,.10)';
  const sym = esUS ? 'US' : '$';
  const lbl = esUS ? 'Pól. en dólares' : 'Pól. en pesos';
  return `<span style="display:inline-flex;align-items:center;gap:6px;background:${bg};color:${c};font-size:14.5px;font-weight:800;padding:5px 13px;border-radius:6px"><span style="font-size:16px">${sym}</span>${lbl}</span>`;
}

/* ============================================================
   CONFIGURACIÓN EDITABLE  (APP_CONFIG)
   ------------------------------------------------------------
   Este objeto concentra lo que se puede personalizar SIN tocar
   las fórmulas: de qué columna del Excel sale cada dato, los
   colores de las causas del Desvío y sus textos.
   Se puede sobreescribir cargando un archivo de configuración
   con el editor externo (window.APP_CONFIG_OVERRIDE).
   Las columnas son 0-based: A=0, B=1, C=2, … (col 0 = primera). */
const APP_CONFIG_DEFAULT = {
  columnas: {
    ejecutivo:0, asistente:1, poliza:2, asegurado:3, codigo:4, producto:5,
    moneda:6, rubro:7, broker:8, vigDesde:9, vigHasta:10,
    /* NUEVA columna L (índice 11): fecha de inicio de la anualidad 2026 de la póliza.
       Es la referencia AUTORITATIVA de cuándo debe emitirse la prima mínima 2026
       (y, +1 mes, ajuste/bono/malus). Todo lo que sigue se corre +1 respecto al layout previo. */
    inicioAnualidad2026:11,
    tipo2025:12, fechaEm2025:13, real2025:14, ars2025:15, usd2025:16,

/* Formato compacto: máximo 3 dígitos visibles.
   - 1-9.99 → 2 decimales (ej. 2.45M)
   - 10-99.9 → 1 decimal  (ej. 25.4M)
   - 100-999 → 0 decimales (ej. 250M)
   Sufijos: k = miles, M = millones, MM = miles de millones */
const _fmt3 = (v)=>{
  const a = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  const av = a;
  if(av < 10) return sign + av.toFixed(2);
  if(av < 100) return sign + av.toFixed(1);
  return sign + Math.round(av).toString();
};
const FMT_USD = (n)=>{
  if(n===null||n===undefined||isNaN(n)) return '—';
  if(n===0) return 'US 0';
  const abs = Math.abs(n);
  if(abs >= 1e9) return 'US '+_fmt3(n/1e9)+'MM';
  if(abs >= 1e6) return 'US '+_fmt3(n/1e6)+'M';
  if(abs >= 1e3) return 'US '+_fmt3(n/1e3)+'k';
  return 'US '+Math.round(n);
};
const FMT_USD_FULL = (n)=> (n===null||n===undefined||isNaN(n))?'—':'US '+Math.round(n).toLocaleString('es-AR');
const FMT_ARS = (n)=>{
  if(n===null||n===undefined||isNaN(n)) return '—';
  if(n===0) return '$0';
  const abs = Math.abs(n);
  if(abs >= 1e9) return '$'+_fmt3(n/1e9)+'MM';
  if(abs >= 1e6) return '$'+_fmt3(n/1e6)+'M';
  if(abs >= 1e3) return '$'+_fmt3(n/1e3)+'k';
  return '$'+Math.round(n);
};
const FMT_ARS_FULL = (n)=> (n===null||n===undefined||isNaN(n))?'—':'$'+Math.round(n).toLocaleString('es-AR');
const FMT_PCT = (n)=> (n===null||n===undefined||isNaN(n)||!isFinite(n))?'—':(n*100).toFixed(0)+'%';
const FMT_PCT_TASA = (n)=> (n===null||n===undefined||isNaN(n)||!isFinite(n))?'—':(n*100).toFixed(3)+'%';
const FMT_PCT_SIN = (n)=> (n===null||n===undefined||isNaN(n)||!isFinite(n))?'—':Math.round(n*100)+'%';
const FMT_NUM = (n)=> (n===null||n===undefined||isNaN(n))?'—':n.toLocaleString('es-AR',{maximumFractionDigits:2});

function fmtMoney(cur, n){ return cur==='ars' ? FMT_ARS_FULL(n) : FMT_USD_FULL(n); }
function fmtMoneyShort(cur, n){ return cur==='ars' ? FMT_ARS(n) : FMT_USD(n); }

/* dual cell con tamaños IGUALES y colores neutros */
function cellByCurrency(cur, usd, ars){

}
function deltaCellByCurrency(cur, du, da){
  if(cur==='usd') return (du>=0?'+':'')+FMT_USD_FULL(du);

  return `<div class="dual-amt ${cls}"><span class="line-1">${FMT_PCT(pu)}</span><span class="line-2">${FMT_PCT(pa)}</span></div>`;
}

function excelDate(s){
  if(s instanceof Date){
    if(s.getFullYear() < 2000 || s.getFullYear() > 2100) return null;
    return s;
  }
  if(typeof s !== 'number') return null;
  if(s < 36000 || s > 80000) return null;
  return new Date((s - 25569) * 86400 * 1000);
}
function monthKey(d){ return d ? d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') : null; }
function monthLabel(k){ if(!k) return '—'; const [y,m]=k.split('-'); return MESES[parseInt(m)-1]+' '+y; }
function monthOfKey(k){ return k ? parseInt(k.split('-')[1]) : null; }

/* Mes en que ARRANCA la anualidad que corresponde a `anio` (y por ende cuándo debe
   emitirse la prima mínima de esa anualidad).
   Regla (confirmada con el usuario, casos Stenfar/ADVANTA/ANTA):
   - La anualidad NO siempre dura 12 meses exactos: puede ser un poco más larga. Por eso
     el fin de la anualidad vigente lo marca VIGENCIA HASTA, y la NUEVA anualidad arranca
     el 1° del mes SIGUIENTE a VigHasta.
   - Cuando la vigencia es LARGA (cubre varias anualidades), dentro de ella cada aniversario
     (VigDesde + N años) es inicio de una nueva anualidad y también emite. El último tramo
     termina en VigHasta y la renovación arranca el mes siguiente.
   Procedimiento: se generan los inicios de anualidad —los aniversarios VigDesde, +1año,
   +2años… que caen ESTRICTAMENTE antes del fin de la anualidad final, más el inicio que
   sigue a VigHasta— y se devuelve el que cae en `anio`.
   Ejemplos:
   - VigDesde 01/04/2024, VigHasta 31/05/2026 (Stenfar): la anualidad vigente termina
     31/05/2026 → nueva anualidad arranca JUNIO 2026. (No abril, aunque el aniversario de
     VigDesde sea abril: la anualidad se extendió hasta mayo.)
   - VigDesde 01/01/2024, VigHasta 31/12/2026: aniversario 01/01/2026 dentro de vigencia
     → enero 2026.
   - VigDesde 01/03/2025, VigHasta 28/02/2027: aniversario 01/03/2026 dentro → marzo 2026. */
function mesEsperadoEmision(vigDesde, vigHasta, anio, inicioExplicito2026){
  /* PRIORIDAD: si la póliza trae la fecha EXPLÍCITA de inicio de anualidad 2026
     (columna "Inicio Anualidad 2026" del Excel) y estamos calculando 2026, usarla
     directamente. Es la referencia autoritativa del negocio y evita los problemas
     de inferir el inicio a partir de Vigencia Desde/Hasta. */
  if(anio===2026 && inicioExplicito2026 instanceof Date && !isNaN(inicioExplicito2026)){
    return inicioExplicito2026.getFullYear()+'-'+String(inicioExplicito2026.getMonth()+1).padStart(2,'0');
  }
  if(!vigDesde || !vigHasta) return null;
  const vdMesKey = vigDesde.getFullYear()*12 + vigDesde.getMonth();
  const vhMesKey = vigHasta.getFullYear()*12 + vigHasta.getMonth();
  const inicioPostVig = vhMesKey + 1;          /* renovación: mes siguiente al fin de cobertura */
  const iniAnio = anio*12, finAnio = anio*12 + 11;

  /* Construir la lista de inicios de anualidad:
     - Aniversarios VigDesde + N años, pero SOLO si tras ese aniversario todavía queda una
       anualidad completa dentro de la cobertura (k + 12 <= inicioPostVig). Si el aniversario
       cae en el ÚLTIMO tramo (la anualidad vigente se extiende hasta VigHasta, que puede ser
       más larga que 12 meses), ese aniversario NO es un nuevo inicio.
     - La renovación que sigue al fin de la cobertura (inicioPostVig). */
  const inicios = [];
  for(let n=0; n<=80; n++){
    const k = vdMesKey + n*12;
    if(k >= inicioPostVig) break;
    /* ¿Queda una anualidad completa después de este aniversario, dentro de la cobertura? */
    if(k + 12 <= inicioPostVig) inicios.push(k);
  }
  inicios.push(inicioPostVig);
  /* Devolver el inicio que cae en `anio`. */
  for(const k of inicios){
    if(k >= iniAnio && k <= finAnio){
      const m = k % 12;
      return anio+'-'+String(m+1).padStart(2,'0');
    }
  }
  return null;
}
function diffMeses(real, esp){
  if(!real || !esp) return null;
  const [y1,m1] = real.split('-').map(Number);
  const [y2,m2] = esp.split('-').map(Number);
  return (y1-y2)*12 + (m1-m2);
}

/* ============================================================
   LECTURA DEL EXCEL — estructura Libro6
   col 0 Ejecutivo, 1 Asistente, 2 Póliza, 3 Asegurado, 4 Código, 5 Producto,

   col 30: etiqueta de presupuesto, cols 31-42: valores mensuales

function readExcel(file){
  state.fileName = file.name;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const data = new Uint8Array(e.target.result);
    /* cellStyles:true → necesario para leer el RESALTADO AMARILLO de "Presup Arg HTML"
       (celda confirmada = se emite este mes). */
    const wb = XLSX.read(data,{type:'array',cellDates:true,cellStyles:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,blankrows:false});
    parseRows(rows);
    parsePresupuestos(rows);
    parseProyEmis(rows);
    parseInsur(rows);   /* bloque AF19:AR24 "INSUR ANÁLISIS" (Mantención + Costos de estudio) */
    /* Presupuesto/proyección 2026 desde 2 hojas nuevas:
         "Confirmado Proyeccion" = confirmado que se emite (antes: celdas amarillas).
         "Presupuesto Argentina" = presupuestado sin confirmar (antes: sin amarillo).
       Respaldo: hoja única antigua "Presup Arg HTML" con amarillo. */
    _presupArgReset();
    const _findSheet=(re)=>{ const n=wb.SheetNames.find(x=>re.test(_accent(x))); return n?wb.Sheets[n]:null; };
    const wsBudget=_findSheet(/presupuesto argentina/) || _findSheet(/presup.*arg/);
    const wsConf=_findSheet(/co?nfirmado/);
    if(wsBudget || wsConf){
      parsePresupArgBudget(wsBudget);
      parseConfProy(wsConf);
    } else {
      parsePresupArg(_findSheet(/presup/));   /* formato antiguo */
    }
    state._presupArg.ok = state._presupArg.rows.length>0;
    parseGrupos(wb);   /* hoja "Grupos" (o cualquiera con columnas Póliza + Grupo): Póliza → Grupo económico */
    aggregatePolizas();
    renderAll();
    document.getElementById('tabsWrap').style.display='block';
    /* El botón flotante "🌐 Mes Corte 2026" queda oculto: su control vive ahora
       como "1° Mes Corte 2026" dentro de la barra de filtros de cada sección. */
    initGlobalMesFilter();
  };
  reader.readAsArrayBuffer(file);
}

/* Parser del bloque "Proyecciones de Emisión" del Excel (~columna AF, fila 19).
   Por bloque, suma Prima Mínima + Ajuste + Malus (SIN Bono) en $ (col AG) y US (col AH).
   Alimenta el botón OK de la Estimación. Cada bloque se indexa por NÚMERO DE PÓLIZA
   (referencia principal) y también por NOMBRE de asegurado (fallback).
   Layout esperado:
     AF: etiquetas (Asegurado / Poliza / Prima Minima / Ajuste / Malus / Bono)
     fila "Asegurado": AG = NOMBRE del asegurado
     fila "Poliza":    AG = NÚMERO de póliza
     filas de concepto: AG = valor en $, AH = valor en US */
function _normProyKey(s){ return String(s==null?'':s).trim().toLowerCase(); }
function _digitsKey(s){ const d = String(s==null?'':s).replace(/\D/g,'').replace(/^0+/,''); return d || null; }
/* Valor de "Proyección de Emisión" del Excel (bloque AF–AH) para una póliza, por moneda
   (suf='u' → USD, 'a' → ARS). Busca por número de póliza y, si no, por nombre de asegurado. */
function _excelEstimVal(p, suf){
  if(!p || !state._ejecProyEmis) return 0;
  const tk = [_normProyKey(p.poliza), _digitsKey(p.poliza), _normProyKey(p.asegurado)];
  for(const k of tk){ if(k && state._ejecProyEmis[k]){ const o = state._ejecProyEmis[k]; const v = (suf==='u') ? o.usd : o.ars; return isFinite(v) ? v : 0; } }
  return 0;
}
/* Valor del Excel (bloque AF–AH) para UN concepto puntual (primaMin/ajuste/malus/bono) de la
   póliza, en la moneda pedida. Así cada concepto del pendiente toma SOLO su propio dato y no se
   mezcla con los demás (p. ej. la prima de Toyota no se reparte al malus). */
function _excelEstimConcepto(p, ck, suf){
  /* Fuente nueva (hoja "Presup Arg HTML"): "se emite este mes" = meses CONFIRMADOS (amarillo). */
  if(state._presupArg && state._presupArg.ok) return _presupArgVal(p, ck, suf, 'confirmado');
  /* Fallback: bloque viejo AF–AH. */
  if(!p || !state._ejecProyEmis) return 0;
  const tk = [_normProyKey(p.poliza), _digitsKey(p.poliza), _normProyKey(p.asegurado)];
  for(const k of tk){ if(k && state._ejecProyEmis[k]){ const o = state._ejecProyEmis[k]; const c = o.c && o.c[ck]; if(!c) return 0; const v = (suf==='u') ? c.usd : c.ars; return isFinite(v) ? v : 0; } }
  return 0;
}
/* Total de la "Emisión estimada" del Excel (bloque AF–AH): suma prima+ajuste+malus de TODAS
   las pólizas proyectadas (deduplicando, porque cada póliza se indexa por varias claves). Es
   el número "Emisión estimada Junio" del Excel. Dinámico: cambia con el Excel cargado. */
function _excelEstimTotal(suf){
  /* Fuente nueva: suma de TODOS los meses CONFIRMADOS (amarillo) por concepto (bono resta). */
  if(state._presupArg && state._presupArg.ok){
    let tot = 0;
    for(const e of state._presupArg.rows){
      const ck = _tipoToConcepto(e.tipo); if(!ck) continue;
      for(const mo of e.months){ if(!mo.yellow) continue; const v=(suf==='u')?mo.orig:mo.ars; if(!isFinite(v)) continue; tot += (ck==='bono')?-Math.abs(v):v; }
    }
    return tot;
  }
  if(!state._ejecProyEmis) return 0;
  const seen = new Set(); let tot = 0;
  for(const k in state._ejecProyEmis){
    const o = state._ejecProyEmis[k]; if(!o || seen.has(o)) continue; seen.add(o);
    const base = (suf==='u') ? o.usd : o.ars;                                   /* prima+ajuste+malus */
    const bono = o.c && o.c.bono ? ((suf==='u') ? o.c.bono.usd : o.c.bono.ars) : 0;
    if(isFinite(base)) tot += base;
    if(isFinite(bono)) tot -= Math.abs(bono);   /* el BONO SIEMPRE resta (nota de crédito) */
  }
  return tot;
}
/* Estado del toggle "Contabilizar" POR CONCEPTO y grupo (clave: `${concepto}_${mes|anio}`).
   Default: "se emite este mes" (mes) = SÍ; "pendiente sin fecha" (anio) = NO. Así apagar o
   encender UN concepto NO afecta a los demás. */
function _ejecContabOn(ck, which){
  state._ejecContab = state._ejecContab || {};
  const v = state._ejecContab[ck+'_'+which];
  if(v!==undefined) return !!v;
  return (which==='mes');   /* todos los pendientes contabilizan por defecto (el dedup evita duplicar) */
}
/* "Emisión pendiente (se emite este mes)" del Excel CONTABILIZADA: suma, por concepto, solo los
   que tienen su toggle 'mes' en SÍ (el bono resta). Así apagar un concepto lo descuenta solo a él
   también en "Comparación de desvíos". */
function _excelEstimContab(suf){
  /* Fuente nueva: meses confirmados (amarillo) por concepto, solo los que tienen su toggle
     'mes' en SÍ (bono resta). */
  if(state._presupArg && state._presupArg.ok){
    let tot = 0;
    for(const e of state._presupArg.rows){
      const ck = _tipoToConcepto(e.tipo); if(!ck || !_ejecContabOn(ck,'mes')) continue;
      for(const mo of e.months){ if(!mo.yellow) continue; const v=(suf==='u')?mo.orig:mo.ars; if(!isFinite(v)) continue; tot += (ck==='bono')?-Math.abs(v):v; }
    }
    return tot;
  }
  if(!state._ejecProyEmis) return 0;
  const seen = new Set(); let tot = 0;
  for(const k in state._ejecProyEmis){
    const o = state._ejecProyEmis[k]; if(!o || seen.has(o)) continue; seen.add(o);
    for(const ck of ['primaMin','ajuste','malus','bono']){
      if(!_ejecContabOn(ck, 'mes')) continue;
      const c = o.c && o.c[ck]; if(!c) continue;
      const v = (suf==='u') ? c.usd : c.ars; if(!isFinite(v)) continue;
      tot += (ck==='bono') ? -Math.abs(v) : v;
    }
  }
  return tot;
}
function parseProyEmis(rows){
  state._ejecProyEmis = {};
  const numOf = (v)=>{ if(v==null||v==='') return NaN; if(typeof v==='number') return v; return parseFloat(String(v).replace(/[^0-9.\-]/g,'')); };
  const AF=31, AG=32, AH=33;
  /* Bloque "Proyecciones de Emisión": columnas AF–AH, filas 19 a 190 del Excel (pedido del
     usuario). Limitamos estrictamente ese rango para no sumar filas de otras tablas que reusan
     esas columnas. (Excel fila N → índice N−1 en el array.) */
  const ROW_FROM = 19, ROW_TO = 190;
  let cur=null;
  const reg = (k,obj)=>{ if(k) state._ejecProyEmis[k] = obj; };
  for(let i=ROW_FROM-1; i<=ROW_TO-1 && i<rows.length; i++){
    const r = rows[i]||[];
    const lbl = _normProyKey(r[AF]);
    if(lbl==='asegurado'){
      /* c = desglose POR CONCEPTO (cada concepto tiene su propio $ y US$ en el Excel).
         ars/usd = total prima+ajuste+malus (sin bono) para compatibilidad. */
      cur = {ars:0, usd:0, c:{primaMin:{ars:0,usd:0}, ajuste:{ars:0,usd:0}, malus:{ars:0,usd:0}, bono:{ars:0,usd:0}}};
      const nombre = String(r[AG]==null?'':r[AG]).trim();
      cur.aseg = nombre;
      reg(_normProyKey(nombre), cur); /* índice por asegurado (fallback) */
      continue;
    }
    if(lbl==='poliza' || lbl==='póliza'){
      if(cur){
        const pol = String(r[AG]==null?'':r[AG]).trim();
        cur.poliza = pol;
        reg(_normProyKey(pol), cur);      /* índice por póliza (principal) */
        reg(_digitsKey(pol), cur);        /* y por sus dígitos (sin ceros a la izq.) */
      }
      continue;
    }
    const _ck = {'prima minima':'primaMin','prima mínima':'primaMin','ajuste':'ajuste','malus':'malus','bono':'bono'}[lbl];
    if(cur && _ck){
      const ars=numOf(r[AG]), usd=numOf(r[AH]);
      if(isFinite(ars)){ cur.c[_ck].ars += ars; if(_ck!=='bono') cur.ars += ars; }
      if(isFinite(usd)){ cur.c[_ck].usd += usd; if(_ck!=='bono') cur.usd += usd; }
    }
  }
}

/* ============================================================
   PARSER de la hoja "Presup Arg HTML" (nueva fuente de desvíos/proyecciones).
   Columnas: COMPAÑÍA, MONEDA, TIPO, PÓLIZA, ASEGURADO, RENUEVA, TOTAL(MON.ORIG/ARS) y un par
   de columnas (MON.ORIG / ARS) por cada MES. Detecta el RESALTADO AMARILLO (relleno FFFF00):
   celda amarilla = emisión CONFIRMADA ("se emite este mes"); sin amarillo = presupuesto
   ("pendiente sin fecha"). Solo se toman filas de COMPAÑÍA = "Seguros".
   Guarda state._presupArg = {rows:[...], byPol:{}, byAseg:{}}.
============================================================ */
function _isAmarillo(rgb){ if(!rgb) return false; const s=String(rgb).toUpperCase(); return s.slice(-6)==='FFFF00'; }
/* Normaliza sin acentos para comparar encabezados / meses. */
function _accent(s){ return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }
const _MESNUM = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,setiembre:9,octubre:10,noviembre:11,diciembre:12};
function _mesToNum(v){ if(v==null||v==='') return 0; if(typeof v==='number'&&v>=1&&v<=12) return Math.round(v); return _MESNUM[_accent(v)]||0; }
function _numv(v){ if(v==null||v==='') return 0; if(typeof v==='number') return v; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isFinite(n)?n:0; }
function _presupArgReset(){ state._presupArg = {rows:[], byPol:{}, byAseg:{}, ok:false, nYellow:0}; }
function _presupArgPush(entry){
  if(!entry || !entry.months || !entry.months.length) return;
  state._presupArg.rows.push(entry);
  const reg=(map,k)=>{ if(k){ (map[k]=map[k]||[]).push(entry); } };
  reg(state._presupArg.byPol, _normProyKey(entry.poliza));
  reg(state._presupArg.byPol, _digitsKey(entry.poliza));
  reg(state._presupArg.byAseg, _normProyKey(entry.aseg));
}
/* ============================================================
   PARSERS de las hojas de presupuesto/proyección 2026.
   Modelo interno unificado (state._presupArg.rows): cada fila
     {poliza, aseg, tipo, esUS, months:[{m, orig, ars, yellow}]}
   yellow:true  = CONFIRMADO que se emite (hoja "Confirmado Proyeccion").
   yellow:false = PRESUPUESTADO sin confirmar (hoja "Presupuesto Argentina").
   Así el resto del código (desvíos, pendientes, gráfico) sigue igual.
============================================================ */
/* Hoja "Confirmado Proyeccion": A=MONEDA B=TIPO C=PÓLIZA D=ASEGURADO y pares (MON.ORIG/ARS) por
   mes (fila 1 = nombre de mes, fila 2 = 'MON. ORIG.'/'ARS'). Una fila por (póliza, tipo). */
function parseConfProy(ws){
  if(!ws || !ws['!ref']) return;
  const range=XLSX.utils.decode_range(ws['!ref']);
  const getv=(r,c)=>{ const cell=ws[XLSX.utils.encode_cell({r,c})]; return cell?cell.v:null; };
  const hdr1=[],hdr2=[];
  for(let c=range.s.c;c<=range.e.c;c++){ hdr1[c]=getv(0,c); hdr2[c]=getv(1,c); }
  const colBy=lbl=>{ for(let c=range.s.c;c<=range.e.c;c++){ if(_accent(hdr2[c])===lbl) return c; } return -1; };
  const cMon=colBy('moneda'), cTipo=colBy('tipo'), cPol=colBy('poliza'), cAseg=colBy('asegurado');
  if(cTipo<0||cPol<0) return;
  const monthCols=[];
  for(let c=range.s.c;c<=range.e.c;c++){ const mi=_mesToNum(hdr1[c]); if(mi>=1 && _accent(hdr2[c])==='mon. orig.'){ monthCols.push({m:mi,cOrig:c,cArs:c+1}); } }
  for(let r=2;r<=range.e.r;r++){
    const pol=getv(r,cPol), aseg=getv(r,cAseg); if(pol==null&&aseg==null) continue;
    const tipo=String(getv(r,cTipo)||'').trim(); const _ck=_tipoToConcepto(tipo); if(!_ck) continue;
    const monedaRaw=String((cMon>=0?getv(r,cMon):'')||'').toUpperCase();
    const esUS=/US|U\$|USD|DOLAR|DÓLAR/.test(monedaRaw);
    /* Bono/Profit: se guarda negado para que el sgn=-1 interno conserve su signo natural. */
    const _ss=(_ck==='bono')?-1:1;
    const months=monthCols.map(mc=>({m:mc.m, orig:_ss*_numv(getv(r,mc.cOrig)), ars:_ss*_numv(getv(r,mc.cArs)), yellow:true})).filter(mo=>mo.orig||mo.ars);
    if(!months.length) continue;
    state._presupArg.nYellow += months.length;
    _presupArgPush({poliza:pol, aseg, tipo, esUS, months});
  }
}
/* Hoja "Presupuesto Argentina": G=Póliza, D=Nombre Asegurado, H=Moneda; por concepto un grupo de
   3 columnas (valor MON.ORIG / valor ARS / MES ESTIMADO EMISION). Mantención se ignora.
   Genera un entry por concepto con UN mes (el "Mes Estimado Emisión"). yellow:false. */
function parsePresupArgBudget(ws){
  if(!ws || !ws['!ref']) return;
  const range=XLSX.utils.decode_range(ws['!ref']);
  const getv=(r,c)=>{ const cell=ws[XLSX.utils.encode_cell({r,c})]; return cell?cell.v:null; };
  const hdr=[]; for(let c=range.s.c;c<=range.e.c;c++) hdr[c]=getv(0,c);
  const colBy=lbl=>{ for(let c=range.s.c;c<=range.e.c;c++){ if(_accent(hdr[c])===lbl) return c; } return -1; };
  const cPol=colBy('poliza'), cAseg=colBy('nombre asegurado'), cMon=colBy('moneda'), cMesGen=colBy('mes');
  if(cPol<0) return;
  /* Cada concepto tiene 3 columnas de valor: "<concepto> Moneda Original", "<concepto> ARS",
     "<concepto> US" y luego "MES ESTIMADO EMISION". (Layout nuevo con equivalente en dólares.)
     Se mantiene compatibilidad con el layout viejo (sin columna US): orig, ars, mes. */
  const mkConc=(tipo,pre)=>{
    const colOrig = colBy(pre+' moneda original'); const colArs = colBy(pre+' ars'); const colUs = colBy(pre+' us');
    const base = (colOrig>=0)?colOrig : colBy(pre);   /* fallback layout viejo */
    const colMes = (colUs>=0) ? colUs+1 : ((colArs>=0)?colArs+1 : (base>=0?base+2:-1));
    return {tipo, colOrig: (colOrig>=0?colOrig:base), colArs: (colArs>=0?colArs:(base>=0?base+1:-1)), colUs, colMes};
  };
  const conceptos=[
    mkConc('Renovación','prima minima renovacion'),
    mkConc('Prima Minima 2da Anualidad','prima minima 2da anualidad'),
    mkConc('Ajuste','ajuste presupuestado'),
    mkConc('Bono','profit estimado'),
    mkConc('Malus','malus estimado'),
  ].filter(x=>x.colOrig>=0 || x.colArs>=0);
  for(let r=1;r<=range.e.r;r++){
    const pol=getv(r,cPol), aseg=(cAseg>=0?getv(r,cAseg):null); if(pol==null&&aseg==null) continue;
    const monedaRaw=String((cMon>=0?getv(r,cMon):'')||'').toUpperCase();
    const esUS=/US|U\$|USD|DOLAR|DÓLAR/.test(monedaRaw);
    for(const cc of conceptos){
      let orig=cc.colOrig>=0?_numv(getv(r,cc.colOrig)):0;
      let ars =cc.colArs>=0 ?_numv(getv(r,cc.colArs)) :0;
      let usd =cc.colUs>=0  ?_numv(getv(r,cc.colUs))  :null;
      if(!orig && !ars && !usd) continue;
      const _ss=(_tipoToConcepto(cc.tipo)==='bono')?-1:1;   /* Bono: conserva signo natural */
      orig*=_ss; ars*=_ss; if(usd!=null) usd*=_ss;
      let m=_mesToNum(cc.colMes>=0?getv(r,cc.colMes):null); if(!m && cMesGen>=0) m=_mesToNum(getv(r,cMesGen)); if(!m) m=12;
      _presupArgPush({poliza:pol, aseg, tipo:cc.tipo, esUS, months:[{m, orig, ars, usd, yellow:false}]});
    }
  }
}
/* Hoja "Emision 2026 HTML", bloque AF19:AR24 → "INSUR ANÁLISIS": Mantención y Costos de estudio,
   cada uno PRESUPUESTADO vs EMITIDO, por mes (ARS). Alimenta la pestaña INSUR Análisis.
   rows = sheet_to_json(header:1). AF = col 32 (índice 31); meses AG..AR = índices 32..43. */
function parseInsur(rows){
  state._insur = {mantPres:Array(12).fill(0), mantEmi:Array(12).fill(0), costPres:Array(12).fill(0), costEmi:Array(12).fill(0), ok:false};
  if(!rows || !rows.length) return;
  const AF=31, AG=32;
  const num=v=>{ if(v==null||v==='') return 0; if(typeof v==='number') return v; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isFinite(n)?n:0; };
  for(const r of rows){
    if(!r) continue;
    const lbl = _accent(r[AF]);
    let key=null;
    if(lbl==='mantencion presupuestado') key='mantPres';
    else if(lbl==='mantencion emitido') key='mantEmi';
    else if(lbl==='costos de estudio presupuestado') key='costPres';
    else if(lbl==='costos de estudio emitido') key='costEmi';
    if(!key) continue;
    for(let m=0;m<12;m++) state._insur[key][m]=num(r[AG+m]);
    state._insur.ok=true;
  }
}

/* Hoja "Grupos": mapea Póliza → Grupo económico (cols: Nombre Asegurado · Póliza · Grupo).
   Varias pólizas pueden compartir grupo; se usa en el Top 10 para sumar la prima por grupo.
   Recibe el workbook y busca la hoja por nombre (/grupos/) o por contenido (columnas Póliza+Grupo). */
function parseGrupos(wb){
  state._grupos = {}; state._gruposByAseg = {};
  if(!wb || !wb.SheetNames) return;
  const colsDe = (ws)=>{ if(!ws||!ws['!ref']) return null; const range=XLSX.utils.decode_range(ws['!ref']);
    const getv=(r,c)=>{ const cell=ws[XLSX.utils.encode_cell({r,c})]; return cell?cell.v:null; };
    let cPol=-1,cGr=-1,cAseg=-1; for(let c=range.s.c;c<=range.e.c;c++){ const h=_accent(getv(0,c)); if(h==='poliza') cPol=c; else if(h==='grupo') cGr=c; else if(h==='nombre asegurado'||h==='asegurado') cAseg=c; }
    return (cGr>=0 && (cPol>=0||cAseg>=0)) ? {ws,range,getv,cPol,cGr,cAseg} : null; };
  /* 1) por nombre; 2) por contenido (cualquier hoja con columna Grupo + Póliza o Asegurado). */
  let found=null;
  const byName = wb.SheetNames.find(n=>/grupos/.test(_accent(n)));
  if(byName) found = colsDe(wb.Sheets[byName]);
  if(!found){ for(const n of wb.SheetNames){ const f=colsDe(wb.Sheets[n]); if(f){ found=f; break; } } }
  if(!found) return;
  const {range,getv,cPol,cGr,cAseg}=found;
  for(let r=1;r<=range.e.r;r++){
    const gr=getv(r,cGr); if(gr==null||String(gr).trim()==='') continue;
    const grupo=String(gr).trim();
    if(cPol>=0){ const k=_digitsKey(getv(r,cPol)); if(k) state._grupos[k]=grupo; }
    if(cAseg>=0){ const ak=_normProyKey(getv(r,cAseg)); if(ak) state._gruposByAseg[ak]=grupo; }
  }
}

/* Parser ANTIGUO (hoja única "Presup Arg HTML" con amarillo). Se mantiene como respaldo. */
function parsePresupArg(ws){
  if(!ws || !ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  const getv = (r,c)=>{ const cell=ws[XLSX.utils.encode_cell({r,c})]; return cell?cell.v:null; };
  const getFill = (r,c)=>{ const cell=ws[XLSX.utils.encode_cell({r,c})]; if(!cell||!cell.s) return null;
    const fg = cell.s.fgColor || (cell.s.fill&&cell.s.fill.fgColor); return fg?(fg.rgb||null):null; };
  const norm = s=>String(s==null?'':s).trim().toLowerCase();
  const hdr1=[], hdr2=[];
  for(let c=range.s.c;c<=range.e.c;c++){ hdr1[c]=getv(0,c); hdr2[c]=getv(1,c); }
  const colBy = lbl=>{ for(let c=range.s.c;c<=range.e.c;c++){ if(norm(hdr2[c])===lbl) return c; } return -1; };
  const cCia=colBy('compañía'), cMon=colBy('moneda'), cTipo=colBy('tipo'),
        cPol=colBy('póliza'), cAseg=colBy('asegurado');
  if(cTipo<0 || cPol<0){ return; }
  const MES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const monthCols=[];
  for(let c=range.s.c;c<=range.e.c;c++){
    const mi = MES.indexOf(norm(hdr1[c]));
    if(mi>=0 && norm(hdr2[c])==='mon. orig.'){ monthCols.push({m:mi+1, cOrig:c, cArs:c+1}); }
  }
  for(let r=2;r<=range.e.r;r++){
    if(norm(getv(r,cCia))!=='seguros') continue;
    const pol=getv(r,cPol), aseg=getv(r,cAseg);
    if(pol==null && aseg==null) continue;
    const tipo=String(getv(r,cTipo)||'').trim();
    const monedaRaw=String((cMon>=0?getv(r,cMon):'')||'').trim().toUpperCase();
    const esUS = /US|U\$|USD|DOLAR|DÓLAR/.test(monedaRaw);
    const months = monthCols.map(mc=>{
      const orig=_numv(getv(r,mc.cOrig)), ars=_numv(getv(r,mc.cArs));
      const yellow = _isAmarillo(getFill(r,mc.cOrig)) || _isAmarillo(getFill(r,mc.cArs));
      if(yellow && (orig||ars)) state._presupArg.nYellow++;
      return {m:mc.m, orig, ars, yellow};
    });
    _presupArgPush({poliza:pol, aseg, tipo, esUS, months});
  }
}
/* TIPO del Excel → concepto del HTML (primaMin/ajuste/bono/malus). Renovación y Segunda/Tercera
   Anualidad = Prima Mínima. Mantención / Costos de Estudio / etc. se ignoran. */
function _tipoToConcepto(tipo){
  const t = String(tipo||'').trim().toLowerCase();
  if(/renovaci|anualidad|prima/.test(t)) return 'primaMin';
  if(/ajuste/.test(t)) return 'ajuste';
  if(/bono/.test(t)) return 'bono';
  if(/malus/.test(t)) return 'malus';
  return null;
}
/* Valor de la hoja "Presup Arg HTML" para una póliza + concepto + moneda (suf 'a'=ARS / 'u'=MON.ORIG),
   filtrando por confirmado (amarillo) o presupuesto (no amarillo) o todo. Suma todos los meses. */
function _presupArgVal(p, ck, suf, modo){
  const pa = state._presupArg; if(!pa || !pa.ok) return 0;
  const tk = [_normProyKey(p.poliza), _digitsKey(p.poliza)];
  let arr=null;
  for(const k of tk){ if(k && pa.byPol[k]){ arr=pa.byPol[k]; break; } }
  if(!arr){ const ak=_normProyKey(p.asegurado); if(ak && pa.byAseg[ak]) arr=pa.byAseg[ak]; }
  if(!arr) return 0;
  let tot=0;
  for(const e of arr){
    if(_tipoToConcepto(e.tipo)!==ck) continue;
    for(const mo of e.months){
      if(modo==='confirmado' && !mo.yellow) continue;
      if(modo==='pendiente' && mo.yellow) continue;
      tot += (suf==='u') ? ((mo.usd!=null&&mo.usd!==0)?mo.usd:(mo.ars/(state._ejecTC||1400))) : mo.ars;
    }
  }
  return tot;
}
/* Clave de póliza para deduplicar entre pendientes (dígitos; fallback nombre normalizado). */
function _polKey(x){ const d=(typeof _digitsKey==='function')?_digitsKey(x):''; return d || ((typeof _normProyKey==='function'?_normProyKey(x):'')||String(x||'')).toString(); }
/* Total GLOBAL de "Presup Arg HTML" por modo (confirmado=amarillo / pendiente=presupuesto), con
   desglose por concepto (primaMin/ajuste/malus/bono; el bono resta) y conteo de pólizas.
   excludeSet: claves "polKey|concepto" a NO sumar (dedup entre pendientes).
   Devuelve también el set de claves incluidas (para construir la exclusión del siguiente). */
function _presupArgGlobal(suf, modo, maxMes, excludeSet, minMes){
  const c={primaMin:0,ajuste:0,malus:0,bono:0}; let total=0; const pol=new Set(); const keys=new Set();
  const pa=state._presupArg; if(!pa||!pa.ok) return {total:0,c,n:0,keys};
  for(const e of pa.rows){ const ck=_tipoToConcepto(e.tipo); if(!ck) continue;
    const key=_polKey(e.poliza)+'|'+ck;
    if(excludeSet && excludeSet.has(key)) continue;
    const sgn=(ck==='bono')?-1:1; let any=false;
    for(const mo of e.months){ if(maxMes && mo.m>maxMes) continue; if(minMes && mo.m<=minMes) continue; if(modo==='confirmado'&&!mo.yellow)continue; if(modo==='pendiente'&&mo.yellow)continue;
      const v=(suf==='u')?((mo.usd!=null&&mo.usd!==0)?mo.usd:(mo.ars/(state._ejecTC||1400))):mo.ars; if(!isFinite(v)||!v)continue; c[ck]+=sgn*v; total+=sgn*v; any=true; }
    if(any){ pol.add(String(e.poliza||e.aseg)); keys.add(key); } }
  return {total, c, n:pol.size, keys};
}
/* Pendiente "Comparación 2025": lo de antes — por póliza pendiente, los conceptos pendientes
   según conceptosPendientes (emisión 2025 por fecha/concepto/categoría: vacío, "anualidad
   anterior", etc.). Devuelve total + desglose por concepto (bono resta) + conteo. */
function _pend2025Global(polPend, mesCorte, suf, excludeSet){
  const c={primaMin:0,ajuste:0,malus:0,bono:0}; let total=0; const pol=new Set();
  const KEYS={'Prima mínima':'primaMin','Ajuste':'ajuste','Bono':'bono','Malus':'malus'};
  for(const p of (polPend||[])){
    const est=estadoPolizaConsolidado(p,mesCorte);
    const pend=(est==='desvio_emision_pendiente'||est==='desvio_pendiente_mayor_2m');
    const cp=conceptosPendientes(p,mesCorte); let items=cp.items;
    if(items.length===0 && pend){ const f25=calcEmisionFiltrada(p,2025,0); const a=f25.breakdownARS.primaMin,u=f25.breakdownUSD.primaMin; if(a>0||u>0) items=[{concepto:'Prima mínima',ars:a,usd:u}]; }
    let any=false;
    for(const it of items){ const k=KEYS[it.concepto]; if(!k) continue;
      if(excludeSet && excludeSet.has(_polKey(p.poliza)+'|'+k)) continue;   /* ya está en Confirmado o Proyección */
      const cv=convertirPendienteTC(it.ars,it.usd,p.moneda); const v=Math.abs((suf==='u')?cv.usd:cv.ars); const sgn=(k==='bono')?-1:1; c[k]+=sgn*v; total+=sgn*v; any=true; }
    if(any) pol.add(p.clave);
  }
  return {total, c, n:pol.size};
}
/* Pólizas de un pendiente (pend_conf/pend_presup/pend_2025) para UN concepto, ordenadas por valor.
   Aplica el mismo dedup por (póliza,concepto) que el donut: Confirmado > Proyección Arg > Comparación 2025. */
function _pendConceptoPolizas(id, ck, suf, polPend, mesCorte, maxMes, minMes){
  const out=[];
  /* Set de exclusión: "Sin Fecha" se deduplica solo contra Emisión Confirmada (completa), igual
     que el donut. (Presupuesto ya no es por póliza, no aporta exclusiones.) */
  let excl=null;
  if(id==='pend_2025'){ excl=_presupArgGlobal(suf,'confirmado',12).keys; }
  if(id==='pend_2025'){
    const NAME={primaMin:'Prima mínima',ajuste:'Ajuste',malus:'Malus',bono:'Bono'};
    for(const p of (polPend||[])){
      if(excl && excl.has(_polKey(p.poliza)+'|'+ck)) continue;
      const est=estadoPolizaConsolidado(p,mesCorte);
      const cp=conceptosPendientes(p,mesCorte); let items=cp.items;
      if(items.length===0 && (est==='desvio_emision_pendiente'||est==='desvio_pendiente_mayor_2m')){ const f25=calcEmisionFiltrada(p,2025,0); if(f25.breakdownARS.primaMin>0||f25.breakdownUSD.primaMin>0) items=[{concepto:'Prima mínima',ars:f25.breakdownARS.primaMin,usd:f25.breakdownUSD.primaMin}]; }
      let v=0; for(const it of items){ if(it.concepto!==NAME[ck]) continue; const cv=convertirPendienteTC(it.ars,it.usd,p.moneda); v+=Math.abs((suf==='u')?cv.usd:cv.ars); }
      v*=(ck==='bono')?-1:1; if(Math.abs(v)>0.5) out.push({poliza:p.poliza,aseg:p.asegurado,val:v});
    }
  } else {
    const modo=id==='pend_conf'?'confirmado':'pendiente'; const pa=state._presupArg;
    if(pa&&pa.ok) for(const e of pa.rows){ if(_tipoToConcepto(e.tipo)!==ck) continue;
      if(excl && excl.has(_polKey(e.poliza)+'|'+ck)) continue;
      let v=0; for(const mo of e.months){ if(maxMes && mo.m>maxMes) continue; if(minMes && modo==='pendiente' && mo.m<=minMes) continue; if(modo==='confirmado'&&!mo.yellow)continue; if(modo==='pendiente'&&mo.yellow)continue; const x=(suf==='u')?((mo.usd!=null&&mo.usd!==0)?mo.usd:(mo.ars/(state._ejecTC||1400))):mo.ars; if(isFinite(x))v+=x; }
      v*=(ck==='bono')?-1:1; if(Math.abs(v)>0.5) out.push({poliza:e.poliza,aseg:e.aseg,val:v}); }
  }
  out.sort((a,b)=>Math.abs(b.val)-Math.abs(a.val));
  return out;
}

/* Si es true, el presupuesto se fuerza a 0. El reporte sigue funcionando: los bloques de
   presupuesto muestran 0 y todo lo demás (emisión real, desvíos, pendientes) no depende del
   presupuesto. En false (estado actual, pedido del usuario) lee el presupuesto del Excel
   desde las columnas configuradas (corridas +1 por la nueva columna "Inicio Anualidad 2026"). */
const PRESUPUESTO_EN_CERO = false;
function parsePresupuestos(rows){
  /* Reset */
  for(const k in state.presup) state.presup[k] = Array(12).fill(0);
  /* Pedido del usuario: presupuesto en 0. No se lee del Excel. */
  if(PRESUPUESTO_EN_CERO) return;
  const colLbl = (CFGCOL.presupLabel!=null) ? CFGCOL.presupLabel : 31;
  const colIni = (CFGCOL.presupMesInicio!=null) ? CFGCOL.presupMesInicio : 32;
  /* Buscar filas con etiqueta en la columna de presupuesto */
  for(let i=0;i<Math.min(20,rows.length);i++){
    const r = rows[i];
    if(!r) continue;
    const lbl = r[colLbl];
    if(typeof lbl !== 'string') continue;
    const lblLow = lbl.toLowerCase().replace(/\s+/g,' ').trim();
    let key = null;
    if(lblLow.includes('continental')){
      if(lblLow.includes('2025')) key = lblLow.includes('us') ? 'cont25_usd' : 'cont25_ars';
      else if(lblLow.includes('2026')) key = lblLow.includes('us') ? 'cont26_usd' : 'cont26_ars';
    } else if(lblLow.includes('argentina')){
      const isUS = / us\b|\bus$/.test(lblLow);
      const isSolo = lblLow.includes('solo moneda');
      if(lblLow.includes('2025')) key = (isSolo?'arg25_solo_':'arg25_') + (isUS?'usd':'ars');
      else if(lblLow.includes('2026')) key = (isSolo?'arg26_solo_':'arg26_') + (isUS?'usd':'ars');
    }
    if(!key) continue;
    /* leer 12 valores mensuales a partir de la columna de inicio */
    for(let m=0;m<12;m++){
      const v = r[colIni+m];
      if(typeof v === 'number') state.presup[key][m] = v;
    }
  }
}

function parseRows(rows){
  state.raw = [];
  /* Detección de formato:
     - Formato A (Libro6, "ancho"): cada fila tiene col 2=Póliza no nula y col 6=Moneda ('$' o 'US'),
       cada concepto es UNA fila por póliza-moneda
     - Formato B (Libro3, "bloques"): col 2/3/6 vacías, cada póliza es un BLOQUE de filas
       (1 marcadora con tipo='Renovación|Segunda anualidad|Póliza nueva|Póliza cancelada' + 8 filas
       de conceptos). Las columnas ARS y USD viven en col 14/15 (2025) y 19/20 (2026), ambos en
       la misma fila. */
  let aFmtRows = 0, bFmtRows = 0;
  const TIPOS_POLIZA = new Set([
    'Renovación','Renovacion',
    'Segunda anualidad',
    'Póliza nueva','Poliza nueva','Polizas Nuevas','Polizas nuevas','Póliza Nueva','Poliza Nueva',
    'Póliza terminada','Poliza cancelada',
    'Póliza terminada','Poliza terminada',
    'Póliza terminada 2025','Poliza terminada 2025',
    'Póliza terminada 2026','Poliza terminada 2026',
    'Póliza Nueva 2025','Poliza Nueva 2025','Póliza nueva 2025','Poliza nueva 2025',
    'Póliza Nueva 2026','Poliza Nueva 2026','Póliza nueva 2026','Poliza nueva 2026',
  ]);
  for(const r of rows){
    if(!r) continue;
    if(r[2]!=null && (r[6]==='$' || r[6]==='US')) aFmtRows++;
    else if(r[CFGCOL.tipo2025]!=null && TIPOS_POLIZA.has(String(r[CFGCOL.tipo2025]).trim())) bFmtRows++;
  }
  const fmtB = bFmtRows > aFmtRows && bFmtRows > 5;
  state.formato = fmtB ? 'B' : 'A';

  if(!fmtB){
    /* Formato A — comportamiento histórico */
    for(let i=0;i<rows.length;i++){
      const r = rows[i];
      if(!r || r[2]===null || r[2]===undefined) continue;
      if(typeof r[2] === 'string' && (r[2].toLowerCase()==='póliza'||r[2].toLowerCase()==='poliza')) continue;
      if(r[CFGCOL.moneda] !== '$' && r[CFGCOL.moneda] !== 'US') continue;
      state.raw.push({
        ejecutivo:r[CFGCOL.ejecutivo], asistente:r[CFGCOL.asistente], poliza:String(r[CFGCOL.poliza]), asegurado:r[CFGCOL.asegurado],
        codigo:r[CFGCOL.codigo], producto:r[CFGCOL.producto], moneda:r[CFGCOL.moneda], rubro:r[CFGCOL.rubro],
        broker: (r[CFGCOL.broker]!==null && r[CFGCOL.broker]!==undefined && r[CFGCOL.broker]!=='no')?String(r[CFGCOL.broker]):'(sin broker)',
        vigDesde:excelDate(r[CFGCOL.vigDesde]), vigHasta:excelDate(r[CFGCOL.vigHasta]),
        /* Fecha de inicio de la anualidad 2026 (columna nueva). Es la referencia
           autoritativa de cuándo debe emitirse la prima mínima 2026. */
        inicioAnualidad2026: (CFGCOL.inicioAnualidad2026!=null) ? excelDate(r[CFGCOL.inicioAnualidad2026]) : null,
        tipo:r[CFGCOL.tipo2025],
        tipoPoliza25: r[CFGCOL.tipo2025],
        tipoPoliza26: r[CFGCOL.tipo2026],
        fechaEm2025: excelDate(r[CFGCOL.fechaEm2025]),
        rawCol12: typeof r[CFGCOL.fechaEm2025]==='number'?r[CFGCOL.fechaEm2025]:null,
        real2025: typeof r[CFGCOL.real2025]==='number'?r[CFGCOL.real2025]:null,
        ars2025: typeof r[CFGCOL.ars2025]==='number'?r[CFGCOL.ars2025]:null,
        usd2025: typeof r[CFGCOL.usd2025]==='number'?r[CFGCOL.usd2025]:null,
        fechaEm2026: excelDate(r[CFGCOL.fechaEm2026]),
        rawCol17: typeof r[CFGCOL.fechaEm2026]==='number'?r[CFGCOL.fechaEm2026]:null,
        real2026: typeof r[CFGCOL.real2026]==='number'?r[CFGCOL.real2026]:null,
        ars2026: typeof r[CFGCOL.ars2026]==='number'?r[CFGCOL.ars2026]:null,
        usd2026: typeof r[CFGCOL.usd2026]==='number'?r[CFGCOL.usd2026]:null,
        /* Columnas de DESVÍO ya calculadas por el negocio.
           Pueden venir como #N/A (texto) → guardamos solo si son numéricas. */
        desvioUSD: typeof r[CFGCOL.desvioUSD]==='number'?r[CFGCOL.desvioUSD]:null,
        desvioARS: typeof r[CFGCOL.desvioARS]==='number'?r[CFGCOL.desvioARS]:null,
        categoria: (typeof r[CFGCOL.categoria] === 'string' && r[CFGCOL.categoria].trim() && r[CFGCOL.categoria].trim() !== 'Categoría') ? r[CFGCOL.categoria].trim() : null,
        detalle: (typeof r[CFGCOL.detalle] === 'string' && r[CFGCOL.detalle].trim() && !r[CFGCOL.detalle].trim().startsWith('Detalle')) ? r[CFGCOL.detalle].trim() : null,
      });
    }
    return;
  }

  /* Formato B — bloques: cada póliza es un bloque que arranca con una fila marcadora
     de tipo (Renovación / Segunda anualidad / Póliza nueva / Póliza cancelada), y
     las siguientes filas son conceptos (Proyeccion de Ventas, Prima Minima, Ajuste,
     Bono, Malus, Tasa aplicable, Siniestralidad H, Siniestralidad UV). En este formato
     cada concepto trae AMBAS monedas: ars en col 14 (2025) / 19 (2026), usd en col 15 (2025) / 20 (2026). */
  /* Como no hay número de póliza, generamos uno secuencial por bloque */
  let polCount = 0;
  let currentPol = null;
  /* Helpers — los conceptos relevantes a guardar */
