/* Acumula un array mensual de presupuesto hasta el mes de corte (inclusive).
   mesCorte=0 → todo el año. Respeta también el global Mes Corte 2026. */
function presupAcumulado(arr12, mesCorte){
  if(!arr12) return 0;
  /* El presupuesto se comporta como el AÑO 2025: NO lo afecta el "Mes Corte 2026"
     (que solo acota la emisión REAL 2026). Solo se acota con el "1° Acumulado hasta"
     de la sección, para igualar el período cuando el usuario lo pide explícitamente. */
  const cutoff = mesCorte===0 ? 12 : mesCorte;
  let s = 0;
  for(let i=0; i<cutoff && i<12; i++) s += (arr12[i]||0);
  return s;
}

/* Formato compacto USD/ARS para números grandes (ej US$12.0M) */
function fmtCompact(v, useUSD){
  const sign = v<0?'-':'';
  const a = Math.abs(v);
  const pref = useUSD ? 'US ' : '$';
  if(useUSD){
    /* USD: escalas con 1-2 decimales como estaba */
    if(a>=1e12) return sign+pref+(a/1e12).toFixed(2)+'B';
    if(a>=1e9)  return sign+pref+(a/1e9).toFixed(1)+'MM';
    if(a>=1e6)  return sign+pref+(a/1e6).toFixed(1)+'M';
    if(a>=1e3)  return sign+pref+(a/1e3).toFixed(0)+'K';
    return sign+pref+Math.round(a);
  }
  /* ARS$: miles de millones con 1 decimal (1.5MM), millones SIN decimal (937M) */
  if(a>=1e12) return sign+pref+(a/1e12).toFixed(1)+'B';
  if(a>=1e9)  return sign+pref+(a/1e9).toFixed(1)+'MM';
  if(a>=1e6)  return sign+pref+Math.round(a/1e6)+'M';
  if(a>=1e3)  return sign+pref+Math.round(a/1e3)+'K';
  return sign+pref+Math.round(a);
}

function drawEjecutivo(){
  const f = getSectionFilters('ejecutivo');
  setActiveCtx(f);
  state._ejecTC = (f.tc && f.tc>0) ? f.tc : 1400;   /* TC para convertir ARS→US cuando no hay columna US (ej. Confirmado) */
  const mesCorte = f.mes;
  const mon = efectivoMonedas(f);
  const showUSD = mon.showUSD, showARS = mon.showARS;
  const dual = showUSD && showARS;
  const polFiltradas = aplicarFiltrosPolizas(state.polizas, f);
  /* Contexto para los drills de "Emisión 2026" (comparación 2025 vs 2026 por concepto,
     cada año desde su propio conjunto de pólizas). */
  state._ejecDrillCtx = {pol: polFiltradas, mesCorte};
  /* Conjunto 2025 por concepto (tipo2025 / concepto / AA), reutilizado por la leyenda
     (totales y conteo 2025) y por el drill. Cortado al MES DE CORTE del botón (dinámico). */
  state._ejecCS25 = buildEmiConceptos(polFiltradas, 2025, mesCorte);
  document.getElementById('ejecutivo-nlabel').innerHTML = '';

  /* Selección oculta del presupuesto: por defecto, Continental. Si el usuario
     escribe "tina" en el input secreto al pie del bloque 1, se cambia a
     Argentina. Cualquier otro valor → vuelve a Continental. */
  const _secret = (state._ejecPresupInput||'').trim().toLowerCase();
  const presupTipo = (_secret === 'tina') ? 'arg' : 'cont';
  let presArrU = presupTipo==='cont' ? state.presup.cont26_usd : state.presup.arg26_usd;
  let presArrA = presupTipo==='cont' ? state.presup.cont26_ars : state.presup.arg26_ars;
  let presArrU25 = presupTipo==='cont' ? state.presup.cont25_usd : state.presup.arg25_usd;
  let presArrA25 = presupTipo==='cont' ? state.presup.cont25_ars : state.presup.arg25_ars;

  /* Calcular todo el set de métricas para una moneda dada */
  function calcSet(useUSD){
    const presArr = useUSD ? presArrU : presArrA;
    const presup26 = presupAcumulado(presArr, mesCorte);
    const t = totalesGlobales(mesCorte, polFiltradas);
    const emis26 = useUSD ? t.totUSD26 : t.totARS26;
    const emis25 = useUSD ? t.totUSD25 : t.totARS25;
    const conc26 = useUSD ? t.concUSD26 : t.concARS26;
    const conc25 = useUSD ? t.concUSD25 : t.concARS25;
    const desvio = presup26 - emis26;
    const cumpl  = presup26>0 ? emis26/presup26 : null;
    const sinPresup = !(presup26 > 0);

    const FACTOR_DEF = 0.75;
    let perdidas=0,nPerdidas=0, pendiente=0,nPend=0, efProy=0,nProy=0, efTasa=0,nTasa=0;
    let efAjuste=0,efBono=0,efMalus=0, efPrimaMin=0,nPrimaMin=0;
    /* Incrementos (lo que SUMÓ emisión) para justificar desvío positivo o compensaciones */
    let incPrimaMin=0, incAjuste=0, incBono=0, incMalus=0, incNuevas=0, nNuevas=0;
    let cSinJust=0, nSinJust=0;  /* emitidas que no alcanzan +30%$/+10%US (franja gris) */
    /* Emisión 2026 lograda por tipo (lo que se emitió) */
    let emiSeg=0, nSeg=0, emiRen=0, nRen=0, emiTer=0, nTer=0;
    let pmSeg=0, pmRen=0;  /* prima mínima 2026 por tipo */
    let subaProy=0, nSubaProy=0;  /* pólizas con suba de proyección */
    /* Categorías de "lo que se emitió" con pólizas individuales */
    const umbralCrec = useUSD?0.10:0.30;
    const emitidoCats = {
      ren:{total:0,polizas:[]}, seg:{total:0,polizas:[]}, ter:{total:0,polizas:[]}, ajuste:{total:0,polizas:[]},
      bono:{total:0,polizas:[]}, malus:{total:0,polizas:[]}, nuevas:{total:0,polizas:[]}, subaproy:{total:0,polizas:[]},
      anualant:{total:0,polizas:[]}
    };
    /* "Otros Conceptos" (dentro del Desvío): subas de proyección por tipo + variación de tasas.
       NO suman a la emisión; explican movimientos de fondo. */
    const otrosConceptos = {
      proyRen:{total:0,polizas:[]},  /* suba de proyección en pólizas Renovación */
      proySeg:{total:0,polizas:[]},  /* suba de proyección en pólizas Segunda anualidad */
      tasas:{total:0,polizas:[]},    /* pólizas con tasa que aumentó */
      noCrecieron:{total:0,polizas:[]}, /* mantienen o aumentan pero NO llegan al objetivo (+30%$/+10%US) */
    };

    for(const p of polFiltradas){
      const est = estadoPolizaConsolidado(p, mesCorte);
      const f25 = calcEmisionFiltrada(p,2025,mesCorte);
      const f26 = calcEmisionFiltrada(p,2026,mesCorte);
      const e25 = useUSD ? f25.totUSD : f25.totARS;
      const e26 = useUSD ? f26.totUSD : f26.totARS;
      const pm25 = useUSD ? f25.breakdownUSD.primaMin : f25.breakdownARS.primaMin;
      const pm26 = useUSD ? f26.breakdownUSD.primaMin : f26.breakdownARS.primaMin;

      /* Emisión lograda por tipo (lo que se emitió en 2026) */
      const aj26v=useUSD?f26.breakdownUSD.ajuste:f26.breakdownARS.ajuste;
      const bo26v=useUSD?f26.breakdownUSD.bono:f26.breakdownARS.bono;
      const ma26v=useUSD?f26.breakdownUSD.malus:f26.breakdownARS.malus;
      const aj25v=useUSD?f25.breakdownUSD.ajuste:f25.breakdownARS.ajuste;
      const bo25v=useUSD?f25.breakdownUSD.bono:f25.breakdownARS.bono;
      const ma25v=useUSD?f25.breakdownUSD.malus:f25.breakdownARS.malus;
      const pr25 = useUSD ? (p.proyUSD2025||0) : (p.proyARS2025||0);
      const pr26 = useUSD ? (p.proyUSD2026||0) : (p.proyARS2026||0);
      const umbral = useUSD?0.10:0.30;
      /* CLAVE: el umbral de crecimiento depende de la MONEDA ORIGINAL de la póliza,
         no de la vista. $ → +30%, US → +10%. (pedido del usuario) */
      const umbralOrig = (p.moneda==='US') ? 0.10 : 0.30;
      const tieneBase25 = pm25 > 0;            /* hay prima 2025 para comparar */
      const creció = tieneBase25 && ((pm26-pm25)/Math.abs(pm25)) > umbralOrig;
      /* "Póliza nueva" la define EXCLUSIVAMENTE el TIPO (col Q). Si no hay base 2025 pero
         el tipo es Renovación/Segunda anualidad, sólo significa que la anualidad anterior
         no se emitió — NO es póliza nueva y no se aclara nada. */
      const rPMcat = p.conceptos['Prima Minima'] ? p.conceptos['Prima Minima'].categoria : null;
      const esAnualAnt = categoriaEsAnualidadAnterior(rPMcat);
      /* Valores de prima mínima en AMBAS monedas (para mostrar moneda del botón + equivalente) */
      const pm26_ars = f26.breakdownARS.primaMin, pm26_usd = f26.breakdownUSD.primaMin;
      const pm25_ars = f25.breakdownARS.primaMin, pm25_usd = f25.breakdownUSD.primaMin;
      /* Registro base: usa PRIMA MÍNIMA (no emisión total). Incluye ambas monedas y la
         moneda original para separar izq($)/der(US) y mostrar equivalente en gris. */
      const recPM = {clave:p.clave, poliza:p.poliza, asegurado:p.asegurado, rubro:p.rubro, e25:pm25, e26:pm26,
        creció, tipoC:p.tipo2026, moneda:p.moneda,
        ars25:pm25_ars, usd25:pm25_usd, ars26:pm26_ars, usd26:pm26_usd};
      /* Solo categorizar si la prima 2026 está realmente emitida */
      const rPMp = p.conceptos['Prima Minima'];
      const umbO = (p.moneda==='US')?0.10:0.30;
      const baseABM = {clave:p.clave, poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,moneda:p.moneda,tipoC:p.tipo2026};
      /* Helper: ¿la categoría de ESTE concepto corresponde a la anualidad anterior? */
      const conceptoEsAA = (tipoConcepto)=> {
        const c = p.conceptos[tipoConcepto];
        return c ? categoriaEsAnualidadAnterior(c.categoria) : false;
      };
      /* ===== CORRESPONDE A LA ANUALIDAD ANTERIOR =====
         Toda emisión 2026 (prima mínima, ajuste, bono, malus) cuya categoría diga
         "anualidad anterior" va a este item, INDEPENDIENTEMENTE de si la prima
         mínima del nuevo período está emitida. Los valores de breakdown del 2026
         ya excluyen AA (por excluirAnualAnt), así que los recalculamos sin ese filtro. */
      const f26full = calcEmisionFiltrada(p,2026,mesCorte,{excluirAnualAnt:false});
      const aaPrima = conceptoEsAA('Prima Minima') ? (useUSD?f26full.breakdownUSD.primaMin:f26full.breakdownARS.primaMin) : 0;
      const aaAjuste= conceptoEsAA('Ajuste')       ? (useUSD?f26full.breakdownUSD.ajuste :f26full.breakdownARS.ajuste ) : 0;
      const aaBono  = conceptoEsAA('Bono')         ? (useUSD?f26full.breakdownUSD.bono   :f26full.breakdownARS.bono   ) : 0;
      const aaMalus = conceptoEsAA('Malus')        ? (useUSD?f26full.breakdownUSD.malus  :f26full.breakdownARS.malus  ) : 0;
      const aaTotal = aaPrima+aaAjuste+aaBono+aaMalus;
      if(aaTotal!==0){
        emitidoCats.anualant.total += aaTotal;
        const recAA = {poliza:p.poliza, asegurado:p.asegurado, rubro:p.rubro, moneda:p.moneda, tipoC:p.tipo2026,
          e25:0, e26:aaTotal, creció:false,
          ars26:(conceptoEsAA('Prima Minima')?f26full.breakdownARS.primaMin:0)+(conceptoEsAA('Ajuste')?f26full.breakdownARS.ajuste:0)+(conceptoEsAA('Bono')?f26full.breakdownARS.bono:0)+(conceptoEsAA('Malus')?f26full.breakdownARS.malus:0),
          usd26:(conceptoEsAA('Prima Minima')?f26full.breakdownUSD.primaMin:0)+(conceptoEsAA('Ajuste')?f26full.breakdownUSD.ajuste:0)+(conceptoEsAA('Bono')?f26full.breakdownUSD.bono:0)+(conceptoEsAA('Malus')?f26full.breakdownUSD.malus:0),
          ars25:0, usd25:0,
          concepto:[conceptoEsAA('Prima Minima')?'Prima':null,conceptoEsAA('Ajuste')?'Ajuste':null,conceptoEsAA('Bono')?'Bono':null,conceptoEsAA('Malus')?'Malus':null].filter(Boolean).join('+')};
        emitidoCats.anualant.polizas.push(recAA);
      }
      /* ===== Prima Mínima NO-AA → por tipo de póliza (Renovación/Segunda anualidad/etc.) =====
         Sumar la prima mínima 2026 emitida (con categoría distinta de "Anualidad Anterior").
         Renovación / Segunda anualidad / Tercera anualidad: requieren prima mínima emitida y > 0.
         Pólizas nuevas: se listan por tipo, aunque la prima 2026 aún sea 0 (póliza creada
         pero todavía sin emitir), para que la tarjeta aparezca igual y refleje la cantidad. */
      if(conceptoEmitido26(rPMp, mesCorte) && pm26>0 && !esAnualAnt){
        if(p.tipo2026==='Segunda anualidad'){ emiSeg+=pm26; nSeg++; pmSeg+=pm26; emitidoCats.seg.total+=pm26; emitidoCats.seg.polizas.push(recPM); }
        else if(p.tipo2026==='Renovación'){ emiRen+=pm26; nRen++; pmRen+=pm26; emitidoCats.ren.total+=pm26; emitidoCats.ren.polizas.push(recPM); }
        else if(p.tipo2026==='Tercera anualidad'){ emiTer+=pm26; nTer++; emitidoCats.ter.total+=pm26; emitidoCats.ter.polizas.push(recPM); }
      }
      /* Pólizas nuevas 2026: SOLO las que el Excel marca explícitamente como
         "Póliza nueva" en la columna de 2026 (no las heredadas desde 2025) Y
         que no estén terminadas. Una póliza que fue nueva en 2025 pero que en
         2026 ya es renovación/segunda anualidad NO debe contar acá. */
      if(p.tipo2026==='Póliza nueva' && p.tipo2026Explicito && !polizaTerminada(p) && !esAnualAnt){
        emitidoCats.nuevas.total += pm26;
        emitidoCats.nuevas.polizas.push(recPM);
        incNuevas += pm26; nNuevas++;
      }
      /* ===== Ajuste / Malus / Bono NO-AA → su propia categoría =====
         INDEPENDIENTES del estado de la prima mínima. La regla (pedido del usuario):
         sumar TODO lo emitido de ese concepto en 2026 cuya categoría no sea
         "Corresponde a la Anualidad Anterior", sin importar si la prima mínima de la
         póliza está emitida o pendiente. Así la suma de los 7 ítems (Renovaciones +
         Segunda anualidad + Pólizas nuevas + Ajuste + Malus − Bono + Anualidad Anterior)
         coincide con la Emisión Total 2026. */
      if(aj26v>0 && !conceptoEsAA('Ajuste')){
        emitidoCats.ajuste.total+=aj26v;
        emitidoCats.ajuste.polizas.push({...baseABM,e25:aj25v,e26:aj26v,creció:aj25v>0&&(aj26v-aj25v)/Math.abs(aj25v)>umbO,ars25:f25.breakdownARS.ajuste,usd25:f25.breakdownUSD.ajuste,ars26:f26.breakdownARS.ajuste,usd26:f26.breakdownUSD.ajuste});
      }
      if(ma26v>0 && !conceptoEsAA('Malus')){
        emitidoCats.malus.total+=ma26v;
        emitidoCats.malus.polizas.push({...baseABM,e25:ma25v,e26:ma26v,creció:false,ars25:f25.breakdownARS.malus,usd25:f25.breakdownUSD.malus,ars26:f26.breakdownARS.malus,usd26:f26.breakdownUSD.malus});
      }
      /* BONO: viene NEGATIVO en el Excel (es una devolución que resta de la emisión).
         Se acumula en valor absoluto y se MUESTRA negativo en la tarjeta. */
      if(bo26v!==0 && !conceptoEsAA('Bono')){
        emitidoCats.bono.total+=Math.abs(bo26v);
        emitidoCats.bono.polizas.push({...baseABM,e25:Math.abs(bo25v),e26:Math.abs(bo26v),creció:false,ars25:Math.abs(f25.breakdownARS.bono),usd25:Math.abs(f25.breakdownUSD.bono),ars26:Math.abs(f26.breakdownARS.bono),usd26:Math.abs(f26.breakdownUSD.bono)});
      }
      /* Subas de proyección de ventas */
      if(pr25>0 && pr26>pr25){ subaProy += (pr26-pr25); nSubaProy++; emitidoCats.subaproy.total+=(pr26-pr25); emitidoCats.subaproy.polizas.push({poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,e25:pr25,e26:pr26,creció:(pr26-pr25)/Math.abs(pr25)>umbral,tipoC:p.tipo2026}); }

      /* ===== OTROS CONCEPTOS (para el Desvío) ===== */
      {
        const umbO = (p.moneda==='US')?0.10:0.30;
        /* Proyección en ambas monedas para mostrar moneda del botón + equivalente */
        const proy25_ars=p.proyARS2025||0, proy25_usd=p.proyUSD2025||0;
        const proy26_ars=p.proyARS2026||0, proy26_usd=p.proyUSD2026||0;
        const baseProy = {poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,moneda:p.moneda,tipoC:p.tipo2026,
          ars25:proy25_ars,usd25:proy25_usd,ars26:proy26_ars,usd26:proy26_usd,
          categoria:p.proyCategoria||null, detalle:p.proyDetalle||null};
        /* Crecimiento de proyección en moneda original */
        const prOrig25 = (p.moneda==='US')?proy25_usd:proy25_ars;
        const prOrig26 = (p.moneda==='US')?proy26_usd:proy26_ars;
        const crecioProy = prOrig25>0 && ((prOrig26-prOrig25)/Math.abs(prOrig25))>umbO;
        const subio = prOrig26>prOrig25;
        if(subio){
          const rec = {...baseProy, e25:prOrig25, e26:prOrig26, creció:crecioProy};
          if(p.tipo2026==='Renovación'){ otrosConceptos.proyRen.total+=(prOrig26-prOrig25); otrosConceptos.proyRen.polizas.push(rec); }
          else if(p.tipo2026==='Segunda anualidad'){ otrosConceptos.proySeg.total+=(prOrig26-prOrig25); otrosConceptos.proySeg.polizas.push(rec); }
        }
        /* Variación de tasas: las que AUMENTARON */
        if(p.tasa2025!=null && p.tasa2026!=null && p.tasa2026>p.tasa2025){
          otrosConceptos.tasas.total += (p.tasa2026-p.tasa2025);
          otrosConceptos.tasas.polizas.push({poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,moneda:p.moneda,tipoC:p.tipo2026,
            tasa25:p.tasa2025, tasa26:p.tasa2026,
            categoria:p.tasaCategoria||null, detalle:p.tasaDetalle||null,
            proyCat:p.proyCategoria||null, proyDet:p.proyDetalle||null});
        }
        /* PÓLIZAS QUE NO CRECIERON: mantienen o aumentan la emisión total pero NO llegan
           al objetivo (+30% si moneda original $, +10% si US). Se EXCLUYEN las pendientes
           y las que tienen desvío negativo (caída), porque ya están contempladas arriba. */
        {
          const eo25 = (p.moneda==='US')?f25.totUSD:f25.totARS;
          const eo26 = (p.moneda==='US')?f26.totUSD:f26.totARS;
          const esPend = (est==='desvio_emision_pendiente'||est==='desvio_pendiente_mayor_2m');
          const rPMx = p.conceptos['Prima Minima'];
          const emit26x = conceptoEmitido26(rPMx, mesCorte);
          if(!polizaTerminada(p) && !esPend && emit26x && eo25>0 && eo26>=eo25){
            const crec = (eo26-eo25)/Math.abs(eo25);
            if(crec < umbO){ /* aumentó/mantuvo pero no llegó al objetivo */
              const faltante = eo25*(1+umbO)-eo26;
              otrosConceptos.noCrecieron.total += (faltante>0?faltante:0);
              otrosConceptos.noCrecieron.polizas.push({poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,moneda:p.moneda,tipoC:p.tipo2026,
                ars25:f25.totARS, usd25:f25.totUSD, ars26:f26.totARS, usd26:f26.totUSD,
                crec, umbral:umbO,
                categoria:(rPMx?rPMx.categoria:null)||p.proyCategoria||null,
                detalle:(rPMx?rPMx.detalle:null)||p.proyDetalle||null});
            }
          }
        }
      }

      /* "Perdida" SOLO si el TIPO dice explícitamente "terminada". Una póliza vencida
         (vigencia terminó) que NO se emitió y cuyo tipo NO aclara que terminó está
         PENDIENTE de renovación, no perdida. */
      const perdida = polizaTerminada(p);
      if(perdida){ perdidas += e25; nPerdidas++; continue; }
      /* "Pólizas nuevas" (incNuevas/emitidoCats.nuevas) ya se contabilizó arriba
         dentro del bucle de prima mínima NO-AA. */

      if(est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m'){
        /* Estimación del pendiente = prima mínima del AÑO ANTERIOR (lo más estable y realista).
           Se calcula en AMBAS monedas y se ancla a la moneda ORIGINAL de la póliza:
           el equivalente en la otra moneda usa el TC del botón 7° (si está activo),
           para que los % del gráfico USD y ARS coincidan. Sin TC vuelve al valor
           bruto del Excel (comportamiento anterior).
           Solo si no hay pm25 en ninguna moneda se recurre a proy*tasa*factor. */
        let estARS = f25.breakdownARS.primaMin;
        let estUSD = f25.breakdownUSD.primaMin;
        if(!(estARS>0) && !(estUSD>0)){
          const proyARS = (p.proyARS2026||p.proyARS2025||0);
          const proyUSD = (p.proyUSD2026||p.proyUSD2025||0);
          const tasa = (p.tasa2026!=null?p.tasa2026:p.tasa2025);
          estARS = (proyARS && tasa) ? proyARS*tasa*FACTOR_DEF : 0;
          estUSD = (proyUSD && tasa) ? proyUSD*tasa*FACTOR_DEF : 0;
        }
        const cv = convertirPendienteTC(estARS, estUSD, p.moneda);
        pendiente += useUSD ? cv.usd : cv.ars;
        nPend++;
        continue;
      }
      /* CLAVE: solo contar variaciones de prima/proy/tasa/ajuste/bono/malus si la
         prima mínima 2026 está REALMENTE emitida (fecha + monto). Si no, es pendiente. */
      const rPM = p.conceptos['Prima Minima'];
      if(!conceptoEmitido26(rPM, mesCorte)){
        /* No emitida → tratar como pendiente, usando prima del año anterior con TC. */
        const cv = convertirPendienteTC(f25.breakdownARS.primaMin, f25.breakdownUSD.primaMin, p.moneda);
        const v = useUSD ? cv.usd : cv.ars;
        if(v>0){ pendiente += v; nPend++; }
        continue;
      }
      /* PRIMA MÍNIMA PARCIALMENTE EMITIDA (pedido del usuario): emitió algunas cuotas
         2026 pero aún le faltan meses por emitir. Esa diferencia NO es "menor prima
         mínima" real, sino emisión PENDIENTE. La contamos como pendiente (solo la parte
         no emitida: prima año anterior − lo ya emitido en 2026) y NO como baja de prima.
         La diferencia se evalúa en cada moneda y se aplica TC para alinear vistas. */
      if(primaMinTienePendiente(p, mesCorte)){
        const fARS = f25.breakdownARS.primaMin - f26.breakdownARS.primaMin;
        const fUSD = f25.breakdownUSD.primaMin - f26.breakdownUSD.primaMin;
        const cv = convertirPendienteTC(fARS>0?fARS:0, fUSD>0?fUSD:0, p.moneda);
        const v = useUSD ? cv.usd : cv.ars;
        if(v>0){ pendiente += v; nPend++; }
        continue;
      }
      /* MENOR PRIMA MÍNIMA (efecto): comparar las MISMAS cuotas (N cuotas 2026 vs primeras
         N de 2025) en la moneda de la vista. Así una póliza que emitió menos cuotas pero
         mantiene el valor por cuota NO cuenta como baja. */
      const parPM = conceptoBajaPareada(p, 'Prima Minima', useUSD, mesCorte);
      const dPm = parPM.pm26 - parPM.pm25;
      if(parPM.baja){ efPrimaMin += dPm; nPrimaMin++; } else if(dPm>0){ incPrimaMin += dPm; }

      const proy25 = useUSD ? (p.proyUSD2025||0) : (p.proyARS2025||0);
      const proy26 = useUSD ? (p.proyUSD2026||0) : (p.proyARS2026||0);
      const tasa25 = p.tasa2025, tasa26 = p.tasa2026;
      let factor = FACTOR_DEF;
      if(proy25 && tasa25){ const fr = pm25/(proy25*tasa25); if(fr>0.3 && fr<1.5) factor = fr; }
      if(proy25 && tasa25!=null){ const ep=(proy26-proy25)*tasa25*factor; if(ep<0){efProy+=ep;nProy++;} }
      if(proy26 && tasa25!=null && tasa26!=null){ const et=proy26*(tasa26-tasa25)*factor; if(et<0){efTasa+=et;nTasa++;} }

      /* AJUSTE / BONO / MALUS: si el concepto todavía tiene cuotas PENDIENTES de emitir,
         su diferencia negativa es emisión pendiente, NO una baja real ("menor"). Y para los
         que sí están completos, la baja se mide comparando MISMAS cuotas (N 2026 vs primeras
         N de 2025) en la moneda de la vista. */
      const ajPend = conceptoTieneCuotasPendientes(p, 'Ajuste', mesCorte);
      const boPend = conceptoTieneCuotasPendientes(p, 'Bono', mesCorte);
      const maPend = conceptoTieneCuotasPendientes(p, 'Malus', mesCorte);
      const parAj = conceptoBajaPareada(p, 'Ajuste', useUSD, mesCorte);
      const parBo = conceptoBajaPareada(p, 'Bono', useUSD, mesCorte);
      const parMa = conceptoBajaPareada(p, 'Malus', useUSD, mesCorte);
      const aj = parAj.pm26 - parAj.pm25;
      const bo = parBo.pm26 - parBo.pm25;
      const ma = parMa.pm26 - parMa.pm25;
      if(!ajPend){ if(parAj.baja) efAjuste+=aj; else if(aj>0) incAjuste+=aj; }
      if(!boPend){ if(parBo.baja) efBono+=bo; else if(bo>0) incBono+=bo; }
      if(!maPend){ if(parMa.baja) efMalus+=ma; else if(ma>0) incMalus+=ma; }

      /* Franja gris: pólizas emitidas que NO alcanzan el aumento esperado.
         El umbral depende de la MONEDA ORIGINAL de la póliza: $ → +30%, US → +10%. */
      if(e25>0 && e26>0 && dPm>=0){
        const umbG = (p.moneda==='US')?0.10:0.30;
        const crec = (e26-e25)/Math.abs(e25);
        if(crec < umbG){
          const faltante = e25*(1+umbG) - e26;
          if(faltante>0){ cSinJust += faltante; nSinJust++; }
        }
      }
    }
    const cPerdidas=perdidas, cPend=pendiente;
    const cPrimaMin=Math.abs(efPrimaMin), cProy=Math.abs(efProy), cTasa=Math.abs(efTasa);
    const cAjuste=Math.abs(efAjuste), cBono=Math.abs(efBono), cMalus=Math.abs(efMalus);
    const cVariaciones = cPrimaMin+cAjuste+cBono+cMalus;
    const sumExpl = cPerdidas+cPend+cVariaciones;
    const cOtros = Math.max(0, desvio - sumExpl);
    const incTotal = incPrimaMin+incAjuste+incBono+incMalus+incNuevas;
    /* DOS desvíos (pedido del usuario):
       (1) hasta el ÚLTIMO mes con emisión real 2026 (lo emitido efectivamente, comparación
           "justa" presupuesto-a-la-fecha vs emisión-a-la-fecha);
       (2) hasta el MES DE CORTE del botón 1° (presupuesto acumulado hasta ahí). */
    let lastEmis26 = 0;
    try { const _md = computeMensual(polFiltradas); const _r = useUSD ? _md.real26.usd : _md.real26.ars;
      for(let i=0;i<12;i++){ if((_r[i]||0)>0.5) lastEmis26=i+1; } } catch(e){}
    const presup26_emi = presupAcumulado(presArr, lastEmis26 || 12);
    const desvio_emi   = presup26_emi - emis26;     /* emis26 ya es lo emitido (no hay emisión tras lastEmis26) */
    return {useUSD, presArr, presup26, emis26, emis25, conc26, conc25, desvio, cumpl, sinPresup,
      lastEmis26, presup26_emi, desvio_emi, mesCorteSet:mesCorte,
      emiSeg,nSeg, emiRen,nRen, emiTer,nTer, pmSeg, pmRen, subaProy, nSubaProy, emitidoCats, otrosConceptos,
      cPerdidas,nPerdidas, cPend,nPend, cPrimaMin,nPrimaMin, cProy,nProy, cTasa,nTasa,
      cAjuste,cBono,cMalus, cVariaciones, cOtros,
      incPrimaMin,incAjuste,incBono,incMalus,incNuevas,nNuevas,incTotal, cSinJust, nSinJust};
  }

  const setU = showUSD ? calcSet(true) : null;
  const setA = showARS ? calcSet(false) : null;
  const primary = setU || setA;  /* para drilldowns */

  /* ===== Render ===== */
  const body = document.getElementById('ejecutivo-body');
  const sinPresup = primary.sinPresup && (!setU || setU.sinPresup) && (!setA || setA.sinPresup);

  /* Guardar para drilldowns ANTES de construir el HTML (ejecJustificacion lo usa
     para contar pólizas reales del desglose en los paréntesis). */
  /* Para los PENDIENTES de emisión usamos un universo que NO aplica el filtro "Emitidas
     2026": una póliza pendiente, por definición, todavía NO emitió en 2026, así que el
     filtro emit26 la excluiría y nunca veríamos su pendiente. Respetamos el resto de
     filtros (moneda, segmento, nuevas, anualidad anterior). */
  const polFiltradasPend = aplicarFiltrosPolizas(state.polizas, {...f, universo:'todos'});
  state._ejecData = {useUSD:primary.useUSD, mesCorte, f, polFiltradas, polFiltradasPend,
    cPerdidas:primary.cPerdidas, cPend:primary.cPend, cPrimaMin:primary.cPrimaMin,
    cProy:primary.cProy, cTasa:primary.cTasa, cAjuste:primary.cAjuste, cBono:primary.cBono, cMalus:primary.cMalus, cOtros:primary.cOtros};

  body.innerHTML = `
    ${sinPresup?`<div style="background:rgba(232,155,30,.10);border-left:3px solid var(--warn);padding:10px 14px;border-radius:4px;margin-bottom:12px;font-size:12px;color:var(--accent-3)">⚠ No se detectó presupuesto 2026 cargado. Los bloques de presupuesto mostrarán 0; el resto funciona igual.</div>`:''}

    <!-- BLOQUE 1 -->
    <div class="card">
      <div class="ejec-block-title ejec-block-title--lg"><span>Presupuesto</span><span class="ejb-sep">vs</span><span>Emisión&nbsp;Real</span><span class="ejb-year">2026</span></div>
      ${setU?ejecFlujo(setU,true):''}
      ${setA?ejecFlujo(setA,false):''}
      <!-- Gráfico mensual: solo botón 2025, sin título -->
      <div style="margin-top:10px">
        ${dual ? `
          <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:4px">USD</div>
          <div class="chart-box" style="height:400px"><canvas id="ejecChartMensual_u"></canvas></div>
          <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin:10px 0 4px">ARS$</div>
          <div class="chart-box" style="height:400px"><canvas id="ejecChartMensual_a"></canvas></div>
        ` : `
          <div class="chart-box" style="height:470px"><canvas id="ejecChartMensual"></canvas></div>
        `}

      </div>
      <!-- Selector oculto del presupuesto: escribir "tina" muestra Argentina -->
      <div style="margin-top:14px;padding-top:10px;border-top:1px dashed var(--line)">
        <input type="text" id="ejecPresupSecret" autocomplete="off" spellcheck="false"
          style="width:100%;max-width:260px;padding:4px 8px;font-family:var(--font-mono);font-size:11px;color:#c5d2e3;background:transparent;border:1px solid transparent;border-radius:4px;outline:none"
          onfocus="this.style.borderColor='var(--line)';this.style.color='var(--ink-2)'"
          onblur="this.style.borderColor='transparent';this.style.color='#c5d2e3'" />
      </div>
    </div>

    <!-- DESVÍO (debajo de Presupuesto, pedido del usuario) -->
    <div class="card">
      <div class="ejec-block-title">${primary.desvio>0?'Desvío':'Desvío (a favor)'}</div>
      ${setU?ejecJustificacion(setU,true,dual,primary.useUSD):''}
      ${setA?ejecJustificacion(setA,false,dual,primary.useUSD):''}
      <div id="ejecCausaDetalle" style="display:none;margin-top:12px"></div>
    </div>

    <!-- COMPARACIÓN 2025 vs 2026 + EMISIÓN 2026 (unificados, debajo del Desvío) -->
    <div class="card">
      <div class="ejec-block-title">Comparación de emisión 2025 vs 2026</div>
      ${setU?ejecComparacion(setU,true,dual):''}
      ${setA?ejecComparacion(setA,false,dual):''}
      <div style="margin-top:26px;padding-top:20px;border-top:2px solid var(--line-2)">
        ${setU?ejecEmitido(setU,true,dual):''}
        ${setA?ejecEmitido(setA,false,dual):''}
      </div>
    </div>

    <!-- BLOQUE 5 -->
    <div class="card">
      <div class="ejec-block-title">Detalle por rubro 2025 VS 2026</div>
      <!-- 5.1 Comparativo emisión 2025 vs 2026 por rubro (PRIMERO, pedido del usuario) -->
      <div id="ejecRubroChartWrap" style="margin-top:12px"></div>
      <!-- 5.0 Super-resumen compacto: variación de proyección, tasa y siniestralidad por rubro -->
      <div id="ejecRubroMiniWrap" style="margin-top:18px"></div>

  /* Charts */
  /* drawEjecRubroExtremos(polFiltradas, f); — bloque TOP oculto temporalmente (pedido del usuario) */
  drawEjecRubroMini(polFiltradas, f, primary.useUSD);
  drawEjecRubroChart(polFiltradas, f, primary.useUSD);
  /* La tabla de cards por rubro se renderiza on-demand al hacer click en una
     fila del comparativo de arriba (foto 2 → foto 1). Igual mantenemos el
     state._ejecRubroItems poblado para el drill. */
  drawEjecRubroTabla(polFiltradas, f, primary.useUSD);

  /* Input secreto del presupuesto: "tina" → Argentina. */
  const secEl = document.getElementById('ejecPresupSecret');
  if(secEl){

      if(prev !== now){

        const ne = document.getElementById('ejecPresupSecret');
        if(ne){ ne.focus(); ne.setSelectionRange(ne.value.length, ne.value.length); }

}

/* Flujo Presupuesto → Emisión → Desvío para una moneda */
function ejecFlujo(S, useUSD){
  const FMTc = (v)=>fmtCompact(v, useUSD);
  const mLbl = useUSD?'USD':'ARS$';
  const desvio=S.desvio, dvAbs=Math.abs(desvio);
  const desvPct = S.presup26>0 ? (desvio/S.presup26*100) : null;
  /* Segundo desvío: hasta el último mes con emisión real 2026 (comparación a la fecha). */
  const desvioEmi = S.desvio_emi||0, dvAbsEmi=Math.abs(desvioEmi);
  const desvPctEmi = S.presup26_emi>0 ? (desvioEmi/S.presup26_emi*100) : null;
  const _mLast  = (S.lastEmis26>0) ? MESES[S.lastEmis26-1] : '—';
  const _mCorte = (S.mesCorteSet>0) ? MESES[S.mesCorteSet-1] : 'Dic';
  /* Títulos de las 3 tarjetas más prominentes (pedido del usuario): subir el
     tamaño y el peso, mantener el color sutil de cada bloque. Se quita
     "objetivo del período" debajo del presupuesto. */
  const tituloCardCss = (col)=>`font-size:14px;color:${col};text-transform:uppercase;letter-spacing:.04em;font-weight:800;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid ${col};display:inline-block`;
  /* Desglose de "Emisión Real 2026" por TIPO (para tooltip al pasar el mouse y burbuja al click). */
  const sufijo = useUSD?'u':'a';
  const _ec = S.emitidoCats || {};
  const _bcats = [
    {k:'seg',lbl:'2ª anualidad'},{k:'ren',lbl:'Renovaciones'},{k:'ter',lbl:'3ª anualidad'},
    {k:'nuevas',lbl:'Pólizas nuevas'},{k:'ajuste',lbl:'Ajuste'},{k:'malus',lbl:'Malus'},
    {k:'bono',lbl:'Bono',neg:true},{k:'anualant',lbl:'Corr. Anualidad Anterior'}
  ];
  const _brows = _bcats.map(c=>{ const d=_ec[c.k]; const n=(d&&d.polizas)?d.polizas.length:0; const tot=d?d.total:0; if(!tot && n===0) return null; return {lbl:c.lbl, val:c.neg?-Math.abs(tot):tot, n, neg:!!c.neg}; }).filter(Boolean);
  const _bubbleRows = _brows.map(r=>`<div style="display:flex;justify-content:space-between;gap:16px;font-size:12px;padding:2.5px 0;border-bottom:1px solid var(--line)"><span style="color:var(--ink-2)">${r.lbl} <span style="color:var(--ink-3);font-size:10.5px">· ${r.n} pól.</span></span><strong style="font-family:var(--font-mono);color:${r.neg?'var(--neg)':'var(--accent-3)'}">${r.neg?'−':''}${FMTc(Math.abs(r.val))}</strong></div>`).join('');
  const _bubbleTitle = 'Emisión 2026 por tipo:\n' + _brows.map(r=>`• ${r.lbl}: ${r.neg?'−':''}${FMTc(Math.abs(r.val))} (${r.n})`).join('\n');
  const _bubbleHTML = `<div id="emisBubble_${sufijo}" style="display:none;position:absolute;top:100%;left:0;margin-top:6px;z-index:40;background:#fff;border:1px solid var(--line-2);border-radius:9px;box-shadow:0 6px 20px rgba(10,31,58,.20);padding:11px 13px;min-width:250px;text-align:left;cursor:default" onclick="event.stopPropagation()"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;color:var(--pos);margin-bottom:6px">Emisión 2026 por tipo</div>${_bubbleRows||'<div style="font-size:12px;color:var(--ink-3)">— sin desglose —</div>'}</div>`;
  return `<div style="margin-top:8px">
    <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:5px">${mLbl}</div>
    <div style="display:flex;align-items:stretch;gap:8px">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center">
        <div style="flex:1;background:rgba(30,111,217,.10);border-radius:10px;padding:8px 13px;display:flex;flex-direction:column;justify-content:center">
          <div style="font-size:11.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;font-weight:800">Presupuesto Acumulado · ${_mLast}</div>
          <div style="font-size:20px;font-weight:800;color:var(--accent-3);line-height:1;font-family:var(--font-mono);margin-top:3px">${FMTc(S.presup26_emi)}</div>
        </div>
        <div style="flex:1;background:rgba(30,111,217,.10);border-radius:10px;padding:8px 13px;display:flex;flex-direction:column;justify-content:center">
          <div style="font-size:11.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;font-weight:800">Presupuesto Acumulado · ${_mCorte}</div>
          <div style="font-size:20px;font-weight:800;color:var(--accent-3);line-height:1;font-family:var(--font-mono);margin-top:3px">${FMTc(S.presup26)}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;color:var(--ink-3);font-size:24px;font-weight:300">→</div>
      <div title="${_bubbleTitle.replace(/"/g,'&quot;')}" onclick="window.toggleEmisBubble('${sufijo}')" style="flex:1;position:relative;background:rgba(45,155,106,.10);border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;justify-content:flex-start;cursor:pointer">
        <div style="${tituloCardCss('var(--pos)')}">Emisión Real 2026 <span style="font-size:11px;color:var(--pos)">▾</span></div>
        <div style="font-size:22px;font-weight:800;color:var(--pos);line-height:1;font-family:var(--font-mono);margin-top:4px">${FMTc(S.emis26)}</div>
        ${(()=>{ const cumplEmi = S.presup26_emi>0 ? S.emis26/S.presup26_emi : null;
          const linea = (pct,sub)=>`<div style="font-size:17px;font-weight:800;color:var(--pos);margin-top:7px;font-family:var(--font-mono)">${pct!=null?Math.round(pct*100)+'%':'—'}<span style="font-size:11px;font-weight:600;margin-left:4px">del objetivo · ${sub}</span></div>`;
          return linea(cumplEmi,_mLast) + linea(S.cumpl,_mCorte);
        })()}
        ${_bubbleHTML}
      </div>
      <div style="display:flex;align-items:center;color:var(--ink-3);font-size:20px;font-weight:300">=</div>
      <div style="flex:1.15;display:flex;flex-direction:column;gap:6px">
        ${(()=>{
          /* DOS desvíos en la misma posición: (1) a la fecha (hasta emisión real 2026),
             (2) hasta el mes de corte del botón 1°. */
          const subCard = (titulo, sub, val, pct)=>{
            const neg = val>0; const c = neg?'var(--neg)':'var(--pos)';
            return `<div style="flex:1;background:${neg?'rgba(217,71,71,.10)':'rgba(45,155,106,.10)'};border-radius:10px;padding:8px 13px;display:flex;flex-direction:column;justify-content:center">
              <div style="font-size:11.5px;color:${c};text-transform:uppercase;letter-spacing:.03em;font-weight:800">${titulo}${sub?' · '+sub:''}</div>
              <div style="display:flex;align-items:baseline;gap:8px;margin-top:2px">
                <span style="font-size:20px;font-weight:800;color:${c};font-family:var(--font-mono)">${neg?'−':'+'}${FMTc(Math.abs(val))}</span>
                <span style="font-size:13px;font-weight:800;color:${c};font-family:var(--font-mono)">${pct!=null?'('+(pct>0?'−':'+')+Math.abs(pct).toFixed(0)+'%)':''}</span>
              </div>
            </div>`;
          };
          return subCard('Desvío Acumulado', _mLast, desvioEmi, desvPctEmi)
               + subCard('Desvío Acumulado', _mCorte, desvio, desvPct);
        })()}
      </div>
    </div>
  </div>`;
}

  const idT = useUSD?'ejecChartTotal_u':'ejecChartTotal_a';

    drawEjecChartTotal(idT, S.emis25, S.emis26, useUSD);
    drawEjecChartConcepto(idC, S.conc25, S.conc26, useUSD);
  }, 10);
  /* Variación total bajo el gráfico de total */
  const dTot = S.emis26 - S.emis25;
  const dTotPct = S.emis25 ? dTot/Math.abs(S.emis25) : null;
  const cTot = dTot>=0?'var(--pos)':'var(--neg)';
  /* Variación por concepto bajo el gráfico de conceptos */
  const conceptosVar = CONCEPTOS_EMISIBLES.map(c=>{
    const k = KEYMAP[c];
    const v25 = S.conc25[k]||0, v26 = S.conc26[k]||0;
    const dd = v26 - v25; const pp = v25 ? dd/Math.abs(v25) : null;

        <div style="text-align:center;margin-top:10px">
          <div style="font-size:13px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700">Desvío</div>
          <div style="font-family:var(--font-mono);font-size:26px;font-weight:800;color:${cTot};line-height:1.1;margin-top:4px">${dTot>=0?'+':''}${fmtCompact(dTot, useUSD)}</div>
          <div style="font-size:16px;font-weight:800;color:${cTot};margin-top:2px">${dTotPct!=null?'('+(dTot>=0?'+':'')+FMT_PCT(dTotPct)+')':''}</div>
        </div>

      <div>

          ${conceptosVar.map(cv=>{

            return `<div style="background:var(--bg-2);border-radius:6px;padding:8px 12px;border-left:3px solid ${cc}">
              <div style="color:var(--accent-3);font-weight:700;font-size:13px">${CONCEPTO_LABEL[cv.c]}</div>
              <div style="display:flex;align-items:baseline;gap:8px;margin-top:2px">
                <span style="font-family:var(--font-mono);font-weight:800;color:${cc};font-size:17px">${cv.dd>=0?'+':''}${cv.pp!=null?FMT_PCT(cv.pp):'—'}</span>
                <span style="font-family:var(--font-mono);font-weight:700;color:var(--ink-2);font-size:13px">${cv.dd>=0?'+':''}${fmtCompact(cv.dd, useUSD)}</span>

  </div>`;
