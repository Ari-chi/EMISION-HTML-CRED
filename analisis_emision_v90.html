window.toggleEjecCausa = function(id){
  const panel = document.getElementById('ejecCausaDetalle');
  if(!panel) return;
  if(panel.dataset.open === id){ panel.style.display='none'; panel.dataset.open=''; return; }
  const d = state._ejecData; if(!d) return;
  const mesCorte = state._ejecDesvioCutoff || d.mesCorte;
  const FMT_U = FMT_USD_FULL, FMT_A = FMT_ARS_FULL;
  /* ¿Es el item de pendiente (total) o uno de sus 4 sub-conceptos? */
  const esPend = (id==='pendiente' || id==='pend_prima' || id==='pend_ajuste' || id==='pend_bono' || id==='pend_malus');
  /* Para pendientes usamos el universo que NO aplica el filtro "Emitidas 2026" (una póliza
     pendiente no emitió, así que emit26 la excluiría). El resto de causas usa el universo
     filtrado normal. */
  /* "Sin Fecha" (pend_2025) usa el MISMO universo pendiente que el donut, para que el total y el
     conteo de pólizas coincidan. */
  const _usePend = esPend || id==='pend_2025';
  const polFiltradas = _usePend ? (d.polFiltradasPend || d.polFiltradas) : d.polFiltradas;

  /* Etiqueta corta del tipo de anualidad */
  function tipoCorto(p){
    const t = p.tipo2026 || p.tipo2025 || '';
    if(/renov/i.test(t)) return 'Renov.';
    if(/segunda/i.test(t)) return '2ª anual.';
    if(/tercera/i.test(t)) return '3ª anual.';
    if(/cuarta/i.test(t)) return '4ª anual.';
    if(/nueva/i.test(t)) return 'Nueva';
    if(/terminada/i.test(t)) return 'Terminada';
    return t || '—';
  }

  /* moneda del BOTÓN 3° (la vista). Todos los montos del drill se muestran en esta
     moneda; si la moneda original difiere, se muestra el equivalente en gris. */
  const btnUSD = d.useUSD;

  /* Agrupar filas con el MISMO NOMBRE de asegurado, sumando sus valores. Pedido del
     usuario: si ADVANTA tiene pólizas 358 y 411 con prima 140 y 9, se muestra una sola
     línea ADVANTA con 149. Suma todos los campos numéricos (montos, v25/v26, pm, proy,
     efectos) y combina los conceptos pendientes. Conserva moneda/rubro/tipo de la primera.
     Las filas SIN nombre de asegurado quedan individuales (no se fusionan entre sí). */
  function agruparPorAsegurado(rows){
    const SUM = ['monto','montoARS','montoUSD','v25','v26','v25ARS','v26ARS','v25USD','v26USD',
      'pm25','pm26','pm25ARS','pm26ARS','pm25USD','pm26USD',
      'proy25','proy26','proy25ARS','proy26ARS','proy25USD','proy26USD',
      'efProy','efTasa','efProyARS','efProyUSD','efTasaARS','efTasaUSD','dPm'];
    const map = new Map();
    const sueltas = [];
    for(const r of rows){
      const nombre = (r.asegurado||'').trim().toUpperCase();
      if(!nombre){ sueltas.push(r); continue; }
      if(!map.has(nombre)){
        /* clonar para no mutar el original */
        const base = {...r};
        base._polizas = [r.poliza];
        base._nGrupo = 1;
        map.set(nombre, base);
      } else {
        const g = map.get(nombre);
        for(const k of SUM){ if(typeof r[k]==='number'){ g[k] = (typeof g[k]==='number'?g[k]:0) + r[k]; } }
        /* conceptos pendientes: concatenar sumando por concepto */
        if(r.conceptosPend && r.conceptosPend.length){
          if(!g.conceptosPend) g.conceptosPend = [];
          for(const it of r.conceptosPend){
            const ex = g.conceptosPend.find(x=>x.concepto===it.concepto);
            if(ex){ ex.ars=(ex.ars||0)+(it.ars||0); ex.usd=(ex.usd||0)+(it.usd||0); }
            else g.conceptosPend.push({...it});
          }
        }
        /* flags booleanos: el grupo está "en baja" si alguna lo está; conserva justif/esBono */
        if(r.baja) g.baja = true;
        if(r.mayor2m) g.mayor2m = true;
        g._polizas.push(r.poliza);
        g._nGrupo++;
      }
    }
    /* Para grupos con más de una póliza, recalcular 'crec' si aplica (a partir de pm/v) */
    const agrupadas = [...map.values()].map(g=>{
      if(g._nGrupo>1){
        /* recalcular % de crecimiento de prima si hay datos */
        if(typeof g.pm25==='number' && g.pm25!==0 && typeof g.pm26==='number'){ g.crec=(g.pm26-g.pm25)/Math.abs(g.pm25); }
      }
      return g;
    });
    return agrupadas.concat(sueltas);
  }

  /* Recolectar pólizas por causa, por moneda ORIGINAL. Cada registro guarda el
     monto en AMBAS monedas (ars/usd) para poder mostrarlo en la moneda del botón
     + el equivalente original en gris. */
  function collect(monOrigUSD, effIdOverride){
    /* effIdOverride permite forzar el "id" de causa al recolectar — usado por
       el drill "menor" que comparte el panel para 4 sub-conceptos
       (prima/ajuste/bono/malus). Si no se pasa, usa el id real de la causa. */
    const effId = effIdOverride || id;
    const rows = [];
    for(const p of polFiltradas){
      if(monOrigUSD && p.moneda!=='US') continue;
      if(!monOrigUSD && p.moneda!=='$') continue;
      const uu = (p.moneda==='US'); /* moneda original para los umbrales */
      const est = estadoPolizaConsolidado(p, mesCorte);
      const f25 = calcEmisionFiltrada(p,2025,mesCorte);
      const f26 = calcEmisionFiltrada(p,2026,mesCorte);
      /* valores en moneda original (para lógica) */
      const e25 = uu?f25.totUSD:f25.totARS, e26 = uu?f26.totUSD:f26.totARS;
      const pm25 = uu?f25.breakdownUSD.primaMin:f25.breakdownARS.primaMin;
      const pm26 = uu?f26.breakdownUSD.primaMin:f26.breakdownARS.primaMin;
      const aj25=uu?f25.breakdownUSD.ajuste:f25.breakdownARS.ajuste, aj26=uu?f26.breakdownUSD.ajuste:f26.breakdownARS.ajuste;
      const bo25=uu?f25.breakdownUSD.bono:f25.breakdownARS.bono, bo26=uu?f26.breakdownUSD.bono:f26.breakdownARS.bono;
      const ma25=uu?f25.breakdownUSD.malus:f25.breakdownARS.malus, ma26=uu?f26.breakdownUSD.malus:f26.breakdownARS.malus;
      const proy25=uu?(p.proyUSD2025||0):(p.proyARS2025||0), proy26=uu?(p.proyUSD2026||0):(p.proyARS2026||0);
      const terminada = /terminada/i.test(p.tipo2026||'') || /terminada/i.test(p.tipo2025||'');
      const pend = (est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m');
      const base = {poliza:p.poliza, clave:p.clave, asegurado:p.asegurado, rubro:p.rubro, tipo25:p.tipo2025, tipo26:p.tipo2026, tipoC:tipoCorto(p), moneda:p.moneda,
        sinH25:p.sinH2025, sinH26:p.sinH2026, sinUV25:p.sinUV2025, sinUV26:p.sinUV2026,
        tasa25:p.tasa2025, tasa26:p.tasa2026,
        proy25ARS:p.proyARS2025||0, proy26ARS:p.proyARS2026||0, proy25USD:p.proyUSD2025||0, proy26USD:p.proyUSD2026||0,
        pm25ARS:f25.breakdownARS.primaMin, pm26ARS:f26.breakdownARS.primaMin,
        pm25USD:f25.breakdownUSD.primaMin, pm26USD:f26.breakdownUSD.primaMin,
        proyCat:p.proyCategoria, proyDet:p.proyDetalle, tasaCat:p.tasaCategoria, tasaDet:p.tasaDetalle};
      const umbral = uu?0.10:0.30;
      const crece = e25>0 && ((e26-e25)/Math.abs(e25))>umbral;
      const mantiene = e25>0 && (e26>=e25) && !crece;
      const rPM = p.conceptos['Prima Minima'];
      const primaEmit26 = conceptoEmitido26(rPM, mesCorte);
      const emitidoOk = primaEmit26 && !terminada && !pend;
      /* NO se usa tipo de cambio en ningún cálculo: cada moneda toma SIEMPRE su valor
         real del Excel. Donde no hay histórico de prima, se estima con la proyección
         REAL de cada moneda por separado (proyARS para $, proyUSD para US$), nunca
         convirtiendo una moneda a la otra. */

      /* La póliza entra en "Pendiente" si tiene CUALQUIER concepto pendiente
         (prima, ajuste, bono o malus), evaluado individualmente. No depende del estado
         consolidado de la póliza (que mira solo la prima): una póliza con la prima ya
         emitida puede igual tener ajuste/bono/malus pendientes.
         Los ids pend_prima/pend_ajuste/pend_bono/pend_malus filtran un solo concepto;
         'pendiente' (legacy) muestra todos. */
      const PEND_CONCEPTO = {pend_prima:'Prima mínima', pend_ajuste:'Ajuste', pend_bono:'Bono', pend_malus:'Malus'};
      if(effId==='pendiente' || PEND_CONCEPTO[effId]){
        const cp = conceptosPendientes(p, mesCorte);
        let items = cp.items.slice();
        /* Fallback consolidado: pendiente sin items detallados → usar la emisión 2025 de
           la prima (lo que falta renovar), en cada moneda. Sin estimaciones ni TC. */
        if(items.length===0 && pend){
          const mARS = f25.breakdownARS.primaMin;
          const mUSD = f25.breakdownUSD.primaMin;
          if(mARS>0||mUSD>0) items=[{concepto:'Prima mínima', ars:mARS, usd:mUSD}];
        }
        /* El BONO pendiente ahora SÍ se contempla como un concepto más (pedido del usuario). */
        /* Si es un sub-concepto, quedarse solo con ese concepto. */
        if(PEND_CONCEPTO[effId]) items = items.filter(it=>it.concepto===PEND_CONCEPTO[effId]);
        if(items.length>0){
          /* TC (solo pendiente): el monto en la moneda propia de la póliza se mantiene;
             el equivalente en la otra moneda se recalcula con el tipo de cambio. */
          const itemsConv = items.map(it=>{ const cv=convertirPendienteTC(it.ars, it.usd, p.moneda); return {...it, ars:cv.ars, usd:cv.usd}; });
          const mARS = itemsConv.reduce((a,it)=>a+it.ars,0);
          const mUSD = itemsConv.reduce((a,it)=>a+it.usd,0);
          const montoOrigTot = (p.moneda==='US')?mUSD:mARS;
          rows.push({...base, monto:montoOrigTot, montoARS:mARS, montoUSD:mUSD,
            conceptosPend:itemsConv, mayor2m: est==='desvio_pendiente_mayor_2m'});
        }
      }
      else if(effId==='perdidas' && terminada){
        const anio = /2026/.test(p.tipo2026||'') ? '2026' : (/2025/.test(p.tipo2025||'')||/2025/.test(p.tipo2026||'') ? '2025' : '2026');
        /* La emisión perdida es TODO lo que la póliza emitió en 2025 (referencia completa),
           sin aplicar el "Acumulado hasta": una póliza terminada dejó de aportar el total
           del año anterior, no solo lo de hasta el mes de corte. Algunas emisiones 2025
           (p. ej. ajustes de fin de año) caen fuera del corte parcial y no deben perderse. */
        const f25full = calcEmisionFiltrada(p,2025,0,{excluirAnualAnt:false});
        const e25full = uu?f25full.totUSD:f25full.totARS;
        rows.push({...base, monto:e25full, montoARS:f25full.totARS, montoUSD:f25full.totUSD, anio});
      }
      else if(effId==='prima' && !terminada && !primaMinTienePendiente(p, mesCorte) && (conceptoBajaPareada(p,'Prima Minima',uu,mesCorte).baja || primaNoCorrespondeDesvio(p,mesCorte).entra)){
        /* REGLA (usuario) para "Menor prima mínima":
           - Si hay EMISIÓN 2026: comparar contra 2025 (mismas cuotas, moneda original) y, si
             baja, sumar la diferencia.
           - Si la EMISIÓN 2026 = 0: es baja del 100%; cuenta como "menor" si la CATEGORÍA
             tiene alguna palabra justificada, INCLUIDO "no corresponde" (= no se emite este
             concepto este año → baja real). Solo si la categoría está vacía o dice "corresponde
             a la anualidad anterior" NO es "menor" (es pendiente).
           - Caso "No corresponde" (endoso $0/US0): el desvío es la emisión 2025 COMPLETA del
             concepto, SIN importar el mes de corte (primaNoCorrespondeDesvio). */
        const nc = primaNoCorrespondeDesvio(p, mesCorte);
        const par = conceptoBajaPareada(p, 'Prima Minima', uu, mesCorte);
        const dARS = (rPM && typeof rPM.desvioARS==='number') ? rPM.desvioARS : null;
        const dUSD = (rPM && typeof rPM.desvioUSD==='number') ? rPM.desvioUSD : null;
        {
          /* Baja en moneda original = pm25 − pm26 (positivo). Montos por moneda: usar el
             desvío del Excel si vino numérico; si no, la baja calculada en esa moneda.
             Si es "No corresponde", priorizamos el desvío 2025 completo. */
          const parA = conceptoBajaPareada(p, 'Prima Minima', false, mesCorte);
          const parU = conceptoBajaPareada(p, 'Prima Minima', true, mesCorte);
          const bajaA = parA.pm25 - parA.pm26;  /* >0 si bajó en $ */
          const bajaU = parU.pm25 - parU.pm26;  /* >0 si bajó en US */
          let mARS = (typeof dARS==='number' && dARS<0) ? dARS : -(bajaA>0?bajaA:0);
          let mUSD = (typeof dUSD==='number' && dUSD<0) ? dUSD : -(bajaU>0?bajaU:0);
          let bajaOrig = par.pm25 - par.pm26;
          let desvioOrig = -(bajaOrig>0?bajaOrig:0);
          if(nc.entra){ mARS = nc.mARS; mUSD = nc.mUSD; desvioOrig = nc.montoOrig; }
          const pA25=p.proyARS2025||0, pA26=p.proyARS2026||0, pU25=p.proyUSD2025||0, pU26=p.proyUSD2026||0;
          const t25=p.tasa2025, t26=p.tasa2026;
          const facA = (pA25&&t25 && f25.breakdownARS.primaMin) ? (()=>{const x=f25.breakdownARS.primaMin/(pA25*t25); return (x>0.3&&x<1.5)?x:0.75;})() : 0.75;
          const facU = (pU25&&t25 && f25.breakdownUSD.primaMin) ? (()=>{const x=f25.breakdownUSD.primaMin/(pU25*t25); return (x>0.3&&x<1.5)?x:0.75;})() : 0.75;
          const efPA = (pA25&&t25!=null)?(pA26-pA25)*t25*facA:0;
          const efTA = (pA26&&t25!=null&&t26!=null)?pA26*(t26-t25)*facA:0;
          const efPU = (pU25&&t25!=null)?(pU26-pU25)*t25*facU:0;
          const efTU = (pU26&&t25!=null&&t26!=null)?pU26*(t26-t25)*facU:0;
          const efPorig = uu?efPU:efPA, efTorig = uu?efTU:efTA;
          rows.push({...base, monto:Math.abs(desvioOrig), montoARS:mARS, montoUSD:mUSD, signo:true,
            dPm:desvioOrig, pm25, pm26, pm25ARS:f25.breakdownARS.primaMin, pm26ARS:f26.breakdownARS.primaMin,
            pm25USD:f25.breakdownUSD.primaMin, pm26USD:f26.breakdownUSD.primaMin,
            proy25, proy26, proy25ARS:pA25, proy26ARS:pA26, proy25USD:pU25, proy26USD:pU26,
            tasa25:p.tasa2025, tasa26:p.tasa2026, justif:conceptoTieneJustificacion(rPM), primaCat:rPM?rPM.categoria:null, primaDet:rPM?rPM.detalle:null,
            efProy: efPorig<0?Math.abs(efPorig):0, efTasa: efTorig<0?Math.abs(efTorig):0,
            efProyARS: efPA, efProyUSD: efPU,
            efTasaARS: efTA, efTasaUSD: efTU,
            baja: true, mantiene});
        }
      }
      else if(effId==='ajuste' || effId==='bono' || effId==='malus'){
        /* Caída/variación de Ajuste/Bono/Malus — FUENTE ÚNICA (desvioConceptoABM):
           aplica toda la regla del usuario y devuelve el monto CON SIGNO desde la
           columna Desvío del Excel. "No corresponde" = endoso $0 con desvío 2025
           completo; bono que sube = a favor (+). */
        const k = effId; /* 'ajuste' | 'bono' | 'malus' */
        const conceptoMap = {ajuste:'Ajuste', bono:'Bono', malus:'Malus'};
        const cR = p.conceptos[conceptoMap[k]];
        const dv = desvioConceptoABM(p, conceptoMap[k], mesCorte);
        if(dv.entra){
          const mARS = dv.mARS, mUSD = dv.mUSD;
          const desvioOrig = dv.montoOrig;
          {
            rows.push({...base, monto:Math.abs(desvioOrig),
              montoARS:mARS, montoUSD:mUSD, signo:true, esBono:false,
              v25:Math.abs(uu?(cR.usd2025||0):(cR.ars2025||0)), v26:Math.abs(uu?(cR.usd2026||0):(cR.ars2026||0)),
              v25ARS:Math.abs(cR.ars2025||0), v26ARS:Math.abs(cR.ars2026||0),
              v25USD:Math.abs(cR.usd2025||0), v26USD:Math.abs(cR.usd2026||0),
              justif:true, cCat:cR?cR.categoria:null, cDet:cR?cR.detalle:null});
          }
        }
      }
    }
    const agrupadas = agruparPorAsegurado(rows);
    agrupadas.sort((a,b)=>b.monto-a.monto);
    return agrupadas;
  }

  /* Valor en la moneda del BOTÓN. r tiene montoARS/montoUSD. */
  const valBtnR = (r)=> btnUSD ? (r.montoUSD||0) : (r.montoARS||0);
  /* Valor en la moneda ORIGINAL de la póliza */
  const valOrigR = (r)=> (r.moneda==='US') ? (r.montoUSD||0) : (r.montoARS||0);
  /* helpers para campos pm/v/proy en una u otra moneda */
  const fBtn = (r,base)=> btnUSD ? (r[base+'USD']||0) : (r[base+'ARS']||0);

  /* Fila estilo "Emisión 2026": cuadrito gris con variaciones (concepto / PV /
     Tasa / Sin UV / Sin H), monto a la derecha con equivalente y % de cambio.
     Para pendientes/perdidas NO se muestra el cuadrito (no hay variación 25→26,
     el monto representa lo que falta o se perdió). */
  function filaPol(r, extraTrail){
    const monOrig = (r.moneda==='US')?'US':'$';
    const monBtn = btnUSD?'US':'$';
    const isUS = (monOrig==='US');
    const vOrig = valOrigR(r);
    const vBtn = valBtnR(r);
    const esPendiente = (id==='pendiente' || /^pend_/.test(id));
    const esPerdida = (id==='perdidas');

    let sgn, color, mostrar;
    if(r.signo){
      if(r.esBono){
        const esDesvio = vOrig > 0;
        sgn = esDesvio ? '−' : '+';
        color = esDesvio ? 'var(--neg)' : 'var(--pos)';
      } else {
        const baja = vOrig < 0;
        sgn = baja ? '−' : '+';
        color = baja ? 'var(--neg)' : 'var(--pos)';
      }
      mostrar = Math.abs(vOrig);
    } else {
      if(id==='pend_bono'){ sgn='+'; color='var(--pos)'; }
      else { sgn='−'; color='var(--neg)'; }
      mostrar = Math.abs(vOrig);
    }

    /* Cada póliza se muestra SOLO en su moneda original (sin equivalente en la otra
       moneda). La conversión/unificación se hace únicamente en el total cuando el HTML
       pide una sola moneda. */
    const equivLine = '';

    /* % de variación a la derecha (solo cuando hay 25 y 26 reales). */
    let pctLine = '';
    if(r.signo && !esPendiente && !esPerdida){
      let n25=null, n26=null;
      if(id==='prima' || id==='menor'){ n25=isUS?r.pm25USD:r.pm25ARS; n26=isUS?r.pm26USD:r.pm26ARS; }
      else if(id==='ajuste' || id==='bono' || id==='malus'){ n25=isUS?r.v25USD:r.v25ARS; n26=isUS?r.v26USD:r.v26ARS; }
      if(n25!=null && n25!==0 && n26!=null){
        const pct = (n26-n25)/Math.abs(n25);
        pctLine = `<div style="font-size:13px;font-weight:800;color:${color};margin-top:2px">${pct>=0?'+':''}${FMT_PCT(pct)}</div>`;
      }
    }

    /* Identificación */
    const polDisp = (r._polizas && r._polizas.length>1)
      ? `<strong style="font-size:14px">${(r.asegurado||'').substring(0,28)}</strong> <span style="color:var(--ink-3);font-size:11.5px">(${r._polizas.length} pól.: ${r._polizas.join(', ')})</span>`
      : `<strong style="font-size:14px">${fmtPoliza(r.poliza)}</strong> <span style="color:var(--ink-2);font-size:13px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.asegurado||'').substring(0,32)}</span>`;

    const rubroChip = `<span style="font-size:11px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${r.rubro||'—'}</span>`;

    let tipoChip = '';
    if(esPerdida){
      tipoChip = '';
    } else if(esPendiente){
      const full = state.polizas.find(pp=>pp.clave===r.clave || pp.poliza===r.poliza);
      const tp = tipoPendientePol(full || {});
      const lbl = tp==='renovacion' ? 'Renov. pendiente' : (tp==='segunda' ? '2ª anual. pendiente' : 'Pendiente');
      const c   = tp==='renovacion' ? 'var(--warn)' : (tp==='segunda' ? 'var(--accent)' : 'var(--ink-3)');
      const bg  = tp==='renovacion' ? 'rgba(232,155,30,.12)' : (tp==='segunda' ? 'rgba(30,111,217,.10)' : 'rgba(0,0,0,.05)');
      tipoChip = `<span style="color:${c};font-size:11px;font-weight:800;background:${bg};padding:1px 6px;border-radius:3px">${lbl}</span>`;
    } else {
      tipoChip = `<span style="color:var(--accent);font-size:11px;font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${r.tipoC}</span>`;
    }

    /* Cuadrito gris con variaciones — solo para causas con variación 25→26
       (prima/ajuste/bono/malus). Para pendientes y pólizas que se fueron NO
       se muestra (el monto ya expresa el desvío total como negativo). */
    let varBox = '';
    if(!esPendiente && !esPerdida){
      const fmtMon = (v)=>v==null?'—':fmtCompact(v, isUS);
      const fmtTasa = (v)=>v==null?'—':FMT_PCT_TASA(v);
      const fmtSin = (v)=>v==null?'—':FMT_PCT_SIN(v);
      const varLine = (label, v25, v26, fmt, neg)=>{
        if(v25==null && v26==null) return '';
        if((v25==null||v25===0) && (v26==null||v26===0)) return '';
        const d = (v26||0) - (v25||0);
        const cT = d===0?'var(--accent)':(d>0?(neg?'var(--neg)':'var(--pos)'):(neg?'var(--pos)':'var(--neg)'));
        const pct = (v25!=null && v25!==0) ? d/Math.abs(v25) : null;
        return `<div style="display:grid;grid-template-columns:62px 1fr auto;gap:6px;font-size:11.5px;line-height:1.35;padding:1px 0">
          <span style="color:var(--accent-3);font-weight:700">${label}</span>
          <span style="font-family:var(--font-mono);color:var(--ink-2)">${fmt(v25)} → <strong>${fmt(v26)}</strong></span>
          <span style="font-family:var(--font-mono);font-weight:800;color:${cT};text-align:right;min-width:60px">${d>=0?'+':''}${fmt(d)}${pct!=null?' ('+(d>=0?'+':'')+FMT_PCT(pct)+')':''}</span>
        </div>`;
      };
      let lblC, c25, c26;
      if(id==='ajuste'){      lblC='Ajuste'; c25=isUS?r.v25USD:r.v25ARS; c26=isUS?r.v26USD:r.v26ARS; }
      else if(id==='bono'){   lblC='Bono';   c25=isUS?r.v25USD:r.v25ARS; c26=isUS?r.v26USD:r.v26ARS; }
      else if(id==='malus'){  lblC='Malus';  c25=isUS?r.v25USD:r.v25ARS; c26=isUS?r.v26USD:r.v26ARS; }
      else {                  lblC='Prima';  c25=isUS?r.pm25USD:r.pm25ARS; c26=isUS?r.pm26USD:r.pm26ARS; }
      const pv25 = isUS ? (r.proy25USD||0) : (r.proy25ARS||0);
      const pv26 = isUS ? (r.proy26USD||0) : (r.proy26ARS||0);
      /* Variación del BONO (2025 → 2026) en NEGATIVO (mismo formato que las otras filas),
         para ver de dónde sale el desvío de bono. Se calcula con cuotas pareadas. */
      let bonoLine = '';
      if(lblC!=='Bono'){
        const _pF = state.polizas.find(pp=>pp.clave===r.clave || pp.poliza===r.poliza);
        if(_pF){
          const pb = conceptoBajaPareada(_pF, 'Bono', isUS, mesCorte, true);
          if((pb.pm25||0)>0.5 || (pb.pm26||0)>0.5){
            bonoLine = varLine('Bono', -(pb.pm25||0), -(pb.pm26||0), fmtMon, false);
          }
        }
      }
      varBox = `<div style="background:rgba(0,0,0,.03);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin-top:6px;max-width:520px">
        ${bonoLine}
        ${varLine(lblC, c25, c26, fmtMon, false)}
        ${varLine('PV',    pv25, pv26, fmtMon, false)}
        ${varLine('Tasa',  r.tasa25, r.tasa26, fmtTasa, false)}
        ${varLine('Sin UV',r.sinUV25, r.sinUV26, fmtSin, true)}
        ${varLine('Sin H', r.sinH25,  r.sinH26,  fmtSin, true)}
      </div>`;
    }

    return `<div style="padding:10px 4px;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start">
        <div style="min-width:0;flex:1">
          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
            ${polDisp}
            ${rubroChip}
            ${tipoChip}
          </div>
          ${varBox}
          ${extraTrail||''}
        </div>
        <div style="text-align:right;font-family:var(--font-mono);white-space:nowrap;min-width:130px">
          <div style="font-size:16px;font-weight:800;color:${color}">${sgn}${fmtCompact(mostrar, isUS)}</div>
          ${equivLine}
          ${pctLine}
        </div>
      </div>
    </div>`;
  }
  function subTabla(arr, titulo, FMT, modo, destaca){
    if(arr.length===0) return '';
    const tot = arr.reduce((a,r)=>a+valBtnR(r),0);
    const u = btnUSD;
    const filas = arr.map(r=>{
      /* Para pendientes con varios conceptos, agregamos chips de detalle
         debajo del header (el varBox no se muestra en pendientes). */
      let extra = '';
      if(modo==='pend' && r.conceptosPend && r.conceptosPend.length > 1){
        const chips = r.conceptosPend.map(cp=>
          `<span style="font-size:11px;color:var(--neg);background:rgba(217,71,71,.08);padding:2px 7px;border-radius:4px;margin-right:5px;display:inline-block;margin-top:3px">${cp.concepto}</span>`
        ).join('');
        extra = `<div style="margin-top:6px">${chips}</div>`;
      }
      return filaPol(r, extra);
    }).join('');
    /* Total NETO con signo: negativo = desvío, positivo = a favor. Para
       pendientes/perdidas (sin signo) el monto representa lo que falta o se
       perdió → siempre en negativo. */
    const tieneSigno = arr.some(r=>r.signo);
    const totSgn = tieneSigno ? (tot<0?'−':'+') : '−';
    const totColor = tieneSigno ? (tot<0?'var(--neg)':'var(--pos)') : (destaca?'var(--neg)':'var(--accent-3)');
    const nPolR = arr.reduce((s,r)=>s+(r._nGrupo||1),0);
    /* Si NO hay título (caso de una sola sub-tabla), NO repetimos el encabezado con n pól · total
       porque ya está arriba en el header de la columna (evita duplicar la info). */
    if(!titulo) return `<div style="margin-bottom:14px"><div>${filas}</div></div>`;
    return `<div style="margin-bottom:14px">
      <div style="font-size:15px;font-weight:800;color:${totColor};margin-bottom:6px;padding:6px 10px;background:${destaca?'rgba(217,71,71,.08)':'rgba(30,111,217,.06)'};border-radius:6px;display:flex;justify-content:space-between;align-items:center">
        <span>${titulo}</span>
        <span style="font-family:var(--font-mono);font-size:16px">${nPolR} pól. · ${totSgn}${fmtCompact(Math.abs(tot), u)}</span>
      </div>
      <div>${filas}</div>
    </div>`;
  }

  /* Render por columna de MONEDA ORIGINAL. Montos en la moneda del botón. */
  function col(monOrigUSD){
    const rows = collect(monOrigUSD);
    const moneda = monOrigUSD?'US':'$';
    const tot = rows.reduce((a,r)=>a+valBtnR(r),0);
    const headColor = monOrigUSD?'var(--pos)':'var(--accent)';
    const headBg = monOrigUSD?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    let inner='';
    if(rows.length===0){ inner = `<div style="font-size:13px;color:var(--ink-3);font-style:italic;padding:8px 0">— sin pólizas en moneda original ${moneda==='US'?'dólares':'pesos'} —</div>`; }
    /* Los sub-títulos solo se muestran cuando hay DOS grupos (para distinguirlos). Si hay un
       solo grupo, no se pone título (duplicaría el header de la columna de arriba). */
    else if(esPend){
      const titBase = {pend_prima:'Prima mínima pendiente', pend_ajuste:'Ajuste pendiente', pend_bono:'Bono pendiente', pend_malus:'Malus pendiente'}[id] || 'Pendiente de emisión';
      const p2=rows.filter(r=>r.mayor2m), p1=rows.filter(r=>!r.mayor2m);
      const dos = p1.length>0 && p2.length>0;
      inner = subTabla(p1, dos?titBase:'', null,'pend',false) + subTabla(p2, dos?titBase+' >2 meses':'', null,'pend',true);
    }
    else if(id==='perdidas'){
      const e26=rows.filter(r=>r.anio==='2026'), e25=rows.filter(r=>r.anio==='2025');
      const dos = e26.length>0 && e25.length>0;
      inner = subTabla(e26, dos?'Se fueron en 2026':'', null,'perd',false) + subTabla(e25, dos?'Se fueron en 2025':'', null,'perd',false);
    }
    else if(id==='prima'){
      const bajan = rows.filter(r=>r.baja && r.justif);
      const sinJustif = rows.filter(r=>r.baja && !r.justif);
      const dos = bajan.length>0 && sinJustif.length>0;
      inner = subTabla(bajan, dos?'Con baja de prima mínima (justificada)':'', null,'prima',true)
            + subTabla(sinJustif, dos?'Pendiente — concepto sin justificación':'', null,'prima',true);
    }
    else if(id==='ajuste'){
      const just=rows.filter(r=>r.justif), nojust=rows.filter(r=>!r.justif);
      const dos = just.length>0 && nojust.length>0;
      inner = subTabla(just, dos?'Caída de ajuste (justificada)':'', null,'ajuste',true)
            + subTabla(nojust, dos?'Pendiente — sin justificación':'', null,'ajuste',true);
    }
    else if(id==='bono'){
      const just=rows.filter(r=>r.justif), nojust=rows.filter(r=>!r.justif);
      const dos = just.length>0 && nojust.length>0;
      inner = subTabla(just, dos?'Caída de bono (justificada)':'', null,'bono',true)
            + subTabla(nojust, dos?'Pendiente — sin justificación':'', null,'bono',true);
    }
    else if(id==='malus'){
      const just=rows.filter(r=>r.justif), nojust=rows.filter(r=>!r.justif);
      const dos = just.length>0 && nojust.length>0;
      inner = subTabla(just, dos?'Caída de malus (justificada)':'', null,'malus',true)
            + subTabla(nojust, dos?'Pendiente — sin justificación':'', null,'malus',true);
    }
    /* Total del header por columna de moneda original. Para conceptos con variación con
       signo (prima/ajuste/malus), el neto puede ser negativo (desvío) o positivo (a favor).
       El bono mantiene su tratamiento (resta emisión). Pendientes/perdidas: desvío. */
    const rowsTienenSigno = rows.some(r=>r.signo);
    let totDisp, totSign, totColor;
    if(id==='bono'){ totDisp = -Math.abs(tot); totSign='−'; totColor='var(--neg)'; }
    else if(rowsTienenSigno){ totDisp = tot; totSign = tot<0?'−':'+'; totColor = tot<0?'var(--neg)':'var(--pos)'; }
    else { totDisp = tot; totSign = esPend?'':'−'; totColor = headColor; }
    const nPolRealesCol = rows.reduce((s,r)=>s+(r._nGrupo||1),0);
    return `<div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:${moneda==='US'?'rgba(139,92,246,.12)':'rgba(232,155,30,.14)'};border:1.5px solid ${moneda==='US'?'#8b5cf6':'#e89b1e'};border-radius:8px">${monedaChipHTML(moneda==='US')}<span style="margin-left:auto;font-family:var(--font-mono);font-size:18px;font-weight:800;color:${totColor}">${nPolRealesCol} pól. · ${totSign}${fmtCompact(Math.abs(totDisp),btnUSD)}</span></div>
      ${inner}
    </div>`;
  }

  /* COLUMNA del drill de PENDIENTE dividida por DATO DEL EXCEL (pedido del usuario):
     seEmite=true → "Se emite este mes" (pólizas con dato en el Excel/cargado a mano);
     seEmite=false → "Pendiente sin fecha" (el resto). Cada póliza: input EDITABLE pre-cargado
     (Excel/manual; si no, el pendiente 2025), chip de moneda original, ordenado de mayor a
     menor. Toggle "Contabilizar (SÍ/NO)" por columna (mes=SÍ, año=NO por defecto). */
  function colPendData(seEmite){
    const suf = btnUSD?'u':'a';
    state._ejecEstim = state._ejecEstim || {};
    if(!state._ejecEstim[suf]) state._ejecEstim[suf] = {};
    const store = state._ejecEstim[suf];
    state._ejecContab = state._ejecContab || {};
    const which = seEmite ? 'mes' : 'anio';
    const colC = seEmite ? '#2d9b6a' : '#4ba3c7';
    const titulo = seEmite ? 'Se emite este mes' : 'Pendiente sin fecha';
    /* CONCEPTO de este drill: cada lápiz abre SOLO su concepto (prima/ajuste/malus/bono), así
       no se mezclan (la prima de una póliza no aparece en el malus). */
    const CK = {pend_prima:'primaMin', pend_ajuste:'ajuste', pend_malus:'malus', pend_bono:'bono'}[id] || null;
    /* El toggle Contabilizar es POR CONCEPTO: apagar este concepto NO afecta a los demás. */
    const on = _ejecContabOn(CK, which);
    const otherSuf = btnUSD?'a':'u';
    const N2K = {'Prima mínima':'primaMin','Prima Mínima':'primaMin','Ajuste':'ajuste','Malus':'malus','Bono':'bono'};
    const mkey = (p)=> CK ? (p.clave+'|'+CK) : p.clave;
    /* Recorremos el universo de pólizas y, para ESTE concepto, calculamos su dato del Excel/manual
       (se emite este mes) o su pendiente 2025 (pendiente sin fecha). Incluye pólizas con dato del
       Excel aunque conceptosPendientes no las marque para ese concepto (malus/bono del cuadro). */
    const items = [];
    for(const p of polFiltradas){
      /* pendiente 2025 de ESTE concepto (con TC), en la moneda de la vista. */
      let auto = 0;
      if(CK){
        const cpItems = conceptosPendientes(p, mesCorte).items;
        let it = cpItems.find(x=> N2K[x.concepto]===CK);
        if(!it && CK==='primaMin'){
          const est = estadoPolizaConsolidado(p, mesCorte);
          if(est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m'){
            const f25 = calcEmisionFiltrada(p,2025,0);
            if(f25.breakdownARS.primaMin>0 || f25.breakdownUSD.primaMin>0) it={concepto:'Prima mínima', ars:f25.breakdownARS.primaMin, usd:f25.breakdownUSD.primaMin};
          }
        }
        if(it){ const cv=convertirPendienteTC(it.ars, it.usd, p.moneda); auto = (suf==='u')?cv.usd:cv.ars; }
      }
      const excelV = CK ? _excelEstimConcepto(p, CK, suf)      : 0;
      const excelO = CK ? _excelEstimConcepto(p, CK, otherSuf) : 0;
      const manual = store[mkey(p)];
      const manualO = (state._ejecEstim[otherSuf]||{})[mkey(p)];
      const hasManual = isFinite(manual) && manual!==0;
      const hasManualO = isFinite(manualO) && manualO!==0;
      const data = Math.abs(excelV)>0 || Math.abs(excelO)>0 || hasManual || hasManualO;
      let eff;
      if(seEmite){ if(!data) continue; eff = hasManual ? manual : excelV; }
      else { if(data) continue; eff = auto; }
      /* El BONO es nota de crédito: SIEMPRE resta (negativo). */
      if(CK==='bono') eff = -Math.abs(eff);
      if(Math.abs(eff)<0.5) continue;
      items.push({r:p, hasManual, eff});
    }
    items.sort((a,b)=> Math.abs(b.eff) - Math.abs(a.eff));
    const tot = items.reduce((a,x)=>a+x.eff,0);
    const dvA = (state._ejecDesvioAbs && state._ejecDesvioAbs[suf]) || 0;
    const pct = dvA>0 ? Math.round(Math.abs(tot)/dvA*100) : 0;
    const rowH = (x)=>{
      const r=x.r; const monC = r.moneda==='US'?'var(--pos)':'var(--accent)';
      const eDisp = x.eff!==0 ? Number(x.eff).toLocaleString('es-AR',{maximumFractionDigits:0}) : '';
      return `<div style="display:grid;grid-template-columns:1fr 120px;gap:8px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line)">
        <div style="min-width:0"><span style="font-size:13px;font-weight:800;color:var(--accent-3);background:var(--bg-2);padding:2px 7px;border-radius:5px">${fmtPoliza(r.poliza)}</span> <span style="font-size:10.5px;font-weight:800;color:${monC}" title="Moneda original">${r.moneda}</span> <span style="font-size:12.5px;color:var(--ink-1);font-weight:600">${(r.asegurado||'').substring(0,22)}</span></div>
        <span style="display:flex;align-items:center;gap:4px"><span style="font-size:12px;color:var(--ink-3)" title="Editable">✎</span><input type="text" inputmode="decimal" value="${eDisp}" onchange="setEjecEstim('${suf}','${mkey(r)}', this.value)" style="width:100%;padding:5px 7px;font-family:var(--font-mono);font-size:12.5px;border:1.5px solid ${x.hasManual?'var(--pos)':'var(--line-2)'};border-radius:6px;text-align:right;background:var(--panel);color:var(--ink)" /></span>
      </div>`;
    };
    return `<div style="border:1px solid var(--line-2);border-radius:8px;overflow:hidden;${on?'':'opacity:.6'}">
      <div style="background:${colC}1a;border-bottom:1px solid var(--line);padding:5px 7px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-size:12px;font-weight:800;color:${colC};text-transform:uppercase;letter-spacing:.03em">${titulo} <span style="color:var(--ink-3);font-weight:600;text-transform:none">· ${items.length} pól.</span></span>
          <button onclick="ejecToggleContab('${CK}','${which}')" title="Contabilizar este concepto en el desvío" style="font-size:9.5px;font-weight:800;border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap;border:1.5px solid ${on?'var(--pos)':'var(--line-2)'};background:${on?'var(--pos)':'var(--panel)'};color:${on?'#fff':'var(--ink-2)'}">Contabilizar: ${on?'SÍ':'NO'}</button>
        </div>
        <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${colC}">${fmtCompact(tot,btnUSD)} <span style="color:var(--ink-3);font-weight:700">(${pct}% del desvío)</span></div>
      </div>
      ${items.length? items.map(rowH).join('') : '<div style="padding:10px;font-size:12px;color:var(--ink-3);font-style:italic">— sin pólizas —</div>'}
    </div>`;
  }

  /* Drill "Pólizas que no crecieron": prima/ajuste/bono/malus emitido ≥ 2025 pero
     sin alcanzar el umbral de crecimiento de la moneda original ($ +30%, US +10%).
     Montos en la moneda del botón + equivalente original en gris. */
  function colNoCrecen(monOrigUSD){
    const moneda = monOrigUSD?'US':'$';
    const headColor = monOrigUSD?'var(--pos)':'var(--accent)';
    const headBg = monOrigUSD?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    const umb = monOrigUSD?0.10:0.30;
    const uuOrig = monOrigUSD;
    const arr=[];
    for(const p of polFiltradas){
      if(monOrigUSD && p.moneda!=='US') continue;
      if(!monOrigUSD && p.moneda!=='$') continue;
      if(polizaTerminada(p)) continue;
      const rPM=p.conceptos['Prima Minima'];
      if(!conceptoEmitido26(rPM,mesCorte)) continue;
      const f25=calcEmisionFiltrada(p,2025,mesCorte), f26=calcEmisionFiltrada(p,2026,mesCorte);
      const pm25=uuOrig?f25.breakdownUSD.primaMin:f25.breakdownARS.primaMin;
      const pm26=uuOrig?f26.breakdownUSD.primaMin:f26.breakdownARS.primaMin;
      if(pm25>0 && pm26>=pm25){
        const crec=(pm26-pm25)/Math.abs(pm25);
        if(crec < umb){
          const faltanteOrig = pm25*(1+umb)-pm26;
          /* Faltante calculado en CADA moneda con sus propios valores reales (sin TC). */
          const fA = (f26.breakdownARS.primaMin>0 || f25.breakdownARS.primaMin>0)
            ? (f25.breakdownARS.primaMin*(1+umb) - f26.breakdownARS.primaMin) : 0;
          const fU = (f26.breakdownUSD.primaMin>0 || f25.breakdownUSD.primaMin>0)
            ? (f25.breakdownUSD.primaMin*(1+umb) - f26.breakdownUSD.primaMin) : 0;
          arr.push({poliza:p.poliza,asegurado:p.asegurado,rubro:p.rubro,tipoC:tipoCorto(p),moneda:p.moneda,
            monto:faltanteOrig>0?faltanteOrig:0, montoARS:fA>0?fA:0, montoUSD:fU>0?fU:0,
            pm25ARS:f25.breakdownARS.primaMin, pm26ARS:f26.breakdownARS.primaMin, pm25USD:f25.breakdownUSD.primaMin, pm26USD:f26.breakdownUSD.primaMin,
            ajARS:f26.breakdownARS.ajuste, ajUSD:f26.breakdownUSD.ajuste, boARS:f26.breakdownARS.bono, boUSD:f26.breakdownUSD.bono, maARS:f26.breakdownARS.malus, maUSD:f26.breakdownUSD.malus,
            crec});
        }
      }
    }
    arr.sort((a,b)=>b.monto-a.monto);
    const tot=arr.reduce((a,r)=>a+valBtnR(r),0);
    const filas = arr.map(r=>{
      const isUS = (r.moneda==='US');
      const monOrig = isUS?'US':'$', monBtn = btnUSD?'US':'$';
      const fmtMon = (v)=>v==null?'—':fmtCompact(v, isUS);
      const c25 = isUS?r.pm25USD:r.pm25ARS;
      const c26 = isUS?r.pm26USD:r.pm26ARS;
      const dC = (c26||0)-(c25||0);
      const pctC = c25?dC/Math.abs(c25):null;
      const varBox = `<div style="background:rgba(0,0,0,.03);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin-top:6px;max-width:520px">
        <div style="display:grid;grid-template-columns:62px 1fr auto;gap:6px;font-size:11.5px;line-height:1.35;padding:1px 0">
          <span style="color:var(--accent-3);font-weight:700">Prima</span>
          <span style="font-family:var(--font-mono);color:var(--ink-2)">${fmtMon(c25)} → <strong>${fmtMon(c26)}</strong></span>
          <span style="font-family:var(--font-mono);font-weight:800;color:var(--accent-3);text-align:right;min-width:60px">${dC>=0?'+':''}${fmtMon(dC)}${pctC!=null?' ('+(pctC>=0?'+':'')+FMT_PCT(pctC)+')':''}</span>
        </div>
        <div style="font-size:11.5px;color:var(--ink-3);margin-top:3px;font-style:italic">Falta para +${(umb*100).toFixed(0)}%: <strong style="color:var(--neg);font-style:normal;font-family:var(--font-mono)">${fmtMon(r.monto)}</strong></div>
      </div>`;
      const eq = (monOrig!==monBtn)
        ? `<div style="font-size:11.5px;color:var(--ink-3);font-family:var(--font-mono);text-align:right;margin-top:2px">${fmtCompact(valBtnR(r), btnUSD)}</div>`
        : '';
      return `<div style="padding:10px 4px;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
              <strong style="font-size:14px">${fmtPoliza(r.poliza)}</strong>
              <span style="color:var(--ink-2);font-size:13px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.asegurado||'').substring(0,32)}</span>
              <span style="font-size:11px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${r.rubro||'—'}</span>
              <span style="font-size:11px;color:var(--accent);font-weight:700;background:rgba(30,111,217,.10);padding:2px 7px;border-radius:4px">${r.tipoC}</span>
            </div>
            ${varBox}
          </div>
          <div style="text-align:right;font-family:var(--font-mono);white-space:nowrap;min-width:130px">
            <div style="font-size:16px;font-weight:800;color:var(--accent-3)">${fmtMon(r.monto)}</div>
            ${eq}
            <div style="font-size:13px;font-weight:800;color:var(--accent-3);margin-top:2px">+${FMT_PCT(r.crec)}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:${moneda==='US'?'rgba(139,92,246,.12)':'rgba(232,155,30,.14)'};border:1.5px solid ${moneda==='US'?'#8b5cf6':'#e89b1e'};border-radius:8px">${monedaChipHTML(moneda==='US')}<span style="font-size:12px;color:var(--ink-3);font-weight:700">No aumenta ${(umb*100).toFixed(0)}%</span><span style="margin-left:auto;font-family:var(--font-mono);font-size:18px;font-weight:800;color:var(--accent-3)">${arr.length} pól. · ${fmtCompact(tot,btnUSD)}</span></div>
      ${arr.length?filas:'<div style="font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas en esta moneda —</div>'}
    </div>`;
  }

  /* Para PRIMA: 3 sub-desgloses (prima / proyección / tasa) con selector */
  function colPrima(monOrigUSD, sub){
    /* effId='prima' fuerza collect a recolectar bajas de prima mínima incluso
       cuando el drill padre es 'menor' (mismo panel para 4 sub-conceptos). */
    const rows = collect(monOrigUSD, 'prima').filter(r=>r.baja);
    const moneda = monOrigUSD?'US':'$';
    const uuOrig = monOrigUSD; /* moneda original de la columna */
    /* Sin TC: cada efecto ya viene calculado en ambas monedas reales (efProyARS/USD, etc.) */
    let arr, titulo, modo;
    if(sub==='proy'){ arr = rows.filter(r=>r.efProy>0).sort((a,b)=>b.efProy-a.efProy).map(r=>({...r,monto:r.efProy,montoARS:r.efProyARS||0,montoUSD:r.efProyUSD||0,signo:true})); titulo='Por baja de proyección'; modo='proy'; }
    else if(sub==='tasa'){ arr = rows.filter(r=>r.efTasa>0).sort((a,b)=>b.efTasa-a.efTasa).map(r=>({...r,monto:r.efTasa,montoARS:r.efTasaARS||0,montoUSD:r.efTasaUSD||0,signo:true})); titulo='Por baja de tasa'; modo='tasa'; }
    else { arr = rows; titulo='Baja de prima mínima'; modo='prima'; }
    const headColor = monOrigUSD?'var(--pos)':'var(--accent)';
    const headBg = monOrigUSD?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    const tot = arr.reduce((a,r)=>a+valBtnR(r),0);
    /* Total NETO con signo: negativo = desvío (rojo), positivo = a favor en esta moneda. */
    const totSgn = tot<0?'−':'+';
    const totColor = tot<0?'var(--neg)':'var(--pos)';
    return `<div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:${moneda==='US'?'rgba(139,92,246,.12)':'rgba(232,155,30,.14)'};border:1.5px solid ${moneda==='US'?'#8b5cf6':'#e89b1e'};border-radius:8px">${monedaChipHTML(moneda==='US')}<span style="margin-left:auto;font-family:var(--font-mono);font-size:18px;font-weight:800;color:${totColor}">${arr.length} pól. · ${totSgn}${fmtCompact(Math.abs(tot),btnUSD)}</span></div>
      ${subTabla(arr,'',null,modo,true)}
    </div>`;
  }

  /* Columna para Ajuste/Bono/Malus (sub = 'ajuste'|'bono'|'malus').
     REGLA (confirmada por el usuario), por concepto:
       1) Filtrar pólizas que en 2026 tengan el concepto (Ajuste/Bono/Malus).
       2) Excluir categoría VACÍA o "corresponde a la anualidad anterior".
       3) Excluir pólizas terminadas en 2025.
       4) Columna moneda original $: tomar las pólizas $ cuyo "Desvío ARS$" (columna del
          Excel) es NEGATIVO. Se suma ese desvío. El equivalente en US se lee de la columna
          "Desvío USD" de esas MISMAS pólizas (no se recalcula ni se convierte con TC).
       5) Columna moneda original US: tomar las pólizas US cuyo "Desvío USD" es NEGATIVO.
          Se suma ese desvío. El equivalente en $ se lee de "Desvío ARS$" de esas pólizas.
     Es decir: el criterio de inclusión usa el desvío en la MONEDA ORIGINAL de la columna,
     y los montos mostrados salen de las columnas Desvío del Excel (ambas monedas). */
  function colAbm(monOrigUSD, sub){
    const moneda = monOrigUSD?'US':'$';
    const headColor = monOrigUSD?'var(--pos)':'var(--accent)';
    const headBg = monOrigUSD?'rgba(45,155,106,.12)':'rgba(30,111,217,.10)';
    const conceptoMap = {ajuste:'Ajuste', bono:'Bono', malus:'Malus'};
    const arr = [];
    for(const p of polFiltradas){
      if(monOrigUSD && p.moneda!=='US') continue;
      if(!monOrigUSD && p.moneda!=='$') continue;
      const cR = p.conceptos[conceptoMap[sub]];
      if(!cR) continue;
      /* FUENTE ÚNICA: desvioConceptoABM aplica toda la regla del usuario
         (terminadas, categoría, pendientes, "No corresponde" = endoso $0 con
         desvío 2025 completo, y signo correcto desde la columna Desvío del Excel). */
      const dv = desvioConceptoABM(p, conceptoMap[sub], mesCorte);
      if(!dv.entra) continue;
      const mARS = dv.mARS, mUSD = dv.mUSD;
      const montoOrig = dv.montoOrig;
      const f25abm = calcEmisionFiltrada(p,2025,mesCorte);
      const f26abm = calcEmisionFiltrada(p,2026,mesCorte);
      arr.push({poliza:p.poliza, clave:p.clave, asegurado:p.asegurado, rubro:p.rubro, tipoC:tipoCorto(p), moneda:p.moneda,
        monto:Math.abs(montoOrig), montoARS:mARS, montoUSD:mUSD, signo:true, esBono:false,
        v25:Math.abs(monOrigUSD?(cR.usd2025||0):(cR.ars2025||0)), v26:Math.abs(monOrigUSD?(cR.usd2026||0):(cR.ars2026||0)),
        v25ARS:Math.abs(cR.ars2025||0), v26ARS:Math.abs(cR.ars2026||0), v25USD:Math.abs(cR.usd2025||0), v26USD:Math.abs(cR.usd2026||0),
        sinH25:p.sinH2025, sinH26:p.sinH2026, sinUV25:p.sinUV2025, sinUV26:p.sinUV2026,
        tasa25:p.tasa2025, tasa26:p.tasa2026,
        proy25ARS:p.proyARS2025||0, proy26ARS:p.proyARS2026||0, proy25USD:p.proyUSD2025||0, proy26USD:p.proyUSD2026||0,
        pm25ARS:f25abm.breakdownARS.primaMin, pm26ARS:f26abm.breakdownARS.primaMin,
        pm25USD:f25abm.breakdownUSD.primaMin, pm26USD:f26abm.breakdownUSD.primaMin});
    }
    const arrG = agruparPorAsegurado(arr);
    /* Ordenar por magnitud del desvío en la moneda del botón (mayor primero). */
    arrG.sort((a,b)=>Math.abs(valBtnR(b))-Math.abs(valBtnR(a)));
    const tot = arrG.reduce((a,r)=>a+valBtnR(r),0);
    const tituloMap = {ajuste:'Variación de ajuste (Desvío)', bono:'Variación de bono (Desvío)', malus:'Variación de malus (Desvío)'};
    /* El desvío negativo es el monto que falta emitir → se muestra en rojo con signo −. */
    const totSgn = tot<0?'−':'+';
    const totColor = tot<0?'var(--neg)':'var(--pos)';
    const nPolReales = arrG.reduce((s,r)=>s+(r._nGrupo||1),0);
    return `<div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:${moneda==='US'?'rgba(139,92,246,.12)':'rgba(232,155,30,.14)'};border:1.5px solid ${moneda==='US'?'#8b5cf6':'#e89b1e'};border-radius:8px">${monedaChipHTML(moneda==='US')}<span style="margin-left:auto;font-family:var(--font-mono);font-size:18px;font-weight:800;color:${totColor}">${nPolReales} pól. · ${totSgn}${fmtCompact(Math.abs(tot),btnUSD)}</span></div>
      ${subTabla(arrG, '', null, sub, true)}
    </div>`;
  }

  const titulos = {pendiente:'Pendiente de emisión', pend_conf:'Pendiente - Emisión Confirmada', pend_presup:'Presupuesto', pend_2025:'Emisión Pendiente - Sin Fecha', pend_prima:'Prima mínima pendiente', pend_ajuste:'Ajuste pendiente', pend_bono:'Bono pendiente', pend_malus:'Malus pendiente', perdidas:'Pólizas que se fueron', prima:'Prima mínima', ajuste:'Ajuste', bono:'Bono', malus:'Malus', menor:'Menor Emisión', sinjust:'Pólizas que no crecieron'};

  /* Resumen pre-card de las pólizas involucradas en ESTA causa, antes del
     desglose por póliza. Mismo formato que en "Emisión 2026": Proyección $/US,
     Tasa promedio, Sin UV, Sin H, Rubros, Moneda $, Moneda US. Para construirlo
     usamos las pólizas que aparecen en cualquiera de las dos columnas (ARS y
     USD) del drill. Para "menor" usamos los 4 sub-conceptos. */
  const resumenCard = (()=>{
    let rowsTodos;
    if(id==='menor'){
      const acc = [];
      ['prima','ajuste','bono','malus'].forEach(sub=>{
        if(sub==='prima'){ acc.push(...collect(false,'prima'), ...collect(true,'prima')); }
      });
      /* Para ajuste/bono/malus, colAbm construye su propia colección — replicamos
         aquí pólizas por concepto. */
      const conceptoMap = {ajuste:'Ajuste', bono:'Bono', malus:'Malus'};
      for(const sub of ['ajuste','bono','malus']){
        for(const p of polFiltradas){
          const cR = p.conceptos[conceptoMap[sub]];
          if(!cR) continue;
          const dv = desvioConceptoABM(p, conceptoMap[sub], mesCorte);
          if(!dv.entra) continue;
          acc.push({clave:p.clave, poliza:p.poliza, asegurado:p.asegurado, rubro:p.rubro, moneda:p.moneda,
                    montoARS:dv.mARS, montoUSD:dv.mUSD});
        }
      }
      rowsTodos = acc;
    } else {
      rowsTodos = [...collect(false), ...collect(true)];
    }
    /* dedup por clave + poliza */
    const seen = new Set();
    const uniq = [];
    for(const r of rowsTodos){
      const k = r.clave || r.poliza;
      if(seen.has(k)) continue;
      seen.add(k);
      uniq.push(r);
    }
    if(uniq.length===0) return '';
    /* Lookup póliza completa */
    const lookup = new Map();
    state.polizas.forEach(p=>{ lookup.set(p.clave, p); lookup.set(p.poliza, p); });
    const enriched = uniq.map(r=>{
      const full = lookup.get(r.clave) || lookup.get(r.poliza) || {};
      return {...r,
        moneda: r.moneda || full.moneda,
        proyARS25: full.proyARS2025||0, proyARS26: full.proyARS2026||0,
        proyUSD25: full.proyUSD2025||0, proyUSD26: full.proyUSD2026||0,
        tasa25: full.tasa2025, tasa26: full.tasa2026,
        sinUV25: full.sinUV2025, sinUV26: full.sinUV2026,
        sinH25: full.sinH2025,  sinH26: full.sinH2026,
      };
    });
    const sumByMon = (arr, picker)=>{
      let s25=0, s26=0, n=0;
      for(const r of arr){
        const v25 = picker(r,'25'), v26 = picker(r,'26');
        if(v25==null && v26==null) continue;
        s25+=v25||0; s26+=v26||0; n++;
      }
      return {s25, s26, d:s26-s25, n, pct: s25?(s26-s25)/Math.abs(s25):null};
    };
    const avgByMon = (arr, p25, p26)=>{
      let s25=0, s26=0, n=0;
      for(const r of arr){ const v25=p25(r), v26=p26(r); if(v25==null||v26==null) continue; s25+=v25; s26+=v26; n++; }
      return n>0?{v25:s25/n, v26:s26/n, d:(s26-s25)/n, n}:null;
    };
    const proyARS = sumByMon(enriched.filter(r=>r.moneda==='$'), (r,k)=>r['proyARS'+k]);
    const proyUSD = sumByMon(enriched.filter(r=>r.moneda==='US'), (r,k)=>r['proyUSD'+k]);
    const tasaAvg = avgByMon(enriched, r=>r.tasa25, r=>r.tasa26);
    const sinUVAvg = avgByMon(enriched, r=>r.sinUV25, r=>r.sinUV26);
    const sinHAvg  = avgByMon(enriched, r=>r.sinH25, r=>r.sinH26);
    const rubros = {};
    for(const r of enriched){ const k=r.rubro||'(sin rubro)'; rubros[k]=(rubros[k]||0)+1; }
    const rubArr = Object.entries(rubros).sort((a,b)=>b[1]-a[1]);
    /* Variación de "monto" en cada moneda — para causas con signo (prima/ajuste/...)
       es el desvío con signo; para pendientes/perdidas es magnitud positiva. */
    const sumAbs = (arr, key)=> arr.reduce((a,r)=>a+(r[key]||0),0);
    const _$r = enriched.filter(r=>r.moneda==='$'), _usr = enriched.filter(r=>r.moneda==='US');
    /* Columna "Prima Mínima" (antes "Monto causa"): prima mínima 2025 → 2026 por moneda. */
    const monARS = {val:sumAbs(_$r, 'montoARS'), n:_$r.length, s25:sumAbs(_$r,'pm25ARS'), s26:sumAbs(_$r,'pm26ARS')};
    const monUSD = {val:sumAbs(_usr,'montoUSD'), n:_usr.length, s25:sumAbs(_usr,'pm25USD'), s26:sumAbs(_usr,'pm26USD')};
    /* Conteo Y monto por moneda EXACTAMENTE como el detalle (collect), para que la
       cantidad y el total de la grilla coincidan con el sub-desglose. */
    let nColARS = monARS.n, nColUSD = monUSD.n, detMonARS = null, detMonUSD = null;
    try {
      const _cF = collect(false), _cT = collect(true);
      nColARS = agruparPorAsegurado(_cF).reduce((s,r)=>s+(r._nGrupo||1),0);
      nColUSD = agruparPorAsegurado(_cT).reduce((s,r)=>s+(r._nGrupo||1),0);
      detMonARS = _cF.reduce((a,r)=>a+(r.montoARS||0),0);
      detMonUSD = _cT.reduce((a,r)=>a+(r.montoUSD||0),0);
    } catch(e){}
    const fmtT = (v)=>v==null?'—':FMT_PCT_TASA(v);
    const fmtS = (v)=>v==null?'—':FMT_PCT_SIN(v);
    /* Tasa y siniestralidad por moneda original ($ / US), igual que Emisión 2026. */
    const _ars = enriched.filter(r=>r.moneda==='$');
    const _usd = enriched.filter(r=>r.moneda==='US');
    const tasaARS = avgByMon(_ars, r=>r.tasa25, r=>r.tasa26);
    const tasaUSD = avgByMon(_usd, r=>r.tasa25, r=>r.tasa26);
    const sinUVARS = avgByMon(_ars, r=>r.sinUV25, r=>r.sinUV26);
    const sinUVUSD = avgByMon(_usd, r=>r.sinUV25, r=>r.sinUV26);
    const sinHARS  = avgByMon(_ars, r=>r.sinH25, r=>r.sinH26);
    const sinHUSD  = avgByMon(_usd, r=>r.sinH25, r=>r.sinH26);
    /* Mismo formato que Emisión 2026: referencia de moneda a la izquierda y cards
       sin repetir la etiqueta (solo cantidad de pólizas + valores). */
    const catHead = (label, bg, txt, border)=>`<div style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 6px;border-radius:7px;text-align:center;background:${bg};color:${txt};border:1.5px solid ${border};white-space:nowrap">${label}</div>`;
    const arrowYears = (v25,v26)=>`<div style="display:flex;align-items:baseline;justify-content:center;gap:5px;margin-top:2px;font-family:var(--font-mono);white-space:nowrap">
        <span style="font-size:8.5px;color:var(--ink-3);font-weight:800">'25</span><span style="font-size:12px;color:var(--ink-2)">${v25}</span>
        <span style="color:var(--ink-3);font-size:12px">→</span>
        <span style="font-size:8.5px;color:var(--ink-3);font-weight:800">'26</span><strong style="font-size:13px;color:var(--accent-3)">${v26}</strong>
      </div>`;
    const refCell = (sym, n)=>{
      const c = sym==='US' ? '#8b5cf6' : '#e89b1e';
      return `<div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:4px 8px;text-align:right;line-height:1.15">
        <span style="font-size:10px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Pólizas<br>Moneda Orig</span>
        <span style="font-size:16px;font-weight:900;color:${c};margin-top:2px">${sym}</span>
        <span style="font-size:11px;font-weight:800;color:var(--ink-2);font-family:var(--font-mono);margin-top:3px">${n||0} <span style="color:var(--ink-3);font-weight:600">pól.</span></span>
      </div>`;
    };
    const _cardCss = "background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06)";
    const nLbl = ()=>'';
    const zeroCard = `<div style="${_cardCss};opacity:.6"><div style="font-family:var(--font-mono);font-size:15px;font-weight:800;color:var(--ink-3);text-align:center">—</div></div>`;
    const cellPctR = (info, fmt, neg)=>{
      if(!info || info.n===0) return zeroCard;
      const c = info.d===0?'var(--accent)':(info.d>0?(neg?'var(--neg)':'var(--pos)'):(neg?'var(--pos)':'var(--neg)'));
      const rel = info.v25?info.d/Math.abs(info.v25):null;
      return `<div style="${_cardCss}">${arrowYears(fmt(info.v25), fmt(info.v26))}<div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${info.d>=0?'+':''}${fmt(info.d)}${rel!=null?` <span style="font-size:12px">(${info.d>=0?'+':''}${FMT_PCT(rel)})</span>`:''}</div></div>`;
    };
    const cellMontoR = (info, isUS)=>{
      if(!info || info.n===0) return zeroCard;
      const c = info.d>=0?'var(--pos)':'var(--neg)';
      return `<div style="${_cardCss}">${arrowYears(fmtCompact(info.s25,isUS), fmtCompact(info.s26,isUS))}<div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${c};margin-top:2px;text-align:center">${info.d>=0?'+':''}${fmtCompact(info.d,isUS)}${info.pct!=null?' ('+(info.d>=0?'+':'')+FMT_PCT(info.pct)+')':''}</div></div>`;
    };
    /* Siniestralidad unificada (UV arriba / H abajo), igual que Emisión 2026. */
    const cellSinUnifR = (uvInfo, hInfo)=>{
      /* Sin % de variación: solo 2025 → 2026. El 2026 se pinta según el cambio respecto a 2025:
         si la siniestralidad SUBE (peor) → rojo; si BAJA (mejor) → verde; igual → neutro. */
      const linea=(lbl,info)=>{
        if(!info || info.n===0) return `<div style="display:flex;align-items:baseline;gap:6px;justify-content:center;font-size:12.5px"><strong style="color:var(--ink-2)">${lbl}:</strong> <span style="color:var(--ink-3);font-style:italic;font-size:11.5px">— sin datos —</span></div>`;
        const c26 = info.d>0?'var(--neg)':(info.d<0?'var(--pos)':'var(--accent-3)');
        return `<div style="display:flex;align-items:baseline;gap:7px;justify-content:center;font-family:var(--font-mono)"><strong style="color:var(--accent-3);font-family:Calibri">${lbl}:</strong><span style="font-size:13px;color:var(--ink-2)">${fmtS(info.v25)} <span style="color:var(--ink-3)">→</span> <strong style="color:${c26};font-size:14.5px">${fmtS(info.v26)}</strong></span></div>`;
      };
      return `<div style="${_cardCss};display:flex;flex-direction:column;gap:8px;justify-content:center">${linea('UV',uvInfo)}<div style="border-top:1px dashed var(--line)"></div>${linea('H',hInfo)}</div>`;
    };
    const cellMonNegR = (info, isUS)=>{
      if(!info || info.n===0 || (info.s25===0 && info.s26===0)) return zeroCard;
      const v = Math.max(Math.abs(info.s25), Math.abs(info.s26||0));
      return `<div style="${_cardCss};display:flex;align-items:center;justify-content:center"><div style="font-family:var(--font-mono);font-size:17px;font-weight:800;color:var(--neg)">−${fmtCompact(v,isUS)}</div></div>`;
    };
    const cellMonAbsR = (info, isUS, forceNeg)=>{
      if(!info || info.n===0) return zeroCard;
      const v = forceNeg ? -Math.abs(info.val) : info.val;
      const color = forceNeg || v<0 ? 'var(--neg)' : (v>0?'var(--pos)':'var(--ink-2)');
      const sgn = (v<0 || forceNeg) ? '−' : (v>0 ? '+' : '');
      return `<div style="${_cardCss};display:flex;align-items:center;justify-content:center"><div style="font-family:var(--font-mono);font-size:17px;font-weight:800;color:${color}">${sgn}${fmtCompact(Math.abs(v),isUS)}</div></div>`;
    };
    const rubrosCellR = `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;box-shadow:0 1px 4px rgba(10,31,58,.06);height:100%${rubArr.length>0?'':';opacity:.6'}">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:4px">Rubros (${rubArr.length})</div>
        ${rubArr.length>0 ? `<div style="display:grid;grid-template-columns:1fr auto;gap:2px 8px;align-items:baseline">
          ${rubArr.map(([k,n])=>`<span style="font-size:11.5px;color:var(--accent-3);font-weight:700;line-height:1.25">${k}</span><span style="font-family:var(--font-mono);font-size:11.5px;color:var(--ink-2);font-weight:700;text-align:right">${n}</span>`).join('')}
        </div>` : '<span style="font-size:11.5px;color:var(--ink-3);font-style:italic">— sin rubros —</span>'}
      </div>`;
    /* Versión COMPACTA de rubros: dos columnas (mitad y mitad) para ocupar la mitad de alto. */
    const rubrosCompact = (()=>{
      const half = Math.ceil(rubArr.length/2);
      let cells='';
      for(let i=0;i<half;i++){
        const a=rubArr[i], b=rubArr[i+half];
        const cel=(x)=> x ? `<span style="font-size:11px;color:var(--accent-3);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x[0]}</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);text-align:right">${x[1]}</span>` : `<span></span><span></span>`;
        cells += cel(a)+cel(b);
      }
      return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;box-shadow:0 1px 4px rgba(10,31,58,.06)">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:4px">Rubros (${rubArr.length})</div>
        ${rubArr.length>0 ? `<div style="display:grid;grid-template-columns:1fr 22px 1fr 22px;gap:2px 12px;align-items:baseline">${cells}</div>` : '<span style="font-size:11px;color:var(--ink-3);font-style:italic">— sin rubros —</span>'}
      </div>`;
    })();
    const esPendPerdNoCorr = (id==='pendiente' || /^pend_/.test(id) || id==='perdidas');
    const proyCell = (info,isUS)=> esPendPerdNoCorr ? cellMonNegR(info,isUS) : cellMontoR(info,isUS);
    /* Prima Mínima: en causas PENDIENTES/PERDIDAS el total se toma del detalle (collect)
       para que coincida exactamente con el sub-desglose; se muestra como magnitud → 0.
       En el resto (menor/concepto) se muestra prima mínima 2025 → 2026 + variación. */
    const montoCell = (info,isUS,detMag)=>{
      if(esPendPerdNoCorr && detMag!=null && Math.abs(detMag)>0){
        const s25 = Math.abs(detMag);
        return cellMontoR({n:info?info.n:0, s25, s26:0, d:-s25, pct:-1}, isUS);
      }
      if(!info || info.n===0) return cellMontoR(info,isUS);
      const d = info.s26 - info.s25, pct = info.s25 ? d/Math.abs(info.s25) : null;
      return cellMontoR({n:info.n, s25:info.s25, s26:info.s26, d, pct}, isUS);
    };
    /* En Desvíos, Tasa y Siniestralidad SIEMPRE quedan en blanco (no aplican a las causas). */
    const blankCellD = `<div style="background:#fafbfc;border:1px dashed var(--line);border-radius:7px;padding:5px 7px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:11px;font-style:italic;min-height:48px">— no aplica —</div>`;
    /* Tasa y Siniestralidad: en general "no aplica" en desvíos, PERO en "Menor Emisión"
       sí se muestran (explican por qué bajó la emisión). */
    const tasaCellD = (info)=> (id==='menor') ? cellPctR(info, fmtT, false) : blankCellD;
    const sinCellD  = (uv,h)=> (id==='menor') ? cellSinUnifR(uv, h) : blankCellD;
    /* En "Menor Emisión" se OCULTA la columna Prima Mínima (ya aparece abajo en
       "Magnitud por concepto"). */
    const showPrima = (id !== 'menor');
    /* Pendientes / perdidas: el resumen muestra SOLO Rubros (la prima ya está en el detalle de
       abajo). Rubros en 3 columnas (≈3 filas) con el número pegado al nombre. */
    if(esPendPerdNoCorr){
      return `<div style="margin-bottom:10px;border:1px solid var(--line-2);border-radius:8px;padding:9px 14px;background:#fbfcfe;box-shadow:0 1px 4px rgba(10,31,58,.06)">
        <div style="font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px">Rubros (${rubArr.length})</div>
        ${rubArr.length>0 ? `<div style="display:grid;grid-template-columns:repeat(3,auto);gap:5px 30px;justify-content:start">
          ${rubArr.map(([k,n])=>`<div style="font-size:12px;white-space:nowrap"><span style="color:var(--accent-3);font-weight:700">${k}</span> <span style="font-family:var(--font-mono);color:var(--ink-2);font-weight:700;margin-left:6px">${n}</span></div>`).join('')}
        </div>` : '<span style="font-size:12px;color:var(--ink-3);font-style:italic">— sin rubros —</span>'}
      </div>`;
    }
    const nCat = showPrima ? 5 : 4;
    return `<div style="margin-bottom:14px;overflow-x:auto">
      <div style="display:grid;grid-template-columns:auto repeat(${nCat},minmax(100px,200px));gap:7px;align-items:stretch;justify-content:center;min-width:${showPrima?560:460}px">
        <div></div>
        ${showPrima ? catHead('Prima Mínima','#c2410c','#fff','#c2410c') : ''}
        ${catHead('Proyección','rgba(30,111,217,.10)','#1e6fd9','#1e6fd9')}
        ${catHead('Tasa promedio','rgba(139,92,246,.12)','#7c4ddb','#8b5cf6')}
        ${catHead('Siniestralidad','rgba(232,155,30,.14)','#b9760f','#e89b1e')}
        ${catHead('Rubros','rgba(94,179,232,.16)','#2a6aa0','#5eb3e8')}
        ${refCell('$', nColARS)}
        ${showPrima ? montoCell(monARS,false,detMonARS) : ''}
        ${proyCell(proyARS,false)}
        ${tasaCellD(tasaARS)}
        ${sinCellD(sinUVARS, sinHARS)}
        <div style="grid-row:span 2">${rubrosCellR}</div>
        ${refCell('US', nColUSD)}
        ${showPrima ? montoCell(monUSD,true,detMonUSD) : ''}
        ${proyCell(proyUSD,true)}
        ${tasaCellD(tasaUSD)}
        ${sinCellD(sinUVUSD, sinHUSD)}
      </div>
    </div>`;
  })();

  let contenido;
  /* Mini-gráfico general que muestra la magnitud de los 4 conceptos "menores"
     (Prima Mínima / Ajuste / Bono / Malus) para que se vea de un vistazo cuál
     pesa más antes de seleccionar el sub-botón. */
  const menorChart = ()=>{
    const u = d.useUSD;
    /* Totales por concepto tomados del MISMO collect que el desglose, para que el gráfico
       y el detalle estén sincronizados (antes usaban state._ejecCausasCnt, otra cuenta). */
    const concT = (effId)=>{
      let totARS=0, totUSD=0; const cl=new Set();
      try {
        [...collect(false, effId), ...collect(true, effId)].forEach(r=>{
          totARS+=(r.montoARS||0); totUSD+=(r.montoUSD||0); cl.add(r.clave||r.poliza);
        });
      } catch(e){}
      return {val: Math.abs(u?totUSD:totARS), n: cl.size};
    };
    const vals = [
      {k:'prima',  lbl:'Prima mín.', col:APP_CONFIG.colores.prima, ...concT('prima')},
      {k:'ajuste', lbl:'Ajuste',     col:APP_CONFIG.colores.abm,   ...concT('ajuste')},
      {k:'bono',   lbl:'Bono',       col:'#d94747',                ...concT('bono')},
      {k:'malus',  lbl:'Malus',      col:'#7c4dff',                ...concT('malus')},
    ];
    const max = Math.max(1, ...vals.map(v=>v.val));
    const FMTcL = (v)=>fmtCompact(v, u);
    /* Líneas de escala verticales (cada 25% del máximo) para poder comparar magnitudes. */
    const gridBg = 'background-image:repeating-linear-gradient(90deg,rgba(10,31,58,.10) 0,rgba(10,31,58,.10) 1px,transparent 1px,transparent 25%)';
    return `<div style="background:var(--bg-2);border-radius:8px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:11.5px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.05em;font-weight:800;margin-bottom:10px">Magnitud por concepto (${u?'USD':'ARS$'}) <span style="color:var(--ink-3);font-weight:500;text-transform:none;letter-spacing:0">· escala 0 → ${FMTcL(max)}</span></div>
      ${vals.map(v=>`<div style="display:grid;grid-template-columns:90px 1fr 150px;gap:10px;align-items:center;margin-bottom:6px">
        <span style="font-size:12.5px;color:var(--ink-2);font-weight:700">${v.lbl}</span>
        <div style="height:16px;background:rgba(0,0,0,.04);border-radius:3px;position:relative;${gridBg};border-right:1px solid rgba(10,31,58,.10)"><div style="position:absolute;left:0;top:0;bottom:0;width:${v.val/max*100}%;background:${v.col};border-radius:3px"></div></div>
        <span style="font-family:var(--font-mono);font-weight:700;font-size:13px;color:${v.col};text-align:right">−${FMTcL(v.val)} <span style="color:var(--ink-3);font-weight:500;font-size:11px">(${v.n} pól.)</span></span>
      </div>`).join('')}
      <div style="display:grid;grid-template-columns:90px 1fr 150px;gap:10px;margin-top:3px">
        <span></span>
        <div style="position:relative;height:12px;font-family:var(--font-mono);font-size:9px;color:var(--ink-3)">
          <span style="position:absolute;left:0;transform:translateX(-50%)">0</span>
          <span style="position:absolute;left:25%;transform:translateX(-50%)">${FMTcL(max*0.25)}</span>
          <span style="position:absolute;left:50%;transform:translateX(-50%)">${FMTcL(max*0.5)}</span>
          <span style="position:absolute;left:75%;transform:translateX(-50%)">${FMTcL(max*0.75)}</span>
          <span style="position:absolute;left:100%;transform:translateX(-50%)">${FMTcL(max)}</span>
        </div>
        <span></span>
      </div>
    </div>`;
  };
  if(id==='menor'){
    /* Drill "Menor Emisión": dos modos arriba —
       Emisiones (Prima/Ajuste/Bono/Malus) y Variables (Proyección/Tasa/Siniestralidad). */
    const tBtn=(top,label,active)=>`<button class="ejec-topbtn" data-top="${top}" onclick="setEjecMenorTop('${top}')" style="padding:8px 22px;font-size:13px;font-weight:800;border-radius:6px;border:1.5px solid ${active?'var(--accent)':'var(--line-2)'};background:${active?'var(--accent)':'var(--bg-2)'};color:${active?'#fff':'var(--ink-2)'};cursor:pointer">${label}</button>`;
    const mBtn=(sub,label,active)=>`<button class="ejec-menorbtn" data-sub="${sub}" onclick="setEjecMenorSub('${sub}')" style="padding:7px 16px;font-size:12px;font-weight:700;border-radius:5px;border:1px solid ${active?'var(--accent)':'var(--line-2)'};background:${active?'var(--accent)':'var(--bg-2)'};color:${active?'#fff':'var(--ink-2)'};cursor:pointer">${label}</button>`;
    const vBtn=(sub,label,active)=>`<button class="ejec-varbtn" data-sub="${sub}" onclick="setEjecVarSub('${sub}')" style="padding:7px 16px;font-size:12px;font-weight:700;border-radius:5px;border:1px solid ${active?'var(--accent)':'var(--line-2)'};background:${active?'var(--accent)':'var(--bg-2)'};color:${active?'#fff':'var(--ink-2)'};cursor:pointer">${label}</button>`;
    /* Vista de Siniestralidad (Variables): totales promedio 25→26 + detalle por póliza. */
    colSinUI = ()=>{
      let uv25=0,uv26=0,uvN=0,h25=0,h26=0,hN=0; const pols=[];
      for(const p of polFiltradas){
        if(polizaTerminada(p)) continue;
        const hUV=p.sinUV2025!=null&&p.sinUV2026!=null, hH=p.sinH2025!=null&&p.sinH2026!=null;
        if(hUV){uv25+=p.sinUV2025;uv26+=p.sinUV2026;uvN++;}
        if(hH){h25+=p.sinH2025;h26+=p.sinH2026;hN++;}
        if(hUV||hH) pols.push(p);
      }
      const totBox=(lbl,v25,v26,n)=>{const d2=v26-v25;const c=d2===0?'var(--accent)':(d2>0?'var(--neg)':'var(--pos)');return `<div style="flex:1;min-width:200px;background:var(--bg-2);border-radius:8px;padding:12px 14px;border-left:4px solid #e89b1e">
        <div style="font-size:12px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.04em;font-weight:800;margin-bottom:6px">${lbl} <span style="color:var(--ink-3);font-weight:500">(${n} pól.)</span></div>
        <div style="font-family:var(--font-mono);font-size:14px;color:var(--ink-2)">${FMT_PCT_SIN(v25)} <span style="color:var(--ink-3)">→</span> <strong style="color:var(--accent-3);font-size:18px">${FMT_PCT_SIN(v26)}</strong></div>
        <div style="font-family:var(--font-mono);font-size:16px;font-weight:800;color:${c};margin-top:4px">${d2>=0?'+':''}${FMT_PCT_SIN(d2)}</div></div>`;};
      pols.sort((a,b)=>((b.sinH2026||0)-(b.sinH2025||0))-((a.sinH2026||0)-(a.sinH2025||0)));
      const cellSin=(v25,v26)=>{ if(v25==null||v26==null) return '<span style="color:var(--ink-3)">—</span>'; const d2=v26-v25;const c=d2===0?'var(--ink-3)':(d2>0?'var(--neg)':'var(--pos)'); return `${FMT_PCT_SIN(v25)}→<strong>${FMT_PCT_SIN(v26)}</strong> <span style="color:${c};font-weight:800">${d2>=0?'+':''}${FMT_PCT_SIN(d2)}</span>`; };
      const fila=(p)=>`<div style="display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:10px;align-items:center;padding:7px 8px;border-bottom:1px solid var(--line);font-size:12px">
        <div><span style="font-weight:800;color:var(--accent-3);background:var(--bg-2);padding:2px 7px;border-radius:5px">${fmtPoliza(p.poliza)}</span> <span style="color:var(--ink-2)">${(p.asegurado||'').substring(0,18)}</span></div>
        <div style="font-family:var(--font-mono);text-align:right">${cellSin(p.sinUV2025,p.sinUV2026)}</div>
        <div style="font-family:var(--font-mono);text-align:right">${cellSin(p.sinH2025,p.sinH2026)}</div>
      </div>`;
      return `
        <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">${totBox('Siniestralidad UV',uvN?uv25/uvN:0,uvN?uv26/uvN:0,uvN)}${totBox('Siniestralidad Histórica',hN?h25/hN:0,hN?h26/hN:0,hN)}</div>
        <div style="border:1px solid var(--line);border-radius:8px;overflow:hidden">
          <div style="display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:10px;padding:8px;background:var(--bg-2);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)"><span>Póliza</span><span style="text-align:right">Sin UV 25→26</span><span style="text-align:right">Sin Hist. 25→26</span></div>
          ${pols.map(fila).join('')||'<div style="padding:12px;font-style:italic;color:var(--ink-3)">— sin datos de siniestralidad —</div>'}
        </div>`;
    };
    emisCols = (sub)=> sub==='prima'
      ? `${colPrima(false,'prima')}${colPrima(true,'prima')}`
      : `${colAbm(false,sub)}${colAbm(true,sub)}`;
    emisionesUI = ()=>`
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap" id="ejecMenorSubsel">${mBtn('prima','Prima mínima',true)}${mBtn('ajuste','Ajuste',false)}${mBtn('bono','Bono',false)}${mBtn('malus','Malus',false)}</div>
      <div id="ejecMenorBody" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${emisCols('prima')}</div>`;
    /* Resumen (formato foto 4, SIN gráficos) de una variable por moneda original. */
    varResumen = (sub)=>{
      const arrA = polFiltradas.filter(p=>p.moneda==='$'), arrU = polFiltradas.filter(p=>p.moneda==='US');
      const card = (v25,v26,isPct,isUS,n)=>{
        const d=v26-v25, c=d===0?'var(--accent)':(d>0?'var(--pos)':'var(--neg)');
        const fmt = isPct ? (x)=>FMT_PCT_TASA(x) : (x)=>fmtCompact(x,isUS);
        return `<div style="background:#fbfcfe;border:1px solid var(--line-2);border-radius:7px;padding:5px 7px;box-shadow:0 1px 4px rgba(10,31,58,.06)">
          <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em;font-weight:700">Pólizas Moneda Orig <span style="color:${isUS?'#8b5cf6':'#e89b1e'};font-weight:900">${isUS?'US':'$'}</span> <span style="color:var(--ink-3);font-weight:600">(${n} pól.)</span></div>
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--ink-2);margin-top:4px">${fmt(v25)} <span style="color:var(--ink-3)">→</span> <strong style="color:var(--accent-3);font-size:15px">${fmt(v26)}</strong></div>
          <div style="font-family:var(--font-mono);font-size:15px;font-weight:800;color:${c};margin-top:4px">${d>=0?'+':''}${fmt(d)}</div>
        </div>`;
      };
      let aA, aU, isPct=false;
      if(sub==='proy'){
        const s=(arr,cur)=>arr.reduce((o,p)=>{o.v25+=p['proy'+cur+'2025']||0;o.v26+=p['proy'+cur+'2026']||0;return o;},{v25:0,v26:0});
        aA=s(arrA,'ARS'); aU=s(arrU,'USD'); aA.n=arrA.length; aU.n=arrU.length;
      } else {
        isPct=true;
        const avg=(arr)=>{let s25=0,s26=0,n=0;for(const p of arr){if(p.tasa2025!=null&&p.tasa2026!=null){s25+=p.tasa2025;s26+=p.tasa2026;n++;}}return {v25:n?s25/n:0,v26:n?s26/n:0,n};};
        aA=avg(arrA); aU=avg(arrU);
      }
      const titulo = sub==='proy' ? 'Proyección de ventas' : 'Tasa promedio';
      return `<div style="font-size:13px;font-weight:800;color:var(--accent-3);margin-bottom:8px">${titulo} · variación 2025 → 2026</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${card(aA.v25,aA.v26,isPct,false,aA.n)}${card(aU.v25,aU.v26,isPct,true,aU.n)}</div>`;
    };
    varBody = (sub)=>{
      if(sub==='sin') return colSinUI();
      /* Resumen foto 4 (sin gráfico) + detalle por póliza. */
      return varResumen(sub) + `<div id="ejecPrimaCols" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colPrima(false,sub)}${colPrima(true,sub)}</div>`;
    };
    variablesUI = ()=>`
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap" id="ejecVarSubsel">${vBtn('proy','Proyección de ventas',true)}${vBtn('tasa','Tasa',false)}${vBtn('sin','Siniestralidad',false)}</div>
      <div id="ejecVarBody">${varBody('proy')}</div>`;
    const topNow = state._ejecMenorTop || 'emisiones';
    contenido = `
      ${menorChart()}
      <div id="ejecMenorTopBody">${emisionesUI()}</div>`;
  } else if(id==='prima'){
    contenido = `<div id="ejecMenorBody" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colPrima(false,'prima')}${colPrima(true,'prima')}</div>`;
  } else if(id==='abm'){
    contenido = `
      <div style="display:flex;gap:8px;margin-bottom:12px" id="ejecAbmSubsel">
        <button class="ejec-abmbtn" data-sub="ajuste" onclick="setEjecAbmSub('ajuste')" style="padding:6px 14px;font-size:11.5px;font-weight:700;border-radius:5px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer">Ajuste</button>
        <button class="ejec-abmbtn" data-sub="bono" onclick="setEjecAbmSub('bono')" style="padding:6px 14px;font-size:11.5px;font-weight:700;border-radius:5px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--ink-2);cursor:pointer">Bono</button>
        <button class="ejec-abmbtn" data-sub="malus" onclick="setEjecAbmSub('malus')" style="padding:6px 14px;font-size:11.5px;font-weight:700;border-radius:5px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--ink-2);cursor:pointer">Malus</button>
      </div>
      <div id="ejecAbmCols" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colAbm(false,'ajuste')}${colAbm(true,'ajuste')}</div>`;
  } else if(id==='sinjust'){
    contenido = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${colNoCrecen(false)}${colNoCrecen(true)}</div>`;
  } else if(id==='pend_presup'){
    /* PRESUPUESTO: desglose MES A MES con toggle por mes. Por defecto cuentan los meses ≤ corte
       SIN emisión confirmada (los confirmados van destildados; se pueden tildar para sumarlos). */
    const suf = btnUSD?'u':'a';
    const presArr = (state._ejecPresArr && state._ejecPresArr[suf]) || Array(12).fill(0);
    const confM = presupArgMensual(suf).conf;
    const corte = state._ejecPresCorte || 12;
    const on = _ejecContabOn('pend_presup','mes');
    state._ejecPresMes = state._ejecPresMes || {};
    const _le26 = state._ejecLastEmis26||0;
    const onMes = (m)=>{ const v=state._ejecPresMes[m]; return (v!==undefined)?!!v:((m>=_le26+2)&&(m<=corte)); };
    let total=0; for(let m=1;m<=12;m++){ if(onMes(m)) total+=(presArr[m-1]||0); }
    const tc='#3a8fc0';
    const filas = MESES.map((mn,idx)=>{ const m=idx+1; const pres=presArr[idx]||0; const conf=confM[idx]||0; const chk=onMes(m); const fut=(m<=corte);
      if(pres<0.5 && conf<0.5 && !fut) return '';
      return `<div onclick="window.ejecTogglePresMes(${m})" style="display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;${chk?'':'opacity:.5'}">
        <span style="width:14px;height:14px;border:1.5px solid ${chk?tc:'var(--line-2)'};border-radius:3px;background:${chk?tc:'transparent'};display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800">${chk?'✓':''}</span>
        <span style="font-weight:700;color:var(--accent-3)">${mn}${conf>0.5?` <span style="color:#d39a00;font-weight:600;font-size:11px">· confirmado ${fmtCompact(conf,btnUSD)}</span>`:''}${m>corte?' <span style="color:var(--ink-3);font-size:10.5px">(fuera del corte)</span>':''}</span>
        <span style="font-family:var(--font-mono);font-weight:800;color:var(--accent-3);min-width:84px;text-align:right">${fmtCompact(pres,btnUSD)}</span>
