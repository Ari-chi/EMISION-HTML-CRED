/* Justificación: desvío grande + barra + % grandes (SIN la lectura en prosa) */
/* Cuenta pólizas y suma montos por causa EXACTAMENTE como el drill (collect),
   para que el contador y el TOTAL del item coincidan siempre con el desglose.
   Soporta: pendiente, perdidas, prima, ajuste, bono, malus, sinjust. */
/* Desglosa el PENDIENTE de emisión por concepto sobre el universo filtrado.
   Devuelve { primaMin:{n,totARS,totUSD}, ajuste:{...}, bono:{...}, malus:{...},
              total:{n,totARS,totUSD} }.
   - n por concepto = cantidad de pólizas con ESE concepto pendiente.
   - total.n = cantidad de pólizas con AL MENOS un concepto pendiente (sin duplicar). */
function desglosePendientePorConcepto(polFiltradas, mesCorte){
  const KEYS = {'Prima mínima':'primaMin','Ajuste':'ajuste','Bono':'bono','Malus':'malus'};
  const out = {
    primaMin:{n:0,totARS:0,totUSD:0},
    ajuste:{n:0,totARS:0,totUSD:0},
    bono:{n:0,totARS:0,totUSD:0},
    malus:{n:0,totARS:0,totUSD:0},
    total:{n:0,totARS:0,totUSD:0},
  };
  /* Toggles "Contabilizar" del drill de pendientes (pedido del usuario): cada póliza pendiente
     cae en un grupo según tenga DATO de emisión cargado (Excel bloque AF–AH o editado a mano):
       · CON dato  → "Se emite este mes" (grupo 'mes', por defecto SÍ contabiliza)
       · SIN dato  → "Pendiente sin fecha" (grupo 'anio', por defecto NO contabiliza)
     Si el grupo está en NO, sus pólizas NO suman al desvío (ni al gráfico ni a los conceptos).
     Valor efectivo de cada póliza: lo cargado a mano > el dato del Excel > el pendiente 2025. */
  state._ejecContab = state._ejecContab || {};
  state._ejecEstim = state._ejecEstim || {u:{}, a:{}};
  for(const p of polFiltradas){
    const est = estadoPolizaConsolidado(p, mesCorte);
    const pend = (est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m');
    const cp = conceptosPendientes(p, mesCorte);
    let items = cp.items;
    /* Fallback consolidado: póliza marcada como pendiente pero sin items detallados →
       usar la emisión 2025 de la prima (lo que falta renovar). Sin estimaciones. */
    if(items.length===0 && pend){
      const f25 = calcEmisionFiltrada(p,2025,0);
      const mARS=f25.breakdownARS.primaMin, mUSD=f25.breakdownUSD.primaMin;
      if(mARS>0||mUSD>0) items=[{concepto:'Prima mínima', ars:mARS, usd:mUSD}];
    }
    /* Pendiente 2025 (con TC) por concepto, según conceptosPendientes. */
    const pendByK = {};
    for(const it of items){ const k=KEYS[it.concepto]; if(!k) continue; pendByK[k]=convertirPendienteTC(it.ars, it.usd, p.moneda); }

    /* CADA concepto (prima/ajuste/malus/bono) se evalúa por SEPARADO: toma SOLO su propio dato
       del Excel (bloque AF–AH) / lo cargado a mano. Con dato → "se emite este mes" (monto del
       Excel por moneda, sin TC); sin dato pero pendiente 2025 → "pendiente sin fecha" (con TC).
       Si un concepto no tiene ni dato ni pendiente, NO se le pone nada. Incluye conceptos con
       dato del Excel aunque conceptosPendientes no los marque (p. ej. malus/bono del cuadro). */
    let polContada = false;
    for(const k of ['primaMin','ajuste','malus','bono']){
      const exA = _excelEstimConcepto(p, k, 'a'), exU = _excelEstimConcepto(p, k, 'u');
      const mA = (state._ejecEstim.a||{})[p.clave+'|'+k], mU = (state._ejecEstim.u||{})[p.clave+'|'+k];
      const hasMA = isFinite(mA) && mA!==0, hasMU = isFinite(mU) && mU!==0;
      const hasData = Math.abs(exA)>0 || Math.abs(exU)>0 || hasMA || hasMU;
      const pend25 = pendByK[k];
      let vA, vU, grupo;
      if(hasData){ grupo='mes'; vA = hasMA ? mA : exA; vU = hasMU ? mU : exU; }
      else if(pend25){ grupo='anio'; vA = pend25.ars; vU = pend25.usd; }
      else continue;   /* ni dato ni pendiente → nada */
      /* El BONO es nota de crédito: SIEMPRE resta emisión (negativo). */
      if(k==='bono'){ vA = -Math.abs(vA); vU = -Math.abs(vU); }
      if(!_ejecContabOn(k, grupo)) continue;   /* este concepto+grupo NO contabilizado → no suma */
      if(Math.abs(vA)<0.5 && Math.abs(vU)<0.5) continue;
      out[k].n++; out[k].totARS+=vA; out[k].totUSD+=vU;
      out.total.totARS+=vA; out.total.totUSD+=vU;
      polContada = true;
    }
    if(polContada) out.total.n++;
  }
  return out;
}

/* Pendiente de UNA póliza (misma lógica que el desglose: excluye Bono, con fallback a
   prima 2025 si está marcada pendiente sin items). Devuelve montos en ambas monedas y
   la lista de conceptos pendientes (Prima mínima / Ajuste / Malus). */
function pendPolizaInfo(p, mesCorte, incluirBono){
  const cp = conceptosPendientes(p, mesCorte);
  let items = cp.items;
  if(items.length===0){
    const est = estadoPolizaConsolidado(p, mesCorte);
    if(est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m'){
      const f25 = calcEmisionFiltrada(p,2025,0);
      const mARS=f25.breakdownARS.primaMin, mUSD=f25.breakdownUSD.primaMin;
      if(mARS>0||mUSD>0) items=[{concepto:'Prima mínima', ars:mARS, usd:mUSD}];
    }
  }
  let ars=0, usd=0; const concepts=[];
  for(const it of items){
    /* El BONO es nota de crédito (RESTA emisión). Por defecto se excluye del pendiente;
       si incluirBono=true, se contempla en NEGATIVO (reduce el pendiente). */
    if(it.concepto==='Bono' && !incluirBono) continue;
    const cv = convertirPendienteTC(it.ars, it.usd, p.moneda);
    const sgn = (it.concepto==='Bono') ? -1 : 1;
    ars += sgn*cv.ars; usd += sgn*cv.usd;
    if(!concepts.includes(it.concepto)) concepts.push(it.concepto);
  }
  return {ars, usd, concepts};
}

function contarPolizasCausa(id, polFiltradas, mesCorte){
  let n=0, totARS=0, totUSD=0;
  for(const p of polFiltradas){
    const uu = (p.moneda==='US');
    const est = estadoPolizaConsolidado(p, mesCorte);
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    const e25 = uu?f25.totUSD:f25.totARS, e26 = uu?f26.totUSD:f26.totARS;
    const pm25 = uu?f25.breakdownUSD.primaMin:f25.breakdownARS.primaMin;
    const pm26 = uu?f26.breakdownUSD.primaMin:f26.breakdownARS.primaMin;
    const terminada = /terminada/i.test(p.tipo2026||'') || /terminada/i.test(p.tipo2025||'');
    const pend = (est==='desvio_emision_pendiente' || est==='desvio_pendiente_mayor_2m');
    const rPM = p.conceptos['Prima Minima'];
    const primaEmit26 = conceptoEmitido26(rPM, mesCorte);
    const emitidoOk = primaEmit26 && !terminada && !pend;
    let cuenta=false, mARS=0, mUSD=0;
    if(id==='pendiente'){
      /* Cuenta si tiene algún concepto pendiente (prima/ajuste/malus), EXCLUYENDO el bono
         (el bono pendiente se saca por completo del Desvío de Emisión). */
      const cp = conceptosPendientes(p, mesCorte);
      const itemsSinBono = cp.items.filter(it=>it.concepto!=='Bono');
      if(itemsSinBono.length>0){
        cuenta=true;
        /* TC: el equivalente en la otra moneda se recalcula por el tipo de cambio. */
        for(const it of itemsSinBono){ const cv=convertirPendienteTC(it.ars, it.usd, p.moneda); mARS+=cv.ars; mUSD+=cv.usd; }
      } else if(pend){
        cuenta=true;
        const cv=convertirPendienteTC(f25.breakdownARS.primaMin, f25.breakdownUSD.primaMin, p.moneda);
        mARS=cv.ars; mUSD=cv.usd;
      }
    } else if(id==='perdidas' && terminada){
      /* Emisión 2025 COMPLETA (sin "Acumulado hasta"): es la referencia total perdida. */
      const f25full = calcEmisionFiltrada(p,2025,0,{excluirAnualAnt:false});
      cuenta=true; mARS=f25full.totARS; mUSD=f25full.totUSD;
    } else if(id==='prima' && !terminada && !primaMinTienePendiente(p, mesCorte) && (conceptoBajaPareada(p,'Prima Minima',uu,mesCorte).baja || primaNoCorrespondeDesvio(p,mesCorte).entra)){
      /* MISMA regla que collect/colPrima: "menor prima mínima" si baja comparando mismas
         cuotas en moneda original; si emisión 2026 = 0, solo cuenta con categoría justificada
         (eso ya lo resuelve conceptoBajaPareada). Caso "No corresponde": desvío 2025 completo. */
      const nc = primaNoCorrespondeDesvio(p, mesCorte);
      const parA = conceptoBajaPareada(p, 'Prima Minima', false, mesCorte);
      const parU = conceptoBajaPareada(p, 'Prima Minima', true, mesCorte);
      const dARS=(rPM && typeof rPM.desvioARS==='number' && rPM.desvioARS<0)?rPM.desvioARS:null;
      const dUSD=(rPM && typeof rPM.desvioUSD==='number' && rPM.desvioUSD<0)?rPM.desvioUSD:null;
      const bajaA=parA.pm25-parA.pm26, bajaU=parU.pm25-parU.pm26;
      cuenta=true;
      if(nc.entra){ mARS=nc.mARS; mUSD=nc.mUSD; }
      else {
        mARS=(dARS!=null)?dARS:-(bajaA>0?bajaA:0);
        mUSD=(dUSD!=null)?dUSD:-(bajaU>0?bajaU:0);
      }
    } else if(id==='ajuste'||id==='bono'||id==='malus'){
      /* MISMA regla que collect/colAbm: fuente única desvioConceptoABM (signo del Excel). */
      const conceptoMap={ajuste:'Ajuste',bono:'Bono',malus:'Malus'};
      const dv = desvioConceptoABM(p, conceptoMap[id], mesCorte);
      if(dv.entra){
        cuenta=true;
        mARS=dv.mARS;
        mUSD=dv.mUSD;
      }
    } else if(id==='sinjust' && emitidoOk){
      const umb=uu?0.10:0.30;
      if(pm25>0 && pm26>=pm25){ const crec=(pm26-pm25)/Math.abs(pm25); if(crec<umb){ cuenta=true; const fA=f25.breakdownARS.primaMin*(1+(0.30))-f26.breakdownARS.primaMin, fU=f25.breakdownUSD.primaMin*(1+0.10)-f26.breakdownUSD.primaMin; mARS=fA>0?fA:0; mUSD=fU>0?fU:0; } }
    }
    if(cuenta){ n++; totARS+=mARS; totUSD+=mUSD; }
  }
  return {n, totARS, totUSD};
}

function ejecJustificacion(S, useUSD, dual, useUSDprimary){
  const FMTc=(v)=>fmtCompact(v,useUSD);
  const FMT = useUSD?FMT_USD_FULL:FMT_ARS_FULL;
  const mLbl=useUSD?'USD':'ARS$';
  /* Selector de los DOS desvíos: 'corte' (hasta el mes del botón 1°) o 'fecha' (hasta el último
     mes con emisión real 2026). Cambia el desvío total y el corte con el que se calculan las causas. */
  const selMode = 'corte';   /* se muestra solo el desvío hasta el corte (botón 1°); la vista "May" se quitó */
  const _cutoff = (selMode==='fecha') ? (S.lastEmis26 || S.mesCorteSet || 12) : (S.mesCorteSet || 12);
  state._ejecDesvioCutoff = _cutoff;   /* lo lee el drill */
  state._ejecPendCut = S.mesCorteSet || 12;          /* pendientes: cutoff completo (no se recortan por "hasta May") */
  state._ejecProyOff = (selMode==='fecha');           /* en vista "emisión real" no se cuenta Proyección Arg */
  state._ejecLastEmis = S.lastEmis26 || _cutoff;   /* tope del pendiente Comparación 2025 */
  state._ejecLastEmis26 = S.lastEmis26 || 0;        /* piso (exclusivo) del pendiente Proyección Arg */
  const desvio = (selMode==='fecha') ? S.desvio_emi : S.desvio;
  const dvAbs=Math.abs(desvio);
  /* Guardar el desvío total por moneda para que el drill calcule el % de cada columna. */
  state._ejecDesvioAbs = state._ejecDesvioAbs || {};
  state._ejecDesvioAbs[useUSD?'u':'a'] = dvAbs;
  if(desvio<=1){
    return `<div style="margin-top:${dual?12:6}px">${dual?`<div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:6px">${mLbl}</div>`:''}<div style="font-size:13px;color:var(--pos);padding:12px 14px;background:rgba(45,155,106,.08);border-radius:8px;border-left:3px solid var(--pos)"><strong>Se cumplió o superó el presupuesto</strong> (${mLbl}). No hay desvío negativo para descomponer.</div></div>`;
  }
  /* La moneda primaria lleva los clicks (para no duplicar handlers) */
  const esPrimaria = (useUSD === useUSDprimary);
  /* Contadores REALES del desglose (coinciden con el drill) */
  const dd = state._ejecData;
  /* Totales y conteos REALES del desglose, para que el item coincida con el drill.
     val = monto en la moneda de esta vista (useUSD). */
  const mkVal = (r)=> useUSD ? r.totUSD : r.totARS;
  const polPend = (dd && dd.polFiltradasPend) ? dd.polFiltradasPend : (dd?dd.polFiltradas:null);
  const cnt = (dd && dd.polFiltradas) ? {
    pendiente: contarPolizasCausa('pendiente', polPend, _cutoff),
    perdidas: contarPolizasCausa('perdidas', dd.polFiltradas, _cutoff),
    prima: contarPolizasCausa('prima', dd.polFiltradas, _cutoff),
    ajuste: contarPolizasCausa('ajuste', dd.polFiltradas, _cutoff),
    bono: contarPolizasCausa('bono', dd.polFiltradas, _cutoff),
    malus: contarPolizasCausa('malus', dd.polFiltradas, _cutoff),
    sinjust: contarPolizasCausa('sinjust', dd.polFiltradas, _cutoff),
  } : null;
  /* Cache para el mini-gráfico del drill "menor" (magnitud por concepto). */
  if(cnt) state._ejecCausasCnt = cnt;
  let causas;
  let pendDesglose = null; /* desglose del pendiente por concepto (para mini-barra y total) */
  if(cnt){
    /* Cada causa: valSigned = neto CON SIGNO en la moneda del botón (negativo agrava el
       desvío, positivo juega a favor). val = magnitud para el ancho de la barra. */
    const abmSigned = mkVal(cnt.ajuste)+mkVal(cnt.bono)+mkVal(cnt.malus);
    const dp = polPend ? desglosePendientePorConcepto(polPend, dd.mesCorte) : null;
    pendDesglose = dp;
    const pv = (o)=> o ? (useUSD ? o.totUSD : o.totARS) : 0;
    const mk = (id,lbl,vSigned,n,col,grupo)=>({id,lbl,val:Math.abs(vSigned),vSigned,n,col,...(grupo?{grupo}:{})});
    /* "Menores" ahora es un único item que junta prima/ajuste/bono/malus (con sus
       4 subbotones en el drill). El total = suma firmada de las 4 magnitudes. */
    const menorSigned = mkVal(cnt.prima) + abmSigned;
    const menorN = cnt.prima.n + cnt.ajuste.n + cnt.bono.n + cnt.malus.n;
    /* PENDIENTES ahora en 2 segmentos (pedido del usuario): AMARILLO = lo que se va a emitir
       (confirmado en Presup Arg) y CELESTE = lo presupuestado sin confirmar (sin justificar).
       El sub-desglose por concepto (prima/ajuste/bono/malus) aparece al hacer click. */
    const _sufp = useUSD?'u':'a';
    /* Pendientes del desvío: Emisión Confirmada (prioridad) · Presupuesto (mensual, con toggles) ·
       Emisión Pendiente - Sin Fecha (Comparación 2025, dedup por póliza+concepto contra Confirmada). */
    /* Los PENDIENTES (lo que se va a emitir) se cuentan SIEMPRE hasta el mes de corte completo
       (no se recortan por la vista "emisión real / hasta May"); si no, el Confirmado de Jun–Dic
       daría 0. En la vista "emisión real" (fecha) NO se cuenta Proyección Arg. (presupuesto sin
       confirmar); el resto (Confirmada, Comparación 2025, pérdidas, menor) sí, con los MISMOS
       valores que la vista "hasta Dic". */
    const _pendCut = S.mesCorteSet || 12;
    const _proyOff = (selMode==='fecha');
    const _conf = _presupArgGlobal(_sufp, 'confirmado', 12);   /* Emisión Confirmada = pipeline completo (no depende del corte) */
    /* Comparación 2025 ("Sin Fecha") SOLO hasta el último mes con emisión real 2026, y dedup contra
       lo confirmado (por póliza+concepto). */
    const _cut25 = S.lastEmis26 || _pendCut;   /* Sin Fecha: siempre hasta el último mes con emisión real (fijo, no depende del corte) */
    const _p25  = _pend2025Global(polPend, _cut25, _sufp, new Set([..._conf.keys]));
    /* PRESUPUESTO de emisión: suma del presupuesto 2026 mensual de los meses "tildados". Cada mes
       tiene un toggle en el desglose. Por defecto cuentan los meses ≤ corte SIN emisión confirmada
       (los confirmados, ej. junio, van DESTILDADOS porque ya están en "Emisión Confirmada"). */
    const _paMc = presupArgMensual(_sufp).conf;
    const _presArr = S.presArr || Array(12).fill(0);
    state._ejecPresArr = state._ejecPresArr || {}; state._ejecPresArr[_sufp] = _presArr;   /* para el drill por mes */
    state._ejecPresCorte = _pendCut;
    state._ejecPresMes = state._ejecPresMes || {};
    const _presMesDefault = (m)=> (m >= (S.lastEmis26||0) + 2) && (m <= _pendCut);   /* desde julio en adelante (salta junio = se emite este mes), hasta el corte */
    const _presMesOn = (m)=>{ const v = state._ejecPresMes[m]; return (v!==undefined) ? !!v : _presMesDefault(m); };
    let presFull = 0, _presMeses = 0;
    if(_ejecContabOn('pend_presup','mes')){ for(let m=1;m<=12;m++){ if(_presMesOn(m)){ presFull += (_presArr[m-1]||0); _presMeses++; } } }
    const confFull = _ejecContabOn('pend_conf','mes') ? _conf.total : 0;
    const p25Full  = _ejecContabOn('pend_2025','mes') ? _p25.total : 0;
    /* Para el DONUT: en vista "emisión real" (fecha/May) el presupuesto futuro no cuenta. */
    const _confV = confFull;
    const _presV = _proyOff ? 0 : presFull;
    const _p25V  = p25Full;
    /* Comparación de desvíos: valores completos (independientes de la vista). */
    state._ejecPendVals = state._ejecPendVals || {};
    state._ejecPendVals[_sufp] = {conf:confFull, pres:presFull, p25:p25Full};
    /* NETO por vista (idéntico en tarjetas, donut y comparación):
         Dic = emisión real + confirmada + presupuesto + sin fecha − presupuesto hasta corte.
         May = emisión real + confirmada + sin fecha − presupuesto hasta el mes con emisión (sin presupuesto futuro). */
    const _netDic = (S.emis26||0) + confFull + presFull + p25Full - (S.presup26||0);
    const _netMay = (S.emis26||0) + confFull + p25Full - (S.presup26_emi||0);
    state._ejecNet = state._ejecNet || {};
    state._ejecNet[_sufp] = {dic:_netDic, may:_netMay};
    causas = [
      mk('pend_conf','Pendiente - Emisión Confirmada', _confV, _conf.n, '#ffd54a','pendiente'),
      mk('pend_presup','Presupuesto', _presV, _presMeses, APP_CONFIG.colores.pendiente,'pendiente'),
      mk('pend_2025','Emisión Pendiente - Sin Fecha', _p25V, _p25.n, '#4fb0a8','pendiente'),
      mk('perdidas',APP_CONFIG.textos.perdidas, mkVal(cnt.perdidas), cnt.perdidas.n, APP_CONFIG.colores.perdidas),
      mk('menor',APP_CONFIG.textos.menor || 'Menor Emisión', menorSigned, menorN, APP_CONFIG.colores.abm),
    /* Los pendientes siempre figuran aunque su valor sea 0. */
    ].filter(c=>(c.val>1 || c.grupo==='pendiente'))
     /* Orden DESCENDENTE por magnitud (pedido del usuario). "Sin justificar" no está acá: se
        agrega siempre al final (en piePartes). */
     .sort((a,b)=>Math.abs(b.val)-Math.abs(a.val));
  } else {
    const mk = (id,lbl,vSigned,n,col)=>({id,lbl,val:Math.abs(vSigned),vSigned,n,col});
    causas = [
      mk('pendiente',APP_CONFIG.textos.pendiente, S.cPend, S.nPend, APP_CONFIG.colores.pendiente),
      mk('perdidas',APP_CONFIG.textos.perdidas, S.cPerdidas, S.nPerdidas, APP_CONFIG.colores.perdidas),
      mk('menor', APP_CONFIG.textos.menor || 'Menor Emisión', S.cPrimaMin+S.cAjuste+S.cBono+S.cMalus, 0, APP_CONFIG.colores.abm),
    ].filter(c=>c.val>1);
  }

  /* === Estimación de Emisión (editable) ===
     Suma de estimaciones cargadas para pólizas PENDIENTES de esta moneda. Convierte
     parte de "Sin justificar" en "Pendiente" (cap = lo que hoy queda sin justificar). */
  state._ejecEstim = state._ejecEstim || {};
  if(!state._ejecEstim.u) state._ejecEstim.u = {};
  if(!state._ejecEstim.a) state._ejecEstim.a = {};
  state._ejecEstimOpen = state._ejecEstimOpen || {};
  const sufijo = useUSD?'u':'a';
  const estStore = state._ejecEstim[sufijo];
  /* Pendiente YA contado por póliza (en la moneda de la vista). La estimación aporta
     SOLO LA DIFERENCIA contra ese pendiente, para no duplicar: si Advanta ya suma 150k
     en pendientes y estimamos 500k, se agregan 350k. */
  const _pendByClave = {};
  for(const pp of (polPend||[])){
    const inf = pendPolizaInfo(pp, dd.mesCorte);
    _pendByClave[pp.clave] = useUSD ? inf.usd : inf.ars;
  }
  /* Toggles "Contabilizar" (pedido del usuario): "Emisión este mes" (pólizas con dato en el
     Excel/cargado a mano) por defecto SÍ; "Pendiente sin fecha" (sin dato) por defecto NO.
     Si "pendiente sin fecha" NO cuenta (default), su pendiente automático se EXCLUYE del
     desvío (se quita la causa) y la "emisión este mes" toma el valor completo del Excel. */
  state._ejecContab = state._ejecContab || {};
  const _contab = {mes:true, anio:false};
  let estimRaw = 0;
  const _estimDone = new Set();
  if(_contab.mes){
    for(const pp of (polPend||[])){
      if(_estimDone.has(pp.clave)) continue; _estimDone.add(pp.clave);
      const manual = estStore[pp.clave];
      const hasManual = isFinite(manual) && manual>0;
      const excel = _excelEstimVal(pp, sufijo);
      const eff = hasManual ? manual : excel;   /* dato del Excel/cargado = emisión este mes */
      if(!(eff>0)) continue;
      const base0 = _pendByClave[pp.clave] || 0;
      if(!(base0>0.5)){
        const est = estadoPolizaConsolidado(pp, dd.mesCorte);
        if(est==='sin_desvio' || est==='emitido_con_desvio') continue;
        if(pp.tipo2026==='Póliza terminada') continue;
      }
      /* Si el pendiente sin fecha cuenta (toggle año), restamos su base para no duplicar;
         si NO cuenta (default), tomamos el valor completo. */
      const base = _contab.anio ? base0 : 0;
      const diff = eff - base;
      if(diff > 0) estimRaw += diff;
    }
  }
  const _sumaBase = causas.reduce((a,c)=>a+c.val,0);
  const _sinCubrirBase = Math.max(0, dvAbs - _sumaBase);
  const estimEff = Math.min(estimRaw, _sinCubrirBase);

  /* MODELO DE COMPOSICIÓN (pedido del usuario):
       El desvío real (déficit) es −dvAbs (ej. −$21.7MM). Los PENDIENTES que se van a emitir
       lo RECUPERAN (+). El neto = desvío real + lo que recuperan los pendientes:
         neto = −dvAbs + Σ(pendientes contabilizados)
       Como normalmente los pendientes NO alcanzan a cubrir todo el déficit, el neto sigue siendo
       NEGATIVO; si los pendientes superaran el déficit, el neto sería positivo.
     Menor emisión / pólizas que se fueron / "sin justificar" son las partes NO recuperables del
     déficit (rojo −). Los % del donut son share del déficit total (dvAbs) → suman 100%. */
  const _sumPend = causas.filter(c=>c.grupo==='pendiente').reduce((a,c)=>a+((c.vSigned!=null)?c.vSigned:c.val), 0);
  const _netDesvio = -dvAbs + _sumPend;
  const baseTotal = dvAbs || 1;
  const sumaCausas = causas.reduce((a,c)=>a+c.val, 0);
  /* % de cada causa sobre el déficit total (dvAbs). Lo no explicado queda como "sin justificar". */
  const pctDe = (v)=> baseTotal>0 ? (v/baseTotal*100) : 0;
  const pctTxt = (v)=> Math.round(pctDe(v))+'%';
  const sinCubrir = Math.max(0, baseTotal - sumaCausas);
  const pctSinCubrir = pctDe(sinCubrir);
  /* Factor de escala de anchos: si las causas + gris exceden 100% (causas sobre-explican),
     comprimimos proporcionalmente para que el dibujo quepa en la barra (los % de texto
     siguen siendo share-del-total reales). */
  const anchoTotalCausas = pctDe(sumaCausas);
  const escala = (anchoTotalCausas > 100) ? (100/anchoTotalCausas) : 1;
  /* Separar causas de pendiente (las 4) del resto, para la llave. */
  const causasPend = causas.filter(c=>c.grupo==='pendiente');
  const causasOtras = causas.filter(c=>c.grupo!=='pendiente');
  const pv2 = (o)=> o ? (useUSD ? o.totUSD : o.totARS) : 0;
  /* Total de la llave = suma de las causas de pendiente que REALMENTE están en el donut
     (respeta los toggles Contabilizar), para que no quede desfasado. */
  const totalPend = causasPend.reduce((a,c)=>a+c.val,0);
  const pctPendNum = pctDe(totalPend);
  /* Ancho total (en %) que ocupan los segmentos de pendiente (van primeros en la barra). */
  const anchoPend = causasPend.reduce((a,c)=>a+pctDe(c.val)*escala, 0);

  /* Segmento de barra. % en BLANCO adentro, GRANDE y SIN sombreado (pedido del usuario).
     TODOS los segmentos muestran su % (no se omite ninguno, aunque sean finos): la fuente
     se reduce gradualmente para que el número entre en segmentos angostos. */
  const fsSeg = (pctAncho)=> pctAncho>=8 ? 22 : (pctAncho>=4 ? 17 : (pctAncho>=2 ? 13 : 11));
  const seg = (c, ultimo)=>{
    if(c.val<=0) return '';
    const pctReal = pctDe(c.val);          /* % sobre el desvío total (texto) */
    const pctAncho = pctReal * escala;      /* ancho dibujado */
    if(pctAncho < 0.05) return '';          /* prácticamente 0% → no dibujar */
    const fs = fsSeg(pctAncho);
    return `<div title="${c.lbl}: ${Math.round(pctReal)}%" style="width:${pctAncho}%;background:${c.col};height:100%;display:flex;align-items:center;justify-content:center;${ultimo?'':'border-right:2px solid var(--panel)'};font-size:${fs}px;font-weight:800;color:#fff;line-height:1;overflow:visible;white-space:nowrap">${Math.round(pctReal)}%</div>`;
  };
  /* Segmento GRIS para la porción no cubierta del desvío (sin justificar). Muestra el %
     pero NO lleva etiqueta ni texto justificativo. */
  const segGris = ()=>{
    if(pctSinCubrir < 0.05) return '';
    const pctAncho = pctSinCubrir * escala;
    const fs = fsSeg(pctAncho);
    return `<div title="Sin justificar: ${Math.round(pctSinCubrir)}%" style="width:${pctAncho}%;background:#c5cdd9;height:100%;display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:800;color:#5a6b85;line-height:1;overflow:visible;white-space:nowrap">${Math.round(pctSinCubrir)}%</div>`;
  };

  /* Leyenda única. */
  const chip = (c)=>`<span style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);white-space:nowrap">
      <span style="width:14px;height:14px;border-radius:3px;background:${c.col};flex-shrink:0;border:1px solid rgba(0,0,0,.12)"></span>
      ${c.lbl} · <strong style="color:var(--accent-3);font-family:var(--font-mono);font-size:13.5px">${pctTxt(c.val)}</strong></span>`;

  /* Tarjeta de causa */
  const tarjeta = (c)=>{
    const clickable = esPrimaria;
    /* NUEVO modelo: los PENDIENTES suman a favor (verde +) — es emisión por venir que recupera
       el desvío. MENOR EMISIÓN y PÓLIZAS QUE SE FUERON restan (rojo −). "Menor Emisión" lleva su
       signo neto (si en realidad emitió de más, juega a favor +). */
    const esBonoPend = (c.id==='pend_bono');
    const esPendGrupo = (c.grupo==='pendiente');   /* los 3 pendientes nuevos */
    const esDesvioFijo = !esBonoPend && (c.id==='pendiente' || c.id==='perdidas');
    const vS = (c.vSigned!=null)?c.vSigned:c.val;
    let sgn, valColor;
    if(esBonoPend){ sgn='+'; valColor='var(--pos)'; }
    else if(esPendGrupo){ sgn='+'; valColor='var(--pos)'; }   /* pendientes suman + */
    else if(esDesvioFijo){ sgn='−'; valColor='var(--neg)'; }
    else { const aFavor = vS>0; sgn = aFavor?'+':'−'; valColor = aFavor?'var(--pos)':'var(--neg)'; }
    return `<div style="background:var(--bg-2);border-radius:8px;padding:12px 14px;border-left:5px solid ${c.col};${clickable?'cursor:pointer':''}" ${clickable?`onclick="toggleEjecCausa('${c.id}')"`:''}>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent-3);font-weight:700;margin-bottom:4px"><span style="width:12px;height:12px;border-radius:3px;background:${c.col};flex-shrink:0"></span>${c.lbl}${c.n>0?` <span style="color:var(--ink-3);font-weight:400">(${c.n} pól.)</span>`:''}</div>
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <div style="font-size:23px;font-weight:700;color:${valColor};font-family:var(--font-mono);line-height:1">${sgn}${FMTc(c.val)}</div>
        <div style="font-size:17px;font-weight:800;color:var(--accent-3);font-family:var(--font-mono)">${pctTxt(c.val)}</div>
      </div>
      ${clickable?`<div style="font-size:10px;color:var(--accent);margin-top:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:700">▶ ver pólizas</div>`:''}
    </div>`;
  };

  /* LLAVE minimalista que abarca el ancho de los 4 pendientes. Texto del total ARRIBA,
     separado del gráfico; debajo una línea fina con ganchitos en los extremos. */
  const braceColor = '#4ba3c7';
  const llave = (anchoPend>0.5) ? `
    <div style="position:relative;width:${anchoPend}%;margin-bottom:10px">
      <div style="text-align:center;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:6px;white-space:nowrap">
        Pendiente de emisión · <span style="font-family:var(--font-mono);color:${braceColor};font-weight:800">${FMTc(totalPend)}</span> · <span style="color:${braceColor};font-weight:800">${Math.round(pctPendNum)}%</span> del desvío
      </div>
      <div style="height:8px;border:1.5px solid ${braceColor};border-bottom:none;border-radius:5px 5px 0 0;opacity:.7"></div>
    </div>` : '';

  /* Pie chart del desvío: cada causa como porción, una porción gris al final
     si hay una parte "sin justificar". Cache para render post-innerHTML. */
  const pieIdDes = `ejecDesvioPie_${useUSD?'u':'a'}`;
  const piePartes = causas.map(c=>({lbl:c.lbl, col:c.col, val:c.val, n:c.n, pctOf:pctDe(c.val)}));
  if(pctSinCubrir>=0.5){
    piePartes.push({lbl:'Sin justificar', col:'#c5cdd9', val:sinCubrir, n:0, pctOf:pctSinCubrir});
  }
  state._ejecDesvioPies = state._ejecDesvioPies || {};
  state._ejecDesvioPies[pieIdDes] = {partes:piePartes, useUSD};
  /* Leyenda a la derecha del pie: triangulito + puntito + nombre · n pól · % · total
     (clickeable abre el desglose en el área común abajo). Las causas con id real
     (pend_*, perdidas, menor) son clickeables; "Sin justificar" no. */
  const leyendaDes = piePartes.map(p=>{
    const causa = causas.find(c=>c.lbl===p.lbl);
    const clickable = !!causa;
    const id = causa ? causa.id : null;
    const totSigned = causa ? (causa.vSigned!=null?causa.vSigned:causa.val) : p.val;
    /* NUEVO modelo: pendientes suman a favor (verde +); pérdidas restan (rojo −); menor lleva su
       signo neto. */
    const totColor = clickable
      ? (causa.grupo==='pendiente' ? 'var(--pos)'
          : (id==='pendiente'||id==='perdidas') ? 'var(--neg)'
          : (totSigned>0?'var(--pos)':'var(--neg)'))
      : 'var(--ink-3)';
    const sgnLeg = id==='pend_bono' ? ''
      : (p.lbl==='Sin justificar' ? '−'
        : (causa && causa.grupo==='pendiente' ? '+'
          : (clickable && (id==='pendiente'||id==='perdidas') ? '−'
            : (totSigned>=0?'+':'−'))));
    const nPolStr = causa && causa.n>0 ? ` <span style="color:var(--ink-3);font-weight:500;font-size:12.5px">· ${causa.n} ${id==='pend_presup'?'meses':'pól.'}</span>` : '';
    /* Los 4 conceptos PENDIENTES son editables: el ▸ se reemplaza por ✎ y al clickear se
       abre el drill editable. "Sin justificar" ya NO es editable (no lleva ✎). */
    const esPendConcepto = !!(causa && causa.grupo==='pendiente');
    const isClk = clickable;
    const click = clickable ? `onclick="toggleEjecCausa('${id}')"` : '';
    const carId = clickable ? `id="ejecCausaCar_${id}"` : '';
    const icon = esPendConcepto ? '✎' : (clickable ? '▸' : '');
    const iconColor = esPendConcepto ? '#1e88c7' : 'var(--accent)';
    return `<div ${click} style="display:grid;grid-template-columns:14px 14px 1fr auto auto;column-gap:10px;align-items:center;padding:4px 8px;border-radius:5px;${isClk?'cursor:pointer;':''}font-size:13.5px;line-height:1.25;border:1px solid transparent" ${isClk?`onmouseover="this.style.background='var(--bg-2)';this.style.borderColor='var(--line)'" onmouseout="this.style.background='';this.style.borderColor='transparent'"`:''}>
      <span ${carId} style="font-size:11px;color:${iconColor}">${icon}</span>
      <span style="width:13px;height:13px;border-radius:50%;background:${p.col};border:1px solid rgba(0,0,0,.08)"></span>
      <span style="color:var(--accent-3);font-weight:700">${p.lbl}${nPolStr}</span>
      <span style="font-family:var(--font-mono);font-weight:800;color:var(--accent-3);min-width:38px;text-align:right">${Math.round(p.pctOf)}%</span>
      <span style="font-family:var(--font-mono);font-weight:800;color:${totColor};min-width:82px;text-align:right">${sgnLeg}${FMTc(Math.abs(totSigned))}</span>
    </div>`;
  }).join('');

  /* Panel editable de "Sin justificar": pólizas pendientes de esta moneda con input
     de estimación + botón OK (toma la proyección del Excel; hoy estima el pendiente). */
  let estimPanel = '';
  if(state._ejecEstimOpen[sufijo] && dd && polPend){
    /* TODAS las pólizas con algún concepto pendiente (prima/ajuste/malus). Se incluyen
       si tienen pendiente en CUALQUIER moneda — misma fuente que la leyenda del Pendiente. */
    const cLbl = {'Prima mínima':'Prima','Ajuste':'Ajuste','Malus':'Malus','Bono':'Bono'};
    /* Lista = pólizas PENDIENTES por fecha + pólizas que NO están pendientes por fecha pero
       que igual hay que emitir (las marcamos en el Excel, o cargadas a mano) y NO están
       emitidas ni terminadas. Todas suman. Se ordena por VALOR de mayor a menor.
       El BONO se contempla (en negativo: resta) en el valor y se muestra como concepto. */
    const lista = (polPend||[]).map(p=>{
      const infNoBono = pendPolizaInfo(p, dd.mesCorte);            /* para decidir si es pendiente */
      const inf = pendPolizaInfo(p, dd.mesCorte, true);            /* con bono, para mostrar/sumar */
      const pendV = useUSD ? inf.usd : inf.ars;
      const esPend = Math.max(infNoBono.ars||0, infNoBono.usd||0) > 0.5;
      const ex = _excelEstimVal(p, sufijo);
      const manual = estStore[p.clave];
      const hasManual = isFinite(manual) && manual>0;
      let incluir = esPend, soloEstim = false;
      if(!esPend && (ex>0 || hasManual)){
        const est = estadoPolizaConsolidado(p, dd.mesCorte);
        const yaEmit = (est==='sin_desvio' || est==='emitido_con_desvio');
        const terminada = (p.tipo2026==='Póliza terminada');
        if(!yaEmit && !terminada){ incluir = true; soloEstim = true; }
      }
      /* Valor EFECTIVO (editable, pre-cargado): lo cargado a mano; si no, el del Excel (lo pisa
         el automático); si no, el pendiente automático. */
      const eff = hasManual ? manual : (ex>0 ? ex : (esPend ? pendV : 0));
      /* SPLIT: "Se emite este mes" = hay dato en el Excel o cargado a mano; si no, "Pendiente
         emisión en el año". */
      const seEmite = (ex>0 || hasManual);
      return {p, pendV, eff, ex, hasManual, concepts:inf.concepts, esPend, soloEstim, incluir, seEmite, sortVal: eff||pendV||ex};
    }).filter(x=>x.incluir).sort((a,b)=> b.sortVal - a.sortVal);
    const nPrima = lista.filter(x=>x.esPend && x.concepts.includes('Prima mínima')).length;
    const nAjuste = lista.filter(x=>x.esPend && x.concepts.includes('Ajuste')).length;
    const nMalus = lista.filter(x=>x.esPend && x.concepts.includes('Malus')).length;
    const nBono = lista.filter(x=>x.esPend && x.concepts.includes('Bono')).length;
    const pctTomado = dvAbs>0 ? Math.round(estimEff/dvAbs*100) : 0;
    /* Fila con input PRE-CARGADO con el valor efectivo (editable). */
    const fmtRow = (x)=>{
      const {p, pendV, eff, concepts, esPend} = x;
      const e = estStore[p.clave]; const hasM = isFinite(e)&&e>0;
      const valShown = hasM ? e : eff;
      const eDisp = (valShown>0) ? Number(valShown).toLocaleString('es-AR',{maximumFractionDigits:0}) : '';
      const tipos = (concepts&&concepts.length) ? concepts.map(c=>cLbl[c]||c).join(' · ') : '—';
      const infoLine = esPend
        ? `Pendiente: <strong style="color:var(--neg)">${fmtCompact(pendV,useUSD)}</strong> <span style="color:var(--neg);font-weight:700">(${tipos})</span>`
        : `<strong style="color:#b9760f">A emitir</strong> <span style="color:var(--ink-3)">· no pendiente por fecha, pero debe emitirse</span>`;
      const monCol = p.moneda==='US'?'var(--pos)':'var(--accent)';
      return `<div style="display:grid;grid-template-columns:1fr 124px;gap:8px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line)">
        <div style="min-width:0">
          <span style="font-size:13px;font-weight:800;color:var(--accent-3);background:var(--bg-2);padding:2px 7px;border-radius:5px">${fmtPoliza(p.poliza)}</span>
          <span style="font-size:10.5px;font-weight:800;color:${monCol};margin-left:5px" title="Moneda original">${p.moneda||'—'}</span>
          <span style="color:var(--ink-1);font-size:12.5px;font-weight:600;margin-left:5px">${(p.asegurado||'').substring(0,22)}</span>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:2px">${infoLine}</div>
        </div>
        <span style="display:flex;align-items:center;gap:4px"><span style="font-size:12px;color:var(--ink-3)" title="Editable">✎</span><input type="text" inputmode="decimal" value="${eDisp}" placeholder="${useUSD?'US':'$'}" onchange="setEjecEstim('${sufijo}','${p.clave}', this.value)" style="width:100%;padding:5px 7px;font-family:var(--font-mono);font-size:12.5px;border:1.5px solid ${hasM?'var(--pos)':'var(--line-2)'};border-radius:6px;text-align:right;color:var(--ink);background:var(--panel)" /></span>
      </div>`;
    };
    /* DOS secciones: "Se emite este mes" (con dato del Excel/cargado) y "Pendiente emisión en el
       año" (el resto). Cada una con su total y % del desvío. */
    const grpSe = lista.filter(x=>x.seEmite);
    const grpAnio = lista.filter(x=>!x.seEmite);
    const totSe = grpSe.reduce((a,x)=>a+(x.eff||0),0);
    const totAnio = grpAnio.reduce((a,x)=>a+(x.eff||0),0);
    const pctSe = dvAbs>0?Math.round(totSe/dvAbs*100):0;
    const pctAnio = dvAbs>0?Math.round(totAnio/dvAbs*100):0;
    /* Encabezado de columna con su total, % y el toggle "Contabilizar (SÍ/NO)". */
    const colHead = (titulo, col, tot, pct, n, which, on)=>`<div style="background:${col}1a;border-bottom:1px solid var(--line);padding:5px 7px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:${col};text-transform:uppercase;letter-spacing:.03em">${titulo} <span style="color:var(--ink-3);font-weight:600;text-transform:none">· ${n} pól.</span></span>
        <button onclick="ejecToggleContab('${which}')" title="Contabilizar este grupo en el desvío" style="font-size:9.5px;font-weight:800;border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap;border:1.5px solid ${on?'var(--pos)':'var(--line-2)'};background:${on?'var(--pos)':'var(--panel)'};color:${on?'#fff':'var(--ink-2)'}">Contabilizar: ${on?'SÍ':'NO'}</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:${col}">${fmtCompact(tot,useUSD)} <span style="color:var(--ink-3);font-weight:700">(${pct}% del desvío)</span></div>
    </div>`;
    const colHTML = (titulo,col,tot,pct,items,which,on)=>`<div style="border:1px solid var(--line-2);border-radius:8px;overflow:hidden;${on?'':'opacity:.55'}">
      ${colHead(titulo,col,tot,pct,items.length,which,on)}
      ${items.length? items.map(fmtRow).join('') : '<div style="padding:10px;font-size:12px;color:var(--ink-3);font-style:italic">— sin pólizas —</div>'}
    </div>`;
    /* DOS COLUMNAS: izquierda "Se emite este mes" (con dato del Excel/cargado), derecha
       "Pendiente sin fecha" (el resto). Cada una con su total, % y toggle Contabilizar. */
    const rows = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px">
      ${colHTML('Se emite este mes','#2d9b6a',totSe,pctSe,grpSe,'mes',_contab.mes)}
      ${colHTML('Pendiente sin fecha','#4ba3c7',totAnio,pctAnio,grpAnio,'anio',_contab.anio)}
    </div>`;
    const excedente = Math.max(0, estimRaw - _sinCubrirBase);
    estimPanel = `<div style="margin-top:14px;border:1.5px solid #c5cdd9;border-radius:8px;overflow:hidden">
      <div style="padding:10px 14px;background:rgba(197,205,217,.30);color:#5a6b85;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:11px;color:#7a879c;font-weight:600;line-height:1.3"><strong style="color:#5a6b85;font-size:11.5px">✎ Pendiente · emisión a tomar</strong> · ${lista.length} pól. · Prima ${nPrima} · Ajuste ${nAjuste}${nBono>0?` · Bono ${nBono}`:''} · Malus ${nMalus}</span>
        <span style="display:flex;align-items:center;gap:12px;white-space:nowrap;flex-wrap:wrap">
          <span style="display:flex;flex-direction:column;gap:3px">
            <button onclick="ejecEstimOkAll('${sufijo}')" title="Autocompleta TODAS con la proyección del Excel (bloque AF–AH). Respeta los valores cargados a mano." style="padding:7px 14px;font-size:12.5px;font-weight:800;border-radius:7px;cursor:pointer;border:1.5px solid var(--pos);background:var(--pos);color:#fff">OK ✓ autocompletar todas</button>
            <button onclick="ejecEstimClearAll('${sufijo}')" title="Borra todas las estimaciones cargadas" style="padding:3px 10px;font-size:10px;font-weight:700;border-radius:6px;cursor:pointer;border:1px solid var(--line-2);background:var(--panel);color:#7a879c">Limpiar todo</button>
          </span>
          <span style="text-align:right;background:var(--panel);border:1px solid var(--line-2);border-radius:7px;padding:6px 12px">
            <span style="font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:#7a879c">Total a emitir (estimado)</span><br>
            <span style="font-family:var(--font-mono);font-size:20px;font-weight:800;color:var(--accent-3)">${fmtCompact(estimRaw,useUSD)}</span>
            ${excedente>1?`<br><span style="font-size:10px;font-weight:700;color:#b9760f">supera lo sin justificar por ${fmtCompact(excedente,useUSD)} → se compensa (emisión de más)</span>`:''}
          </span>
          <span style="text-align:right">
            <span style="font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:#7a879c">Desvío que se está tomando</span><br>
            <span style="font-family:var(--font-mono);font-size:24px;font-weight:800;color:var(--pos)">${fmtCompact(estimEff,useUSD)}</span>
            <span style="font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--pos)">(${pctTomado}% del desvío)</span>
          </span>
        </span>
      </div>
      ${rows || '<div style="padding:12px 14px;font-size:13px;color:var(--ink-3);font-style:italic">— sin pólizas pendientes —</div>'}
    </div>`;
  }

  /* Selector de los DOS desvíos (cards arriba del donut). Al tocar uno, el donut se recalcula
     para ese corte. */
  const _MES3=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const _mLastD=_MES3[(S.lastEmis26||1)-1]||'—', _mCorteD=_MES3[(S.mesCorteSet||12)-1]||'Dic';
  /* Las tarjetas muestran el NETO (igual que la Comparación y el donut): convención dv>0 = déficit. */
  const _net = (state._ejecNet && state._ejecNet[useUSD?'u':'a']) || {dic:-(S.desvio||0), may:-(S.desvio_emi||0)};
  const _dvCorte = -_net.dic, _dvEmi = -_net.may;
  const _pctEmi = S.presup26_emi>0 ? _dvEmi/S.presup26_emi*100 : null;
  const _pctCorte = S.presup26>0 ? _dvCorte/S.presup26*100 : null;
  const _selCard = (mode,titulo,sub,dv,pct)=>{ const sel=(selMode===mode);
    return `<div onclick="window.ejecSelDesvio('${mode}')" style="flex:1;cursor:pointer;background:${sel?'rgba(217,71,71,.13)':'rgba(120,135,160,.07)'};border:1.5px solid ${sel?'var(--neg)':'var(--line-2)'};border-radius:9px;padding:6px 11px;transition:all .12s">
      <div style="font-size:10px;color:${sel?'var(--neg)':'var(--ink-2)'};text-transform:uppercase;letter-spacing:.03em;font-weight:800">${titulo}${sub?' · '+sub:''}</div>
      <div style="display:flex;align-items:baseline;gap:7px;margin-top:1px">
        <span style="font-size:16px;font-weight:800;color:var(--neg);font-family:var(--font-mono)">${dv>0?'−':'+'}${FMTc(Math.abs(dv))}</span>
        <span style="font-size:11px;font-weight:800;color:var(--neg);font-family:var(--font-mono)">${pct!=null?'('+(pct>0?'−':'+')+Math.abs(Math.round(pct))+'%)':''}</span>
      </div>
    </div>`; };
  /* Primero HASTA DIC (corte del botón 1°), después emisión real. Achicadas y separadas para
     diferenciarlas del total. */
  const _selectorCards = `<div style="display:flex;gap:18px;margin-bottom:10px;max-width:300px">
    ${_selCard('corte','Desvío Acumulado',_mCorteD, _dvCorte, _pctCorte)}

  return `<div style="margin-top:${dual?8:2}px">
    ${dual?`<div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:4px">${mLbl}</div>`:''}
    ${_selectorCards}
    ${(()=>{
      /* COMPARACIÓN DE DESVÍOS: IZQUIERDA = presupuesto (hasta corte y hasta mes con emisión) +
         emisión real; MEDIO (amarillo) = "se emite este mes" (Emisión Confirmada) y "Estimaciones"
         (Proyección Arg. + Comparación 2025); DERECHA = desvío resultante:
           · hasta fin de año = (emisión real + confirmada + estimaciones) − presupuesto hasta corte.
           · se emite este mes = (emisión real + confirmada) − presupuesto hasta el mes con emisión. */
      const sufx = useUSD?'u':'a';
      const presup = S.presup26 || 0;             /* presupuesto acumulado hasta el botón de corte */
      const presupEmi = S.presup26_emi || 0;      /* presupuesto hasta el último mes con emisión real 2026 */
      const emisReal = S.emis26 || 0;
      const pv = (state._ejecPendVals && state._ejecPendVals[sufx]) || {conf:0,pres:0,p25:0};
      const pendMes   = pv.conf;                  /* se emite este mes = Emisión Confirmada */
      const pendEstim = pv.pres + pv.p25;         /* Presupuesto + Sin Fecha */
      const desvAnio = (emisReal + pendMes + pendEstim) - presup;   /* vs presupuesto hasta corte (incluye proyección + sin fecha) */
      const desvMes  = (emisReal + pendMes + pv.p25) - presupEmi;   /* vs presupuesto hasta mes con emisión: confirmada + sin fecha (sin proyección) */
      const _mLast  = (S.lastEmis26>0) ? MESES[S.lastEmis26-1] : '—';
      const _mCorte = (S.mesCorteSet>0) ? MESES[S.mesCorteSet-1] : 'Dic';
      const fv = (v)=>FMTc(Math.abs(v));
      const card = (bg,fg,lbl,sub,inner)=>`<div style="flex:1;background:${bg};border-radius:9px;padding:6px 11px;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:10px;color:${fg};text-transform:uppercase;letter-spacing:.03em;font-weight:800">${lbl}${sub?' · '+sub:''}</div>
        ${inner}</div>`;
      const valDiv = (color,txt)=>`<div style="font-size:16px;font-weight:800;color:${color};line-height:1;font-family:var(--font-mono);margin-top:2px">${txt}</div>`;
      const cardBlue  = (lbl,sub,val)=> card('rgba(30,111,217,.10)','var(--accent)',lbl,sub, valDiv('var(--accent-3)',FMTc(val)));
      const cardEmis  = (lbl,sub,val)=> card('rgba(45,155,106,.12)','var(--pos)',lbl,sub, valDiv('var(--pos)',FMTc(val)));
      const cardYellow= (lbl,sub,val)=> card('rgba(255,193,7,.16)','#b8860b',lbl,sub, valDiv('#b8860b','+'+fv(val)));
      const cardDesv  = (lbl,sub,val,base)=>{ const neg=val<0; const c=neg?'var(--neg)':'var(--pos)';
        const pct = base ? `(${neg?'−':'+'}${Math.round(Math.abs(val/base*100))}%)` : '';
        const inner = `<div style="display:flex;align-items:baseline;gap:7px;margin-top:2px"><span style="font-size:16px;font-weight:800;color:${c};font-family:var(--font-mono)">${neg?'−':'+'}${fv(val)}</span><span style="font-size:11.5px;font-weight:800;color:${c};font-family:var(--font-mono)">${pct}</span></div>`;
        return card(neg?'rgba(217,71,71,.10)':'rgba(45,155,106,.10)', c, lbl, sub, inner); };
      const flecha = (s)=>`<div style="display:flex;align-items:center;color:var(--ink-3);font-size:24px;font-weight:300">${s}</div>`;
      /* Según el mes seleccionado arriba (Dic = 'corte' / May = 'fecha'): se muestra solo el
         Presupuesto y el Desvío de ESE mes; el resto (Emisión Real, pendientes) igual para ambos. */
      const esCorte = (selMode!=='fecha');
      return `<div style="margin-top:4px;border-top:1px solid var(--line);padding-top:6px">
        <div style="font-size:11.5px;font-weight:800;color:var(--accent-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Comparación de desvíos</div>
        <div style="display:flex;align-items:stretch;gap:8px">
          <div style="flex:1.05;display:flex;flex-direction:column;gap:6px;justify-content:center">
            ${esCorte ? cardBlue('Presupuesto Acumulado',_mCorte,presup) : cardBlue('Presupuesto Acumulado',_mLast,presupEmi)}
            ${cardEmis('Emisión Real 2026',_mLast,emisReal)}
          </div>
          ${flecha('+')}
          <div style="flex:1.15;display:flex;flex-direction:column;gap:6px;justify-content:center">
            ${cardYellow('Pendiente · se emite este mes','',pendMes)}
            ${cardYellow('Presupuesto + Sin Fecha','',pendEstim)}
          </div>
          ${flecha('=')}
          <div style="flex:1.15;display:flex;flex-direction:column;gap:6px;justify-content:center">
            ${esCorte ? cardDesv('Desvío Acumulado',_mCorte,desvAnio, presup) : cardDesv('Desvío Acumulado',_mLast,desvMes, presupEmi)}
          </div>
        </div>
      </div>`;
    })()}
    <div style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px"></div>
    ${causas.length>0 ? `
    <div style="display:grid;grid-template-columns:minmax(220px,280px) 1fr;gap:26px;align-items:center;margin-bottom:4px">
      <div style="width:100%;max-width:260px;justify-self:center"><canvas id="${pieIdDes}" style="max-height:215px"></canvas></div>
      <div>${leyendaDes}</div>
    </div>` : ''}
  </div>`;
}

/* Renderiza los pie charts del Desvío de Emisión guardados en state._ejecDesvioPies. */
function renderEjecDesvioPies(){
  if(typeof Chart === 'undefined') return;
  const pies = state._ejecDesvioPies || {};
  for(const id of Object.keys(pies)){
    const canvas = document.getElementById(id);
    if(!canvas) continue;
    const {partes, useUSD} = pies[id];
    /* Para el gráfico unificamos las porciones del MISMO color (los 3
       pendientes celeste se ven como UNA sola porción), pero la leyenda
       a la derecha conserva el desglose individual. */
    const merged = [];
    const idxByCol = new Map();
    for(const p of partes){
      if(idxByCol.has(p.col)){
        const i = idxByCol.get(p.col);
        merged[i].val += p.val;
        merged[i].lbl = (merged[i].lbl==='Pendiente de emisión' || /pendiente/i.test(merged[i].lbl)) ? 'Pendiente de emisión' : merged[i].lbl;
      } else {
        idxByCol.set(p.col, merged.length);
        merged.push({lbl:p.lbl, col:p.col, val:p.val});
      }
    }
    /* Renombrar la porción celeste agrupada para que el tooltip diga
       "Pendiente de emisión" en vez de la sub-categoría que tocara primero. */
    const pendIdx = merged.findIndex(m=>m.col==='#7ec8e3' || /pendiente/i.test(m.lbl));
    if(pendIdx>=0) merged[pendIdx].lbl = 'Pendiente de emisión';
    drawChart(id, {
      type:'doughnut',
      data:{
        labels: merged.map(p=>p.lbl),
        datasets:[{
          data: merged.map(p=>p.val),
          backgroundColor: merged.map(p=>p.col),
          borderColor:'#fff', borderWidth:2,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:'55%',
        layout:{padding:{top:18,right:30,bottom:18,left:30}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:(ctx)=> `${ctx.label}: ${fmtCompact(ctx.parsed, useUSD)}`}}
        }
      },
      plugins:[pctOnArcPlugin]
    });
  }
}

/* === Estimación de Emisión (editable, dentro de "Sin justificar" del Desvío) ===
   El usuario carga una estimación de emisión por póliza pendiente (o toca OK para
   tomar la proyección del Excel — AF19). Lo cargado convierte "Sin justificar" en
   "Pendiente". Estado por vista: state._ejecEstim = { u:{clave:val}, a:{clave:val} }.
   Solo impacta cuando hay valor / se toca OK. */
function _ejecEstimStore(suf){
  state._ejecEstim = state._ejecEstim || {};
  if(!state._ejecEstim.u) state._ejecEstim.u = {};
  if(!state._ejecEstim.a) state._ejecEstim.a = {};
  return state._ejecEstim[suf];
}
window.setEjecEstim = function(suf, clave, raw){
  const st = _ejecEstimStore(suf);
  /* Formato es-AR: el punto es separador de MILES y la coma es decimal. Quitamos los puntos
     y convertimos la coma decimal a punto antes de parsear. */
  const limpio = String(raw==null?'':raw).replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'');
  const v = parseFloat(limpio);
  if(isFinite(v) && v!==0) st[clave] = v; else delete st[clave];
  /* Editar un pendiente debe recalcular el desvío, los conceptos y el GRÁFICO (no solo el
     drill): redibujamos el ejecutivo completo y re-abrimos el mismo drill. */
  _ejecRerenderConDrill();
};
/* Redibuja todo el ejecutivo (donut + leyenda + totales) y vuelve a abrir el drill que
   estuviera abierto, sin perder el contexto del usuario. */
/* Selector de los dos desvíos: cambia el corte del donut y re-renderiza la sección. */
window.ejecSelDesvio = function(mode){
  state._ejecDesvioSel = (mode==='fecha') ? 'fecha' : 'corte';
  if(typeof renderEjecutivo==='function') renderEjecutivo();
};
function _ejecRerenderConDrill(){
  const panel = document.getElementById('ejecCausaDetalle');
  const openId = panel ? panel.dataset.open : '';
  if(typeof drawEjecutivo==='function') drawEjecutivo();
  if(openId && typeof toggleEjecCausa==='function'){
    const p2 = document.getElementById('ejecCausaDetalle');
    if(p2){ p2.dataset.open=''; toggleEjecCausa(openId); }
  }
}
/* OK GENERAL: autocompleta TODAS las pendientes con la proyección del Excel (bloque AF–AH),
   buscando por número de póliza o nombre de asegurado. Respeta las estimaciones ya cargadas
   a mano (solo completa las vacías). Solo coloca valor si el Excel tiene algo para esa póliza. */
window.ejecEstimOkAll = function(suf){
  const st = _ejecEstimStore(suf);
  const ctx = state._ejecDrillCtx || {};
  const pol = ctx.pol || state.polizas || [];
  const mesCorte = ctx.mesCorte || 0;
  for(const p of pol){
    if(st[p.clave]!=null) continue;                          /* respetar lo cargado a mano */
    const inf = pendPolizaInfo(p, mesCorte);
    const esPend = Math.max(inf.ars||0, inf.usd||0) > 0.5;
    if(!esPend){
      /* No pendiente por fecha: solo se autocompleta si NO está emitida ni terminada
         (es algo que igual hay que emitir y lo marcamos en el Excel). */
      const est = estadoPolizaConsolidado(p, mesCorte);
      if(est==='sin_desvio' || est==='emitido_con_desvio') continue;
      if(p.tipo2026==='Póliza terminada') continue;
    }
    const ex = _excelEstimVal(p, suf);
    if(isFinite(ex) && ex>0) st[p.clave] = ex;
  }
  if(typeof drawEjecutivo==='function') drawEjecutivo();
};
/* Limpia todas las estimaciones cargadas (manuales y del Excel) de esta moneda. */
window.ejecEstimClearAll = function(suf){
  state._ejecEstim = state._ejecEstim || {};
  state._ejecEstim[suf] = {};
  if(typeof drawEjecutivo==='function') drawEjecutivo();
};
/* Toggle "Contabilizar" de cada grupo del pendiente: 'mes' (Emisión este mes) o 'anio'
   (Pendiente sin fecha). Controla si ese grupo justifica el desvío. */
window.ejecToggleContab = function(ck, which){
  state._ejecContab = state._ejecContab || {};
  const key = ck+'_'+which;
  state._ejecContab[key] = !_ejecContabOn(ck, which);
  /* Contabilizar SÍ/NO debe sumar/restar ese grupo en el desvío, los conceptos y el GRÁFICO:
     redibujamos el ejecutivo completo y re-abrimos el drill. */
  _ejecRerenderConDrill();
};
window.ejecEstimOk = function(suf, clave, pendVal){
  const st = _ejecEstimStore(suf);
  if(st[clave]!=null){ delete st[clave]; }
  else {
    /* OK = tomar la "Proyección de Emisión" del Excel (bloque AF–AH), buscando primero por
       NÚMERO DE PÓLIZA y, si no, por NOMBRE de asegurado (suma Prima Mínima + Ajuste + Malus).
       EXCLUSIVO: solo coloca un valor SI el Excel tiene cargado algo para esa póliza. Si no
       hay valor, el OK queda VACÍO (se completa a mano en el HTML). */
    let ex = null;
    if(state._ejecProyEmis){
      const p = (state.polizas||[]).find(x=>x.clave===clave || x.poliza===clave);
      let o = null;
      if(p){
        const tryKeys = [_normProyKey(p.poliza), _digitsKey(p.poliza), _normProyKey(p.asegurado)];
        for(const k of tryKeys){ if(k && state._ejecProyEmis[k]){ o = state._ejecProyEmis[k]; break; } }
      }
      if(o) ex = (suf==='u') ? o.usd : o.ars;
    }
    if(isFinite(ex) && ex>0) st[clave] = ex;  /* sin valor en el Excel → queda vacío */
  }
  if(typeof drawEjecutivo==='function') drawEjecutivo();
};
window.toggleEjecEstim = function(suf){
  state._ejecEstimOpen = state._ejecEstimOpen || {};
  state._ejecEstimOpen[suf] = !state._ejecEstimOpen[suf];
  if(typeof drawEjecutivo==='function') drawEjecutivo();
};

/* Incrementos / compensaciones (desvío negativo) o detalle sobre-cumplimiento (positivo) */
function ejecEmitido(S, useUSD, dual){
  const FMTc=(v)=>fmtCompact(v,useUSD);
  const mLbl=useUSD?'USD':'ARS$';
  const sufijo = useUSD?'u':'a';
  /* Cada categoría con su color identificatorio para la barra apilada. Paleta
     armonizada: ámbar para renovaciones (reemplazando el verde), azules más
     suaves para anualidades, naranja para ajuste, púrpura medio para malus,
     rojo apagado para bono, verde apagado para pólizas nuevas y gris para AA. */
  const cats = [
    {key:'ren',      lbl:'Renovaciones',                       col:'#e89b1e', esBono:false},
    {key:'seg',      lbl:'Segunda anualidad',                  col:'#88bfe6', esBono:false},
    {key:'ter',      lbl:'Tercera anualidad',                  col:'#5887c2', esBono:false},
    {key:'ajuste',   lbl:'Ajuste',                             col:'#d4751f', esBono:false},
    {key:'malus',    lbl:'Malus',                              col:'#9b6ec9', esBono:false},
    {key:'bono',     lbl:'Bono',                               col:'#c95252', esBono:true},
    {key:'nuevas',   lbl:'Pólizas nuevas',                     col:'#6fb88e', esBono:false},
    {key:'anualant', lbl:'Corr. Anualidad Anterior',col:'#8b8fa3', esBono:false},
  ];
  const colMap = Object.fromEntries(cats.map(c=>[c.key, c]));
  const show25 = state._ejecEmiShow25 !== false; /* predeterminado: activado */
  /* Construir items con datos y filtrar los vacíos. El total 2025 del concepto se
     reconstruye sumando ars25/usd25 de los registros de cada categoría (acumulado al
     mismo corte), para comparar 2025 vs 2026 cuando 'Mostrar 2025' está activo. */
  /* Set 2025 por concepto (mismo que usa el drill) → totales y conteo 2025 consistentes. */
  const cs25 = state._ejecCS25 || {};
  const items = cats.map(c=>{
    const data = S.emitidoCats ? S.emitidoCats[c.key] : null;
    const tot = data ? data.total : 0;
    const n = data ? data.polizas.length : 0;
    const set25 = cs25[c.key] || [];
    const tot25 = set25.reduce((a,r)=> a + (useUSD ? (r.val_usd||0) : (r.val_ars||0)), 0);
    const n25 = set25.length;
    const totSigned = c.esBono ? -Math.abs(tot) : tot;
    const tot25Signed = c.esBono ? -Math.abs(tot25) : tot25;
    return {...c, tot, n, n25, totSigned, tot25Signed, absVal:Math.abs(totSigned)};
  }).filter(it=> it.n>0 || it.absVal>1);
  /* Orden de MAYOR a MENOR por valor absoluto (pedido del usuario). */
  items.sort((a,b)=> b.absVal - a.absVal);
  /* Total absoluto para % de la barra: suma de magnitudes de cada item. */
  const totalAbs = items.reduce((a,it)=>a+it.absVal, 0) || 1;
  /* Emisión Total 2026 (suma con signo: bono resta). */
  const sumItems = items.reduce((a,it)=>a+it.totSigned, 0);

  /* Barra horizontal apilada — cada segmento muestra su % del total absoluto.
     Estilo similar al gráfico del Desvío de Emisión. */
  const fsSeg = (pct)=> pct>=8 ? 17 : (pct>=4 ? 13 : (pct>=2 ? 11 : 9));
  const seg = (it)=>{
    const pct = it.absVal/totalAbs*100;
    if(pct < 0.05) return '';
    const fs = fsSeg(pct);
    return `<div title="${it.lbl}: ${Math.round(pct)}%" style="width:${pct}%;background:${it.col};height:100%;display:flex;align-items:center;justify-content:center;border-right:2px solid var(--panel);font-size:${fs}px;font-weight:800;color:#fff;line-height:1;white-space:nowrap">${Math.round(pct)}%</div>`;
  };
  const chip = (it)=>{
    const pct = Math.round(it.absVal/totalAbs*100);
    return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);white-space:nowrap">
      <span style="width:11px;height:11px;border-radius:2px;background:${it.col};flex-shrink:0;border:1px solid rgba(0,0,0,.08)"></span>
      ${it.lbl} <strong style="color:var(--accent-3);font-family:var(--font-mono)">${pct}%</strong>
    </span>`;
  };

  /* Guardar datos para los desplegables. El drill se abre en un área COMÚN
     debajo del chart+leyenda, no en cada item, para no apretar la leyenda. */
  state._ejecEmitido = state._ejecEmitido || {};
  cats.forEach(c=>{
    const id = `ejecEmi_${c.key}_${sufijo}`;
    state._ejecEmitido[id] = (S.emitidoCats && S.emitidoCats[c.key]) ? {data:S.emitidoCats[c.key], useUSD, dual} : {data:{total:0,polizas:[]}, useUSD, dual};
  });

  /* Pie chart id único por moneda. */
  const pieId = `ejecEmiPie_${sufijo}`;
  const drillId = `ejecEmiDrillArea_${sufijo}`;
  /* Leyenda a la derecha del pie: triangulito + puntito + nombre · n pól · % · total.
     Es clickeable y abre el desglose abajo del gráfico (en el área común). */
  const leyenda = items.map(it=>{
    const id = `ejecEmi_${it.key}_${sufijo}`;
    const totColor = it.esBono ? 'var(--neg)' : 'var(--accent-3)';
    const countHTML = show25
      ? `<span style="color:var(--ink-3);font-weight:500;font-size:12.5px">· ${it.n25} → ${it.n} pól.</span>`
      : `<span style="color:var(--ink-3);font-weight:500;font-size:12.5px">· ${it.n} pól.</span>`;
    const nameCell = `<span style="color:var(--accent-3);font-weight:700;font-size:13px;white-space:nowrap">${it.lbl} ${countHTML}</span>`;
    const hov = `onmouseover="this.style.background='var(--bg-2)';this.style.borderColor='var(--line)'" onmouseout="this.style.background='';this.style.borderColor='transparent'"`;
    if(show25){
      const d=it.totSigned-it.tot25Signed, dc=d>=0?'var(--pos)':'var(--neg)';
      /* Grilla alineada: nombre | 2025 | → | 2026 | Δ (columnas de ancho fijo). */
      return `<div onclick="toggleEjecEmiArea('${id}','${drillId}')" style="display:grid;grid-template-columns:14px 13px 200px 88px 11px 88px 66px;column-gap:7px;align-items:center;padding:6px 6px;border-radius:5px;cursor:pointer;line-height:1.3;border:1px solid transparent;width:fit-content" ${hov}>
        <span id="${id}_car" style="font-size:11px;color:var(--accent)">▸</span>
        <span style="width:13px;height:13px;border-radius:50%;background:${it.col};border:1px solid rgba(0,0,0,.08)"></span>
        ${nameCell}
        <span style="justify-self:end;display:inline-block;white-space:nowrap;font-family:var(--font-mono);background:var(--bg-2);border:1px solid var(--line);padding:3px 7px;border-radius:5px;color:var(--ink-2);font-weight:700;font-size:13px">${FMTc(it.tot25Signed)}</span>
        <span style="color:var(--ink-3);text-align:center;font-size:12px">→</span>
        <span style="justify-self:end;display:inline-block;white-space:nowrap;font-family:var(--font-mono);background:rgba(45,155,106,.10);border:1px solid rgba(45,155,106,.25);padding:3px 7px;border-radius:5px;color:${totColor};font-weight:800;font-size:14px">${FMTc(it.totSigned)}</span>
        <span style="font-family:var(--font-mono);color:${dc};font-weight:800;font-size:12.5px;text-align:right">${d>=0?'+':''}${FMTc(d)}</span>
      </div>`;
    }
    return `<div onclick="toggleEjecEmiArea('${id}','${drillId}')" style="display:grid;grid-template-columns:15px 14px 1fr auto;column-gap:10px;align-items:center;padding:8px 8px;border-radius:5px;cursor:pointer;font-size:14.5px;line-height:1.3;border:1px solid transparent" ${hov}>
      <span id="${id}_car" style="font-size:11px;color:var(--accent)">▸</span>
      <span style="width:13px;height:13px;border-radius:50%;background:${it.col};border:1px solid rgba(0,0,0,.08)"></span>
      ${nameCell}
      <span style="font-family:var(--font-mono);font-weight:800;color:${totColor};min-width:82px;text-align:right">${it.esBono?'−':''}${FMTc(Math.abs(it.totSigned))}</span>
    </div>`;
  }).join('');
  /* Encabezado de columnas (solo en modo comparación): títulos 2025 / 2026 sobre las cajas. */
  const leyHeader = show25
    ? `<div style="display:grid;grid-template-columns:14px 13px 200px 88px 11px 88px 66px;column-gap:7px;padding:0 6px 5px;font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;width:fit-content">
        <span></span><span></span><span></span>
        <span style="text-align:center">2025</span><span></span>
        <span style="text-align:center;color:var(--pos)">2026</span>
        <span style="text-align:right">Var.</span>
      </div>`
    : '';
  const leyendaFull = leyHeader + leyenda;

  /* Guardar datos del pie para renderlo después */

/* Helper: armar la lista de polizas con emisión 2026 que NO alcanzaron el
   umbral de crecimiento (30% en moneda original $, 10% en US) comparando
   emisión total (prima + ajuste + bono + malus, neto con signo) 2025 vs 2026.
   Para cada póliza devuelve total25, total26, faltante (target - 26), %. */
function calcEjecCrecimiento(polFiltradas, mesCorte, useUSD){
  const out = {ars:[], usd:[]};
  for(const p of polFiltradas){
    if(polizaTerminada(p)) continue;
    const f25 = calcEmisionFiltrada(p,2025,mesCorte);
    const f26 = calcEmisionFiltrada(p,2026,mesCorte);
    const uu = p.moneda==='US';
    /* Total = prima + ajuste + bono + malus (bono ya viene negativo en el
       Excel, así que suma con su signo y resta del total). */
    const t25 = uu ? f25.totUSD : f25.totARS;
    const t26 = uu ? f26.totUSD : f26.totARS;
    if(t25<=0 || t26<=0) continue;
    const umbral = uu ? 0.10 : 0.30;
    const crec = (t26 - t25) / Math.abs(t25);
    if(crec >= umbral) continue;
    const objetivo = t25 * (1 + umbral);
    const faltante = objetivo - t26;
    const rec = {
      clave:p.clave, poliza:p.poliza, asegurado:p.asegurado, rubro:p.rubro, moneda:p.moneda,
      tipo2026:p.tipo2026, t25, t26, crec, umbral, objetivo, faltante,
      ars25:f25.totARS, ars26:f26.totARS, usd25:f25.totUSD, usd26:f26.totUSD,
    };
    if(uu) out.usd.push(rec);
    else   out.ars.push(rec);
  }
  out.ars.sort((a,b)=>b.faltante-a.faltante);
  out.usd.sort((a,b)=>b.faltante-a.faltante);
  return out;
}

/* Plugin para dibujar el % adentro de cada arco del doughnut. Si la porción es
   chica (<6%) lo dibuja AFUERA con una pequeña línea guía y el color del arco.
   Para porciones de 1-2% incluso muy chicas, se usa un offset radial mayor para
   evitar que los textos se solapen. Sin decimales. */
const pctOnArcPlugin = {
  id: 'pctOnArc',
  afterDatasetsDraw(chart){
    const ds = chart.data.datasets[0];
    const meta = chart.getDatasetMeta(0);
    const total = ds.data.reduce((a,b)=>a+Math.abs(b||0),0);
    if(!total) return;
    const ctx = chart.ctx;
    ctx.save();
    /* Calcular % de cada arco para no perder los chicos */
    const labels = ds.data.map(v=> total ? Math.round(Math.abs(v)/total*100) : 0);
    meta.data.forEach((arc,i)=>{
      const pct = labels[i];
      if(pct < 1) return;
      const p = arc.getProps(['startAngle','endAngle','innerRadius','outerRadius','x','y'], true);
      const angle = (p.startAngle + p.endAngle)/2;
      const rMid = (p.innerRadius + p.outerRadius)/2;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      if(pct >= 6){
        const x = p.x + Math.cos(angle)*rMid;
        const y = p.y + Math.sin(angle)*rMid;
        ctx.font = 'bold 14px Calibri,Segoe UI,sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(pct+'%', x, y);
      } else {
        /* Fuera del arco con una pequeña línea guía. Offset radial variable
           para reducir colisión cuando hay varias porciones chicas seguidas. */
        const offset = pct<=2 ? 22 : 16;
        const xA = p.x + Math.cos(angle)*p.outerRadius;
        const yA = p.y + Math.sin(angle)*p.outerRadius;
        const xB = p.x + Math.cos(angle)*(p.outerRadius+offset);
        const yB = p.y + Math.sin(angle)*(p.outerRadius+offset);
        ctx.strokeStyle = ds.backgroundColor[i] || '#888';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(xA,yA); ctx.lineTo(xB,yB); ctx.stroke();
        ctx.font = 'bold 11px Calibri,Segoe UI,sans-serif';
        ctx.fillStyle = ds.backgroundColor[i] || '#333';
        const tw = ctx.measureText(pct+'%').width;
        const xT = xB + (Math.cos(angle)>=0 ? tw/2+2 : -tw/2-2);
        ctx.fillText(pct+'%', xT, yB);
      }
    });
    ctx.restore();
  }
};
